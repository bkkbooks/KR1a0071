body:
  text: 易纂言卷十元吳澄撰説卦傳説卦者備載卦位卦德卦象之説蓋自昔有其説夫子傳述之以為傳爾首章次章則夫子總説聖人作易大意以為説卦傳之發端也其餘十一章以下語頗叢雜其義不可盡通於經亦不盡合或是夫子贊易以前如八索之書所載有若此者而夫子筆削之以其無大害於理者姑存之也昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻幽謂神明之理微而不顯也贊猶助也生蓍生出揲蓍之法也此言聖人肇創蓍法代為神明告人以吉凶所以贊助其幽而使其靈之顯也參三之也天謂竒數蓍之挂扐得五得四者也兩二之也地謂耦數蓍之挂扐得九得八者也倚依於其旁也蓍每揲以四故以四為一一挂二扐得五得四者一其四也故為竒而謂之天得九得八者二其四也故為耦而謂之地天之象圓圓者徑一圍三地之形方方者徑一圍四此言揲蓍一變之後挂扐得天一竒數則象天之圓而其圍三三者參其竒數之一也故以三數倚於天一竒數之旁所謂參天也挂扐得地二耦數則法地之方而其圍四四者兩其耦數之二也故以二數倚於地二耦數之旁所謂兩地也變謂揲蓍之變隂陽謂老少二隂老少二陽也立卦謂立成卦畫也三變所倚之數參天者三則為九而謂之老陽參天者一兩地者二則為七而謂之少陽二陽皆為竒畫兩地者一參天者二則為八而謂之少隂兩地者三則為六而謂之老隂二隂皆為耦畫此言揲蓍三變之後觀蓍變或得六八之隂或得七九之陽而立竒耦之卦畫也剛謂竒畫柔謂耦畫爻謂爻之辭此言揲蓍十八變之後六畫既成則發揮其剛畫柔畫之或變或不變而生出所用之爻辭以占也和順於道德而理於義窮理盡性以至於命爻辭之占其所行之利於民者不乖於天之道不逆於人之德而不亂於處事之義也其所知之明於天者研窮於事之理究盡於人之性而又極至於天道流行之命也傳八之一章凡五十六字注代為云偽切老少書紹切昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦性之理謂人之道也命之理謂天地之道也立者兩相對之謂天地人之道無獨而有對故天之氣有隂與陽地之質有柔與剛人之德有仁與義皆兩者相對而立道則主宰其氣質而為是德者也三才各一則為三三者各兼而兩之則為六故聖人之畫卦必備六畫而後成卦者所以象天地人之各有兩而為六也初二象地初剛也二柔也三四象人三仁也四義也五上象天五陽也上隂也分隂分陽迭用柔剛故易六位而成章上文以隂陽為天之道其位屬五屬上此隂陽二字則總言六位也六位之中分初三五為陽位分二四上為隂位也上文以柔剛為地之道其位屬初屬二此柔剛二字則總言六畫也六畫之中竒畫皆謂之剛耦畫皆謂之柔也位無質故以隂陽名之畫有質故以柔剛名之位之隂陽相間則分布一定畫之柔剛不同則迭為用以居於六位之中而不一定也故六位之中或用柔畫居之或用剛畫居之錯雜而成文章也繫辭傳所謂物相雜曰文即此成章之謂也傳八之二章凡六十九字注相間居限切天地定位山澤通氣雷風相薄水火不相射邵子曰此伏羲先天八卦之位也澄案天地定位者乾南坤北上天下地定其尊卑之位也山澤通氣者艮西北兌東南山根著於地澤連接於天通乎天地之氣也雷風相薄者震東北巽西南雷從地而起風自天而行互相衝激也水火不相射者坎西離東水火相害之物今一左一右不相侵克也此皆以圓圖言也八卦相錯數往者順知來者逆是故易逆數也八卦相錯者八卦之上各加八卦而成六十四也自左而右則以坤艮坎巽震離兊乾為次皆數其已往所生之卦故曰順自右而左則以乾兊離震巽坎艮坤為次皆推知其未來所生之卦故曰逆凡數易卦生出之先後則乾一兊二離三震四巽五坎六艮七坤八正如自右至左之序故曰逆數此皆以方圖言也朱子曰數往猶自今日而追數昨日也知來猶自今日而逆計來日也蔡氏曰順者馴也馴其舊迹逆者迎也迎之於未形如逆料之逆邵子曰順若順天而行是左旋也皆已生之卦故曰往逆若逆天而行是右行也皆未生之卦故曰來夫易之道由逆而成若逆知四時之比傳八之三章凡三十五字薄旁各切射食亦切數往逆數並色主切注根著直略切夫易音扶雷以動之風以散之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之此承上章羲皇卦位之後而言八卦之用上章逆數者以生出之序為次此章八卦先後以運行之序為次蔡氏曰動則物發萌散則萬殊具二者生物也潤則物滋烜則物舒二者長物也止則物成説則物鬯二者收物也君則物有所歸藏則物有所息二者藏物也乾至陽也居上而括下故為君坤至隂也居下而括終故為藏丁氏易東曰雷風初畫之竒耦雨日中畫之竒耦艮兊上畫之竒耦乾坤三畫之竒耦震巽坎離以其象言艮兊乾坤以其卦言動止説以其性言散潤烜以其功言君以其道言藏以其德言也傳八之四章凡二十二字烜沈逺切説音曰後皆同注長物知兩切帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮邵子曰此文王後天八卦之位也澄謂帝主宰萬物者也出謂物之初生震位東方春之時也齊謂物之畢達巽位東南春夏之交也相見者物之長盛明著也離位南方夏之時也致至而極之也役猶使也坤位西南夏秋之交也乾後君道夫道坤臣道妻道故役使坤土以養物於既長之將收之先也説者物皆收斂各得自遂而説也言助辭兊位西方秋之時也戰者鬭敵也乾位西北秋冬之交也五隂之剝進為純隂之坤六隂將及一陽在上將盡然陽之性健雖垂盡而猶與隂敵也勞去聲勞動之餘而休息曰勞坎位北方冬之時也萬物皆歸藏於內而休息也成完全也艮位東北冬春之交也完全者既終藏物之冬又始生物之春也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所説也故曰説言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮此申釋上文八句萬物之所以為萬物者帝也故上文言帝而此言萬物潔謂新而鮮潔也相薄者戰也出齊相見致役説勞成七者皆言萬物唯戰字非指萬物言故曰言隂陽相薄日月之蝕曰薄此前章雷風相薄謂雷風對位而相衝激猶望之日薄月也此言隂陽相薄謂隂陽同處而相鬭敵猶朔之月薄日也蔡氏曰帝之出入不可見而物可見故又以物言震巽離乾坎艮言方兊言時坤言地地者體也夫子欲備三者之義而互言之爾項氏曰後天之序播五行於四時也震巽二木主春故震在東方巽東南次之離火主夏故為南方之卦兊乾二金主秋故兊為正秋乾西北次之坎水主冬故為北方之卦土旺四季故坤土在夏秋之交為西南之卦艮土在冬春之交為東北方之卦木金土各二者以形王也水火各一者以氣王也坤隂土故在隂地艮陽土故在陽地震陽木故正東巽隂木故近南而接乎隂兊隂金故正西乾陽金故近北而接乎陽坤旺季夏義在中央故言地而不言西南兊以物成為説故言秋而不言西亦以例餘卦也傳八之五章凡百八十二字勞來到切注長盛知兩切後同勞動如字形王氣王音旺神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火不相逮雷風不相悖山澤通氣然後能變化既成萬物也此承上章文王卦位之後而言六卦之用不言乾坤者乾坤主宰萬物之帝行乎六子之中所謂神也者妙萬物而為言者也萬物有迹可見而神在其中無迹可見然神不離乎物也即萬物之中而妙不可測者神也故曰妙萬物雷之所以動風之所以撓火之所以燥澤之所以説水之所以潤艮之所以終始皆乾坤之神也動者發萌啓蟄震之出也撓者吹拂長養巽之齊也燥者炎赫暴炙離之相見也説者欣懌就實兊之説也潤者滋液歸根坎之勞也終始者貞下起元艮之成也五卦皆言卦象艮獨言卦名者終始萬物之事非山之所能盡也逮及也悖逆也既盡也水火相及故則相滅熄矣坎位正北離位正南兩不相及各得其用坎水能潤物於冬藏之時離火能燥物於夏長之時勢也雷風本是同氣震位正東巽位東南連續協助聲相同不相反逆故震雷能奮發於春生之時巽風能長養於春夏之交也深山大澤材木卉草之所叢聚羽毛鱗介之所窟宅艮位東北兊位正西各通其氣以蕃育容畜故艮能終物始物于冬春之交兊澤能説物於秋收之時也六子之能變化萬物者用乾道始物之神能既成萬物者用坤道成物之神也案第三章及此章言山澤雷風水火皆本羲文卦位而言六卦各居其位各有所用不取相對二卦相為用之義山澤通氣者山澤各自通其氣也若謂山澤之氣相通則有山之處多無澤有澤之處多無山何以能得山氣通於澤澤氣通於山也哉或乃因損咸二卦而生相通之義蓋未嘗察於地理也如先天卦位艮兊相對猶可強以相通解之然一居西北一居東南邈乎相遼非如東北之雷西南之風其氣可以相及而相通至於後天卦位則艮在東北兊在正西既不相對其氣何以能相通也於是對者遷就其説謂此亦是以先天卦對而言且此章承前章皆主文王卦位豈有章末結語而又用羲皇卦位聖人立言而本末舛逆首尾衡決意脈乃不相貫如此乎必不然矣邵子詩云天地定位否泰反類山澤通氣損咸見義雷風相薄恆益起意水火相射既濟未濟此乃借用説卦傳之言以説彼八卦合二象之義非可以彼義而釋此篇之言也傳八之六章凡八十七字水火不相逮或無不字者非撓乃飽切熯音漢注長養知兩切暴炙上皮卜切下知石切強其兩切乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也健者天之德順者地之德動者雷之德入者風之德陷者水之德麗者火之德止者山之德説者澤之德此八者繫辭傳所謂神明之德也將言八卦所類之形體而先言其所通之性情也蔡氏曰乾純剛故健坤純柔故順震陽生乎二隂之下則剛而進故動坎陽在二隂之中則其剛為隂所溺故陷艮陽出二隂之上雖健亦無所往矣故止巽隂成乎二陽之下則以順而伏故入離隂在二陽之中則以順而附故麗兊隂在二陽之上則以順而見故説項氏曰動陷止皆屬健入麗説皆屬順凡物健則能動順則能入健遇順則陷順遇健則麗健者始於動而終於止順者始於入而終於説此章以八字斷八卦之德其下乃以物以身以家依八德之類而分主之自此以下皆以隂陽純卦及初中終為序又非上章先天後天之序也傳八之七章凡二十四字注斷東亂切乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兊為羊健而行不息者馬也順而勝重載者牛也以動奮之身而靜息於地勢重隂之下與地雷同其馭者龍也龍之潛於淵底者重隂之處也以入伏之身而出聲於天氣重陽之內與地風同其感者雞也雞之鳴於丑半者重陽之時也或曰雞之行首動於前足動於中身不動而隨其後能動之二陽在前在中不動之一隂在後也前後皆隂之汚濁而中心剛躁者豕也前後皆陽之文明而中心柔怯者雉也外剛能止物而中內柔媚者狗也外柔能説草而中內剛很者羊也此以動類之八物擬八卦也傳八之八章凡二十四字注勝音升乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口至剛至實而在上者首也至柔至虛而容物者腹也陽動隂靜動而在下者足也動而在上者手也隂拆陽連拆而在下者股也拆而在上者口也耳之外內皆凹者隂也中之凸而實者陽也目之上下皆白者陽也中之黑而虛者隂也此以人身之八體擬八卦也傳八之九章凡二十四字注凹於交切凸田結切乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女萬物資始於天猶子之氣始於父也萬物資生於地猶子之形生於母也故乾稱父坤稱母索求而取之也坤交於乾求取乾之初畫中畫上畫而得長中少三男乾交於坤求取坤之初畫中畫上畫而得長中少三女一索謂交初再索謂交中三索謂交上以索之先後為長中少之次也此以人家之八屬擬八卦也傳八之十章凡八十字索色白切長男貞文切中男貞仲切少男詩照切乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果天者乾之本象羲皇畫三以象天也三竒象天氣之無涯也為父見第十章為馬見第八章此加良老瘠駁四字以見純陽無隂異於震坎隂陽相雜之馬良謂純陽健之最善者也老謂老陽健之最久者也瘠謂多骨少肉健之最堅強者也駁馬鋸牙食虎豹健之最威猛者也沙隨程氏曰為圜天之體也為君居上而覆下也為玉德粹也為金堅剛也為寒位西北也為冰寒之凝也為大赤盛陽之色也為木果以實承實也若艮為果蓏則下有柔者存焉澄謂赤加大字以别於坎坎中陽為赤乾純陽故為大赤傳八之十一章凡三十五字注覆符后切以别彼列切坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑地者坤之本象羲皇畫以象地也三耦象地形之厚積也為母見第十章為牛見第八章此加子母字以見其順而蕃育也為布旁有邊幅而中平廣也為釡容物熟物以養物也為吝嗇三畫皆虛故歉縮也為均均者陶人造瓦所用載土以成器物也為大輿三畫虛所容載者多也坎惟二畫虛亦為輿而不得為大也為文竒畫之連者質耦畫之分者文也為衆謂民也純耦之數多如民之衆也為柄謂在下而承物於上凡執持之物其本著地者柄也其於地也為黑地之土色有五若坤之所象則於地為黑土也黑者極隂之色也傳八之十二章凡三十三字注著地直略切震為雷為龍為玄黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮雷者震之本象羲皇畫以象雷也二隂包裹於一陽之外而一陽動奮於其內也為龍見第八章為長子見第十章為玄黃乾坤始交而生震故兼有天地之色得乾初畫為玄得坤中畫上畫為黃孔疏謂玄黃雜而成蒼色也為敷色又作敷與華通花蒂下連而上分為花出也為大塗一竒動於內而二耦開通前無壅塞也為決躁決者陽生於下而上進以決隂躁者陽之動也為蒼筤竹蒼深青色筤謂色之美蓋竹之筠也為萑葦萑荻葦蘆竹萑葦皆下本實而上幹虛其於馬也為善鳴為馵足為作足為的顙善鳴者陽在內為聲上畫耦口開出聲也馵足足骹白陽之色作足足超起陽之健皆言下畫之陽也的顙額有旋毛巾虛如射者之的言上畫之虛也其於稼也為反生稼諸穀之類反生萌芽自下而生反句向上陽在下也其究為健中上二畫變則為乾也為蕃鮮蕃盛而鮮美謂春生之草也草下一根而葉分開於上也傳八之十三章凡五十六字敷音孚筤音郎萑音九馵主樹切的説文作馰東歷切蕃音煩注骹空交切旋毛斯戀切句公侯切巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦風者巽之本象羲皇畫以象風也一隂入藏於二陽之內而三陽旋繞於其外也為木見象傳耦而下入者木之極竒而上升者木之幹也為長女見第十章為繩直以柔正剛也為工以柔巽隨宜制器以繩直木者木工也為白者陽之色外陽多故曰色見於外也為長為髙陽長隂短陽髙隂卑中陽積而達於上故長而髙也為進退為不果前二陽欲進後一隂欲退將進又退不果於進者也為臭者香羶腥焦朽之五氣及物有聲色臭味聲臭屬陽色味屬隂巽二陽外達故為臭反以三隅則震一陽內主為聲兊者巽之反體為味艮者震之反體為色也其於人也為寡髮為廣顙為多白眼皆上陽盛也以頭言隂血盛者髮多陽氣盛者髮少以顙言陽體勝者額廣隂體勝者額狹以眼言白者為陽黑者為隂離目上下白而黑者居中黑白相間而停勻巽日上中白而黑者在下上白多於下黑也為近利市三倍義理者陽也利欲者隂也震陽在內義理主於內也故一剛為主於內之卦為無妄巽隂在內利欲主於內也故為近利曰市三倍者猶詩言賈三倍謂市物而得利三倍近利之至甚者也其究為躁卦三畫皆變則為震也震之三畫皆變則成巽巽之中上二畫變則成坤於震不變其初畫之陽而但變其中上二畫故其究為乾而不為巽於巽先變其初畫之隂而盡變其初中上三畫故其究為震而不為坤蓋喜隂卦為陽卦陽卦為純陽卦而不欲陽卦為隂卦隂卦為純隂卦也傳八之十四章凡五十二字長女知兩切注見於賢遍切相間居限切賈音古坎為水為溝瀆為隱伏為矯揉為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄其於輿也為曵為多眚為通為月為盜其於木也為堅多心水者坎之本象羲皇畫以象水也上下二隂象土之凹中陽象水之流於凹中也為月者天之水也故方諸可取水於月二隂象上下之匡郭一陽象中之明也為耳見第九章此加痛字為溝瀆為隱伏溝水之通流而注於川者瀆水之通流而注於海者隱伏水之潛流於地中者繫辭傳巽稱而隱雜卦傳兊見巽伏巽六隱亦伏者得坎下半體也為矯揉謂以剛物納於陷空之中面矯其曲者使之直揉其直者使之曲也為弓輪中剛象弓之弣上下之柔象弓之隈弰中竒象輪之軸上下之耦象輪之輻牙也其於人也為加憂為心病為耳痛陷於險中故其憂加重中實者心也為二隂所掩故病耳痛義同為血卦離火在人身為氣坎水在人身為血也為赤得乾中畫之陽故與乾同色其於馬也為美脊為亟心為下首為薄蹄脊者外體之中心者內藏之中坎陽在中故脊美心亟急也前畫柔故首下而不昻下畫柔故蹄薄而不厚其於輿也為曵坤輿為平地載物之大車坎輿為險路人乘之小車坤畫皆虛以待物來實之坎畫中實以象人在車中曵者險路艱於前進若或曵其後也為多眚已有過而致患害曰眚多眚者坎之險陷多患害而少平康也舊説以為輿之多眚有險陷而多阻礙蓋行於險道不若坤輿之行於平地者易且安也為通一陽貫乎二隂之中也為盜隱伏而潛通於中也其於木也為堅多心中剛也傳八之十五章凡七十二字其於輿也為曵舊本為曵二字在其於輿也之上矯一作橋紀表切輮馬鄭陸績王肅本作汝九切注凹於交切稱尺證切見賢遍切弣非古切隈波回切弰辛交切牙音迓藏才浪切易以豉切離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿火者離之本象羲皇畫以象火也火中虛而麗於實物其中黑者一隂為光明而色赤者上下二陽也為日者天之火也故陽燧可取火於日中一隂象日之內斂上下二陽象日之外明也象傳曰作明為電則象傳中下二畫震之雷也上畫一陽則霹靂掣光見乎外也為中女見第十章為甲胄上剛象胄下剛象甲中柔者被甲胄之人也為戈兵上剛象其刃下剛象其樽鐓中柔者其柲也其於人也為大腹中虛也為乾卦坎水為溼離火為乾也為鱉為蟹為螺為蚌為龜二剛象其前後上下之介中柔象其肉也其於木也為科上稿科下實中空也上稿上亦堅也稿者僵死乾枯之木也木生則柔脆死則堅剛傳八之十六章凡四十四字中女貞仲切乾卦古端切蟹户賣切螺力禾切蚌步項切注霹匹厯切靂來狄切掣尺列切見乎賢遍切鐏祖本切鐓徒對切柲兵媚切脆七醉切艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節山者艮之本象羲皇畫以象山也下二隂地也上一陽隆起而在地之上者山也為指即第九章為手也為狗見第八章為徑路徑者路之小也艮者震之反體髙山之上成蹊非如平地之大塗也為小石剛在坤土之上象山頂髙處之小石坎剛在坤土之中則象平地土中之大石也為門闕闕者門之出入處上畫連亘中下二畫數峙而虛似門闕也為果蓏果者木實蓏者草實乾純剛故為木果艮一剛在上者木之果二柔在下者草之蓏沙隨程氏引詩果螺之實以為一物然蓏作螺字不同也為閽寺外一剛閽人無足而禦止於外者也內二柔寺人無陽而給使於內者也為鼠為黔喙之屬皆謂前剛也黔字當與鉗通以鐵持束物者黔喙之屬山居猛獸齒牙堅利如鐵能食生物者也其於木也為堅多節剛在外也傳八之十七章凡三十七字蓏力大切黔其廉切喙兄衛切注處昌據切兊為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊澤者兊之本象羲皇畫以象澤也澤之大者海海之下際天下二陽天也上一隂虛缺而在天之上者澤也凡水之豬有似於海者亦名為澤為少女見第十章為口見第九章此加舌字外之畫耦象口中內之畫竒象口中之舌為羊見第八章為巫少女外以口媚恱陽神俾陽神降於其身內也為毁折前畫缺如物之毁折也為附決一柔附於外而內之二剛將決去之也其於地也為剛鹵鹵鹹土也東方曰斥西方曰鹵東方之斥在溼地而柔西方之鹵在燥地而剛下二陽剛也上一隂鹵也西方之地中下堅堅如石而上柔為鹵者化鹽為妾則不稱為妻也兊者巽之反體長女為人妻之象從之而為娣也傳八之十八章凡二十八字少失照切鹵郎古切注長女貞丈切案第七章至第十章合八卦德象言之而分四類為四章第十一章至第十八章合所象諸類言之而分八卦為八章項氏曰反覆推廣使之明備沙隨程氏曰八卦之象八物而已充其類則百物不廢極其説可以類萬物之情然説卦之象有與卦爻相符者有不與卦爻相符者有見於卦爻而説卦不載者有見於説卦而卦爻無之者若夫大琴謂之離小壘謂之坎此見於他書而易與説卦又可以類推也為龍乾初九九二九五上九用九坤上六為直坤六二為衣既濟六四為言需九二訟初六師六五明夷初九夬九四困彖革九三震上六漸初六然乾不象言也以上乾逸象四為牝坤彖離彖為迷坤彖復上六為方坤六二為囊坤六四為裳坤六五為帛賁六五為漿彖爻辭無以上坤逸象七為圭誤作土益六三為鶴誤作鵠中孚九二為鼓中孚六三以上震逸象三為楊大過九二九五為鴻誤作鸛漸初六六二九三六四九五上九以上巽逸象二為宫困六三為律師初六為可坤六三無妄九四損彖井九三漸上九小過彖皆以可為辭然非取象於坎也為棟大過彖九三九四為叢棘坎上六為狐解九二未濟彖為蒺藜困六三為桎梏蒙初六以上坎逸象八為牝牛離彖以上離逸象一為鼻噬嗑六二為虎履彖六三九四頤六四革九五履革皆無艮艮不象虎也為豹誤作狐革上六義同上以上艮逸象三為常彖爻辭無或曰當為裳或曰當為商或曰常九旗之一下二竒象通帛下垂上一耦象為繫於杠音工為輔頰咸上六艮六五以上兊逸象二凡八卦之逸象共三十荀爽九家易有之皆附前各章之末項氏曰逸象多取於繇辭沙隨程氏曰查籥云若不通倫類雖多添亦不盡易纂言卷十
