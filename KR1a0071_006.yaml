body:
  text: 易纂言卷六元吳澄撰象下傳山上有澤此釋艮下兑上也山頂之上而有容水之澤也咸此重卦之名澤在上而水下潤於山山在下而氣上蒸於澤此二氣之交感也故卦名為咸君子以虛受人澤虛容水於上以虛而能受在下山氣之蒸山虛含氣於下以虛而能受在上澤水之潤故君子象之而以虛心受人之諫教也上六之耦澤之虛也四五之實所受山氣之蒸也初二之耦山之虛也九三之實所受澤水之閏也咸其拇志在外也外謂四四之志不在初而初之志則在四初善矣雖凶居吉順不害也順謂順理靜守以俟正應為順理咸其股亦不處也志在隨人所執下也隨人謂隨已之人范氏大性曰處止也艮之德止而今不能然二欲從三三亦志於得二三居二之上故云所執下也艮體在他卦近爻亦不相取而此不然者居感之時故也貞吉悔亡未感害也憧憧往來未光大也凡相感以情者利相感以偽者害四感初正應是相感以情而未感於害者也若變其剛憧憧然與五相感則非公正無私之感未可以為充實有光輝之大也咸其晦志末也李氏鼎祚曰末猶上也志末者謂五志感於上也咸其輔頰舌滕口説也滕騰通滕猶播也國風曰士也罔極二三其德離騷曰初既與子成言兮後悔適而有他所滕之口説蓋如此也傳四之一凡七十一字雷風此釋巽下震上也恆此重卦之名雷發聲於卯中收聲於酉中一年之間唯半年有雷風則盛治之世五日一風或風多之時恆風者有矣雷不恆有而風恆有雷不兼風不能恆也雷而以風濟之則恆矣故卦名為恆君子以立不易方雷之起每嵗各有方風之起八節各有方周則復始常然而不易故君子之自立而不易其方者象之曰雷風所起之方雷則每歲不同風則每節不同非一方矣豈所謂不易者哉君子所立之方如此其可乎曰正如此也項氏曰立不易方方之所在則立焉非一方也程子亦曰恆非一定之謂一定則不能恆矣唯隨時乃常道也澄謂立不易象二五之居中方象初三四上之分布於內外浚恆之凶始求深也始謂卦之初畫猶婦歸夫象之始也始歸而即求深入不出以相夫而克家者九二悔亡能久中也有悔而悔亡者以能常久於中而不過剛也不恆其德無所容也不得以恆久其飲食之德者以悍戾被出而無所容其身也久非其位安得禽也非其位謂居柔丈夫以剛為有才居柔則是無才也安能得禽哉婦人貞吉從一而終也夫子制義從婦凶也以柔中順從一夫終身主饋者此婦人正主事之吉也為夫子則當以剛裁制事理之宜不主故常乃為男子之正主事若亦如婦人之從一而終則凶矣振恆在上大無功也隂柔而振奮於上雖變為陽剛之大而亦無能強之功也傳四之二凡六十字注相悉亮切天下有山此釋艮下乾上也遁此重卦之名山髙有侵天之勢天行不息有似逃避而去之故卦名為遁君子以逺小人不惡而嚴天行在上非有意於逺山而山止於下自不能近此逺小人不惡而嚴之象艮二隂之浸長小人也乾三陽上進而逺去逺之也乾三陽之剛健嚴也下與艮之一陽合而為同類不惡也項氏曰艮為少男故小乾為君父故嚴遁尾之厲不往何災也以初長之隂往應上盛之陽豈能久應知其危厲止而不往則何有於災也執用黃牛固志也堅固其志使之留止而不肯進也係遁之厲有疾憊也畜臣妾吉不可大事也係於隂而不能去猶不去其疾而至於憊所以為厲係戀陰柔所以為疾畜臣妄之私恩不可為之大事也君子好遁小人否也君子雖與之和好而亦遁所以吉小人則不能然所以否嘉遁貞吉以正志也以正主事為志而無私情也肥遁無不利無所疑也疑謂滯擬於隂而為所惑也傳四之三凡七十三字逺于願切憊步拜切雷在天上此釋乾下震上也天無上下以人所不覩處為上雷聲在天之上極其髙也大壯此重卦之名雷聲卑下者陽氣猶弱也雷聲髙亢者陽氣盛壯也故卦名大壯君子以非禮弗履君子之非禮弗履唯剛健以動者能之禮者天之理而其用卑下乾在下之象也履者足之所踐如雷行所過震在上之象也壯于趾其孚窮也窮謂征凶也以初之恃其壯而猛於進雖有九四之孚牽引於前征行則必窮而凶也蓋曰雖其有孚亦必困窮九二貞吉以中也中則無過不恃其壯而猛進也小人用壯君子罔也三之用壯非能如君子之罔也兩開其端一則以戒一則以教也藩決不羸尚往也尚上也前行無所礙故得上進而往也喪羊于易位不當也六居五為位不當變為剛則位當矣故喪羊而無悔也不能退不能遂不詳也艱則吉咎不長也不詳謂不詳審藩籬之礙其前而乃很進也知其艱難不可以進則吉矣是其殃咎不至於長也傳四之四凡六十五字注很休懇切明出地上此釋坤下離上也日西入於地下則暮日東出於地上則旦晉此重卦之名日出地上進進而上故卦名為晉君子以自昭明德明德者離日之象自昭者出地上之象晉如摧如獨行正也裕無咎未受命也獨行謂四不援而進之也正釋貞也裕者不急於求四之孚故未進而受命於四也受兹介福以中正也以六二中正故能順事六五而受其福也衆允之志上行也衆志同進故三與二隂進而上行也鼫鼠貞厲位不當也以居柔故如鼠之伏於晝也失得勿恤往有慶也有慶謂陰陽相遇合維用伐邑道未光也道未光釋貞吝傳四之五凡六十六字明入地中此釋離下坤上也明夷此重卦之名日入地下而暗若明之遭傷然故卦名明夷君子以涖衆用晦而明項氏曰明出地上君子以之自治明入地中君子以之治人明而遭傷本非善事君子觀之皆為有用用之以居人上聰明睿知守之以愚使小人有所容君子得以自盡豈非君子之善道哉蔡氏曰涖離象衆坤象用晦坤象明離象澄謂涖衆者以離照坤也用晦而明者以坤養離也君子于行義不食也明傷之時君子在路雖有可食然以義不當食而不食之也六二之吉順以則也六二以柔居中為順而有則故能得強壯之馬以拯己之傷而有吉也南狩之志乃大得也以陽明獵隂暗而有所得也入于左腹獲心意也五入于四之腹者四能得五之心意也箕子之貞明不可息也明雖遭傷而其明不以傷而遂息故亦利於正主事也初登于天照四國也後入于地失則也下之明登用于上則可以照四國不用而使之入于地故在上者失其所法則也傳四之六凡七十一字注睿知音智風自火出此釋離下巽上也邵子謂火為風蓋風者火氣之所化火能生風風自火而出也火盛則其氣上衝其猛急飄揚者即風也家人此重卦之名屋下有火炊爨則屋上有風自突而出凡有外風自內火而出者是其家有人居之也故卦名家人君子以言有物而行有恆人之家必竈有火而後突有風君子以家之本在身修身者必言有物而後行有恆言有物者言皆有實而顧其行也言有實則行自有恆而顧其言矣洪範五事一曰言屬火言有物如火之麗於物而傳故言之有物象火身所行之行如行地之風雷得風而其卦為恆故行之有常象風間有家志未變也程子曰間之於志意未變動之前也志變而後治則所傷多矣六二之吉順以巽也六二自上來得坤順之中盡上九自二往成上卦之巽體能柔順而卑巽者也家人嗃嗃未失也婦子嘻嘻失家節也嗃嗃而改悔則於治家之道未為失否則傷思而失治家之節矣嗃嗃下不舉悔字而有其意象傳舉爻辭之例如此者多矣富家大吉順在位也順謂得坤順下畫在位謂以柔居柔得其正位故能作配正家而致王之吉也王假有家交相愛也程子曰夫愛其內助婦愛其刑家交相愛也威如之吉反身之謂也言反求諸身自治嚴肅故下皆畏之非以威刑為威也傳四之七凡七十一字行下孟切注其行行自之行故行並同上火下澤此釋兌下離上也睽此重卦之名火氣炎上澤水潤下兩相睽異故卦名為睽君子以同而異項氏曰睽非善事然有當睽者同而異是也二女同居同也其志不同行異也此人道之當然其在君子則周而不比和而不同羣而不黨皆同而異也同人於異之中見其同睽於同之中見其異同兌説之象也異離明之象也見惡人以辟咎也項氏曰初以四為惡人其見之也辟其為咎爾非望其有所行也遇主于巷未失道也里巷之相遇雖非其所然所遇者正應未為失道也見輿曳位不當也無初有終遇剛也三陽位六以柔居之才弱不能進故與曳剛謂上九也交孚無咎志行也敵應本不相與交既孚而初之志得行於四所以無咎也厥宗噬膚往有慶也二剛噬五之柔則隂陽相合而有慶矣遇雨之吉羣疑亡也六三者上九之正應也因九四之梗于前故上九之見六三疑其如負塗之豕疑其如載鬼之車又疑其遭張弧之射其疑不一故曰羣疑心疑則情不親矣故雖婚媾也而速逺之反若寇然及九四之􅋃先張後説柔弱之三與強梗之四既和則上九之羣疑俱亡而正應相求六三上九之睽合矣傳四之八凡六十三字辟皮二切山上有水此釋艮下坎上也山上有澤者山上有水渟之澤也山上有水者山上有川流之水也蹇此重卦之名山之峻已不可躋攀至山之上而水之險又不可超越則不可行而進也故卦名為蹇君子以反身修德行有不得者皆反求諸已前遇險而外不可行唯當靜止於內反求諸身以自修其德也反身自艮取象陽止於外而回顧其內象反身修德自坎取象陽在於中而坎水常流象中心修為之不息往蹇來譽宜待也宜止於初而待不宜往也王臣蹇蹇終無尤也安於義命終無所怨尤於人也往蹇來反內喜之也內謂六二九三反于下以親六二而六二亦喜之也往蹇來連當位實也六四雖當位然柔而虛九三之當位則剛而實下連九三是得當位而實者為己之援也大蹇朋來以中節也中節者謂九五居中之節九五往外而居外卦之中故九三得以來內而居內卦之上九三之所以能來內者其由蓋以九五之得中也往蹇來碩志在內也利見大人以從貴也內謂六四貴謂九五傳四之九凡五十九字案鄭本宜待下有時字蓋以叶韻故然離騷徑待與為期叶則不添時字亦叶韻雷雨作此釋坎下震上也解此重卦之名雷動乎上雨降乎下則鬱結之氣解矣故卦名為解君子以赦過宥罪雷雨作而解散鬱結之氣則物被發生之仁君子以之解散囚繫之人則人蒙寬大之恩過者震動之愆赦則縱之使去象雷之匆有遂無罪者坎險之惡宥則減之使輕象雨之潤漸而不驟剛柔之際義無咎也以柔承剛與之交際而順從之合時之冝矣故曰義九二貞吉得中道也不過剛而隂之難解得中道者能之負且乘亦可醜也自我致冦又誰咎也負擔小人而乘君子之器非能為君子之害也彼自可醜爾為九四之民所寇奪者彼所自取非人之咎也解而拇未當位也九四以剛居柔未當其位是未能純乎君而得中則能獲三狐而解其難脫然無所纍也君子有解小人退也近比之初三既有解則正應之五自退聰而三隂之難俱解也公用射隼以解悖也隂不順陽悖也初三五之三隂九二解之於前既順乎陽矣唯上六一陰悖而未順也至於終為九四所射而後得以解其悖也傳四之十凡六十五字自我致寇舊本冦作戎朝氏曰其失自虞始虞前皆依爻辭作寇解悖佳買切注難奴旦切未當當位並去聲比皮二切山下有澤此釋兌下艮上也山之下有澤非山之邊側有澤也澤者瀦水之委非通流之川亦非有源之泉所瀦者死水而已損此重卦之名山下之澤潤上行而水漸減故卦名為損君子以懲忿窒欲懲平之也窒塞之也忿氣之起如山之高欲心之留如澤之深朱子曰觀山之象以懲忿觀澤之象以窒欲項氏曰少男多忿少女多欲人之所當損者唯忿與欲九思之終曰忿思難見得思義已事遄往尚合志也尚上通上謂六四也往益六四與之合志也九二利貞中以為志也以其中為志而益六五利在自守不宜行往也一人行三則疑也疑謂不專一無所適從也繫辭傳所謂致一是也損其疾亦可喜也有喜者初可喜者四故言亦六五元吉自上祐也龜弗克違者上九祐之也弗損益之大得志也大謂陽上九不損下而能益上所謂得志也傳四之十一凡五十九字注委役偽切風雷此釋震下巽上也益此重卦之名風雷皆氣也然風之聲因物而後盛雷則其聲自盛奮迅之威甚於風風得雷則增助其勢故卦名為益君子以見善則遷有過則改人之益莫大於遷善改過遷善巽象巽在外於人之善見則遷之自外而益也改過震象震在內於己之過有則改之自內而益也遷如風之行改如雷之擊朱子曰遷善當如風之速改過當如雷之猛元吉無咎下不厚事也厚猶言重大也事作為之事也厚事即爻辭所謂大作也初九所以元吉無咎者蓋下民小弱之力不能厚有所事大作為以益之必陽剛之才自上而來益下者也或益之自外來也外謂九五益用凶事固有之也固猶故也凶事急遽不暇於求人上九不能下益六三所謂益之乃六三舊時已所自有之者而非上九益之也告公從以益志也告者告之以求益之志而初九從之也有孚惠心勿問之矣惠我德大得志也在下者受益而惠其心不待問筮而吉可知大謂初九之陽初九益之主德被于人人懷其恩得遂以己益人之志也益之初九即損之上九皆一卦之主爻故象傳皆言其大得志莫益之偏辭也或擊之自外來也偏者徇己而不益人之謂大學傳云辟則為天下僇辟即偏也六二之自外來謂九五自外而來內以益六二也此爻之自外來謂上九自外而來內以擊六三也夫子之傳如此其明舊注猶且誤以或擊之為擊上九而不知其為擊六三也傳四之十二凡七十三字注辟匹亦切澤上於天此釋乾下兌上也凡海岸之上皆天也海水湧起髙數十丈是為澤上於天夬隄壞而河水泛溢謂之河決海水湧起而髙出虛空謂之海決故澤上於天之卦名為夬君子以施祿及下居德則忌海決者災異非美事也君子觀其象既革其不美以為美又因其不美以為戒海水上湧則注溉于下故象之而施祿以及下人海水盈溢則湧出于上故象之而居德則忌滿盛或以祿為兌象德為乾象然兌澤祿也乾天亦祿也是兌之二陽乾之三陽皆可象祿乾健德也兌説亦德也是乾之三陽兌之二陽皆可象德施者自上而施以至於下故五而四四而三三而二二而初陽之祿施自五始而極於初蓋上之所施必使及於下而後止者欲其溥遍也居者在下而積以至于上故初而二二而三三而四四而五陽之德積至五止而不極於上蓋下之所積不使至于上而過髙者忌其盈溢也項氏曰居訓積書之化居易之居業皆是漢人猶言居積不勝而往咎也陽盛之時陽居陽位故戒其輕往有戎勿恤得中道也得中則不恃剛而能惕能惕則有備故雖有戎而無憂也君子夬夬終無咎也君子之夬夬也不恃其剛雖和於柔而終能決去之故無咎與壯而有凶者異矣其行次且位不當也聞言不信聰不明也位不當謂以剛居柔故次且聰不明謂坎耳塞其內也故不聰於聽中行無咎中未光也夬之主爻比近所決之柔以其中而無不及故能引進羣剛同決一柔然僅免咎而已於剛中之道未為光也無號之凶終不可長也言一柔在上終不可以長久必為五陽所決去也傳四之十三凡七十一字施申志切天下有風此釋巽下乾上也天下有風猶天下雷行言普天之下覆燾所及無一處不有此風也姤此重卦之名天之下處處有風則無一物不與風遇故卦名為姤后以施命誥四方風遍及乎普天之下猶君人命令遍及乎四方也命者巽之命施者乾之所施誥者以乾九五所施巽九二之命由中而達于四方也四方者下體之初三上體之四上也繫于金柅柔道牽也程子曰牽者引而進也隂始生而漸進柔道方牽也繫于金柅所以止其進也包有魚義不及賓也二之剛中既包有初之魚其義不能以及於九四矣其行次且行未牽也行未牽謂使九四之行未能下就初六而與之相牽聨也無魚之凶逺民也九四陽君也初六陰民也初不應四是君不能有其民而逺其民也九五含章中正也有隕自天志不舍命也志者下之志命者天之命舍猶違也志一動氣能致天命不違已也謂下之三陽一隂能致九五之下臨而與之遇也下有志於遇五故能致天命之不違已志志不舍命辭意與逺民相似民之逺君由君使其民之逺也故不曰民逺而曰逺民天命之不違人由人能使天命之不違也故不曰命不舍而曰不舍命也姤其角上窮吝也處上而窮極其吝者時位則然非已之咎傳四之十四凡六十六字逺于願切舍音捨注覆孚豆切燾同冒切澤上於地此釋坤下兌上也澤上於地謂澤中之水溢出岸旁地上也萃此重卦之名西海北海之濱澤上有地者為臨東海南海之濱澤上於地者為萃蓋東南地勢卑下澤水溢出海岸淹浸平地萬有餘里衆流之歸悉聚於此故卦名為萃君子以除戎器戒不虞除猶治也又與儲通蓄聚也戒猶備也虞度也不虞謂不虞度而至之事也衆聚之事有備則無患故除治兵戎之器以戒備不虞之事也兌西方金三四五互巽巽木外有兌金戎器之象坤平地無險阻可恃不虞之象坤能儲蓄兌能戒備乃亂乃萃其志亂也謂其志之擾亂也引吉無咎中未變也引之至久者固守其中而未變也往無咎上巽也上從九四以一隂入于二陽之下三四五互成巽體故曰上巽也大吉無咎位不當也雖是剛畫以其居柔則未可謂之大也萃有位志未光也雖有陽位而未能得二之孚故其志未能光顯也齎咨涕洟未安上也未能安於衆人羣聚之上也傳四之十五凡五十九字注度待洛切地中生木此釋巽下坤上也地中生木謂木根生於地中而未出土者也升此重卦之名木根既生於地中漸而升以出土故卦名為升君子以順德積小以成髙大項氏曰順德坤也積小以髙大巽也澄謂初六之柔小也積謂自下畫而始九二九三之剛大也自下升至于上高也成謂至上畫而終九三巽體之上畫也巽為髙允升大吉上合志也上謂九三三之志欲升初與之合志故與之易位而三得以遂其志也九二之孚有喜也有喜謂利且無咎也升虛邑無所疑也無所疑謂如入無人之境無所疑惑顧慮也王用亨于岐山順事也六四坤之初畫為順九三近比六四能得坤之順德以事隂神也貞吉升階大得志也大指九二剛畫而言應五而上升得志也冥升在上消不富也消不富謂柔畫剛為息柔為消剛實為富柔虛為不富所謂冥升以柔畫之消而不富者在上也若剛畫息而富者升于上則為照升而非冥升矣傳四之十六凡六十三字以成高大舊本無成字陸德明王昭素皆云一有成字今從之澤無水此釋坎下兑上也水在澤之下是水漏于下而澤無水也困此重卦之名水下漏而澤上枯乏悴之象故卦名為困君子以致命遂志君子處困窮之時凡事委之天命而必遂已志苟不知命貪生趨利而改其志則何以為君子哉命自外至故致命以外兑取象志由內守故遂志以內坎取象兑一隂乘二陽之上而得正命之出於天而正者也柔説於外有能委順之意坎一陽陷二隂之間而得中志之厄於時而不屈者也剛實於內有能直遂之意入于幽谷幽不明也謂墮落在幽暗不明之地也困于酒食中有慶也以其得中故有福慶也據于蒺藜乘剛也入于其宫不見其妻不祥也剛謂坎之中畫不祥者死將至也來徐徐志在下也雖不當位有與也下謂初志在於拯初也不當位謂居柔故其行徐有與謂與初為正應行雖徐終必能就初而拯其困也臲卼志未得也乃徐有説以中直也利用祭祀受福也志未得謂居髙不安中直即中正改正為直以叶韻受福謂其中實也困于葛藟未當也動悔有悔吉行也未當者所處未得其當也吉行者能行而去之則吉也傳四之十七凡九十四字注説音曰木上有水此釋巽下坎上也程子曰木承水而上之乃器汲水而出之象澄案彖傳言巽乎水而上水此象傳言木上有水合彖傳象傳之義其為木器入水而承水以上無疑説者乃因彖爻有羸瓶甕敝之辭則謂古人蓋以陶器汲而不以木器汲於是以木為轆轤桔橰井幹之屬然三物非入水者亦不可謂三物之上有水與彖象傳意不協夫陶器木器皆可汲也何以知古人必用陶器而不以木器乎井此重卦之名丁氏易東曰以木為器汲水而上井之用也澄謂卦名為井以此或云木杪抽水以上有井中汲水而上之象其説雖巧而不若舊説之安君子以勞民勸相井之養人所及者衆君子觀其象教民以相養之道勞者閔其勞而休息之也勸勤勉之意相助力也勸相者使之各勤勉以相助也商法八家同井共耕公田而已周則私田亦令通力合作出入相友守望相助疾病相扶持此皆勸相之法各相助力則民有休息之時勸相者所以勞其力也勞民取坎象水者萬物所歸故説卦傳曰勞乎坎勸相取巽象木本根生枝葉枝葉芘本根勸相之義坎之二柔民也中一剛動者而休息於二柔之間勞之意巽外二剛力有餘能相助人內一柔力不足而能卑巽以下二剛使之肯來助己勸之意也井泥不食下也舊井無禽時舍也下謂在六畫之下井之上出者為可食之水其在下者為不可食之泥也舍不用也時所不用非但人不食禽鳥亦不食也井谷射鮒無與也與謂應無應在上故無提挈之以出者井泄不食行惻也求王明受福也行惻者欲其得行故為之惻然也王之明者則必見用而受福自泄於己即所以求之之道所謂夫子之求之異乎人之求之也井甃無咎修井也修謂甃砌完整也寒泉之食中正也九五之冽寒而可食者以其中正也元吉在上大成也大指九三之剛而言上六能汲之至上故其陽剛濟物之功得以成也傳四之十八凡六十六字勞林到切相息亮切舍音捨注其勞相養相助相友相扶如字為之云偽切澤中有火此釋離下兌上也海為大澤萬水所歸海之尾閭名曰焦釜之谷水至其處如沃焦釜有火在下消乾其水是為澤中有火革此重卦之名水能滅火而水反為火所消以至多之水悉化而無有皆改變其常也故卦名為革君子以治厯明時此變革之至大者也厯謂日月五緯之躔次時謂春夏秋冬之代序推日月而後可定四時故治厯所以明時也治厯取兌象明時取離象治猶治水之治俾軌道秩然而理如澤之衆流有歸明如火明之明俾氣候粲然而見如火之纖微畢照兌為巫史司厯必有其官也離為日定時皆起於日也鞏用黃牛不可以有為也時在初位在下上無應援不可以有為但當固守不動也已日革之行有嘉也行釋征有嘉釋吉無咎革言三就又何之矣之往也即征之義九三不當往求上六之應惟當待上六來就己也又何之謂又何待於往也改命之吉信志也改命而吉者二孚於四是二能信四之志也大人虎變其文炳也炳者如火日之光明也君子豹變其文蔚也小人革面順以從君也九五應離中畫離為火為日故其文炳然如火日之光明上六應互巽中畫巽為木故其文但蔚然如草木之荗盛不能如九五之炳然也小人則變為柔順以順從於君又不能如變為剛之君子矣傳四之十九凡七十字注消乾音于木上有火此釋巽下離上也以木入火則火然木而起髙焰是為木上有火鼎此重卦之名鼎烹飪之器以木入火而成烹飪之用故卦名為鼎項氏曰鼎之木上有火猶井之木上有水非井鼎之本形也水至木杪為滋液象水泉之上出火至木杪為華實象鼎氣之上蒸澄謂以木之滋液為水猶為可通以木之華實為火則迂僻甚矣君子以正位凝命正位者敬也凝命者信也容貌不敬則民慢政令不信則民疑正位取離象離為南面之位舜之恭已正南面是也凝命取巽象巽為命令凝者凝結而不可解謂命令之已出者不可輒改當堅如金石信如四時也二者象鼎之重固而不可遷也鼎顛趾未悖也利出否以從貴也足反居上為悖逆以其出否故為未悖貴謂四妾賤而上從其子之貴則非僭猶趾顛而傾出其中之否則非悖也鼎有實慎所之也我仇有疾終無尤也鼎之有實如人之有道德者也慎其所往豈肯自輕而往求於上哉九二雖不即六五而六五終無所尤於九二之不我即也鼎耳革失其義也鼎耳在五卦之主也而變革居三失其宜矣非改悔何能終吉乎覆公餗信如何也信實也言鼎中之實竟如何也鼎黃耳中以為實也黃耳中虛故能受鉉以為實也玉鉉在上剛柔節也不太剛不太柔而適其宜為節傳四之二十凡七十字洊雷此釋震下震上也一雷之後又一雷洊雷也震此仍羲皇八卦之名為重卦之名君子以恐懼修省懼甚於恐修省修而又省也君子初聞雷聲既恐而自修矣再聞雷聲愈懼而加省焉蓋慮所修之有未至取重震之象也震來虩虩恐致福也笑言啞啞後有則也恐謂虩虩致福謂致笑言啞啞之福有則謂不以恐懼而失其常度也震來厲乘剛也柔乘初剛迫近雷威故危震蘇蘇位不當也所居之位不當故宜行而去之震遂泥未光也震雷開而為電則有光遂陷於泥則未能有離電之光也故曰未光震往來厲危行也其事在中大無喪也上行下行皆危故曰危行有事者在固守其中柔中居剛為大中故能有守而億無所喪也與六二之柔中居柔小而非大者不同矣震索索中未得也雖凶無咎畏鄰戒也中未得謂九四雷震之聲遂泥而不得上達但能驚懼在下之六三而已雖六五上卦之中與之比近且未得至況上六去九四益逺矣故其聲索索而盡也戒如豫有戒心之戒月令有不戒其容止之戒同畏鄰戒謂因鄰之戒而知畏也傳四之二十一凡七十五字洊在薦切兼山此釋艮下艮上也一山之外又一山兼山也艮此仍羲皇八卦之名而為重卦之名君子以思不出其位項氏曰兩雷兩風兩水兩火兩澤皆有相往來之理獨兩山並立各止其所不相往來人之至難止者心能使心之所思各止其位不二不雜則可以言止矣位字又見艮上艮下之象澄謂思不出其位者在下則思止於下在上則思止於上取重艮之象也艮其趾未失正也能止於下則位雖不當猶未至於失其正也不止而行則失正矣不拯其隨未退聽也二為三之隨則當卑退而聽從於三今乃不然三所以不拯其隨者以六二自止其止未嘗退聽於三而為之隨故也艮其限危熏心也五非比非應而亦熏及之則其危甚矣艮其身止諸躬也諸之於也躬謂腰膂間人鞠躬之處所謂止其身者止之於此處也艮其輔以正中也中謂心也正口之輔者以此中心也正中蓋如文言傳龍德而正中舊本作中正朱子曰正字羡文項氏曰姚小彭氏云當作以正中於韻為協今從之敦艮之吉以厚終也以敦厚而居卦之終也傳四之二十二凡五十五字以正中舊本作以中正也今倒其文者從項氏所引姚小彭氏之説山上有木此釋艮下巽上也漸此重卦之名山上有木木長一尺則山亦高一尺其進以漸不能遽也故卦名為漸君子以居賢德善風俗居猶居貨之居謂積於內也賢德謂純美之德善謂新美之使未善者善之風俗謂因風成俗進修己德轉移民俗皆非一日所能必以漸而至也積德取艮山之象化俗取巽風之象小子之厲義無咎也項氏曰小子居之危厲不安但於義無咎固大丈夫之所安也飲食衎衎不素飽也素猶空也與詩素餐之素同待可進而進非徒飽於飲食以自養而已夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也羣醜謂初二艮之二民也詩曰從其羣醜九三往四則離其民矣四來居三則不得正位是失婦道矣順謂二柔初二二柔之順能止九三一剛之動是能禦止坎之寇也使三四不易位男女各安居而三四之有室有家得以相保如舊矣或得其桷順以巽也得坤下之順為巽下之風風勢順矣而猶以卑巽自處未欲高飛而上或欲擇桷而棲進之漸而不急也如此終莫之勝吉得所願也中正相應乃二五所願其合雖遲終得其所願也其羽可用為儀吉不可亂也鴻飛之次序不可亂人以比兄弟之序其可為儀者此也有釋儀為執鴻羽以舞者非也此言飛鴻之羽豈謂死鴻之羽哉傳四之二十三凡八十二字善風俗舊本無風字今依王肅本離羣力智切澤上有雷此釋兌下震上也震雷象亦龍象神龍純陽之氣所聚潛於澤為無聲之雷神龍自澤起則陽氣動而為有聲之雷此澤上有雷也歸妹此重卦之名神龍飛去出澤上澤水從下起立高湧如屋從其所至而止如歸妹之從夫而動以歸于夫家也故卦名歸妹君子以永終知敝神龍飛去則澤水湧起以從之龍既止澤水亦落矣龍之飛去者必止是其終之時也水之湧起者必落是其敝之時也君子觀其象以物之有始必有終事之有新必有敝故必先有以永之而不使至於終先有以知之而不使至於敝也歸妹以娣以恆也跛能履吉相承也恆當也歸妹以其娣同歸者乃常事也六三之娣降為須如跛者之能履其所以吉者往四而上承六五以同歸夫家也娣往承女君女君受其承故曰相承利幽人之貞未變常也幽貞自守待正配之歸不私比不正之須則未變易夫婦之常道也歸妹以須未當也娣降為須雖歸於夫家九二守貞不私昵之以須之賤而不正未能與其君子相當也愆期之志有待而行也古有殺禮而多婚者此則必待備禮而後行也帝乙歸妹不如其娣之袂良也其位在中以貴行也上兩句舉爻辭下兩句釋其義如需上六象傳例五之位在中中者德之貴以中德之貴而行歸于夫家不以外飾為美也上六無實承虛筐也手奉虛筐而無幣以實之婚禮不成故也傳四之二十四凡八十字注殺禮所戒切雷電皆至此釋離下震上也皆交也有雷又有電二者皆至也豐此重卦之名雷電同時而至威焰盛大故卦名為豐君子以折獄致刑折謂剖斷決之於已也致謂行用加之於彼也離為獄震為刑折獄者其明如電之光致刑者其動如雷之威雖旬無咎過旬災也初與二遇於初僅可在一旬之內過旬則為災矣遇者非正配合故也有孚發若信以發志也有陽明之人來孚信於已以開發其心志使之不昏暗也豐其沛不可大事也折其右肱終不可用也沛之蔽雖輕於蔀然蔽雖輕亦不可作大事矣五居尊位如日麗天而照臨天下此日不明如人之折其右肱終不復可用事矣豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也豐蔀見斗之象六二爻辭已有象傳不於六二釋之而於九四釋之者蓋蔀象由九四而成四為蔀故二見斗二爻之象同而所重在四也位不當者謂位柔而剛居之故竒畫連亘而似蔀若耦盡居此則位當而障蔽者開豁矣幽二也二在地為幽四蔀蔽天故二幽暗而不見日之明吉行謂四若下行與二遇則吉也六五之吉有慶也但舉爻辭有慶二字而不復言譽者取韻協也豐其屋天際翔也窺其户闃其無人自藏也六居上之位有小過飛鳥之象言上六之大其屋其髙如鳥之翔於天際也九三乃上六家內之人自外窺之而無人者三自藏而不見故也傳四之二十五凡九十二字折之舌切注斷丁亂切傳直戀切山上有火此釋艮下離上也宿止山上舉火炊爨故山上有火旅此重卦之名旅之字以外聚衆言羣衆相從宿止於外也故行軍謂之旅非一人客寓之謂舉火於內而人望見其突中之風則為家居之人舉火於外而人望見其山上之光則為旅次之人故山上有火之卦名為旅君子以明慎用刑而不留獄離明將以明刑也然不恃其明而慎用謂重之而不輕行刑也慎用刑者山止不動之象艮止將以止獄也然不泥於止而不留獄謂出之而不留在獄也不留獄者火行不處之象雖不恃其明因慎用而刑不誤乃所以為明也雖不泥於正因不留而獄遂空乃所以為正也推其極功則由慎用而至於刑措由不留而至於圄空可也以旅卦之象而君子用之乃如此旅瑣瑣志窮災也柔而居下其志猥陋故曰窮得童僕貞終無尤也有童僕之貞者在旅終無得罪於人之事旅焚其次亦以傷矣以旅與下其義喪也以已通焚其次已可傷矣況又喪其童僕之貞者乎以旅之時而剛自五降三來與其下因上乾中畫之剛來內與下而互艮中畫之柔往外居五此為喪童僕之義旅于處未得位也得其資斧心未快也未得位言五依四以居而四未得正位也故雖得資斧而心未快終以譽命上逮也上謂六五在六二上上逮及也居上而能逮下故下即六二而有譽有命也以旅在上其義焚也喪牛于易終莫之聞也以下之旅而其次在離火之上此為遭焚之義終莫之聞謂終莫能知其牛之所在無處尋求而喪者不可復得也傳四之二十六凡八十十六字注復得扶豆切隨風此釋巽下巽上也一風先倡一風後和二風相隨從也巽此仍羲皇八卦之名而為重卦之名君子以申命行事巽風象命令為一事而出一命命既出而又申命之則事之行不中止矣取重巽之象也進退志疑也利武人之貞志治也進退者志之疑能如武人之剛強則志治矣紛若之吉得中也得中故不過柔而能如事神者之卑巽以待人也頓巽之吝志窮也窮謂坎水之盡處志至于窮極之地而後巽也田獲三品有功也有功謂益及上下也九五之吉位正中也位正中正而且中也巽在牀下上窮也喪其資斧正乎凶也六四之巽雖在牀下以順承于上而九剛在上當窮極之地故失下之心而不能有六四牀下之巽也正主事則凶故曰正乎凶也傳四之二十七凡六十七字注和胡臥切為一云偽切麗澤此釋兌下兑上也一澤在內一澤在外二澤相附麗也兌此仍羲皇八卦之名而為重卦之名君子以朋友講習二澤相滋潤之益如朋友共講習之益先己講而後又習焉取重兌之象也和兌之吉行未疑也蔡氏曰未牽於隂故未疑若四則有商兌之疑矣孚兌之吉信志也以誠信之吉待六三也來兌之凶位不當也不中正故諂媚以為説也無四之喜有慶也慶即喜也孚于剝位正當也位正當者中正也故雖剝陽之隂亦能以誠孚之聖人并包兼容化小人為君子者一以誠心待之而已矣上六引兌未光也引長已終之説於説之道為未光傳四之二十八凡五十四字注説音曰風行水上此釋坎下巽上也渙此重卦之名水凝為氷風行水上則氷釋而渙散也故卦名為渙先王以享于帝立廟天大無涯而神氣無不在渙散也享于帝者合其散於一壇人死則魄降而魂氣無不之渙散也立廟以祭者合其散於一室天之神升上如在天之風故享帝取上卦巽風之象二三四互震為春時生萬物之帝則象祭者降在天之神于地上也人之魄降下如在地之水故立廟取下卦坎水之象三四五互艮為廟則象祭者升在地之魄于廟中也初六之吉順也震馬坎馬共有三柔得坤順之馬而拯渙也渙奔其機得願也自四奔就坎輿中之機而即所安是得其所願也渙其躬志在外也三之志在四之躬而今則渙矣渙其羣元吉光大也去柔羣而承剛君是其光輝之盛大也王居無咎正位也九居五者王居其正位而不去也渙其血逺害也謂逺去坎血之禍害也傳四之二十九凡五十四字逺云願切澤上有水此釋兌下坎上也節此重卦之名澤上有水水滿則澤不容水而溢出有限節也故卦名為節君子以制數度議德行制裁割也數度數之度蓋度起於數也議審訂也德行德之行蓋行本乎德也數度節於外者也而取內卦兌澤象容受之淺深有則澤之數度也坎為矯輮則有制之象焉以外坎制內兌之數度而節於外也德行節於內者也而取外卦坎水象晝夜之流行不息水之德行也兌為口則有議之之象焉以內兌議外坎之德行而節於內也不出户庭知通塞也知九二塞其前而不可出也不出門庭凶失時極也當其可之謂時中九二不出以合於九五不得時宜甚矣初之知通塞知節者也二之失時極不知節者也不節之嗟又誰咎也不節而能嗟則知節矣又何咎乎項氏曰小象又誰咎也凡三同人初九為褒辭解六三為貶辭節之六三王弼從解沙隨程迥從同人澄謂程從同人者是蓋同人節是釋經文無咎又誰咎者言誰得而咎己解六三經文無咎字乃夫子自言其誰可以咎他人也誰字意同咎字一為人咎己一為己咎人安節之亨承上道也上謂五也甘節之吉居位中也五之甘而吉者以其居上卦三位之中也中則不過而至於苦苦節貞凶其道窮也同彖傳傳四之三十凡六十三字行下孟切澤上有風此釋兌下巽上也大澤之上常有風也中孚此重卦之名澤廣則風盛風施而澤受兩相感應故卦名中孚君子以議獄緩死蔡氏曰議獄兌象緩死巽象徐氏幾曰象言刑獄者五噬嗑賁豐旅中孚也離有獄象又取離明照知情實中孚六畫之離噬嗑豐兼取震賁旅兼取艮非震動無以威衆非艮止或輕於用刑胡氏一桂曰噬嗑豐有離之明震之威賁次噬嗑旅次豐離明不易震皆反為艮蓋明貴無時不然威則有時當止中孚全體似離互體有震艮而又兌以議之巽以緩之聖人即象垂教仁哉五卦中文王唯於噬嗑取象夫子即噬嗑賁豐旅中孚以盡其義澄謂五獄皆離象離中虛外窒有似囹圄刑之用不用則自震艮而異震動也故其刑必用艮止也故其刑不用噬嗑豐有震二卦皆用刑者也然噬嗑之罪輕豐之罪重罪輕而人不在獄則薄罰其罪以正吾之法而已罪重而人在於獄則明定其罪而加之以刑也賁旅有艮二卦皆不用刑者也然賁之情重旅之情輕情重而未明則須待鞠問而未可出獄情輕而猶疑則雖未行罰而暫命出獄也蓋賁豐離獄在內者其獄有人噬嗑旅離獄在外者其獄無人也四獄三畫之離獄之小者中孚六畫之離獄之大者獄之小者可罰可刑而非殺也噬嗑旅可罰之獄噬嗑已罰旅未罰中孚死獄也死獄而互體有震又有艮則刑之用不用未決故議之議之則非必死亦非必不死緩之而已矣議獄緩死者必誠求之故見於中孚之象初九虞吉志未變也初上應九四其志未變而他從也其子和之中心願也五之孚二出於中心之所願自然之應非強非偽項氏曰甚言其孚也否六四不戒以孚亦曰中心願也或鼓或罷位不當也位不當者陽位而柔居之柔則不實豈能得人之孚哉馬匹亡絶類上也上謂九五絶六三同類之隂而上孚於九五也有孚攣如位正當也位正而當故能得人之孚也翰音登于天何可長也何可長者項氏曰聲聞過情其涸可立而待傳四之三十一凡六十一字注強其兩切聞音問山上有雷此釋艮下震上也小過此重卦之名山上之雷震於高處然其高不能及天上之雷但能小過於出地之雷與澤上之雷而已故卦名小過君子以行過乎恭喪過乎哀用過乎儉獨立不懼遁世無悶乃大過於人之事恭哀儉三者雖過於人亦只小過於人之事也行過恭取內艮下二畫之象用過儉取外震上二畫之象震艮自坤變上下四柔畫皆坤也躬行內事也止於下而象坤之柔順者柔之過乎恭財用外物也動於上而象坤之吝嗇者用之過乎儉喪過哀取卦中二剛畫之象喪者人道之終始非強力者弗能勝九三內卦之終九四外卦之始二剛強力勝喪者也三在內為情之哀四在外為文之哀飛鳥以凶不可如何也遭時如此非人所能逃免也不及其君臣不可過也小過皆是隂過陽陽不敢過隂故上六過九三六五過九四九四雖處初六之上亦不敢過初六獨六二處九三之下而使九三過之小過之時陽得過隂者唯此而已蓋所以明君臣之分也九三君也六二臣也臣不可以過君故甘處其下而不及也從或戕之凶如何也如何者謂其凶不可測知也弗過遇之位不當也往厲必戒終不可長也陽居於四為位不當終不可長者言不可久居上體之四宜退居下體之初而與初遇也密雲不雨已上也已猶太也言隂太居上而不居下若隂下居三則坎體全而成雨矣弗遇過之已亢也言上六所居太髙亢而九三趨上以離其網也傳四之三十二凡七十八字行下孟切注勝音升分扶問切水在火上此釋離下坎上也既濟此重卦之名水在火上兩相為用故卦名既濟君子以思患而豫防之時雖既濟凡事當慮其後患而為之先備有備則無患思者慮其後也豫者為之於其先也患者謂如火之為災防者謂如防之畜水項民曰人之用莫大於火而火常生患善濟火者莫如水思火之為患而儲水以防使水常在火上其力足以勝之則其患亡矣是以君子修道立教設政舉事知末流之生患必皆有以防而濟之曵其輪義無咎也守正不急於濟也七日得以中道也程子曰喪茀七日當復得謂自守其中異時必行也三年克之憊也憊言用力之疲困以見克之之難而用兵非美事也終日戒有所疑也有所疑者於猶盛之時疑其必有敗壞也東鄰殺牛不如西鄰之時也實受其福吉大來也時謂祭雖薄而當其可得其宜吉即福也大謂九五之陽來謂自外至內六二所受之吉福實自九五而來也濡其首厲何可久也何可久謂治安之久必至危亂也傳四之三十三凡六十九字火在水上此釋坎下離上也未濟此重卦之名火在水上不相為用故卦名未濟君子以慎辨物居方火能辨羣物照於上則其辨愈明水必居下方流於下則其居不忒故辨物當如火之在上居方當如水之在下也同人辨物亦取離象項氏曰火在上為辨物水在下為居方必加慎字者以其未濟也在濟之時且當思患豫防況未濟乎水火交則有難未交則未有難然難將生矣辨之不早居之不得其所皆難之所由生也可不慎乎易終於未濟而始於屯其意深矣濡其尾亦不知極也項氏曰極終也六五不能終濟使下有濡尾非但初六之罪然初六柔暗在下亦非能知終者朱子曰極字未詳考上下韻亦不叶澄疑當作拯字或云極叶音競九二貞吉中以行正也守中故能行其正也未濟征凶位不當也未濟諸爻位皆不當而象傳特於六三言之者隂柔居險極也貞吉悔亡志行也近柔中之君其志得行也君子之光其暉吉也項氏曰先儒謂暉為揮散非也暉者光中之氣管輅曰日中為光朝日為暉詩曰庭燎有暉周禮眂祲以十暈為十暉澄案散暉及物為光斂光在體為暉故日中之日夜間之燎其暉散則為光朝日之日向晨之燎其光斂則為暉暈者亦光斂於體內暉光相為體用光及九二而暉在六五九二之光乃六五之吉也以其暉吉為言九二者非飲酒濡首亦不知節也飲酒過多而不知節遂至被水濡其者也傳四之三十四凡六十三字注難乃旦切輅音路易纂言卷六
