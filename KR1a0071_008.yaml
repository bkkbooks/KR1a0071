body:
  text: 易纂言卷八元吳澄撰繫辭下傳八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也八卦成列謂乾一兌二離三震四巽五坎六艮七坤八相次也象謂文王所名之卦在其中者謂包含於其中也因而重之謂因八卦而重之為六十四也爻謂周公所繫之辭變者蓍之變命猶名也動者人之動已有八卦之時猶未有六十四卦之名也已有重卦之時猶未有三百八十四爻之辭也剛柔二畫雖能相推變化然蓍未變則未有九六也繫辭雖名為吉為凶然人未動則未有吉凶也雖未有之而其理已具故曰在其中矣吉凶悔吝因人之動而後有周子曰吉一而已動可不慎乎澄謂此承前篇卒章言蓍卦之象辭變占曰在其中者凡四一象二爻三變四動爻者辭也動則有吉凶悔吝之占焉前篇動者尚其變而此以動屬占者動因變而得占也剛柔者立本者也變通者趣時者也剛柔之畫其體一定如木本之植立因蓍之變其用相通隨時所遇趣而就之剛或化柔柔或化剛也此承剛柔相推變在其中之語而言蓍之變吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也貞謂正主之也吉凶二占正主于一勝吉勝則無凶凶勝則無吉非如悔吝之可吉可凶也觀猶示也因吉凶之正主于勝遂言天地之文理正主于示人日月之往來正主于明照而天下人事之動則正主于一而不可以二不吉則凶不凶則吉所謂貞勝也此承吉凶悔吝生乎動之語而言蓍之占夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也乾謂天坤謂地非卦名也確剛健貌隤柔順貌天地之貞觀者天則剛健而示人以易地則柔順而示人以簡周公之爻文王之象則亦效像天地而示人以易簡也此承象在其中爻在其中之語而言卦之爻與象爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭內謂易書之內外謂易書之外爻象無非示人以動而趨吉之理然其動在乎易書之內實未嘗有動之事也人之動如是而吉不如是而凶則著見于人事而在乎易書之外矣以蓍之變決其嫌疑定其猶豫而勇于趨事則功業之成皆因蓍之變而著見也以上言辭言象言吉凶之占言見乎變四者備矣而又以一句結之謂聖人與民同患之情皆於易而著見此辭字兼彖爻言也聖人之道四而獨歸重於辭蓋此篇為繫辭之傳故也傳六之一章凡百四十六字趣立樹切勝繩證切觀古喚切夫音扶確苦各切易以豉切隤同捸切見經電切諸本皆至下章禁民為非曰義為一章今案天地之大德曰生與此文不相屬當為下章之首屬之欲切天地之大德曰生聖人之大寶曰位何以守位曰人何以聚人曰財理財正辭禁民為非曰義生生不已者天地之大德然天地生物生人又生與天地合德之聖人命之居君師之位為人物之主而後能使天地之所生得以各遂其生也苟或但有其德而無其位則亦不能相天地而遂人物之生故位為聖人之大寶大寶謂大可貴重守謂保有之必得衆人之歸嚮乃能保有君師之位聚謂養之而使蕃盛衆多財者天地所生之物以養天地所生之人故聚人以財也理謂以道取而用之理財必正其辭謂取其所當取可取言之而無悖無愧者禁謂防制之蓋財者民之所同欲爭盜之所由起必設法令以禁其為非使之不敢爭不敢盜義者事理之宜理財之所宜理禁民之所不宜為夫是之謂義以下言五聖人之制作皆聚人理財之事古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情包犧氏大昊也氣之有文者曰象形之有理者曰法漢書藝文志相地為形法家天有雷風日月雷風氣也日月象也言象可以兼氣地有水火山澤水火質也山澤形也言形可以兼質鳥獸之文謂動物地之宜謂植物身就人而言物該服食器用而言通同之也神明天地之氣象形質妙而叵測顯而可見者也德若健順動入陷麗止説及鼓之散之潤之烜之之屬類似之也萬物凡動植人器皆是情猶言其意義也羲皇觀于天地觀于動植近取逺取洞見兩間自然之易乃畫竒耦二畫交互成八卦以象之而天地萬物悉不外是故與其德同而與其情無不相似也天開地闢之後不知其幾萬年矣而洪荒朴略未有文字至羲皇始畫八卦實肇人文之端故將言制作之事而首言此也作結繩而為網罟以佃以漁蓋取諸離以散絲散麻絆緊而合之曰結結之以為繩也網以取獸曰佃罟以取魚曰漁或曰網罟通用上古之時已有結繩矣作之而為網罟者羲皇也或曰結繩而治亦自羲皇始結繩網罟二事結繩以防欺詐因以為網罟而佃漁也二説未詳孰是蓋者不敢決定之辭聖人非必模倣此卦以制此器其象相類爾又此時未有重卦之名借後本所立卦名言之故不決定其辭而曰蓋離謂重離重離兩目相承邊實中虛為物所麗結繩網罟之象人無爪牙不能敵獸之猛羲皇以前獸每食人既有網罟之後人始能取魚獸以食之而免為獸所食大哉聖人之仁乎包犧氏沒神農氏作斫木為耜揉木為耒耒耨之地以教天下蓋取諸益神農氏炎帝也斫謂削而鋭之耜者耒首揉謂揉而曲之耒者耜柄教天下者古未有粒食神農始教民稼穡者也益之二三四互坤地也上巽二陽象耒之自地上而入下震一陽象耜之在地下而動也日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑案周官有三市此獨言日中者或創市之初惟用日中後王乃增朝夕二市與噬嗑上離日中之象離中虛可藏貨市之象震動而前致民之象震二柔畫為民離明萬物相見聚貨之象離二剛畫富實貨也一剛一柔相間有相交相易之象退謂交易既畢而歸其家各得其所謂以其所有易其所無而歸各得以遂其願濟其所用也神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久黃帝軒轅氏堯陶唐氏舜有虞氏也通其變者通其所當變之事使不至于窮也變而無迹曰化上古之時民與禽獸無異有網罟而鮮食者有耒耜而得艱食者艱鮮既奏而又為市以質遷其有無則與禽獸稍異矣然民用之未備者猶多也風氣漸開不可如朴略之世此窮而當變也變之則通而不窮矣其能使民喜樂不倦者以其通之之道神妙不測變而不見其迹使于民而民皆宜利之故爾凡易之道窮則必變而通之然後可以久而無弊黃帝堯舜之通其變者易之道也九事皆黃帝時而并言堯舜者肇始于黃帝而極備于堯舜也不言少昊顓頊帝嚳者承黃帝之後因之而無所損益也黃帝堯舜垂衣裳而天下治蓋取諸乾坤衣上體之服裳下體之服上古以禽獸羽毛草木華葉蔽其體至此始以絲麻為衣裳也上衣下裳如天尊地卑上下分定故天下治乾畫竒象衣之縫合為一坤畫耦象裳之前後殊為二刳木為舟剡木為楫舟楫之利以濟不通蓋取諸渙刳木者刳空其中為舟以浮水剡木者剡薄其端為楫以運舟水所阻隔道路不通則以舟楫渡而濟之也渙巽木在坎水之上二三四五上舟虛之象初耦二楫運于舟後之象服牛乘馬引重致逺以利天下蓋取諸隨服者以軛加其項而使之引重載乘者以衡加其背而使之致達道隨下震自坤而變坤為牛一竒畫在後者象所引之重物也上兊自乾而變乾為馬一耦在前者象前路開通無礙而可以致逺也重門擊柝以待暴客蓋取諸豫郭門城門為重門擊拆所以警夜而防姦盜也暴客謂姦盜豫前二耦畫重門之象九四一竒畫而動體擊柝于門內之象坤三畫在下民安居于內而無暴客侵陵之象斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過杵以舂臼以容用之搗去粟殼而得米其利便萬民亦猶渡水之得濟也小過橫而觀之中二竒畫象木杵內外四耦畫象地臼弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽弧木弓也兵器不一弓矢所及者逺為長兵威天下者示有警備而使之畏也坎象弧者中弣強而上下兩弰弱也離象天者前鏃後栝實中笴虛也暌三四五互坎弧象二三四互離及上體之離皆矢象上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯上古謂黃帝以前穴居土中營窟也野處木杪橧巢也後世聖人謂黃帝堯舜也外垣四同曰宫户牖之內曰室棟檩之上隆者宇椽之下垂者有棟宇而成屋則可以障風蔽雨大壯下四剛棟承上而隆之象上二柔宇覆下而垂之象古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨蓋取諸大過厚衣之以薪謂以薪承藉其下而置尸焉復以薪蓋覆於其上也中野野中也不封不封土為墳也不樹不樹木以識也喪期無數哀盡則止無卒哭祔練祥禫之日數也棺內棺槨外棺也凡竒畫為長耦畫為短大過中四長畫九二棺底木也九三九四棺兩傍木也九五棺蓋木也初上二短畫上六棺前端木也初六棺後端木也上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬結繩説者謂民淳事簡結繩以為信大事大其繩小事小其繩以識别也書以刀筆畫木簡為文字也契以木刻一二三四之畫而中分之各執其一合之以為信也契者書之始也契惟以畫記數而已書則有指事象形之變有文字則可以治百官之事察萬民之情矣書契自一畫二畫三畫四畫始至五畫則為又蓋至五而窮也窮則變夬有五奇畫象書契之一二三四五至六則變矣故上畫耦者竒之變也又象契之上端分為二之處十三卦之制作自畫卦而始至書契而終蓋萬世文字之祖肇於畫卦而備於書契也是故易者象也象也者象也此章之首第一節總敘以起下文自包犧至書契十四節言制作之事而以是故總結之謂易卦皆器物之象象者像似之義聖人制器皆與卦象合也彖者材也爻也者效天下之動者也既結一章之意矣因象而及於辭謂文王彖辭以六畫之象而論一卦之材質周公爻辭以一畫之象而效人所作為之事是故吉凶生而悔吝著也又以是故結上文二句謂彖爻如此故生出吉凶而使人趨避著明悔吝而使人警悟也傳六之二章凡四百二十九字守位曰人舊本人作仁陸氏曰王肅卞伯王桓玄明僧紹作人耒耜舊本耜作耨朝氏曰王昭素云諸本或作耜乃合上文澄謂傳寫者訛右傍以字為辱也今正之通則久下舊本有是以自天祐之吉無不利十字繫文言傳釋大有上九爻辭錯簡重出以濟不通下舊本有致逺以利天下六字陸氏曰一本無今案此六字見下文羡文重出也包白交切王于況切柝天作切厚衣於既切注相天地息亮切後相地同夫是音扶叵平可切止説音曰烜沉逺切合之音閣二市與音餘相間居限切喜樂音洛分定封問切重載親采切舂黍容切弣封古切弰新巢切鏃子本切笴見汗切僧音曽垣音袁檩林錦切藉晴夜切置音至復以扶后切覆孚后切以識音志後識別同潭汀坎切別彼列切陽卦多隂隂卦多陽其故何也陽卦奇隂卦耦其德行何也陽一君而二民君子之道也隂二君而一民小人之道也陽卦震坎艮也皆一陽二隂隂多於陽隂卦巽離兊也皆一隂二陽陽多於隂故者其迹之粗德行者其理之精先粗後精兩設問而兩答之也陽卦數奇多陰則一竒二偶合成五數隂卦數耦多陽則一耦二竒合成四數數分竒耦以答其故之問陽畫為君隂畫為民陽卦一君統二民寡能治衆主必致一得理之正為君子之道隂卦一民事二君土無二王物不兩大非理之正為小人之道道分君子小人以答其德行之問乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德上文既言六子之卦此乃言六子自乾坤而生也易謂六子以竒耦相易而成卦故曰易乾坤者六子之所從出故曰門物猶言畫也射禮畫於地者亦曰物乾三畫皆陽故曰陽物坤三畫皆隂故曰隂物乾陽之德坤隂之德交互相合以生六子而震坎艮有一剛二柔之體巽離兊有一柔二剛之體此八卦者與天地神明一也故曰體曰通體謂以之為體也撰猶言所為也體天地之撰以卦象言通神明之德以卦德言其稱名也雜而不越於稽其類其衰世之意邪此又言六十四卦自八卦而生也名謂重卦之名離謂不一越過也於歎辭稽推考也文王所稱五十六卦之名雖其義不一而皆不過自八卦中出歎其推考重卦兩體與八卦所象相類而立名之意見其遭遇衰世憂患危懼是以推考如是其精微也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣以上三節首言六卦之體次言六卦本乎二卦而為八又言重卦本乎八卦而為六十四此以下總上三節而言文王之彖辭彰往即藏往也謂明於天之道而彰明已往之理察來即知來也謂察於民之故而察知未來之事微顯即神德行也謂以人事之顯而本之於天道所以微其顯闡者闡而顯之也闡幽即顯道也謂以天道之幽而用之於人事所以闡其幽上篇之藏往知來顯道神德行兼蓍而言此則專以卦而言也開明名卦之意而使當其名辨别隂陽之物而正言其占夫易以下諸義自文王斷以彖辭之後則皆具備矣朱子曰而微顯恐當作微顯而開而之而亦疑有誤其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報小謂其義專而狹大謂其義泛而廣旨意也文謂修節而不質直曲謂一偏而不該遍中如居中而四外皆通肆謂縱而不拘隱謂晦而不顯彖首所稱卦名如上雲下雷則名為屯上山下泉則名為蒙但就本卦二體之象而生名故曰小彖中所取象類如類動物則有虎尾豚魚飛鳥小孤之屬類用物則有盥薦二簋羸瓶匕鬯之屬泛及天下諸物之形而比類故曰大稱名之義雖小而其旨則逺謂推索而無窮盡也取類之義雖大而其辭則文謂假托而不質言也小者雖偏曲而局於一方然旨之逺則中而可旁通也大者雖縱肆而遍於諸物然辭之文則隱而不顯露也二謂疑而不決用筮以占而彖辭為決所疑則行事之果如渡水之得濟故曰濟民行民於行事之失得未能明也以彖辭而知如此為得而行之則有吉報如彼為失而行之則有凶報故曰明失得之報或謂此一節蓋論彖爻夫取類之大辭之文事之肆而隱爻辭亦然而此則專為彖辭言也傳六之三章凡百六十二字小人之道也下舊本有文言傳錯簡釋咸九四困六三解上六噬嗑初六上六否九五鼎九四豫六二復初九損六三益上九爻辭十一節間隔之故與乾坤其易之門不相屬遂於乾坤上加子曰字而分為别章今定錯簡歸文言傳刪去子曰字而此章復合為一德行下孟切後民行同撰士免切於音烏夫音扶斷東亂切中如字注索悉革切為決云偽切後為彖同夫微顯音扶易之興也其於中古乎作易者其有憂患乎中古謂文王時羲皇之易有畫而已三畫之卦雖有名而六畫之卦未有名文王始名六畫之卦而繫之以辭易道幾微而至此復興也卦名及辭皆前所未有故不云述而云作作易在羑里時故云其有憂患乎蓋于其名卦而知其有憂患也下文舉九卦之名以見其憂患之意是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困德之辨也井德之地也巽德之制也履踐行也基如築土之下址積纍之所始也謙恭讓也柄所執持者也復反也孟子謂君子必自反也行有不得者反求諸已如木之反也本歸根也恆常久也固謂常守而不變也損者減損謂消除其私欲也修謂完補其闕也益者增益謂充長其善端也裕如加厚其衣也困厄窮也辨者識之明孟子謂人之德慧術智存乎疢疾因身之困而心識開明也井不動而及物之惠普遍猶地之靜而成物之功廣博巽者柔順卑下以入則無處而不可入如利刀之裁制布帛隨其長短而裁之無不如意也始之以實踐繼之以自謙人不我是而自反已之所守必有常損其不善益其善雖處困而識愈明身不可動而不忘及物柔順卑下無入而不自得此九字之義皆處憂患之道也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱上文初陳九卦之名取其字義而已此再陳乃取卦義項氏曰釋卦之兩體九句皆以相反成文朱子曰如書之九德澄案和謂兑之説至謂乾之健蓋雖與物無乖而行必造極也鄉原之閹然媚世而不可入堯舜之道則履之和而不至者尊謂坤地之卑而尊之使居艮上光謂艮山雖下於坤而自不失其為髙已處人下疑若晦昧而不光然謙則雖尊他人而已亦光也小謂震一陽之動辨於物謂珅衆隂之順一陽之復甚微猶君子之自反所操甚約也然陽復於內雖微而隂順於外則衆猶君子一自反而橫逆者皆順非明於接物不能也雜謂其事不一震雷之時復一鳴似之不厭如言學不厭巽風之無日不有似之行事不一而終終不厭倦所以為恆也先難謂方損之初如浚兑澤於下而畚土以上也後易謂既損之後如艮山之靜止而受土以成其髙也長裕謂日益設謂施為之虛假如設使設或之説揠苗而長之其苗非實有長裕也虛假所為爾震雷之聲則實能助益巽風之勢而不虛假也窮謂兑澤涸於上通謂坎水流於下或謂彖傳之險而説亦窮而通之義彼蓋合上下二德以釋困亨與此不同也居其所謂巽之二陽在下體水之在井中者也遷謂坎之一陽在上體水之汲而上以及物者也稱謂巽二陽在隂之前二陽體鈞其重不偏如稱物之平隱謂巽一隂入陽之內為卦之主以事二君而人莫知其所以能入二陽之故履復損井取義以下體為先謙恆益困取義以上體為先巽八純重卦但就一體取二義而二體皆然履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權此章三陳九卦先後有淺深初陳雜舉卦名而每字之下先就人身言之以明其字義未及卦義也再陳乃於卦名之下説上下二體之義三陳則卦字名一字之中包含上文所説卦體二義非専指卦名一言也以猶象傳君子以之以謂取此卦之義用之於人事也踐行之履在人為德之基故名下兑上乾之義曰履其義兑和而乾至人則以此履卦之義而和行和行謂所行無乖忤也恭讓之謙在人為德之柄故名上坤下艮之卦曰謙其義坤尊而艮光人則以此謙卦之義而制禮禮者恭敬退讓自卑而尊人制禮謂制為儀則也自反之復在人為德之本故名下震上坤之卦曰復其義震小而辨於坤之物人則以此復卦之義而自知愛人不親反其仁治人不治反其智禮人不答反其敬惟自知反己不責人之不親不治不答也常久之恆在人為德之固故名上震下巽之卦曰恆其義震之雷雜而巽之風不厭人則以此恆卦之義而一德一謂終始如一也減省之損在人為德之修故名下兊上艮之卦曰損其義先損兑之澤難而後成艮之山易人則以此損卦之義而逺害為不善者有害於已減損其不善所以逺去其害也增多之益在人為德之裕故名上巽下震之卦曰益其義巽之風長裕而震之類不設人則以此益卦之義而興利為善者有利於已增益其善所以興起其利也厄窮之困在人為德之辨故名上兑下坎之卦曰困其義兊窮而坎通人則以此困卦之義而寡怨知命安分者雖厄窮患難而無怨寡之以至於無也掘地得泉之井在人為德之地故名下巽上坎之卦曰井其義巽居其所而坎遷人則以此井卦之義而辨義已之惠澤及人者義也柔順卑下以入之巽在人為德之制故羲皇三畫之卦名巽文王名六畫之重卦亦曰巽其義上中二陽宜稱於外而下之一隂隱伏於內人則以此重巽之義而行權行謂不定在一處權者稱錘前却無定以等物之輕重而取衡之平時中是也六十四卦其可以處憂患者不止於九夫子姑舉其大槩爾五十六重卦舉八卦七之一也純卦舉一卦八之一也傳六之四章凡百四十五字厭因劒切易以䜴切長知兩切稱充證切行下孟切逺于願切注充長同上疢充震切尤處充許切後一處同鄉原音願閹音淹橫逆封孟切時復符后切畚音本以上時掌切後而上同揠音戛切涸曷各切而説音曰減省所梗切安分奉問切難乃旦切掘羣厥切錘程追切易之為書也不可逺為道也屢遷不可逺謂其書之利於民用不可離去也屢遷謂其變易不一定也變動不居周流六虛上下無常剛柔相易不可為典要唯變所適以卦變言也變動謂卦畫更變移動兩易其位也不居不止定在一處也周流周遍流行也六虛卦之六位也在上位者或降而下在下位者或升而上無有常處者以剛柔二畫之互相易也典要典籍中之契要常而不可易者也不可為典要謂其易而不可常也唯其變畫之所之適在何位爾案傳之單言變者謂蓍䇿之變言變化者謂卦畫之變唯變所適非謂蓍䇿也而亦單言變者蓋此言卦變之互易其位非爻變之變化其畫也不可言化故亦單言變夫子於彖傳已言卦變矣而於此又言之一體三畫自相易者復姤臨遁大壯觀夬剝所變也下體三畫與上體三畫互相易者泰否坎離震艮巽兊所變也蔡氏曰此言易道之屢遷也其出入以度外內使知懼又明於憂患與故無有師保如臨父母出入以度外內知懼言人事之動亦當如卦畫之變也出謂升上入謂降下外者上也內者下也卦畫之出而外入而內者皆以其度或一體自易或二體互易六子八辟之所變各二卦泰否二辟之所變各九卦如度之分寸各有界限不可僭差人事之或出或入亦必如卦畫之出入以度其出入動循禮法使出而在外入而在內之時惕然知所畏懼此聖人作易訓人之意使謂聖人之使人如此也凡人之出入能明於聖人之憂患與民同之義以慎乃事而守之嚴雖無有師保顯為之教戒而畏懼不敢慢易惕然一如父母之臨其上也蔡氏曰此言易書之不可逺也初率其辭而揆其方既有典常苟非其人道不虛行初始也率循也辭彖爻之辭也揆度也方所向也既盡也典常典籍中所載之常法一定而不可易者也言人於用易之始循易書之辭而揆其處事之方其道盡有常法不可變易也上言卦畫之變其道變而不常此言彖爻之辭其道常而不變也苟猶若也其人謂聖人易之道雖如此若非作易之聖人示此道以教人則易之道不能無人而自行也蓋言易道之行于世者皆聖人之功蔡氏曰此合書與道為言也傳六之五章凡八十三字要去聲度如字注並同注離艮智切更變音庚一處常處充注切辟音壁慢易以䜴切度也待洛切處事昌主切易之為書也原始要終以為質也六爻相雜唯其時物也要如要於路之要謂遮截其歸宿之處質謂卦之體質文王原卦義之始要卦義之終以為卦之體質各名其卦而繫彖辭也爻之為言交也六位之隂陽相雜而交錯也時謂初二三四五上之時物謂陽竒隂耦二畫之物周公觀六爻之交錯唯其六位之時或是陽物或是隂物各因其義而繫爻辭也此章言六爻而六爻統於彖故先言彖下文乃分説六爻也其初難知其上易知本末也初辭擬之卒成之終此言初上二爻侯氏果曰初則事微故難知上則事彰故易知澄謂初如木下之本上如木上之末觀木者其下之本根難見其上之枝葉易見也項氏曰初禍福未定故其辭多擬議上已覩其成禍福判矣故其辭多決定澄案終謂上爻初爻之辭擬之者猶有商度卒竟成完而言之者終爻之辭也初與終為對擬之與卒成之為對兩句文法顚倒相互若夫雜物撰德辨是與非則非其中爻不備此言卦中四爻中爻謂二三四五也朱子曰先儒多解此為互體胡氏一桂曰雜物謂隂陽一物自中四爻雜而互之又自撰成兩卦之德也是與非謂中與不中當位與不當位也內外卦既足以示人復自互體而辨之則是非益可見澄謂內外既有二正體之卦中四爻又成二互體之卦然後其義愈無遺缺非以此正體互體並觀則其義猶有不備正體則二為內卦之中五為外卦之中互體則三為內卦之中四為外卦之中故皆謂之中爻噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣上文既分言初上二爻及中四爻此又總六爻言之存亡者隂陽之消息吉凶者事情之得失居猶坐也要其存亡吉凶之所歸則六爻之義坐而可知矣又謂知者能見事於未形雖不觀各爻之義但觀卦首之彖辭則所思已得十分之五六矣蓋彖辭或論二體或論主爻或論卦變相易之爻是以不待觀六爻而已可見也章首第一句言彖第二句總言六爻此一節又總言六爻而後歸重於彖蓋為結語與章首起語相始終下文則又更端而言中四爻也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也二與四同是隂位若皆以柔居之則六二六四同是以柔居隂故曰同功然其位則有逺近之異五者一卦之尊位故逺近皆自五而言二與五應為逺四與五比為近以位之逺近有異而其善亦不同逺者意氣舒展而多譽近者勢分逼迫而多懼多者謂不盡然而若此者衆爾近也二字釋四多懼謂四之所以懼不能如二之譽者蓋迫近尊位不得自安故也柔之為道以下釋二多譽柔不能自立近者有所依倚逺者宜若不利二逺於五而其歸得以無咎者以其用柔而居下卦之中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪三與五同是陽位若皆以剛居之則九三九五同是以剛居陽故曰同功然其位則有貴賤之異五天子之位為貴三諸侯之位為賤以位之貴賤有異賤者剛居剛為大過而多凶貴者剛居剛為適宜而多功二多譽四多懼之上有其善不同一句而三多凶五多功之上無之者譽懼雖不同而皆可謂之善凶則不可謂善矣故不言也等謂兩相比並而有品級貴賤之等也五字釋三多凶謂三之所以凶不能如五之功者蓋貴賤有等賤者不與貴者同不宜以剛居剛故也其柔危以下釋五多功五為尊位以柔居之則不勝其任而危惟剛居之則能勝其任而有功也傳六之六章凡百四十四字要一遙切後同易知以䜴切夫音扶撰士免切知者音智思先次切勝音升注啇度待洛切竟音敬復自符后切五比皮二切勢分符問切易之為書也廣大悉備廣謂如地之無所不容大謂如天之無所不包悉備謂人物之理纎悉具備於其中有天道焉有人道焉有地道焉此言三畫之卦天道謂上畫象大覆於上人道謂中畫象悉備於中地道謂下畫象廣載於下兼三才而兩之故六六者非他也三才之道也此言六畫之卦兼猶言雙也一手持二秉曰兼三畫之卦象三才三才各一而已一而不兩則獨而無對天獨陽而無隂地獨隂而無陽人之隂陽亦混而不分必皆兼而兩之天人地各有隂陽然後其道全而不偏所以重三畫之卦而為六畫者此也有六畫則初二為地道三四為人道五上為天道各兩其一而為六六者非有他也以三才之道各有隂陽也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉道即上文所謂天道人道地道也有變動謂卦位之為天為人為地者有更變移動也三畫之卦重為六畫惟初為地道上為天道不改移中四畫皆有改移二人也而為地三天也而為人四地也而為人五人也而為天故曰道有變動隂位陽位交錯相間謂之爻三畫之卦不曰爻者無隂陽相間也既有六畫而三才之道改移其位然後初為地之陽二為地之隂三為人之陽四為人之隂五為天之陽上為天之隂相交錯而謂之爻也等如上章貴賤之等各爻之畫比並有不同故曰有等其有等不同者或是竒畫則為陽物或是耦畫則為隂物也二物相雜在六位之中然後成文若隂陽純而不雜則不文矣文不當謂陽物居隂位隂物居陽位當位者多吉不當位者多凶吉凶由當不當而生不言當而但言不當者省文自可見意也傳六之七章凡六十六字注覆孚后切間居限切下同省文所梗切易之興也其當殷之末世周之盛德邪當文王與紂之事邪殷之末世謂紂周之盛德謂文王因第四章之起語而申言之彼但言其時此并言其人也此卒章之第一節是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也是故以下終第一節之意危者懼而不敢安也易者匆而不知懼也文王以盛德遇末世而有憂患故其繫易也有危懼之辭蓋謂人之處事其心危懼則可保平康其心匆易則必至傾覆使者理有必至若或使之云爾前篇以易則易知言乾之善此章又以易者使傾言人之惡易知之易敬勝怠而其心易直也使傾之易怠敬勝而其心匆易也字雖同而其意正相反其道謂作易之道物猶事也不廢謂具備於中而無所棄遺也易之道雖無一事不該然不過欲人於每事自始至終以危懼之心處之其指歸欲人之無咎而已易有彖辭有爻辭而所謂其辭危者乃専以文王彖辭言何也蓋繫辭自文王始周公不過補文王之未及為者爾無異旨也父統子葉但言彖辭而爻辭在其中矣下文則皆兼彖爻之義而言也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能説諸心能研諸慮定天下之吉凶成天下之亹亹者言聖人作易之道本乎天地也乾坤謂天地非卦名也天之健地之順造化流行常易常簡無有繁難也又豈有妨害之者而天地猶且知險知阻人事則不無妨害之虞其可匆易而不危懼乎天地之知險知阻非如人之知也天之下凡有險陷之處天皆臨而照之是天下之險天無一不知也地之上凡有阻礙之處地皆載而有之是地上之阻地無一不知也作易聖人能如天之知險故凡可以陷害於人者必為之指示以通其志使人皆灼見則其心開釋而説懌能如地之知阻故凡可以妨礙於人者必為之處置以成其務使人皆慎行則其慮精審而研核定其所占之如是則吉如是則凶使人之於事無疑有決而勉勉為之也此第二節是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能是故以下終第二節之意云為言動也人能以易中隂陽變化之道而用之以言用之以動則於事皆可以旨而有祥必不至於凶而有災也或有所象之事則能知器之形而可以制器或有所占之事則能知未來之吉凶而可以決疑易之用惟此四者而已云為象占即上篇所謂以言以動以制器以卜筮也此四者皆聖人本諸天地之道以教人者故天地設位於上下雖有此道而不能使悉由此道聖人作易教人由此道所以成天地之能也成謂有所闕而完足之鬼謀謂覡巫與如中庸可以與知焉之與人謀羲文之易而用之以占凡有一事既謀之於人又謀之於鬼而後為之則所為皆合易道之教雖其愚不肖亦可以與聖人之能也健順易簡知險知阻此天地之能説心研慮定吉凶成亹亹此聖人之能而成天地之能也云為之祥象占之知此百姓之能而與聖人之能者也八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷八卦謂六爻四象之上下二體也項氏曰八卦以象告謂卦之以四象示人爻彖以情言謂辭之以言諭人也剛柔雜居而吉凶可見再言象之所以示人者明也變動以利言吉凶以情遷再言辭之所以諭人者殊也自彖辭觀之卦體本以變動而成故彖辭専言其變動之利如柔來而文剛分剛上而文柔之類是也雖睽蹇明夷至不美之卦其彖皆有所利蓋類變而成卦則以成卦者為利故曰變動以利言自爻辭觀之據逐爻之情而處事則吉凶皆異於本彖矣故有在彖為主爻而在本爻則為凶者如震之九四震驚百里可為祭主而在本爻則為泥而未光之類是也故曰吉凶以情遷觀彖之本辭則為遷易也澄謂變動即第五章所謂變動不居者言卦畫之更變移動其位也爻彖以情言彖與爻皆言情也吉凶以情遷則情専屬爻而不及彖何也蓋變動以利言利亦自情而生也彖亦有情爻亦有利互文也此第三節是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝是故以下至篇終皆終第三節之意愛惡者情也相攻謂相愛兩相惡也逺謂應近謂比相取謂逺取逺近取近也情之真者曰情情之非真者曰偽相感謂情感情偽感偽也愛惡逺近皆有情偽或以情相取或以偽相取情偽皆有愛惡其相愛或真或偽其相惡亦或真或偽偽者情之反害者利之反凡占曰不利無攸利者害也項氏曰自此以下皆言吉凶以情遷之事以六爻吉凶悔吝之三辭分出於相攻相取相感之三情而總屬於相近之一情四相者爻之情也命辭之法必各象其爻之情故觀其辭可以知其情利害者商略其事冝有利有不利也悔吝則有迹矣言凶則其成也故總而名之曰吉凶相感者情之始交故以利害言之相取則有事矣故以悔吝言之相攻則其事極矣故以吉凶言之逺近情偽姑就淺深分之若錯而總之則相攻相取相感之人其意皆有逺近其行皆有情偽其情皆有愛惡也故總以相近一條明之近而不相得則以惡相攻而凶生矣以偽相感而害生矣不以近相取而悔吝生矣是則一近之中備此三條也凡爻有比爻有應爻有一卦之主爻皆情之當相得者也凡稱近者止據比爻言之反以三隅則逺而為應為主者亦必備此三條矣但居之近者其吉凶尤多故聖人槩以近者明之近而不相得則惡相攻偽相感近不相取則愛相攻情相感而近取者為相得矣不相得則凶害悔吝其相得則吉利悔亡無悔無咎從可知也夫子之己言者三其未言者三總之凡六條然此據近之比爻言爾若逺之應爻及主爻亦當各備六條總之為十八條矣嘗以此十八條之例考之爻辭皆合乃知作傳聖人以此該括易之辭情至為精密而諸家注釋唯項氏能究其底藴焉將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈上章言易之辭皆由情而生此又以人譬之人之辭亦由情而生也將欲倍畔猶未發露中有所慊唯恐為人所覺故其辭慙怍中心疑惑不能剖決意謂如此又恐不如此故其辭如木之枝兩間端岐不敢執一吉人靜重深厚故其辭謹而簡躁人輕動淺薄故其辭易而繁誣毁善人自知非實故其辭浮遊不定困厄沮喪失所操守故其辭卑屈不伸叛疑吉躁誣失者人之六情有不同故慙枝寡多遊屈其六辭各因其情而不同焉朱子曰卦爻之辭亦猶是也澄案此篇之首章泛言辭變象占四道而末句歸重於辭且以本於聖人之情至此卒章凡三節其中亦言四道而首末皆言彖爻之辭末又本於易之情以終繫辭之傳蓋唯聖人之情能知易之情而繫易之辭也是為一篇始終之脈絡云傳六之八章凡二百五十四字研諸下舊本有侯之二字案王氏略例無之朝氏曰王昭素司馬溫公皆以為衍字易者恆易以䜴切要一遙切夫音扶行下孟切説音曰與能音預惡烏路切注必為之云偽切與如字與知之與與於而與並音預比皮二切繫辭傳上下篇共二十章章首發端以天地字者三以聖人字者二以易字者卜一以彖爻以一隂一陽以八卦以陽卦隂卦者各一舊本有子曰者六先儒以為後人所加今考之易其至矣乎知變化之道者其知神之所為乎皆是前章之結語後之分章者欲以此為後章之起語書不盡言乾坤其易之門邪皆是連上文共為一章後之分章者欲分截自此别為一章故四處各加子曰字以别之易有聖人之道四馬者是再提章首起句為結句聖人立象以盡意是以答語答上文問語故兩處亦各加子曰字今並刪去庶俾讀者不致生疑而妄謂繫辭傳非夫子所作云易纂言卷八
