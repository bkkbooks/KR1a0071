body:
  text: 易纂言卷一元吳澄撰易周易周者岐山下之地名太王亶父自豳徙居其地至曽孫武王伐商為天子遂以周為有天下之號易始於羲皇周之文王在羑里時演羲皇八卦之名為六十四且作彖辭周公相成王制禮作樂時又作爻辭以重卦之名及彖爻之辭乃文王問公所作故名之曰周易以別於夏商之易云上經第一文王以六十四卦分為上下二篇此篇首乾坤竟坎離對體之卦六反體之卦十二反體一卦為二卦總計三卜卦謂之上經乾下乾上一之一上之一經八純父六陽辟主上九乾此羲皇乾下乾上之卦而文王亦名之曰乾乾天也朱子曰乾者健也陽之性也陽之數竒三畫皆竒之卦名乾而象天三畫之乾重為六畫上下皆乾則陽之純健之至也故乾之名不易元亨占也元首也文人上為元在人一身之上為衆體之長凡有大徳為衆善之長曰元或居大位在人上官之正長家之宗嫡皆可曰元亨字與獻享之享同備物以獻謂之享亨者極盛之時百嘉聚㑹有如享禮衆美之物具備也萬物資始於乾是為天徳之首乾有此元徳故能致萬物長茂蕃殖之亨也占者有長人之大徳者必亨利貞占也利者宜於事如刀之刈禾順而便也貞者主其事如木之楨榦正而固也占者宜於正主其事也初九初之畫得九為乾之姤潛龍象也藏伏而不可見曰潛龍陽物震為龍者一陽在坤體之下如龍之在地下也陽畫雖不具震體皆可象龍六畫之卦初二為地二地之上初地之下也陽畫在初猶龍之潛伏於地下而未出見也勿用占也用謂用之以作事也筮得此爻者凡事皆不可作為故曰勿用九二九居第二畫為乾之同人見龍在田象也出而可見曰見田地上也二地上之位九居二猶龍之出見而在地上也利見大人占也見謂身親見之凡卦畫陽為大陰為小以三畫卦言二為人位九居二為大人而占者利於見大徳之人也九三九居第三畫為乾之履君子終日乾乾夕惕若象也君者臣之所事也子者貴稱也天子之大夫稱子諸侯未踰年亦稱子諸侯有臣天子之大夫亦有臣自其臣尊稱之曰君本稱曰子而又尊之故曰君子而凡有位者皆通稱之又借以為有徳者之稱也三為六畫卦之人位陽剛得正人之有賢徳者君子也三變為柔二三四成離離為日三為人間二為地上日照人間將至于地日將終之時也故曰終日乾乾謂下乾之終接上乾之始也日既終則為夕矣惕戒慎恐懼之意乾剛實心有主故能敬惕厲占也厲危也在下之上如登髙臨深故危无咎占也无咎者善其能補過處危地本當有咎以其終日乾乾進修不息至夕猶惕然戒懼故无咎也九四九居第四畫為乾之小畜或躍在淵象也或者非必之辭淵者地之下龍所潛處謂初也四之位在人之上天之下與初之位相應言龍潛在淵或其時可以飛而上天則躍而出也既躍則不復在淵而猶言在淵者謂在淵中度其可躍而後躍也見龍在田者謂己見而在於田飛龍在天者謂已飛而在於天皆言其已然故為已定之決辭而稱龍或躍在淵者謂將躍而猶在於淵蓋言其將然故為未定之疑辭而稱或淵乃四所應之位而非四所居之位也无咎占也能審度其時之可故无咎九五九居第五畫為乾之大有飛龍在天象也六畫之卦五上為天利見大人占也與九二同五為上卦之人位上九上之畫得九為乾之夬亢龍象也亢人之喉骨剛而在上者也故剛而居髙曰亢有悔占也悔謂事闕敗而追恨也用九六畫俱得九為乾之坤見羣龍无首象也羣龍六畫皆陽也乾為首以人身而喻卦之上畫為首首剛而在上六陽皆變乾體不存則无有剛而在上者矣故曰无首見羣龍无首猶睽上九言見豕負塗吉占也六畫皆陽剛之過也變為柔則不偏於剛矣所謂剛健中正純粹精也故吉經彖辭凡五字爻辭凡六十二字乾乾燥之乾假借渠焉切亨與獻享之享同古讀為香今許庚切見龍賢遍切利見見羣龍如字亢苦浪切註長知兩切出見曰見已見賢遍切潛處昌據切不復扶豆切度待洛切坤下坤上八之八上之二經八純母六陰辟主上六坤此羲皇坤下坤上之卦而文王亦名之曰坤坤地也朱子曰坤者順也陰之性也陰之數耦三畫皆耦之卦名坤而象地六畫之卦上下皆坤則陰之純順之至也故坤之名不易元亨占也坤之徳可以配乾故亦名元而可以致亨也利牝馬之貞占也牝馬占中之象也放牧之地馬羣中之牝者順以從陽而専於一此占謂宜専一順從於陽以正主事也君子有攸往先迷後得主占也君子有所往者其先迷失道路其後乃得所主陰不可先倡但可後隨陽明陰暗六畫純陰暗昧之象故迷凡卦各有一爻為主彖爻之辭言主者皆謂主爻也坤之上六為主爻主在卦終故後乃得主利西南得朋東北喪朋占也凡卦之位四為西三為南初為東上為北朋同類也占者利於行西南方則得其朋類若行東北方則失其朋類也盖六四六三二陰相比近故為得朋初六上六二陰相隔逺故為喪朋安貞吉占也安謂靜也安靜者坤道故正主事則吉也初六初之畫得六為坤之復履霜象也卦之下畫為地人所履也霜者露所結露者坤土之氣所化堅冰至象也自五月一陰生九月而五陰陰消陽將盡則露為霜矣其時猶有一陽未為純坤也馴至十月則六陰為坤而水凍為冰至十一月以後而冰益堅夫履霜在坤體未成之前堅冰在坤體既成之後然初履霜而已知堅冰之必至盖陰盛必至於極而陽消必至於盡也有國家者能知此戒則其於折姦萌塞禍原宜早圖之豈可坐待其盛哉有象无占占在象中六二六居第二畫為坤之師直方象也以卦體則坤之中以卦位則地之上故以地取象六居中而變為剛象地之中天氣自下而上故曰直初二兩耦畫象地之方故曰方大不習象也以直計之地之厚上下相去三萬里以方計之地之廣輪東西相去南北相去亦各三萬里直之厚方之廣有形之物其大無可與比故曰不習習重也言不再有如此大者也无不利占也筮得此爻於事无所不利六三六居第三畫為坤之謙含章象也含如口之含陰陽相間雜而成文曰章𤼵生萬物粲然有章者陽之為也然非陰成之則不可坤陰含蔵陽氣於内陽内陰外有衣錦尚絅闇然日章之美三變為陽有章在内四含之於外而不見其美也可貞占也可以正主其事也謂可不謂利於義則可不能必其利也或從王事无成有終占也謂儻或從王事雖无成完而可以有終盖有人倡之已无全功故曰无成人倡之於先已畢之於後故曰有終六四六居第四畫為坤之豫括囊象也括謂結之也坤體虚而容物囊之象也四變為竒塞壓其上猶括結囊之上口人之謹閉其口而不言亦猶是也无咎占也无譽占也不言雖可免過咎而亦无稱譽也四變為剛而應初如否之初四上下不交故其象占如此六五六居第五畫為坤之比黄裳象也五位在中其色為黄坤畫耦象裳之兩開不屬初為足二為脛三為股而四則身也當裳之要坤為布帛六五以黄色之布帛為裳掩蔽下四畫猶裳之掩蔽人下體也元吉占也徳位之无者得此占則吉上六上之畫得六為坤之剥龍戰于野其血𤣥黄象也陰變為陽象龍地與天連接處為野上之位天也坤之畫地也上位之天與坤畫之地相接故象野坤之六陰皆民也上六化陽象龍臨于五民之上則民而為君矣坤為民乃其素分順也民而為君則不順而逆矣上六一民為逆五民之順其肯從之乎故下之五陰與之戰于野戰則上六敗而遭傷故其血𤣥黄氣陽也血陰也陰傷故言血𤣥者暫變為黄之色黄者本質為陰之色雖變為陽而質則陰故其血雖𤣥而猶黄也順者理直故下之五陰戰而勝逆者理不直故上之一陰敗而傷或曰血者陰之傷也何以知其非下五陰之傷而必其為上一陰之傷乎曰下五陰傷則其血黄而已无𤣥也且𤣥且黄二色混雜以是知其為上六一陰之血也盖上六陰質化陽君而非君民而非民有如王莽黄巢之死項氏曰𤣥黄説者謂陰陽俱傷爻辭惡陰之盛故陳其禍敗以為戒血指陰而言无與陽事澄案舊説以為陽與上六戰故項氏云然今觀卦内无陽何以得陽與上六戰乎用六六畫俱得六為坤之乾利永貞占也坤之六陰皆變為陽其占利於永乆正主事陰柔非能永乆者變為陽故能永久也經彖辭凡三十字爻辭凡六十字坤困昆切牝頻忍切喪息浪切註比近皮二切夫履音扶占見賢遍切後不見同與比補履切間居限切衣因既切絅科茗切闇囚感切屬之欲切要亦遥切接處昌據切分符問切惡烏路切无與因據切震下坎上四之六上之三緯八純艮變主九五屯此羲皇震下坎上之卦而文王名之曰屯屯之字象草上穿出地而下猶未伸物始生艱難未暢達之時也内卦乾始交坤成震而外卦乾之一陽陷於二陰有所艱阻人方行動於内而外阻艱難故為屯元亨占也元謂九五利貞占也屯之時未易亨也其占為大徳之人能致亨則利於正主事勿用有攸往占也此占於坎取義卦變艮三往五陽陷於二陰之中故勿宜用之有所往利建侯占也此占於震取義卦變艮上來初一君居内為二民之主諸侯之象也故利於筮立君初九初之畫得九為屯之比磐桓象也磐石也桓杙也四坎之下畫為石互艮之中畫為木四下應初初地之下也象磐石之根著於地桓本之埋豎於地也震為足初剛變為柔則足弱不能動猶磐石桓杙之在地而不可動也利居貞占也居者靜處也既未可動但利於居而貞春秋傳云弱足者居利建侯占也與彖辭同上言居貞若建而為侯則不可居矣春秋傳云侯主社稷臨祭祀奉民人事鬼神從㑹朝又焉得居然則初之磐桓非終不動者也磐桓居貞以剛變為柔取義建侯以不變取義六二六居第二畫為屯之節屯如邅如象也如語助邅遲回不進也二有正應然逼近初剛欲進不能故屯邅乗馬班如象也乗馬四馬也班分也猶班師之班卦四陰四馬之象下二陰震馬也上二陰坎馬也四陰為五所間隔四馬分散之象一車有二服二驂則行四馬分散則不行矣匪㓂㛰媾象也坎為冦象五為二之正應非冦也乃㛰媾也女子貞不字十年乃字占也二以柔居柔女子也字許嫁也禮記曰女子許嫁笄而字二為初剛所逼而不得往從五猶女子為强暴所凌而未得成㛰也其占為女子所正主之事㛰議不成二三四五坤坤數十過坤十數則逢五正應而許嫁矣六三六居第三畫為屯之既濟即鹿无虞惟入于林中象也即就也鹿虞翻王肅作麓山足也三互艮下畫山之足也虞掌山澤之官四當三之前在艮山之間虞人之象然應初比五與三不相得不為三之嚮導故三即鹿而无虞人也平地有竹木曰林互坤為平地互艮木也震竹也震坤艮之交故象林坤之中畫故曰中就山麓而獵者必資嚮導若无虞人嚮導則惟有陷入林中而已君子㡬不如舍往吝占也㡬鄭作機弩牙也逸書云若虞機張楚辭云矰弋機而在上凡設械以取禽獸皆曰機不但機弩而已舍釋也占謂君子機而取禽獸不若舍置而不為若往則未必獲禽徒取羞吝也六四六居弟四畫為屯之隨乗馬班如象也與六二同求㛰媾往吉占也四雖柔弱不行然初為正應上進就已故占者若求㛰媾而往則吉也凡言往者皆謂自内適外无不利占也筮得此爻者占求㛰固吉占他事亦无所不利盖四雖才弱然居得其正又有剛正之應求已故也九五九居第五畫為屯之復屯其膏象也坎為豕為雨為雲考工記天下之大獸五膏者脂者膏謂犬豕五在坎體之中豕之膏也時雨謂之膏雨言其潤澤如膏也凡坎在上體者象水之氣升而為雲屯需是也坎在下體者象水之液降而為雨解是也屯卦坎在上為雲而不為雨天之膏澤艱屯而不下之象小貞吉占也大貞凶占也凡易經言小者皆謂陰言大者皆謂陽此爻之辭小指六二大指九五屯之二五中正相應非不善也方時之屯未克有濟六二在下雖有乗剛之難然守正俟時終必復常是小者之貞可以吉也九五之尊命令不行威權去已不能度時審勢而有所作為必招禍敗此大者之貞所以凶也筮得此爻者若所遇之時與象相類在下卑小之人主事可吉在上尊大之人主事則凶也或所遇之時與象不同則隨其時隨其事隨其人而審處之以合占之意上六上之畫得六為屯之益乗馬班如象也與二四同項氏曰凡稱馬者皆陰爻惟大畜九三特舉乾本象稱良馬他馬皆陰也屯稱馬者卦中四陰也四馬之中獨六三居剛故无虞而徑進二四上居柔皆班而不行屯之時柔者不能行也泣血漣如象也泣者无聲而出涕血者出涕如出血也漣泣貌凡身之液皆水也項氏曰坎為水故有泣血之象陰柔難輔勢孤无應无可廷之䇿矣六畫俱九六為屯之鼎經彖辭凡十三字爻辭凡八十七字屯張倫切磐俗本作盤邅張連切乗繩證切舍音捨註險難乃旦切未易以豉切著直略切傳直戀切朝音潮焉伊虔切間居限切比皮二切解音蟹度待洛切坎下艮上六之七上之三緯八純震變主九二蒙此羲皇坎下艮上之卦而文王名之曰蒙蒙者昏昧无所見如巾之掩覆草之遮蔽然艮山之下有坎險險在内而止於外故為蒙亨占也蒙而開啓之則不蒙矣占者所以可亨也匪我求童蒙童蒙求我初筮告再三瀆瀆則不告占也古者占筮不過三一不吉則可再再不吉則可三三不吉則止不復筮故文王特於蒙比二卦彖辭𤼵三筮再筮之例匪我求童蒙童蒙求我者所筮之事也我謂教師指九二言九二卦主故稱我童蒙謂學子指六五言六五艮少男故稱童蒙禮有來學无往教凡筮人來從師問道初筮若得此卦則可告之告謂許其來學而教之也或初筮不吉再筮而得此卦或再筮不吉三筮而得此卦雖非不吉之占然因至再至三瀆神而後得與初筮即得此卦者不同所以不告之也利貞占也承上文凡再筮三筮而得此卦者利於正主事也初六初之畫得六為蒙之損𤼵蒙象也卦之四陰蒙者也二陽治蒙者也陰斂閉陽開𤼵之初六近九二之陽得陽之開𤼵如徹去其覆冂然利用刑人占也凡易言用刑必有震二三四互震九二震之下畫為用刑之主初六得九二開𤼵柔變而剛能肋九五施教刑四居相應之位獨逺於陽初變為陽而應四治四之蒙四為受刑之人初為承稟於二以施刑於四故其占為利於用以刑人也刑如周官所謂鄉刑上徳糾孝圖土聚教罷民以明刑恥之刑人不虧體罰人不虧財者盖以教愚蒙之民使之知恥知畏而改過遷善非五刑之刑也用説桎梏以往吝占也上為施刑之人占以初柔變為剛而言也此為受刑之人占以初柔未變而言也桎足械梏首械互震為足初足械也而在震足之下足械已脱於脛之象坎為耳四首械也而在坎耳之外首械已脱於項之象初畫四畫耦而不連如械木之判而不合故象桎梏之已説者案周官火司冦乎罷民桎梏而坐諸嘉石或旬有三日或九日或七日或五日或三日以此恥之使知改悔既説桎梏之後當羞愧懲艾而不出若遽有所往則吝矣九二九居第二畫為蒙之剝包蒙象也包如包裹之包容物於内也陽畫連亘有包之象二剛而得中能包裹羣蒙者吉占也納婦吉占也二五正應如夫婦二居内五在外猶婦在父母家將納之歸夫家婦人内夫家也上之吉汎言之凡事皆吉也此之吉指定言之占納婦則吉也子克家申明納婦吉之義克家者能勝治家之任也以剛中之子納柔中之婦得其内肋則克家矣項氏曰二為子上其嚴君與六三六居第三畫為蒙之蠱勿用取女占也陰柔不正故其占為勿用之以取女見金夫不有躬申明勿用取女之義見謂近接於目金夫謂九二六三有正應在上乃近見九二剛强富實之夫而不能保有其躬以爻位言之四為躬六四柔而正比應皆无陽女之獨處无夫可從能保有其躬者六三不正舍其夫而貳於所見之金夫不能如六四之保有其躬也故曰不有躬无攸利占也柔而不正不擇所從以占他事亦无所利六四六居第四畫為蒙之未濟困蒙象也困者四面皆窮无路可通也陰之愚蒙必資陽之啓𤼵蒙卦四陰唯六四不與九二上九之陽為比應僻逺愚民无君師以治之教之者也故為困窮之蒙吝占也蒙而獨无啓𤼵之者所以吝也六五六居第五畫為蒙之渙童蒙象也五艮體為童柔中而應於剛中之二如童稚之蒙有所受教吉占也上九上之畫得九為蒙之師擊蒙象也二剛皆治蒙者九二剛而寛得中其於蒙也能包之治之以者也上九剛極不中其於蒙也乃擊之治之以猛者也艮為手有擊象不利為冦占也冦謂六三坎體陰柔不中正冦也利禦冦占也治蒙之初而用刑已非得已況治蒙之終而用兵乎聖人於初爻為用刑受刑之人兩設其占於上爻為受兵用兵之人乂兩設其占焉上九六三正應六三愚蒙為冦者也上九治蒙禦冦者也其占為冦者不利而禦冦者利夫葛伯之仇餉宻人之不共湯文王用兵擊伐之者以其昬迷不悛故也彼若能悛則此无可禦之冦而兵亦不用矣禦者止之使不為㓂也上之義取諸艮六畫俱六九為蒙之革經彖辭凡二十三字爻辭凡六十二字告公獨切説吐活切桎真失切梏公獨切取十聚切註不復扶豆切比皮二切後同少式照切斂上聲徹去起吕切覆孚阜切同茗狄切罷音皮上為此為云偽切後爻為同艾音乂勝平聲君與音余舍音捨夫音扶餉式亮切共音恭悛聰全切乾下坎上一之六上之四緯四陽大壯變主九五需此羲皇乾下坎上之卦而文王名之曰需需須待也乾健上進坎險在前故須待也有孚占也五以中實感人而人應之光亨占也申上意言有人之孚致光顯而亨也貞吉占也正主事則吉也利涉大川占也需自大壯而變四往居五三四五互離成舟象初九初之畫得九為需之井需于郊象也卦中四畫象國中初上象國門相近之郊去險尚逺而需待不進需于郊者也利用恒占也初九變為柔成巽得恒下體四五變唯上六不變成震得恒上體初雖變而終不變則為恒也至終不變是能常乆須待不進而近險也无咎占也九二九居第二畫為需之既濟需于沙象也九二剛而在地上位與坎水之中相應猶沙地雖未瀕水而逺水已漸潰於其中故曰需於沙小有言終吉占也小陰也謂二若變為柔則其占如此有言如鄭息有違言謂以口語相傷也小者得此占雖人有違言而自處不失其中故終吉也九三九居第三畫為需之節需于泥象也三近坎水剛變為柔亦如水際之濕土故為泥謂須待于瀕水之泥也致冦至象也坎雖為冦已不逼近之則冦何由而至三進逼於險是自致坎冦之至也六四六居第四畫為需之夬需于血象也四已在險地坎為血卦故曰需于血出自穴象也出謂自内而出外也四者坎内之耦盡象穴往順于五則是自穴而出在外矣九五九居第五畫為需之泰需于酒食象也坎水為酒二三四互兊為食九五剛中正位天位酒食燕樂以俟之而已貞吉占也上六上之畫得六為需之小畜入于穴象也入謂自外而入内也四為穴上應三是入于穴之内也上獨不言需者時既終矣无復有所需也有不速之客三人來敬之象也因以教戒占者不速不召也客三人乾三陽也乾為客來謂處於内如泰之大來也乾三陽在内乃其素處之位非上六所召而來者上六柔正下應九三之陽初二與九三同為陽類上六皆敬之也終吉占也以陰在上能敬在下之陽故居需之終而吉也六畫俱九六為需之晉經彖辭凡十一字爻辭凡六十一字註漸漬將廉切樂音洛无復扶豆切坎下乾上六之一上之四緯二陰遯變主九二訟此羲皇坎下乾上之卦而文王名之曰訟訟以言相爭辨也以二人言則上剛下險以一人言則内險外健所以為訟有孚占也二以中實感人而人應之窒惕申占之意言雖有孚者然猶窒塞未通而惕懼中實故窒得乾健之中畫故惕中吉占也凡易言初中終皆謂其時中之時吉者訟至中半而止則吉也終凶占也終之時凶者訟至終極而不止則凶也終凶雖勝亦凶況不勝乎利見大人占也大人者乾之九五也不利涉大川占也訟自遯而變三來居二二三四互離有舟象渉川之舟利於進前不利於退後需主爻九五自四上往為五進舟而前所以利也訟主爻九二自三下來為二退舟而後所以不利也初六初之畫得六為訟之履不永所事象也此邵子所謂意象也柔弱居下不能終訟故有不永所事之象小有言終吉占也初六陰也故曰小其占始雖有言語之傷至終則吉也九二九居第二畫為訟之否不克訟象也能勝曰克二與五訟五剛中正居尊位非可勝者故二不克訟歸而逋象也訟由遯而變遯以六居二訟則九居二二不克訟變剛為柔以避五則九二還為遯之六二故曰歸而逋其邑人三百户象也二變成坤坤為邑二為人艮二畫之耦為門户者門之半故一畫之耦為戸庶人有户无門故民數以户稱坤之數十十其十為百坤三耦為三百户三又坎數也无眚占也眚過尤也處弱避强邑小民寡所以无眚六三六居第三畫為訟之垢食舊徳象也五四三互兊之倒體口向内而食也陰虚食陽之實上九應六三六三食於上九也舊謂素常徳謂所得之食上九在上而食人六三在下而食於人三之從上乃食其素常所得之食也貞厲終吉占也以正主事始雖危而終得吉也危謂處險而上九應之終可吉以其能從陽剛之應也或從王事无成占也從王事坤六三謂无成而有終但不敢為倡而已訟六三止云无成則終始皆无矣九四九居第四畫為訟之渙不克訟象也與九二同四亦訟五而不能勝也復即命象也復還其舊也即命就受命也命自上出者也四訟五則拒上命矣既不克訟變則為柔復其舊而受上命也四變成巽巽為命故有復而即命之象渝象也渝變也變其訟上逆命之非也安貞吉占也安靜以正主事則吉也九五九居第五畫為訟之未濟訟元吉占也居訟之時有長人之善而吉也項氏曰人謂九五為聴訟之君非也爻象皆稱訟何謂聴訟但訟卦五爻皆不正唯九五一爻既中且正中則我不終訟正則人不克訟此訟之最善者或為徳之尊或為位之尊不必專指人君也上九上之畫得九為訟之困或錫之鞶帶終朝三褫之象也錫與也鞶帶革带也所以繫鞸繫佩凡命服先束革带乃加大带三四五互巽為股上九一畫連亘當股之上鞶带之象也自旦至食時為終朝五之位為日之正中上之位在五之外偏而不中故為日之朝褫鄭本作拕徒可切晁氏曰如拕紳之拕澄案若只依今本作褫與搋通用訓拽亦拕之義訟勝受服矜喜之極故終朝之間三拕拽而加諸身也上九與坎之上畫為應二坎數也項氏曰凡訟皆起於剛而止於柔九二九四皆剛者也是以起訟終以居柔而不克訟故一逋一渝皆變而止初六六三雖居剛位而其徳皆柔故能終吉一為不永所事一為從事无成獨九五一爻有全剛之資有尊大之勢可以訟矣而居中履正非好訟者也故為元吉上九以剛居柔可以不克訟矣而在訟之終居髙用剛不勝不已此終訟之凶人也六畫俱六九為訟之明夷經彖辭凡十八字爻辭凡七十一字褫敕紙切註食於食人音嗣長人知兩切好訟虚到切坎下坤上六之八上之五緯一陽復變主九二師此羲皇坎下坤上之卦而文王名之曰師師衆也一陽在下卦之中衆陰從之有將帥統衆之象焉貞大人吉占也正主用師之事者必大人乃吉大人九二也陽為大二人位舊本作丈人崔氏憬曰子夏傳作大人今案子夏傳雖後人附託之書然此彖作貞大人吉與困卦彖辭同皆以内卦坎中畫九二為大人其義為得丈字盖大字之訛又案太𤣥衆首擬師卦其贊辭曰丈人㩁孥盖用易語則大之訛為丈在先漢已然矣王弼解丈人為嚴莊之稱陸績則云丈人者聖人也澄案論語莊子等書稱丈人者謂老人无力以老而扶杖故曰丈人解為嚴莊固未當若績之意則是而无此訓義今定從崔説作大无咎占也程子曰吉而无咎也盖有吉而有咎者有无咎而不吉者吉且无咎乃盡善也吉謂必克无咎謂合義初六初之畫得六為師之臨師出象也在一卦之内由内而外為出以律否臧象之教戒辭也謂師出之初冝以律而否臧之春秋左氏傳曰執事順成為臧逆為否有律以如已也故曰律否臧此盖謂聴吹律之聲以占師之或否或臧也案周官春官大師之職執同律以聴軍聲而詔吉凶鄭註引兵書云王者行師出軍之日授將弓矢大師吹律合音宫則軍和士卒同心商則戰勝軍士强角則軍擾多變失士心微則將急數怒軍士勞羽則兵弱少威明又案春秋傳晉人聞有楚師師曠曰吾驟歌北風又歌南風南風不競多死聲楚必无功杜註云歌者吹律以詠八風又案史記律書曰六律為萬事根本其於兵械尤所重故望敵知吉凶聞聲效勝負武王伐紂吹律聴聲推孟春以至於季冬殺氣相并而音尚宫司馬氏索隠云古者師出以律凡出軍皆聴律聲澄謂律自坎取象荀九家逸象坎為律上下空而陽氣實其中也凶占也初柔弱在下而不正不正非出師之義柔弱非出師之才故凶然聖人先教戒之俾師出之初定其否藏于律囚律聲之不吉而師不出則不至於凶也九二九居第二畫為師之坤在師象也在師在軍中也古者制軍之法二千五百人為師五師為一軍軍將皆命卿九二以一陽在五陰之中猶一軍將在五師之中也中吉占也中者以二居下卦之中也其占為中主之時則吉亦以戒其老師黷武也无咎占也與彖辭同王三錫命申明中吉无咎之義將之在師者中之時吉且无咎當膺王三錫命之寵錫命如王使宰周公錫齊侯命王使内史過錫晉侯命也至于三者天寵之優渥也二應在五五為王三坎之數也六三六居第三畫為師之升師或輿尸象也坎為輿人死曰尸盧氏曰坤為尸坤尸在坎輿之上故象輿尸范氏大性曰二為卦主三以失位之柔而乗之此師之所甚忌者故有僨軍之象古者兵雖敗猶不忍棄死者故載尸以歸輿户猶以車載棺而謂之輿櫬也或者有時而然之辭凶占也六四六居第四畫為師之解師左次象也春秋師次于郎師退次于召陵左氏傳曰凡師三宿為次虞氏曰震為左澄案兵事尚右右為前左為後故八陳圖天前衝地前衝在右天後衝地後衝在左左次猶言退舍謂不進前而退後也无咎占也程子曰師之進以强勇也四以柔居陰非能進而克捷者度不能勝而完師以退愈於覆敗逺矣六五六居第五畫為師之坎田有禽象也田謂二下卦坎有禽象田有禽則可以獵獲利執言象也執言謂奉辭以伐罪无咎占也程子曰師之興必以蠻夷猾夏冦賊姦宄為生民之害不可懐來然後奉辭以誅之如此而動乃得无咎若輕動以毒天下咎矣長子帥師弟子輿尸象也凡次子以下為長子之弟者皆曰弟子震為長男坎為中男九二震之下畫長子也六三坎之上畫弟子也帥師當專任長子若又兼任弟子則事權不專威令不一必至喪敗而輿尸以歸六三居剛而乗九二之丄如先穀不順荀林父之命馬謖固違孔明節制以取敗者故有此象貞凶占也正主其事而如此則凶程子曰自古任將不專而致覆敗者如晉荀林父邲之戰唐郭子儀相州之敗是也上六上之畫得六為師之蒙大君有命開國承家象也六上變為剛居一卦之上大君之象巽風震雷皆命令之象互震在下大君之命自上而達於下也三四五互坤為國震為諸侯開國也上變則二三四五上成離象家震為長子承家也此以師之終言之用師成功大君有命命之或開國為諸侯或承家為大夫也小人勿用占也小人謂細民農工商賈也庶人在官者亦是若小人得此爻之占則勿用盖開國承家之賞非小人之所可當也六畫俱六九為師之同人經彖辭凡七字爻辭凡六卜九字大人舊本作丈人今依崔憬所定否音鄙長子知兩切註天師之職大音泰傳直戀洛後同内史過君和切債音奮櫬初覲切度待切覆敗孚卜切喪敗喪去聲穀胡谷切謖所六切賈音古坤下坎上八之六上之五緯五陰剥變主九五比此羲皇坤下坎上之卦而文王名之曰比二人反面相從謂之比一陽居尊而五陰從之如五家為比而比長統之也吉占也人相附從則无乖爭故吉原筮元永貞无咎占也原再也再熟之蠶謂之原蠶初筮而得此比卦者其占吉再筮而得此比卦者其占為元徳之人永久正主其事則可无咎盖不能如初筮所占之吉也不寜方來占也考工記曰唯若寜侯毋或若女不寜侯不寜盖諸侯之不朝貢者也王者再筮而得此卦具占為前時不寜之國繼今以後方且來朝貢也後夫凶占也昬姻之家再筮而得此卦者占為女子所嫁之後夫則凶盖夫不可再也比卦衆陰所從一陽而已如民之戴一君女之事一夫不可以二因再筮而𤼵此不可再之義初六初之畫得六為比之屯有孚占也初變為剛以實感人而二孚於初比之象也初與二相比近故二來比之无咎占也比自近始二有孚而比初所以无咎有孚占也此有孚謂三四盈缶終來象也初變為剛則初二三四有缶象言有孚者不止於二若三若四皆在缶之中其有孚者盈滿於缶之中而終來孚於初也有他吉占也初不止比二而又有他并往比三四在下之陰同一心而順從九五則吉也六二六居第二畫為比之坎比之自内象也比之者初比二也故曰自内貞吉占也六三六居第三畫為比之蹇比之匪人象也三近於二二比三者也然三居人位而不中正是人而无人道也故曰匪人二雖比之三豈可比者哉凶占也六四六居第四畫為比之萃外比之象也外謂五也四近於五故五比之貞吉占也已得正而陽剛中正之賢比之故正主事而吉也九五九居第五畫為比之坤顯比象也五以陽剛當天之中衆所共覩與上冥下幽者不同故曰顯顯比顯明其道以比天下也王用三驅失前禽邑人不誡吉占也謂王者筮得此爻而用之以田獵也三驅者因田以教戰凡馳驟進趨皆以三為節周官大司馬仲冬大閲立三表是其法也驅即所謂驅逆之車驅出禽獸使趨田也三坎數坤馬駕坤輿以行象驅禽被驅而前去者不追唯順而來者取之失謂任其去失前指上六禽坎象坤為邑二三四皆人也誡期約也田獵之時其民竭作不期約之是聴其自至也九五比之主以一陽統衆陰然上六之在前者縱其去四陰之在下者不必其皆從王者大公无我之心不計人之從已而人自无不從此爻為田獵之吉占而占之中又有此二象也上六上之畫得六為比之觀比之无首象也比之謂九五比之聖人一視同仁不以上六在外而不親比之也然上六居一卦之上如人首在一身之上也獨外王化不内嚮九五是比之下體具足而獨上體不完猶人之无首也盖比卦五陰下四陰皆順從一陽唯上六一陰在一陽之外非嚮化者故有此象凶占也苗之於舜葛之於湯崇之於文王自取其凶也六畫俱六九為比之大有經彖辭凡十六字爻辭凡六十二字比之匪人者下舊本无凶字今從王肅本比皮二切後不音並同註比長知兩切若女音汝朝貢音潮乾下巽上一之五上之六緯五陽夬變主六四小畜此羲皇乾下巽上之卦而文王名之曰小畜小謂陰畜藏也一陰藏畜於五陽之間小者藏畜也亨占也雖小者畜藏而亦可亨也宻雲不雨自我西郊象也坎之水其氣上升為雲其液下降為雨二三四互兊兊有坎之上半體變坎之下半體上有雲而下无雨也坎之下畫窒塞不通窒塞象雲之宻不通象雨之不降我謂六四為卦主故稱我西四之位又互兊之上畫也内卦象國中四象郊西郊陰方也陽倡陰和則雨陰倡陽和則不雨自西郊陰倡也小畜一陰為主未能成濟物之功故其象如此初九初之畫得九為小畜之巽復自道象也小畜一陰為主而初九獨與之應宜有咎也若外不繫於陰柔内自守其陽剛是為能復復一陽五陰小畜一陰五陽卦之相反者小畜五畫俱變唯初九不變則為小畜之震九以一陽居初與復之初九同故以復為象道正路也震為大塗故以道為象初之能復也不繫正應之四而比同徳剛中之二復而由正道者故曰復自道何其咎占也舍柔應從同徳何咎哉吉占也九二九居第二畫為小畜之家人牽復象也剛而得中初九舍六四正應而牽連九一以復于初初之復也二有力焉故曰牽復吉占也九三九居第三畫為小畜之中孚輿説輹象也輹伏兎也在軸之上承輿者車不行則説之二若是耦畫則二三四互坎為輿九二竒畫是坎之下畫不存也輿下說去其輹之象九二為輿之輹九三為在輿中之人人在輿中而輿下之輹説則不能行也輹舊作輻晁氏曰案説文作輹澄案輻因音近而誤也輻者輪轑非可説者作輹字乃與大畜九二同夫妻反目象也三夫也四妻也反目反其目而不相視也互離為目離目視上不視下反目之象初四為正應四乃初之妻也初能自復而逺絶之三與之比欲與為妻然四上合五而不下視三故反其目三欲妻四而四不夫三也六四六居第四畫為小畜之乾有孚占也有五之孚血象也坎為血卦三四有坎之半體血陰之傷也四與三不和故有傷去惕出象也去如微子去之紀侯大去其國之去惕出謂惕懼以出也杜詩云􅇶惕乆木出避三之見傷故去其所而出外以懼也上合於九五一陰介二陽之間變為剛實故能惕无咎占也不從近比强昬之夫而歸寜歸宗以依于君親其補過亦可善也九五九居第五畫為小畜之大畜有孚占也有四之孚攣如申占之意言四孚五五亦攣四其交固結富以其鄰象也陽實為富陰虚為不富鄰謂四言九五富實而能提挈帶挾其鄰也上九上之畫得九為小畜之需既雨既處象也陰畜藏於陽之内陽旋繞不已則為風巽上畫變為柔則成坎而為雨故曰既雨雨作處而風息處者外陽不復動也故曰既尚得載象也尚猶配也與己配而在己上者也臣下取帝女曰尚公主漢書卓王孫自以得使其女尚司馬長卿尚謂六四小畜以六四為主爻而九三以之為妻四在三上故曰尚得舊作徳晁氏曰京房虞翻子夏傳皆作得今從之載者車中所載之物也故為輿上九坎之上畫而實其中象車之有載故曰尚得載上九與九三為敵應之爻上九爻辭自此以下皆取應爻九三及主爻六四而言亦於卦終總言一卦之義故不專取上九一爻之義也婦貞厲占也婦亦謂六四六四既與九三反目九三為夫不自正主事而俾六四貞之則危矣月㡬望象也㡬孟荀一行作既今案㡬亦有既音左氏傳庸可幾乎㡬既古字盖通用納甲巽卦象既望之月參同契曰十六轉受統巽辛見平明月㡬望者陰之盛謂六四為卦主也易以月㡬望為象者三皆陰為主之卦也筮日得此爻則以此象為占君子征凶占也君子謂九三也征行也行軍往正其罪曰征凡行役在路者皆曰征受制於妻失為夫之道矣其能行乎故征則凶也六畫俱九六為小畜之豫經彖辭凡十一字爻辭凡六十二字輹舊本作㡬輻得舊本作徳說土活切攣力專切載才再切音既註和胡臥切轑音老逺絶于願切強如字昬起兩切取帝女音娶長卿知兩切所載兊下乾上二之一上之六緯一陰姤變主六三履虎尾不咥人此羲皇兊下乾上之卦而文王名之曰履履足踐地也卦之初二為地卦自垢而變初柔升三履二之地故曰履卦名連彖辭象也二三四互離為虎離於飛類象雉於走類象虎外文明而中陰質也二與初在後虎之尾也以三履二為履虎之尾上乾為虎之首所履之尾在後而虎首趨前上口不開為不咥人之象三為人亨占也初九初之畫得九為履之訟素履象也絲帛未加采色曰素言不改其舊也初九陽剛安於在下不變所守素其位而行者也舜飯糗茹革若將終身顔子居於陋巷不改具樂其斯之謂與往无咎占也其往也安行其素耳豈有慕乎外而往哉故无咎九二九居第二畫為履之无妄履道坦坦象也二為地上九二剛變為柔得坤中畫成震大塗所履者地上之正路坦坦然平夷者也幽人貞吉占也初在地之下為幽二為人二比初而居中故曰幽人二比初亦比三然能内取剛正之初而不外昵柔邪之三所以為幽人之正主事而吉也六三六居第三畫為履之乾眇能視象也眇一目少也二三四互離為目目眇者所視偏離之中虚在三不中不正視之偏也視雖偏而離目无所傷目雖𦕈而猶能視之象跛能履象也跛足偏廢也震為足兊變震之中畫足跛也震下畫之陽猶存足雖跛而猶能履之象履虎尾咥人象也象與彖辭同彖通指一卦而言則上九虎之首也虎口實而合有不咥之象此專據一爻而言則三為人之位兊之上畫也兊口虚而開如人在虎口中故有咥人之象凶占也居不正非能馴暴養貪者其被咥而凶也冝哉武人為于大君象也柔而居剛内剛也外比九四外剛也質柔而内外俱剛血氣之勇非義理之勇故為武人之象為猶虞書汝為之為謂以膂力之剛而效使令也大君上九也大謂陽乾為君六三應上九以力而效用于大君之象咥人之象其占固者凶矣乂有此象則不皆凶也易之前民用其變不常如此九四九居第四畫為履之中孚履虎尾愬愬象也初為虎之尾四應初下履虎之尾也愬愬畏懼之貌剛而居柔故能畏懼終吉占也臨禍害而能畏懼終獲其吉也九五九居第五畫為履之睽夬履象也夬決也五剛決去一柔為夬他爻所言履字各爻之自履也此爻所言履字則卦名之履專指六三而言盖六三成卦之主也夬與履皆一柔五剛之卦上下二體互易耳六三以不中不正之柔下履九二之剛小人之凌君子也九五與九二徳同位應欲為九二決去六三故曰夬履貞厲占也陽之不能无陰天地之常道君子之不能无小人亦古今之常理小人值當去之時有可去之勢固在所必去茍時勢或有未然則姑且容之而已夬之一柔乗五剛此當去之時可去之勢也故決而去之為冝履之六三雖乗九二之剛然和説以應上出力以奉上彼自不中不正耳非能敵陽者也共鯀驩兜與稷契臯夔同處堯朝何損於堯之冶必欲正主決而去之之事則反危矣危謂於時未冝於勢未易也上九上之畫得九為履之兊視履象也居履之終人皆視其所履之何如六三離目為應自下視上故曰視履考祥其旋占之事也人之行莫大於孝養生之孝未為大喪死之孝最為大上爻當乾父之終父死稱考祥者父喪既終之時也旋反還也居喪在外旋者祥後復寢之時也視其所履於親之終者當視其所履於喪之終元吉占也三年之喪盡禮可謂能慎終矣上九陽剛健極故能強有力以終喪此大善之人所履之吉也六畫俱九六為履之謙經彖辭凡七字爻辭凡六十二字咥徒結切𦕈妙小切跛波我切愬山革切註飯糗上孚晚切下其乆切其樂音洛使令來丁切當去可去去之並起吕切共音恭朝音潮未易以豉切之行下孟切養生于尚切乾下坤上一之八上之七經三陽辟主九三泰此羲皇乾下坤上之卦而文王名之曰泰三陽長出地上六陰已消其半夏正正月之卦也泰者流通无滯之謂天氣下降地氣上騰二氣交而相通也小往大來象也小謂陰大謂陽三陰皆往居外三陽皆來居内吉亨占也吉而文亨占辭之極善者初九初之畫得九為泰之升拔茅茹以其彚象也初九變為柔成巽象茅茹茅根也彚類也三陽為類茅雖不共本拔之則其根相連而起初之以其類同進似之征吉占也三陽同行而進故吉也九二九居第二畫為泰之明夷包巟象也包者古人盖以茅葦之屬包裹魚肉也凡易中言包者皆謂陽畫巟與通血也九二變為柔互坎之陽畫為血九三陽畫在外包之郊祭天神燔柴之後最先進血禮記曰郊血至敬不饗味而貴氣臭也包謂包裹牲血以進而達誠於天也二五正應五天之位也而陰上升以交乎天二地之位也而陽下降以交乎地此禮所謂升中于天饗帝于郊者陽象天神陰象下地主祭之人二之交五必包裹祭天之血以達誠于上也巟諸本作荒今依許慎説文及虞翻本作巟考象義當作諧聲字從省故云血其後傳冩訛巟下去血而上加草則失其義矣用馮河不遐遺朋亡占也馮徒涉也河者流水之名遐逺也遺謂物有遺失亡云也九二剛變為柔二三四互坎為水之流三四五互震為足之動初二三成離雖有舟象然震足動於前而舟在其後為舍舟而徒涉之象九二實變而虛為失物之象不離本位不遐之象不遐而遺猶曰不逺而復也初陽在水之内不與同渉朋亡之象陽猛於進故其占為用之以徙涉河水則不逺而已有所遺失朋類亦皆亡去此戒其進之鋭也得尚于中行占也尚配之在己上者謂六五也中行中路也五居上卦之中故曰中行其占雖朋亡於下而得配于上也九三九居第三畫為泰之臨无平不陂无往不復象也泰至半矣慮其將變也泰三四相易則變歸妹九三比六四故以二畫之相易取象泰之上體坤也若三四相易則三四五互坎而平夷之坤變為險陂之坎矣故曰无平不陂陰往在外若四易三則往外之陰來復于内矣故曰无往不復程子曰三居泰之中泰之盛也物理如循環在下者必升居上者必降泰久必否故為之戒曰无常安平而不險陂者謂无常泰也无常往而不反者謂陰當復也艱貞无咎占也泰將變之時以艱難之心正主事則无咎也勿恤占也又戒以勿憂恤盖徒憂无益必有處之之道其孚于食有福占也其者期之之辭陽者陰所食六四食於九三九三若能孚于食已之實者而得其心則必无來復易位之禍是有福也互兊象食六四六居第四畫為泰之大壯翩翩象也翩翩飛而向下也小過有飛鳥之象者陽象鳥身陰象鳥翼翼在兩旁而身在中也泰六四變為剛三四五上得小過全體之半陽在下陰在上如鳥身投下翼飛于上而隨身以下也不富以其鄰象也其占為雖不富而能以其鄰陰虚為不富鄰謂五盖三陰皆欲求陽故四趨下而鄰皆肯從之也不戒以孚象也四孚于其鄰鄰亦應四之孚故不待期約而能以其所孚之鄰同下六五六居第五畫為泰之需帝乙歸妹以祉象也帝乙商王也六五以柔中應在下之剛中帝乙下嫁從夫之象泰卦互體及卦變皆成歸妹卦故以歸妹為辭祉福也以祉言將其寵禄以歸夫家也祉指四上二陰而言六五下嫁九二而二陰從之也朱子曰帝乙歸妹之時常占得此爻凡經以古人為言如髙宗箕子之類皆放此澄案他書載湯嫁妹之辭云云其辭雖善要是後世好事者假託為之或乃因是遂指帝乙為湯而謂非受辛之父者惑矣元吉占也上六上之畫得六為泰之大畜城復于隍象也掘隍取土以築城隍陷入地中隔絶不通耦畫似之城髙出地上連亘不斷竒畫似之上城也三隍也泰之上其畫耦而為坤體是城之髙者平矣泰之三其畫竒是隍之虚者實矣故為城土頺圯復還舊處填塞其隍之象勿用師占也上六變為剛則坤體不完衆散邑削故勿冝用師自邑告命貞吝占也邑既削矣兊口在四不比不應威令不行乃自邑而告之以命欲川其衆如是正主事則吝也六畫俱九六為泰之否經彖辭凡七字爻辭凡八十七字巟舊本作荒彚音胃註􅀢風黄切去血起吕切放封廣切好事虚到切坤下乾上八之一上之七經三陰辟主六三否此羲皇坤下乾上之卦而文王名之曰否三陰長出地上六陽已消其半夏正七月之卦也否隔塞也與病痞之痞同義天氣上而不下地氣下而不上二氣不交而隔塞也不利君子貞占也君子道消故不利正主事大往小來象也二陽皆往居外三陰皆來居内也初六初之畫得六為否之无妄拔茅茹以其彚象也三四五互巽為茅初二柔畫皆茅之茹也泰之三陽以其類同進否之三陰亦以其類同進故象與泰之初同貞吉亨占也正主事者吉而亨也或曰泰之三陽並進君子之類也其占貞吉冝矣否之三陰並進小人之類也其占正主事亦吉亨何也曰君子之有小人猶夫之有婦陽之有陰豈能絶其類哉唯艱其進遏其盛不使之勝善類而害治道斯可矣小人者治世之能臣亂世之姦雄也自占治世為君子分憂任勞者固亦有亂世之姦雄特世治黨衰則不能為惡耳方否之初陰以類進聖人不遽絶之也初與九四正應奉承君子固可以吉且亨也誘之趨善俾天下无棄人聖人之仁也貞者以正主事也不能改心易慮以從君子烏能以正主事哉而何吉亨之有六二六居第二畫為否之訟包承象也承當作脀牲之正體也古字通用故作承六二坤體為牛牲居中為正體與九五應以九五之陽包之也小人當否而求通豈能守道俟命唯以包苴饋遺為事而已曲禮曰以包苴簞笥問人莊子曰小夫之知不離乎包苴竿牘小人吉占也如象所云小人之事也故吉大人否亨占也大人謂九五九當五之時則能休否而吉在二之時雖未出乎否然守道俟命豈肯妄為以求通故身雖否而道則亨也六三六居第三畫為否之遯包羞象也羞者􅌜胾膾炙醢醬之屬食之加品非食之正品也六三亦牛牲然位不居中又不得正非牲之正體也故象羞九四之陽在外包之以包苴遺人而其遺非正饌又非中正之二可比矣九四九居第四畫為否之觀有命占也有命與師上六大君有命同三四五互巽為命以剛健之才居近宻之位受君命之寵委任以濟否者也无咎占也居不當位冝有咎也有君之命得展其才以濟時故无咎疇離祉占也疇類也離附麗也疇謂陽之類指三陽也祉謂陰之福指三陰言四受命於君行其濟時之志故三陽皆將出乎否三陰皆將順乎陽是陽類同受陰祉之附麗也九五九居第五畫為否之晉休否象也人依木旁以息曰休三四五互巽為木人情厭亂思治冀得休息九五陽剛中正之大人如木有芘蔭可依故在下者依其芘蔭以休息於否將變之時也大人吉占也否將變而得以休息唯大人為可依故吉其亡其亡繫于苞桑象之教戒辭也其者慮其將然之辭亡去失也與馬匹亡及莊子俱亡其羊之亡同苞叢生也大人者安不忘危故於否既可休之時其逺慮深戒如有一動物在此未至於亡也而恐其亡曰其亡矣其亡矣其繫之于苞桑乎諸木之中桑之根最深固而又叢生則固之甚也盖唯恐繫之不固而或至走逸慎之至也程子曰否將反泰不可便為安肆當常虞否之復來聖人之戒深矣漢王允唐李徳裕不知此戒所以致禍敗也上九上之畫得九為否之萃傾否象也傾猶倒也否者泰之反體坤下乾上為否反而倒之則乾在下坤在上而為泰矣故曰傾否泰過半則泰將變至終則泰反為否否過半則否將變至終則否反為泰四之時否可祉而未能休也五之時否已休而未能傾也上九否之終則反而傾否既傾則轉而泰也程子曰極而必反理之常也然反危為安易亂為治必有陽剛變之才而後能故否之上九能傾否屯之上六則不能屯也先否後喜占也占者先之時猶否後之時則喜也六畫俱六九為否之泰經彖辭凡十字爻辭凡五十八字舊本卦名下有之匪人三字朱子曰疑衍文由比六三而誤也今從其説註為君子為云偽切脀諸仍切饋遺云偽切知音智離力智切􅌜黒各切胾則四切炙之夜切可比補履切復扶豆切離下乾上三之一上之八緯一陰姤變主六二同人于野此羲皇離下乾上之卦而文王名之曰同人同人者同心同徳之人也六二九五俱以中正居人位而相應六二為九五所同之人故曰同人卦名連彖辭象也人目所望地連天際處為野六二在下居乎地也上應乾五應乎天也故曰同人于野亨占也六二卦主而乾五為應故能致亨利涉大川占也初二三有舟象乾健前行而舟隨其後故以涉大川則利也利君子貞占也二五中正相應其相同者皆君子之正道故利於君子之正主事也初九初之畫得九為同人之遯同人于門象也同人謂六二乃九五所同之人也初九變為柔成艮門闕之象初者時之初同人自姤而變六二自初往二猶自門而出外也无咎占也於初而出門以就同己者非有咎也六二六居第二畫為同人之乾同人于宗象也宗如宗子之宗六二為一卦之主猶宗子為一族之主也凡宗者各有所宗非天下為公之同也六二以中正應九五同乎九五而已他无與同者是六二之為同人不過于其同宗之人而同也吝占也程子曰同於所繫應是有所偏與在同人之道為私狹故可吝九三九居第三畫為同人之无妄伏戎于莽升其髙陵三嵗不興象也離之戈兵為戎九三變為柔互震上畫互巽下畫為有草茅竹木之處故曰莽又互艮中畫山之半也故為陵義與丘同下卦之上故為髙伏者伏于四之下升者升于二之上三震數項氏曰伏戎于莽處下卦也升其髙陵望上卦也程子曰卦唯一陰諸陽皆欲同之二中正與五相應三與之比欲奪而同之然理不直義不勝故不敢顯𤼵伏藏兵戈于林莽之中負不直又畏懼時升髙陵以顧望至三嵗之久終不敢興既不敢𤼵故不至凶也九四九居第四畫為同人之家人乗其墉弗克攻象也墉城垣也離中虚外周象墉九三為六二之墉四在三上乗其墉也九四亦欲得六二乗二之墉將攻而取之然二之應五正也四之於二非應非比其攻之為无名而逆理甚矣二雖弱而直四雖强而不直始有攻之之意終以義之不可故弗克攻而止項氏曰凡爻言不克者皆陽居陰位訟之九二九四同人之九四是也唯其陽故有訟有攻唯居陰故不克訟弗克攻吉占也程子曰知不直而不攻畏義而能改其吉冝矣澄案三之伏戎四之乗墉或並以為抗五或並以為侵二或謂三欲侵二四欲抗五以爻義考之皆非也夫陽之得陰陰之從陽者以其應也以其比也姤之初六正應九四而九二與比者得之同人六二若非以中正與九五同則不保其不為姤之初六矣九三不慮六二之不從己唯忿九五之能得二故不急圗二而專以敵五為心晉文公一戰勝楚諸侯之從楚者自不能不從晉九三非能如此也而謬計妄想盖欲如此九三與九五度徳雖殊度力猶頗相等均之為以剛居剛故也若九四之以剛居柔則力非能抗九五者矣故不敢咎五而徑以攻二為事晉悼公與楚爭鄭不伐楚但伐鄭鄭不能支而楚自不能與爭九四非能如此也而輕舉妄動盖欲如此然三之於五卒不能興者以勢之不敵而不敢也故僅可以免凶四之於二卒不攻者以義之不克而不為也故猶可以獲吉九五九居第五畫為同人之離同人先號咷而後笑象也同人亦指六二號大呼也咷哭也號咷者離火之聲笑者兊口之説也六二往應九五而厄於九三之强鄰其先六二在離火炎焚之中而號咷其後與九五相遇九五變為柔則成兊口而笑矣大師克相遇象也同人六畫俱變則成師師以坤為衆坤衆自乾惕而變故為大師九三之强必時事俱變以大師克勝之然後二與五得相遇也上九上之畫得九為同人之革同人于郊象也初九六二九五所稱同人皆謂六二盖六二者一卦之主為九五所同之人此爻所稱同人謂九五盖九五者與六二相同之人也郊謂國門之外凡卦初上二爻有擬之以人者有但言其時者此卦之初上是也二五為心徳相同之人三四為爭奪六二之人此四爻各擬之以人者也初九但言時之初同人于門以六二在初之時而言也上九但言時之終同人于郊以九五在終之時而言也此二爻不擬之以人者也九五與六二以中正相同然可與同者止有六二而已虞有八元八凱周有亂臣十人下至中林􅆯兎之夫猶可以為公侯之腹心何其同者之多也漢昭烈僅得一孔明猶魚之有水何其同者之寡也乾九中而居五則六二為應終而在上則下无應與如出在國門之外環視四顧无一可與同者矣无悔占也非自處不善時則然也雖无衆賢共事措天下於大同之治而亦可无悔也六畫俱六九為同人之師經彖辭凡十三字爻辭凡六十一字葬莫黨切號户髙切咷道刀切註夫陽音扶勝楚升正切度待洛切頗匹可切乾下離上一之三上之八緯五陽史變主六二大有此羲皇乾下離上之卦而文王名之曰大有大謂陽有者盛多之義繫辭傳云富有詩小雅云㫖且有釋者謂有猶多也卦以大名者四大有言大者多有也大畜言大者藏畜也大過言大者太過也大壯言大者盛壯也此卦一陰居尊為主而五陽具備故曰大有舊説謂陽為陰所有非也元亨占也初九初之畫得九為大有之鼎无交害象也交如朋友之交无交如文言傳所謂无交而求孟子所謂无上下之交者初九无應而逺於不利所主故曰无交害者利之反也謂所求匪咎艱則无咎占也其害也匪己之過咎所處之地然爾能艱難則可无咎上无交契前有剛間不可慢易也九二九居第二畫為大有之離大車以載象也坤為大輿其畫耦而虚大有之下體乾也其畫竒而實猶坤之火車而以載實其中也有攸往无咎占也剛健勝重故有所往則无咎言无覆敗之憂也九三九居第三畫為大有之睽公用亨于天子占也言諸俟筮得此爻而用之以享于天子也享備物以獻也凡諸侯朝覲天子先朝而後享朝者禮之重享者禮之盛案覲禮先執圭以覲後乃備物三享也蔡氏曰公三也天子五也居下之上故稱公進近乎五故有享于天子之象小人弗克占也小人筮得此爻則弗克承當不冝用也九四九居第四畫為大有之大畜匪其彭象也彭者作樂聲容之盛也大有者陽之盛多唯初九處下无交不言其盛九二大車重載則盛矣九三備物亨上則又盛矣九四在三陽之上以陽息之卦言之則為四陽之大壯盛之至也物忌滿盛九四離體能明此理居柔不過於剛不自處以盛者也故曰匪其彭无咎占也當盛之時不處其盛故无咎六五六居第五畫為大有之乾厥孚交如威如象也六五以柔中下應剛中之九二其孚信于九二如物之交合固而不可解又得九二之剛以濟已之柔故有威如之象吉占也上九上之畫得九為大有之大壯自天祐之象也六五者一卦之主也上居卦之終故於卦終言卦主之盛四陽在六五之下者皆應之矣上九一陽在六五之上而亦應之上天之位也上一陽之應五是天之祐五也吉占也无不利占也六畫俱六九為大有之比經彖辭凡四字爻辭凡六十字載才再切亨香兩切彭陸氏步郎切又如字註剛間居限切易以豉切勝重音升朝音潮艮下坤上七之八上之九緯一陽復變主九三謙此羲皇艮下坤上之卦而文王名之曰謙謙者屈己下物也艮山之髙而在地下是貶抑其尊廿處物下也坤地之卑而在山上是推遜卑者使居己上也内止則退己而不進外順則讓人而不爭所以為謙也亨占也君子有終占也其占既能致亨矣若君子筮得此卦則其占又能有終也凡單言有終者有初而有終也九三為一卦之主君子盖指九三言之初六初之畫得六為謙之明夷謙謙象也陰柔處至下謙而謙者也君子用涉大川吉象也君子筮得此爻而用之以涉大川則吉也初六變為剛初二三成離有舟象坤順在上前无阻隔故吉柔變而剛故曰君子六二六居第二畫為謙之升鳴謙象也三四五互震為雷雷有聲韓文曰天以雷鳴夏六二外比互震之下畫謙在中而鳴聲𤼵於外也貞吉占也中正故正主事則吉九三九居第三畫為謙之坤勞謙象也震動者勞之象有功勞而能謙如周公是也顔子之願无施勞抑其次與君子有終吉占也與彖同九三一卦之主彖辭之占以九三言之也筮得此爻者其占如彖又加一吉字以明其占之極善也六四六居第四畫為謙之小過无不利占也順而得正上而能下故其占如此撝謙象也撝如手之撝下有艮手為撝示其謙於下之象六四固能謙矣然以无功而處九三有功者之上故施布其謙以示下盖居三之上而不敢自安也六五六居第五畫為謙之蹇不富以其鄰象也象與泰六四同鄰謂六四利用侵伐占也不名其罪而加兵曰侵聲其罪而致討曰伐六五變為剛三四五成離有戈兵象故其占利用之以侵伐所侵伐者盖上六也能下為謙上六居一卦之上而乗君位非能謙者故侵伐之朱子曰自初九積到六五謙亦極矣自冝人人服之猶有未服者則利侵伐也或問謙不與人爭如何言侵伐朱子曰老子言抗兵相加哀者勝矣孫子言始如處女敵人開戸後如脱兎敵不及距大抵謙自是用兵之道无不利占也朱子曰於他事亦无不利也項氏曰三為獨陽為萬民所服己下人人亦下己故止於謙无所復為五以陰柔居尊位己雖隆謙人未免有不謙者必用侵伐以一之帥衆謙以攻少不謙不謙者去則天下皆謙故无不利不富以其鄰不待賞而服同謙者也利用侵伐待刑而後服不同謙者也二者皆服則无不謙矣上六上之畫得六為謙之艮鳴謙象也鳴者以震之一陽也六二外比震之一陽由中而鳴其謙於外上六下應震之一陽自上而鳴其謙于下由中𤼵乎外而鳴者情也自上達乎外而鳴者不情也上六以柔居柔順體之極冝能謙矣然志欲自伸於一陽四陰之上非能屈己下人者也其鳴謙也特畏九三而為是聲音以媚之爾利用行師征邑國占也謙之二三四五上師之初二三四五也行師謂師行在道震為大塗行之象坤邑國之象邑謂天子畿内詩曰商邑翼翼四方之極邑國畿内之國也畿内大國皆王之三公出封封于疆地爵以上公上畫於一卦為最逺外於六位為最髙上故象王畿大都所封上公之國也上六應九三乗六五能謙于剛强之臣而不能謙于柔順之主當謙之時虧謙之道故冝用師以正其罪邑國者上六之國也征者王命帥師之臣征之也如春秋時王師伐虢之類舊説以為上六自征其邑國非矣所征之邑國即六五之所侵伐者據六五出命而言則曰侵伐據上六在國而言則以行師至其國而正其罪為義故曰行師征邑國也六畫俱六九為謙之履經彖辭凡六字爻辭凡五十八字撝毁皮切註次與音余復為扶豆切去起吕切坤下震上八之四上之九緯五陰剥變主九四豫此羲皇坤下震上之卦而文王名之曰豫豫者暇而樂也以卦徳則内順外動凡人從容和緩順序以動則先事詳審故事成而樂若非先事蚤圗匆遽紛擾而為之則事未必如意何樂之有以卦象則雷出地上陽氣伏藏地中非一日矣一陽二陽至三陽上達於地之後雷始𤼵聲故其聲和樂諸儒皆曰豫者樂也而不曰先時而暇毛氏璞謂豫當訓先釋為安逸者非范氏大性因此遂專以前定釋之二説均之為偏中庸云事豫則立以前定則不跲不困不疚不窮也前定者先時而暇矣不跲不困不疚不窮則如意而樂矣象傳於既濟言豫防固取先暇之義序卦傳言以喜隨人亦取喜樂之義合二説為一其義始備利建侯行師占也鄭氏謂建侯震象行師坤象然坤為震侯之國震為坤衆之師初六初之畫得六為豫之震鳴豫象也應震之一陽而鳴其喜樂以上達于九四九四以一陽為卦主五爻之豫皆由之初六陰柔不正喜其獨為九四之應故其𤼵于聲音者如此朱子謂小人有強援是也凶占也六二六居第二畫為豫之解介于石不終日象也介如介乎大國之間之介加田為田之畔其義同石謂九四剛而在坤地之中也艮為小石石之在山上者也坎為石石之在地中者也三四五互坎石也二與三接界介于石也六二變為剛則成離日三為人之位下履乎地離日在三日將至地之時也故三為終日不終日不至于三也九四豫之主人皆趨附獨六二不與之比應退而以中正自守不待至三而能早疏逺之盖圣三則己與之比矣此君子見㡬之早不以進附權勢為樂而以退守中正為樂也貞吉占也六三六居第三畫為豫之小過盱豫象也盱上視也六三不中不正上視九四而預以趨時附勢為樂者也悔遲有悔占也上悔字改悔之悔教戒辭也下悔字悔吝之悔占辭也如六三之不能自守速宜改悔若改悔之遲則有悔矣九四九居第四畫為豫之坤由豫象也由如路之可由震為大塗二三四互艮為徑路可由者也豫自剥而變上來易四卦之所以為豫者由九四也大有得占也徐氏㡬曰大剛也一剛而得五柔故曰大有得勿疑占也教戒辭陰多疑居陰故戒之以勿疑朋盍簪占之象也朋謂衆柔盍合也簪笄也所以收髮九四一剛貫衆柔之中一簪貫衆髮之象也大有得者言一剛之得彼衆柔也朋盍簪者言衆柔之合此一剛也九四固能合衆柔矣又勿疑則衆柔皆歸心焉六五六居第五畫為豫之萃貞疾占也與貞凶貞吝貞厲之例同豫皆由九四權之所在衆之所歸也六五以柔弱處其上正主事則如有疾之人厭厭不振无能為也巳恒不死象也恒常乆也得恒卦上體之中畫受震東方生氣故不死五受制於四雖知疾人然能固守其恒則是不失其中也其疾可以不死如周衰之時權歸霸國周雖微弱而亦乆存也上六上之畫得六為豫之晉冥豫象也上居天之上杳冥之間冥迷而豫悦樂過極者也成有渝象也成謂以和好相結約也如春秋傳求成之成渝謂改變如渝盟之渝成有渝者既成矣而又有改變也五柔同豫如諸侯之結成上六變為剛則同者他巽矣渝其成也楚辭曰初既與予成言兮後悔遯而有成有渝之謂也无咎占也處豫之極當改變之時也既極而變則无咎矣六畫俱六九為豫之小畜經彖辭凡六字爻辭凡五十一字盱香于切盍胡閣切簪側森切註樂音洛從千容切匆初崇切跲其劫切疚見舊切帥所類切援于願切畔皮半切疏新鉏切笄音雞厭因兼切和好虚到切震下兊上四之二上之十緯三陰否變主初九隨此羲皇震下兊上之卦而文王名之曰隨隨謂從於人也卦自否而變三陽三陰否隔不交今一陽來初而下卦二陰隨之一陰往上而隨上卦之二陽以陰從陽故曰隨元亨占也元者九五初九二剛之徳利貞占也初九為卦主而得正九五居尊位而中正是徳之元能致亨而利於貞无咎占也有无徳能致亨利於正主事者則有人隨之所以无咎初九初之畫得九為隨之萃官有渝象也官統治人者初成卦之主以震之一君統二民為二之官故二以近比而隨之私係爾非正應之隨也初雖无應渝則變為坤以柔順應四而為正應之隨矣貞吉占也去係就應正主事則吉也出門交有功象也二三四互艮象門交謂四初出門往應四四得其助是於所交之友有功也六二六居第二畫為隨之兊係小子失丈夫象也程子曰二應五而比初初陽在下小子也五正應在上丈夫也二若志係於初則失九五之正應隨先於近柔不能固守故為之戒云若係小子則失丈夫也六三六居第三畫為隨之革係丈夫失小子象也丈夫謂九四陽之在己上者也小子亦謂初九二之以五為丈夫者正其夫也三之以四為丈夫者非其夫也三无應无夫之婦也四亦无應无婦之夫也无夫之婦近於无婦之夫而隨之遂以為夫此三之係四所以謂之係丈夫也初者三之君也否上一陽降處于初震之二民皆隨之者六三係四失初是隨不正之夫而不隨其君也故曰係丈夫失小子係謂不當隨者乃牽於私情而隨之失謂所當隨者乃違於正理而不隨之也隨有求得象也隨之為言猶三從人也三為四之隨兩皆无應四之與三者其情專故三之有求於四者无不得也利居貞占也占辭盖因象辭之有善而示教也能知靜處以正主事之為利則必不係四而有所求矣九四九居第四畫為隨之屯隨有獲象也隨謂六三三為四之從人四與之專凡三有求于四則必得盖不可矣又倚勢貪利不待求四而自有獲尤不可也獲謂攫取財物如獵取禽獸然貞凶占也初九舍私係之陰則貞吉九四昵私係之陰則貞凶有孚占也謂有初九之孚在道以明象也在道謂行而在路震為大塗道也以如以其鄰以其彚之以明謂賢明之人即初九也九四初九其位相應雖皆陽剛有相求相與之理初上孚於四四履震塗之上而與震下一陽同位如在路以賢明之人隨行也何咎占也四剛而不正資初之匡救禆益以初之正正其不正則何咎之有九四以六三隨從則貞凶以初九隨從則何咎人可不慎其所與哉四居陰故或與六三九體陽故能交初九九五九居第五畫為隨之震孚于嘉象也有孚者彼孚于此單言孚者此孚于彼嘉美也謂六二昬曰嘉禮妃曰嘉耦六二為五之正應配耦之嘉者故曰嘉五之孚于嘉謂應二也吉占也中正相應故吉上六上之畫得六為隨之无妄拘係之乃從維之象也拘謂攣縶其手係謂聨綴之維謂四旁羅絡之凡維係之象取諸坎皆陰畫維係于陽也隨之三四五上肖坎卦變上六一陰自初往上而隨上卦之陽上居隨之極其隨於五也固結而不可解如既拘縶又係縛之矣又從而四維之也王用亨于西山占也王筮得此爻而用之以祭享于西山也王謂九五西山岍隴諸山其尊者吳嶽在正西兊方又地祸陰神也故兊之陰畫為西山拘係維之象陰之固結其志於陽也享西山之占陽之升達其誠於陰也六畫俱九六為隨之蠱經彖辭凡七字爻辭凡七十一字亨香兩切註從人才縱切下隨從同攫俱縛切舍私音捨昵寜的切妃音配攣來全切摯之泣切綴真嵗切岍音牽巽下艮上五之七上之十緯三陽泰變主初六蠱此羲皇巽下艮上之卦而文王名之曰蠱蠱者事之蠧壊卦自泰而變初上相易内剛外柔為泰泰之後剛往居外而不復有為柔來居内而无能為所以蠱也元亨占也有元徳者治蠱則亨矣初六卦主柔弱居下亦可謂元而能致亨乎曰初六才雖不足然當蠱之初牽補支吾俾不至大壊以俟九三之君用事而治蠱此亦初六之元而九三遂能致亨於後者不可謂非初六之功也利涉大川占也蠱之時不可靜俟當往濟險難而三四五上有舟象先甲三日後甲三日占也此筮日之占漢書武紀元鼎五年詔曰先甲三日後甲三日丁酉拜況于郊註云先甲三日辛也後甲三日丁也曲禮云内事用柔日辛丁皆柔日也蠱之主爻初六為東方甲乙納丁故先後自甲而數初二三巽納辛二三四互兊初六初之畫得六為蠱之大畜幹父之蠱象也蠱之為卦父殁母老子㓜女長之象也泰之乾為父坤為母乾父自初往上成艮父殁而有少男也坤母自上來初成巽母老而𫝊家事於長女也爻義兼取互卦故初六幹父之蠱者巽女也九二幹母之蠱者兊女也九三幹父之蠱者震男也六四裕父之蠱者艮男也家之二女二男巽女為長兊女次之震男乂次之艮男最㓜故其出而任事也有先後卦位之尊者五與上也五陰為母上陽為父上陽自乾往而居陰父之已亡者也五陰坤之中畫而居陽母之猶存者也幹者木之正身又為築墻之木文言傳云貞者事之幹也凡有智有力能成立其事謂之幹初六巽之下畫長女也為成卦之主乾父既往家事蠧壊震子未能任事巽女最長而主其家故先出而當治蠱之任有子考无咎占也言考者見父已亡也家之蠱豈巽女之柔弱所能辦必有震子陽剛之才然後足以補弊救敗而考得无咎也厲終吉占也以柔弱處艱難危矣然姑少俟爾震子成人而能當家則終於吉也九二九居第二畫為蠱之艮幹母之蠱象也九二互兊之下畫少女也剛而得中女之能而賢者與六五應六五坤體母也父歿母老震子未能承家巽女居長暫攝亡父所遺一家之事兊女居次專任寡母所治一身之事服勞奉養其母故曰幹母之蠱不可貞占也女雖能且賢居中奉母其職也不可以正主事貞謂正主一家之事也以此坊民猶或有吕武牝晨之妖若初六之長女代長男盖遭家之難權時之冝暫焉而已於理則不可也九三九居第三畫為蠱之蒙幹父之蠱象也九三互震之下畫長子也以剛居剛而在巽體有智有力而能權者也至下卦之終始出而任事才足以幹父之蠱者獨此爻而已小有悔占也小謂陰謂九三若變為柔則有悔矣盖蠱非剛强不能濟也无大咎占也大謂陽大咎謂以陽剛致過咎也九三不變為陰柔但為陽剛則必无陽剛之咎六四六居第四畫為蠱之鼎裕父之蠱象也裕饒益也六四艮之下畫少男也年㓜穉而才柔弱不能拯救父之蠱但以裕處之往見吝占也僅可止而自守若往而有為則不勝其任而見吝也六五六居第五畫為蠱之巽幹父之蠱象也泰未變蠱則六五為坤之中畫泰已變蠱則六五為艮之中畫故六五為母又為少男之依乎母者六四以陰居陰才既弱而志亦弱盖艮男方穉未能如六五之時也故以无能而裕父之蠱六五以陰居陽才雖弱而志稍强盖艮男漸長已勝於六四之時矣故亦有為而幹父之蠱用譽占也六五柔剛適中善事其母而追孝其父以此用事雖未必有實功而可有虚名也上九上之畫得九為蠱之升不事王侯髙尚其事象也少男長女為蠱盖以象家事之蠧壊諸爻皆以父母男女取義自初六至六五同一意也上九乃父之既死而以蠱事遺後人者然斯義也下五爻言之已詳故上一爻別𤼵一義陽剛止於艮山之上賢人髙舉逺遯之象夫蠱者必有事也仕於君者事其事賢人止而不仕則天子不得臣諸侯不得友而不事王侯之事矣王五也侯三也上九居與五比而不相遜位與三應而不相應故曰不事王侯凡處世間而有為者皆卑下之事唯出世間而无為者乃髙出之事也尚上通上九在一卦至髙至上之位故曰髙尚下五爻屑屑於一家之事至此則一國之事天下之事猶且視為卑下而不屑為彼一家之事又何足道哉六畫俱九六為蠱之隨經彖辭凡十五字爻辭凡六十二字先悉薦切後去聲註不復扶豆切而數所主切女長之兩切少男詩照切下並同言傳直戀切見父賢遍切少俟如字奉養羊尚切坊音防之難乃旦切咸殺沙界切穉直二切不勝音升已勝去聲夫蠱音扶兊下坤上二之八上之十一緯二陽辟主九二臨此羲皇兊下坤上之卦而文王名之曰臨二陽長而消二陰夏正十二月之卦也臨者居上涖下之名二陽浸長於下而陰居上臨之以俟其進也元亨占也利貞占也占與乾之彖同乾之六陽自臨之二陽而進也至于八月有凶占也自天正建子之月一陽始生為復其二建丑之月二陽長而為臨其七建午之月一陰始生為姤至其八建未之月則二陰長而為遯遯者臨之正對臨卦六畫變盡也今日二陽之臨陽長而消陰也至于八月二隂之遯則隂長而消陽矣故其占為至于八月則有凶也初九初之畫得九為臨之師咸臨象也初二之陽長於下而四五之陰臨其上陽君也隂民也民豈可以臨君也哉凡易於陽上陰下者以尊卑定分取義天地之否夫婦之恒是也陽下陰上者以往來交感取義天地之泰夫婦之咸是也咸交感之義艮男當居上而反居下兊女當居下而反居上所以為咸治世君民上下之志通亦若男女交感之咸咸之四五二陽降而下接於民則為臨之初九九二咸之初二二陰升而上逹於君則為臨之六四六五此臨之初二二爻所以謂之咸臨初與四應咸之九四下降而為初九也貞吉占也九二九居第二畫為臨之復咸臨象也二與五應咸之九五下降而為九二也項氏曰初九九二皆臨隂者也以陽臨陰反在隂下有男下女之象故皆為咸夫之臨婦其道如此吉占也无不利占也六三六居第三畫為臨之泰甘臨象也六三互坤之下畫坤土味甘兊口柔説以言媚人隂柔不正下臨浸長之剛勢將逼己而甘言以媚説之故曰甘臨无攸利占也柔説豈足以禦陽剛之進哉雖甘亦无所利也既憂之无咎占也三雖臨二剛之上而未離下體既能以剛進之不可遏為憂而安於處下不敢以賤臨貴斂藏退避以俟剛之上進則可无咎項氏曰六三以甘媚臨而无攸利見君子之難説也既憂之无咎又見君子之易事也其處己也嚴故不受不正之媚其與人也寛故不治既憂之人爻辭雖為六三言之然亦可以見二陽之用心矣六四六居第四畫為臨之歸妹至臨象也四五二爻皆以剛臨柔取義至者鳥飛自上而極於地也初之剛本居四自四而降以下接於初而初為九所謂至臨也四之柔本居初自初而升以上達於四而四為六此民情上達之象非六本居於四也无咎占也六上達於四故无咎六五六居第五畫為臨之節知臨象也剛為智柔為愚五柔而智何也曰五非柔也剛也五之剛下接乎二二之剛即五之剛也五剛下二是君之智下燭民間也此堯之清問下民也所謂聰明睿智足以有臨者故曰知臨然則六何以居五也曰六非五也二也柔自二而上升于五五之柔乃二之柔也二柔升五是民之情上達君所也此堯之鰥寡无盖也大君之冝吉占也大者剛畫也君者五位也九五大君也六五非大君也此六五而曰大君明六五本是九五也因五之九降二而二之六升五也六民也非君也六而在五之位民之上達於君也民之得上達於君由君之能下逮乎民也君民一體上下志通大君之臨民冝如是故曰大君之冝所以吉也上六上之畫得六為臨之損敦臨象也敦厚也坤之上畫地之最厚處天髙而覆物者以上臨下也地厚而載物者以下承上非臨也上六陰柔居髙臨下然以坤厚載物之徳臨之以俟二陽之進而非敢以柔臨剛也在上而不以髙自居厚之至也故曰敦臨此爻取義乃臨卦之正意吉占也无咎占也六畫俱九六為臨之遯經彖辭凡十二字爻辭凡四十八字知音智註浸長知兩切下同定分符問切柔説音曰下同未離來至切易事因利切雖為云偽切覆孚豆切坤下巽上八之五上之十一緯四隂辟主六四觀盥而不薦此羲皇坤下巽上之卦而文王名之曰觀四陰長盛消陽已過其半夏正八月之卦也觀以目視物也二剛在上四陰在下仰觀之此四隂消陽之卦聖人名卦但以下觀上取義卦名連彖辭與履同人艮三卦同例舊以卦名自為句者非也象也盥潔手也字從左右二手從水從皿以水沃手而以皿盛其餘水也三四五互艮為手上一陽在手上象沃手之水下二隂在手下象盛水之皿薦進也進祭物以獻神也下體坤為牛象所薦之牲下之所觀莫大於敬上之所敬莫大於祭盥者祭之始薦者祭之盛觀盥謂觀其盥也不薦謂不觀其薦也敬之感人其應甚速觀祭者但觀於其初盥之時不待觀於其既薦之後而已感應矣項氏曰相觀而化其神如此先儒謂盥則誠意方專薦則誠意已散仁人孝子之奉祀也豈皆至薦而誠散乎有孚占也謂下四隂之孚也顒若占之象也顒仰首而望之貌下之觀上也一觀其初祭之敬而有孚者已顒若矣謂其感應之神速也初六初之畫得六為觀之益童觀象也觀艮之複體艮少男為童下之所觀觀九五中正之道也初最下去五最逺如未有知識之童子而觀不能有所見也小人无咎占也項氏曰初六為下民日用而不知則其常也故无咎君子吝占也項氏曰君子而不著不察則可羞矣六二六居第二畫為觀之渙闚觀象也闚者窺門也三四五互艮為門闕二在其内猶女子不能出外在門内而窺觀門外其所見狹矣二與五應而陰柔不能見逺故如女子之闚觀初居陽象男童二居隂象女子利女貞占也朱子曰人夫得之則非所利矣六三六居第三畫為觀之漸觀我生進退象也凡彖辭爻辭稱我者皆謂彖之主爻蒙九二為主爻彖辭匪我求童蒙我謂九二也凡息卦消卦十有二一陽一隂之卦初為主二陽二陰之卦二為主三陽三陰之卦三為主四陽四隂之卦四為主五陽五陰之卦五為主六陽六陰之卦上為主觀四陰之卦故六四為主爻我謂六四也生猶生之謂性之生謂其身之動作也六四巽之下畫巽為進退四陰進逼而消陽六四為之先初六六二逺弱未有凌陽之勢六三居下卦之上居剛而不中正與六四同惡者也然雖隂盛之時而陽剛中正之君在上六四逼近九五者方且臣順則六三豈能獨進故比於六四唯觀六四之動作而為進退爾六四進而凌逼則六三亦隨之而進六四退而臣順則六三亦隨之而退諸家或以九五為觀之主爻盖擇其徳位之盛者為主非通例也六四六居第四畫為觀之否觀國之光象也坤為國互艮有光象九五以陽剛臨坤土之上國之光也六四入近君側下觀坤土之廣上近天子之光故曰觀國之光利用賓于王占也諸候朝貢干王曰賓六四變為剛則成乾乾為賓四隂勢盛進逼二陽幸九五能君故六四不敢不臣以强臣逼上之勢轉為諸侯朝王之象筮得此爻者利用之以賓于王也陰消陽之時而四當位得陰之正故有從順而无跋扈項氏曰履正故為賓使其不正則為敵矣國有光則賓无光可觀則敵當觀之時聖人懼焉九五九居第五畫為觀之剥觀我生象也我亦指六四而言隂盛消陽六四已進逼君側九五不失君道則六四猶為臣九五一失君道則六四將不臣矣當此之時九五但觀六四之動作如何以驗吾君道之得失也危迫甚矣君子无咎占也占本有咎君子得之則可无咎盖君子御得其道而狙詐作使若非君子則御失其道而狙詐作敵斯有咎矣九五以陽剛中正為下所觀而无吉占何也時則然也况又變而為剥乎上九上之畫得九為觀之比觀其生象也其指上九而言謂自觀其身之動作君子无咎占也陰長陽危自觀一身之所為果合君子之道與則自處得冝而可免於咎若不合君子之道則自處失冝有咎必矣故其占惟君子則无咎也項氏曰上在卦外无民无位小人之進退下民之向背皆不由己但謹視其身思自免咎而己觀本是小人逼君子之卦但以九五中正在上羣陰仰而觀之故聖人取之以為小人觀君子之象象雖如此勢實漸危故五上二爻皆曰君子无咎言君子方危能如五之居中履正上之謹身在外僅可免咎二陽向消道大而福小也六畫俱九六為觀之大壯經彖辭凡九字爻辭凡五十四字觀平聲篇内並同盥音管顒魚恭切闚苦規切詿盛其盛水時貞切朝音潮跋蒲末切扈音戸狙七余切道與音余向背蒲貝切震下離上四之三上之十二緯三隂否變主六二噬嗑此羲皇震下離上之卦而文王名之曰噬嗑噬齧也嗑合也卦象頤口中虚而有一剛畫間隔於其中頤口本合有物間之則不合矣故必齧噬其中之間而後上下合也亨占也梗而未合則不亨噬而合之則亨矣利用獄占也獄者有訟而拘囚於獄也離體中虚獄之象六五柔中為卦主用於上以震動於下治獄者也兩辭參差亦猶有梗於中而不合鞫問而得其情則其辭一矣亦猶噬之而後合也故其占為利於用之以治獄初九初之畫得九為噬嗑之晉屨校滅趾象也彖辭之占利用獄故初上爻辭皆因用獄取象屨謂著於其足如納屨然校械也滅没也猶浸在水中没而不見也震下畫為趾初剛横亘於震足之下足械滅没其趾之象足械之制周圍其脛而已下不及趾也今械木之廣既圍脛而遮掩又過其脛并不見脛下之趾也入獄之初未加鞫問恐其走逸亦械其足雖屨校而滅趾然其人非必有罪也特桎之使不得去爾鞫問无罪則釋其械而縱之矣无咎占也在卦之初為初犯得位之正則非有罪也鞫問明直而獲縱釋此人者足曽被械因是知所懲㣻不復犯法故其占為无咎六二六居第二畫為噬嗑之睽噬膚滅鼻象也初上二爻既因彖辭用獄取象其中四爻並自卦名噬嗑取象卦之全體象頤初上二剛象頤口上下齗齶有齒牙能噬者也其中四畫乃頤中虚而容物之處故各象所噬之物二三五柔畫物之脆者四剛畫物之堅者二三五皆柔三五以柔居剛雖脆而堅二以柔居柔最為易噬膚者豕腹之下柔軟无骨之肉古禮别實於一鼎曰膚鼎二最易噬象膚又近初剛初為下頤之齶凡噬物下齶之動最有力以至近能噬之剛噬至柔易噬之物一舉盡臠略无留難以至所噬之膚掩過噬者之鼻也坎為豕二在互坎下畫之下象豕腹向下之膚艮為鼻二當互艮之下畫鼻之下端也正與所噬之膚相直故有膚滅其鼻之象无咎占也噬嗑在於去間所噬者易噬是其間易去也故其占无咎六三六居第三畫為噬嗑之離噬腊肉遇毒象也腊正作昔上象肉之形下從日月之日乾者也其後假借為今昔之昔乃於左畔加肉以别之而為腊肉之腊非字之正也鼎實以兎之薨為腊鼎田獵所獲野物或獸或禽全體乾之通謂之腊彼單稱為腊此言腊肉非指野物全體之乾者而言盖六三六五二柔畫爻辭並云肉謂无骨者也九四一剛畫爻辭不云肉而云胏謂有骨者也若以六三為全體帶骨之腊則與爻象不合六三互坎之下畫有離日在上豕肉受日之暵者肉者六之柔也腊之則柔亦堅矣位剛故也凡食物臭味之惡者為毒以上九之陽噬六三不中不正之陰故為遇毒小吝占也小者筮得此爻則吝也上九陽剛為大上古神農嘗百草一日數遇毒而不為害者大智大力能勝其毒也若小者遇毒則不能堪而可吝矣无咎占也大者噬之雖遇毒而不害故无咎九四九居第四畫為噬嗑之頤噬乾胏得金矢象也胏骨之連肉者在離體之内火所乾也骨而又乾其堅至矣九之剛象之骨而連肉剛之居柔象之不期遇而遇曰得金矢鐵箭鏃也九之剛為金離為矢殺矢之金金三錫二金之雜錫亦猶骨之連肉皆九四以剛居柔之象也乾胏者九四也噬之者初九也噬乾胏而乃於胏之中得金矢焉其堅又過於乾胏而矣然金矢雖堅而可為用堅者為梗所以噬之不為梗反為用則雖堅可不噬也利艱貞占也冝以艱難之心正主事也吉占也艱貞故吉初九所噬者九四與六二也六二近而柔以其易噬也初九以易視之僅能无咎而已九四逺而堅以其難噬也初九以難處之所以吉也六五六居第五畫為噬嗑之无妄噬乾肉得黄金象也六五互坎之上畫亦豕肉也與六三皆質柔而居剛象无骨之肉以乾而堅也六三在離日之下日所乾者故曰腊六五在離火之中火所乾者與九四同故曰乾黄者中央之色五居中故曰黄五變為剛故曰金凡單稱金者金銅銀錫皆金也唯曰黄金者為正色之金乾肉者六五也噬之者上九也噬乾肉而乃於肉之中得黄金焉其堅又遇於乾肉矣黄金雖堅然不為梗而可為用則雖堅可不噬也項氏曰四五兩爻稱得金者下卦為間尚淺故用力易上卦為間已大故用力難有噬有得者噬道將終必盡其慮也噬者除其惡得者取其善有惡則去有善則取憎而知其善也於九四則噬其乾胏之强而收其金矢之用於六五則噬其乾肉之强而收其黄金之用聖人之待强梗其仁如此貞厲占也上九位不當所噬雖近猶難故正主事則危厲无咎占也噬其梗之堅而乃得所用之貴貴故无咎上九上之畫得九為噬嗑之震何校滅耳象也何負也謂負之於首也上畫為首剛畫在上首械之象三四五互坎為耳首械之制周圍其項上不及耳今首械在坎耳之上是械之厚掩過其耳而耳不見也居卦之終盖問獄已成以其有罪而首何至厚之械罪不可解矣凶占也剛不正而在終之時是終為惡而受罪者也故凶噬嗑六爻分為二義初上兩爻於用獄起義盖以六五為治獄之主初上為坐獄被校之人兩爻之占各指本爻而言初之无咎初九自无咎也上之凶者上九自凶二三四五於噬間起義初九上九為噬物之頤二三四五為頤中所噬之物兩爻之占皆指初上而言初比二而位應四噬二噬四者初九也六二之占无咎謂初九之无咎也九四之占利艱貞吉謂初九之利與吉也上比五而位應三噬三噬五者上九也六三之占小吝无咎謂上九之无咎也六五之占貞厲无咎謂上九之厲與无咎也雖筮者得之直據各爻之辭為占然聖人觀象繫辭之意則如此不可不知也六畫俱九六為噬嗑之井經彖辭凡六字爻辭凡五十八字噬市制切嗑胡閣切屨紀具切校爻教切腊音昔乾音干胏兹此切何何可切註齧五結切間居限切後並同參七森切差七思切鞫恭曲切著足略切曾泰登切㣻音又復符后切斷魚斤切齶魚各切脆音翠易以豉切後同臠劣逺切别彼列切薧苦老切暵音漢數音朔勝音升鏃子木切離下艮上三之七上之十二緯三陽泰變主六二賁此羲皇離下艮上之卦而文王名之曰賁賁文飾也字從貝諧卉聲貝水蟲背有文如錦故為文飾之義卦自泰變二之剛往上文外二柔上之柔來下文内二剛亨占也内卦文明衆美之會小利有攸往占也小謂陰也外卦剛止於上四五二柔冝往上以求其文初九初之畫得九為賁之艮賁其趾象也初畫在下為趾賁其趾者屝屨之屬以飾其趾為行計也舍車而徒象也二三四互坎為車徒步行也二之柔來飾初之剛初剛不受其飾而惟自飾故舍二之車而自飾其趾以步行内飾於已而不資外飾於人剛正而明者能之六二六居第二畫為賁之大畜賁其須象也三四五上肖頤六二在頤下須之象須之美者生而美也美由中出不假外飾六二柔麗乎中正固有其美如須之賁非有待於外物而賁者然陰柔不能自動必附麗於陽如須雖有美必附麗於頤也六二卦之主也以一柔來文下卦之二剛初九自賁而不受六二之賁矣六二既自賁又附麗於九三而為九三之賁也九三九居第三畫為賁之頤賁如濡如象也九三者互坎之中畫坎水有濡象猶詩言六轡如濡謂所飾之文采鮮澤也處文明之極一剛在二柔之間錯雜成文故賁如乂六二之柔飾之於下賁之最盛者也故濡如永貞吉占也得二之飾而不溺於二長永正主其事則吉也六四六居第四畫為賁之離賁如皤如象也九三居文明之極六四有輝光之懿二爻當上下剛柔相雜之際故皆曰賁如賁之成卦以六二自外來而文二剛上九自内往而文二柔也九三與六二比近而得其賁故需如六四與上九隔逺而不得其賁故皤如言白而未受采也白馬翰如象也六四震馬之中畫坎馬之上畫變為剛則成巽為白翰如言其走之疾如羽翰也六四弗得上九文柔之賁故疾走以就正應而求賁於初九之陽匪冦㛰媾象也四與初正應然初九孤潔自守近不昵二逺不交四二比爻也不就之者義也四應爻也就之者正也初不昵二而并疑四因六四之下求初九之疑始釋而知六四非冦也乃已之㛰媾也象同屯六二六五六居第五畫為賁之家人賁于丘園象也六五柔中艮體有徳之賢止而不仕者也艮之中畫山之半也為丘園丘之有草木者互震草也體艮木也丘園賢者隠處之地上九一剛為二柔之君賁二柔者也六四隔逺不受其賁所賁者六五而已以上九賁六五為上之人禮聘賢者恩光下逮賁于丘園之象束帛戔戔象也五兩為束坤為帛而坤之上畫連束之於外之象戔戔委積貌多也賢者隠處而受聘幣之禮其光顯榮輝被于丘園如伊尹耕于有莘之野而湯以幣聘之也吝占也柔雖得中而不當位故吝終吉占也受君賜之榮故終吉上九上之畫得九為賁之明夷白賁象也賁自泰變者也泰之九二升在上而文二柔泰之上六降在下而文二剛然初九不肯受二之賁受二之賁者惟九三一剛六四不能受上之賁受上之賁者惟六五一柔濡如之賁丘園之賁虚文之飾爾有之不為甚益无之不為大損二爻成賁之功亦淺鮮矣賁極當變變而復于泰則善不變而受之剥則壞矣文窮反質賁復為泰以還其初上九復于二六二復于上則三剛三柔皆守其質而不相文所謂白也泰二三四互兊為白故曰白賁於卦終總言賁極而反質白者通全卦而言非專指上九一爻言也无咎占也文極必弊復反于質則不至于弊矣故无咎六畫俱九六為賁之困經彖辭凡七字爻辭凡五十四字賁彼偽切舍音拾皤白波切又音槃翰雄干切戔在千切又音牋註貝必佩切屝扶味切鮮澤音仙錯千各切昵女力切淺鮮雖典切坤下艮上八之七上之十二緯五陰辟主六五剥此羲皇坤下艮上之卦而文王名之曰剥五陰長盛消陽將盡夏正九月之卦也剥者以刀割削而去之也五隂消盡五陽也不利有攸往占也以卦體而言則陰長已至五僅存一陽再往則并一陽消之矣故不宜有往以占者而言則小人極盛之時當順時而止不可以有所往也初六初之畫得六為剥之頤剥牀以足象也陰之剥陽自五月一陰始消一陽而為姤六月二隂消二陽而為遯七月三隂消三陽而為否八月四隂消四陽而為觀九月五隂消五陽而為剥剥之初六即姤之初六也故此以姤之初六言之姤之初六下耦承上竒牀之象初為牀之足隂消陽自下始五月姤之一隂始消一陽於下猶剥牀而先及其足也蔑貞凶占也陸氏曰蔑猶削也楚俗有削蔑之言澄謂當小人削蔑君子之時正主事則凶也六二六居第二畫為剥之蒙剥牀以辨象也剥之六二即遯之六二也此以遯之六二言之辨牀之榦也中畫象之剥陽至下卦之中畫猶自牀足而上剥至于榦也蔑貞凶占也與初六同六三六居第三畫為剥之艮剥之象也剥之猶比卦言比之損卦言損之益卦言益之小過卦言過之也之指陽而言剥之六三即否之六三也此以否之六三言之謂剥陽已及三也三牀之上也不言剥牀而汎言剥之其辭比初六六二六四差緩也剥陽及三者乘隂長之勢至此非專三之罪三雖居剥陽之位而獨與上九一陽為應則无害陽之心故聖人繫爻特異其辭以别於初二四之三隂也无咎占也程子曰衆隂剥陽之時三獨居剛應剛志從於正在剥之時為无咎也六四六居第四畫為剥之晉剥牀以膚象也剥之六四即觀之六四也此以觀之六四言之言剥陽已至干四也四在人為身之位膚者身之皮膚也初為牀足二為牀辨三為牀上人所臥處四人之身也非牀也非牀而曰剥牀以膚言剥牀而上及於人之肌膚也凶占也災已及身矣六五六居第五畫為剥之觀貫魚象也六五變為剛則成巽巽下之柔為魚一柔之下又有三柔羣魚之象也五變為剛畫連亘其上貫穿之象也魚隂物五羣陰之主在上統率羣陰如貫穿羣魚而為一也以宫人寵象也以者將之也宫人衆妾也以之者誰后也后為宫人之主五統羣陰如后統衆妾衆隂戴陽如后以衆妾進御於王而獲寵愛之象隂長消陽至於五極矣不可以再長也一陽在上非可剥者故取羣隂順承一陽為義六三應上九而寜失羣陰之心六五比上九而率羣陰以求一陽之寵一陽之功大矣天道之不可一日无陽世道之不可一日无君子者此也項氏曰六五君位五為王后與君同處四為夫人佐后者也三為九嬪以主九御下卦之長也二為世婦初為御妻无不利占也程子曰五能使羣陰順從如貫魚然獲寵愛於在上之陽如宫人則无所不利也上九上之畫得九為剥之坤碩果象也艮為果蓏果謂上畫一剛蓏謂中下二柔上九艮之上畫故為果碩謂陽之大也不食象也卦无兊口故不食下五陽皆已剥獨存一陽在上如木之果實皆已落獨一碩大之果不為人所食而猶在木末論語云吾豈匏瓜也哉焉能繫而不食亦匏瓜不為人所取食而常繫於蔓也君子得輿占之象也君子謂一陽坤為輿五隂承戴上九之一陽如人之在車上君子筮得此爻則其象為得輿而占亦如之小人剥廬占之象也小人謂上九變為柔也一陽上覆五隂有廬之象竒變為耦則如廬之破壞穿漏其上而无以盖覆其下故小人筮得此爻則其象為剥廬而占亦如之也六畫俱六九為剥之夬經彖辭凡六字爻辭凡五十六字蔑莫結切辨平免切註去之起吕切下同長之兩切别彼列切蓏李果切覆孚豆切震下坤上四之八上之十三緯一陽辟主初九復此羲皇震下坤上之卦而文王名之曰復一陽初生於地下而消一陰夏正十一月之卦也復還反也冬至之前六陽消盡而為純坤冬至之後一陽還反而生于下也亨占也陽復則亨出入无疾占也凡一陽之卦皆自復而變无有自他卦變為復者此取復所變之卦再還復未變之時為義師自復而變者也師之初還復于二為出師之二還復于初為入筮者占之或出外或入内皆可无疾朋來无咎占也一陽既生日進日盛又取臨泰大壯夬所變之卦還復未變之時為義明夷自臨而變者也明夷之三還復來二則為二陽之臨歸妹自泰而變者也歸妹之四還復來三則為三陽之泰需自大壯而變者也需之五還復來四則為四陽之大壯大有自大而變者也大有之上還復來五則為五陽之夬此陽之朋類次第而來也筮者占之已之或出或入既无疾而朋類自然來至者亦无咎也反復其道七日來復占也自五月一陰生至十一月一陽生凡歴七月筮者占之出外而反者還復其初所行之道路則七日可以來至於家而復也道者震為大塗七震之數也利有攸往占也陽之長貴乎日進故占者宜有所往也初九初之畫得九為復之坤不逺復象也師卦自復而變初九自師之九二還反於初出外不逺而遄復者也无祗悔占也祗適也抵也猶云至也字從衣從氐與祇敬之祇不同祇敬之祇從氏從示程子曰无祗悔不至於悔也復者陽反來復也陽君子之道故復為反善之義失而後有復不失則何復之有唯失之不逺而復則不至於悔元吉占也常人筮得之固无至於悔矣有大善之徳者筮得之則吉也六二六居第二畫為復之臨休復象也人於勞暍之得得依木之芘蔭以息至美也故休有美義否之九五中正大人也在下者依其芘蔭以休息於否將變之時故曰休否初九一陽之復勢孤援寡六二中正與初九比近為朋初九在下依其芘蔭相與休息六二變而為剛同初之復故曰休復否五復二皆卦之中也否有巽木復有震之竹與萑葦為芘蔭可休之處吉占也陽剛浸長相與休息同其吉也或曰凡占辭特為占者設爾然聖人繫辭之意則有定指此吉字指六二乎指初九乎曰六二能比初九依之以息六二之吉也而初九與有焉六三六居第三畫為復之明夷頻復象也頻水厓也六三變為剛二盡三四成坎三下卦之終如岸之處瀕乎水也行至水厓不可以進而後復復之不早者也厲占也阻水不能進故厲无咎占也能復故亦无咎也六四六居第四畫為復之震中行獨復象也行者路也震為大塗卦之五隂二三近陽五上逺陽四居逺近之中猶路之半也故曰中行五陰唯四與初陽為應四變為陽則與初九同是震體下畫之一陽獨能與初九一陽之復同者也故曰獨復六五六居第五畫為復之屯敦復象也三四五互坤五為坤上畫坤土最厚之處敦之象敦者篤厚靜重而若遲鈍亦復而不速之意无悔占也由初至五五畫之復六五最後復雖不速然柔順得中故无悔上六上之畫得六為復之頤迷復象也迷者冥行失其正道也上六一卦之終猶迷塗至極盡之處也迷行至終乃求還反晚矣梁武帝之迷至侯景兵入臺城而圖復唐明皇之迷至安禄山陷洛陽而圖復當是時也雖復竟何如哉舊註皆謂上六終迷不復案爻辭言迷復註謂迷而不復似與經竟相戾始也南行今冋轅向北始也北行今旋面向南是之謂復楚辭云迴朕車以復路兮及行迷之未逺復字從彳卦爻之義皆以行取喻初曰不逺者行出未逺而復二曰休者休息於塗而復三曰頻者行至水厓而復四曰中行者行至中道而復五曰敦者敦篤緩行而復上曰迷者迷行至終而復行而迷失正道者其終之復亦是循其故道而復然其故道非正道也往復皆迷展轉錯誤不可專以能復為善不由其道而復者雖復亦不善也上為冥昧之位六為柔暗之質故迷凶占也如梁武帝唐明皇是也有災眚占也占既曰凶矣而又曰有災眚何也迷復有輕重小大也其重者大者則凶輕者小者亦有災眚災謂禍災眚謂過眚災自外至而由己所致眚自内有而非己所致也眚災者非己所致而為災書帝典王誥言眚災是也災眚者由己所致而為眚此復之上六及小過之上六言災眚是也用行師終有大敗占也上二占泛言之此一占專以行師一事言師卦由復而變一陽統坤衆也行亦取震塗之象大謂上六變為陽也復之六五不取君義上六位最髙變為陽而下臨坤衆有君象焉但常時所行既失君道民心之去乆矣一旦用其民民豈為之用哉故其君必至於敗是之謂大敗如商以師敵周而前徒倒戈衞以師禦狄而受甲兵者曰余焉能戰商紂衞懿卒以敗亡以其國君凶占也以如春秋蔡侯以吳子及楚人戰于柏舉之以上言行師者自主兵也此言以其國君者不自主兵出兵助人如為人所以也國君亦指上六下有坤土為國變為剛而居上曰君以者他人以之初九一陽為主于内者君也上六變為陽而統衆于外又一君也故有内國君以其外國君之象凶如鄭國君王世充以夏國君竇建徳拒唐師而建徳并為太宗所禽也至于十年不克征占也行師一事分為三占既言為己為人兩皆凶敗矣又言自已不興師亦不為人興師幸可免目前之凶敗然民心離貳國勢削弱乆而至于十年之後亦不能出征也十坤數案周易雖用爻之變為占而爻辭多只就不變取義其取變者間見耳復之六爻惟初九一陽為己復者故爻義以不變者言其餘五隂乃未復者而爻辭各有復字皆取爻之變者言也盖不變為陽則不可謂之復矣六畫俱九六為復之姤經彖辭凡二十二字爻辭凡五十九字祗音支註長盛知兩切下同暍音謁間見居限切震下乾上四之一上之十四緯二陰遯變主初九无妄此羲皇震下乾上之卦而文王名之曰无妄无妄者誠也有天理之真實无人欲之虚偽凡陽剛象天理之誠陰柔象人欲之妄卦自遯變遯三來初以无妄陽剛之正易去隂柔之不正為去妄存誠之義故曰元亨占也利貞占也无妄之動以天故其占與乾卦同其匪正目下二占无妄者无私心而又合正理也雖无私心茍不合正理亦是妄也其所為非正理則其占如下之所云有眚占也匪正則有過尤不利有攸往占也匪正而不往且有眚往則是妄動也初九初之畫得九為无妄之否无妄往吉占也陽剛當位而无應得正理而无私心也為无妄之主當震動之初无妄而往者也故吉六二六居第二畫為无妄之履不耕穫不菑畬則利有攸往占也耕穫菑畬占之象也春而治田曰耕秋而收禾曰穫初墾荒田曰菑三嵗熟田曰畬不耕穫謂不耕而穫不菑畬謂不菑而畬夫有耕然後有穫有菑然後有畬不耕而穫不菑而畬者何也在先无求之之心而在後有得之之實也此所謂无妄也无妄史記作无望謂无所期望而有得盖亦此意夫陽剛之實為无妄二雖中正然質柔非剛而又有應非剛則未能實也有應則未能无私也是未能純乎无妄之道也有攸往者往應五也往應五者求陽剛之實以益己也得剛實以益己雖為正事而求之之心猶為私心也必也先絶其有求之心所謂不耕不菑也後自獲其有實之益所謂穫畬也言能如此則所往乃為无妄也有應之私易至害于无妄之道故爻辭為之戒孟氏集義養氣之學不揠苗以助長而氣自无餒盖如此也震耜耕象乾金穫象二地上為田菑畬之象六三六居第三畫為无妄之同人无妄之災占也筮得此爻者其占為有災而其災非由己致朱子曰卦之六爻皆无妄者也澄案无妄之善有三剛也當位也无應也剛者實也當位者正也无應者无私累也諸爻或有其三或有其二或有其一初九三者全其最善也九五九四有其二九五剛而中正九四剛而无應是其次也六二上九有其一六二中正上九剛實是又其次也唯六三於三者咸无焉而亦得為无妄何也下比中正之六二上比剛實无私之九四譬如有人在己雖无一善而上有嚴師下有良友親近切磨夾持熏染亦不至於為惡此六三之所以亦得為无妄也項氏曰六三所遇之災非人為也故為无妄之災廬陵楊氏曰我求而我得者有妄之災非我求而我得者无妄之災或繫之牛行人之得邑人之災象也設此象以明上占辭如或繫一牛於此乃邑人之牛也偶脱所繫而為行人所得邑人有失牛之災亦適然不幸爾非己有以致之是謂无妄之災因卦變取象无妄自遯變遯下卦艮也坤為牛艮以一陽交坤上畫為坤之君坤牛艮之所有也一竒實坤上畫之畫如有物以繫牛之前也此以遯之九三未變為无妄之六三而言也及遯之既變為无妄也三下易初成震則震之一陽為坤之君而坤牛為震之所有矣震動于大塗行人也初非人位而曰行人者初自三之人位來也震遂有坤行人得牛也无妄六三坤上畫也坤為邑三人位邑人也己所有之牛為他人所得失牛者災也六三之遇此災莫之致而至也廬陵楊氏謂牛繫於斯塗之人取去牛主訟邑居者而己朱子亦謂行人牽牛以去而居者遭捕詰之擾考之爻象无此義九四九居第四畫為无妄之益可貞占也九四乾體剛實无應故可以正主事可貞與利貞不同利者冝也可者僅可无咎占也居不當位當有咎也以有實无私故得无咎九五九居第五畫為无妄之噬嗑无妄之疾占也筮得此爻者其占為有疾而其疾非由己致九五剛健中正可謂无妄矣而下有應故曰疾疾者以外物之應能為内心之病也然有有妄之疾有无妄之疾常人之於應物外物一接而已心從之此有妄之疾也聖人之於應物其心湛然如明鏡止水物來則照物去不留動而无動雖應未嘗應也是之謂无妄之疾勿藥占之戒辭也有妄之疾必須用藥治療无妄之疾慎勿用藥治療也外物之紛至任其自來自去勿藥者也若或厭惡而以術屏絶之是用藥以治療也非徒无益而又有害告子之冥然罔思悍然力制以為不動心釋氏之息滅人倫違棄世故以為不住相犯勿藥之戒者也有喜占也疾去曰有喜不治療而其疾自去不屏外物而外物自不能為累也上九上之畫得九為无妄之隨无妄行有眚占也上九之善雖不及初九然亦无妄者也初九以无妄而往則吉上九以无妾而行則有眚何也時位不同也无妄之有往也何所為而往也豈為濟其欲哉盖為進其善也進善者如登可上不可下也初九之位猶下時之初也其往也進而升于上也上九之位己極時之終也前无可往之地矣唯有退而降於下爾初九言往者謂其進前也上九言行者謂其在塗也既不進而上則必退而下以就所應之六三六三震體故曰行夫无妄之徳動而健未嘗禁其行也但上九時位己至窮極故不可以有行靜守而終焉可也大抵无妄六爻下三爻以動為善初九往則吉六二如是而往則利六三居而有災上三爻以靜為善九四可貞而无咎九五勿藥而有喜上九行而有眚也无攸利占也於己既有眚於事亦无所冝也三畫俱九六為无妄之升經彖辭凡十六字爻辭凡六十二字菑則斯切註去妄起吕切夫有音扶後夫陽夫无同易至以豉切揠一戛切助長知兩切餒年猥切厭伊欠惡烏路切住相息亮切屏必令切累郎遂切所為為濟為並云偽切乾下艮上一之七上之十四緯四陽大壯變主上九大畜此羲皇乾下艮上之卦而文王名之曰大畜大謂陽也畜者藏也亦有止義一陰畜藏於五陽之中為小畜一陽畜止於二陰之上而三陽畜藏於二陰之内故為大畜陽固為大聖人名卦於陽之多者特以大名五陽為大有四陽為大畜大壯大過是也利貞占也一陽在上為畜止之主冝於正主事也不家食吉占也陽剛之畜象賢人之聚賢人衆多則當食君之禄而不食于家也家人二五易位成大畜大畜與家人易位不在家也兊口在四食於外也利涉大川占也三四五上有舟象乾健應五上進有舟行而前之象初九初之畫得九為大畜之蠱有厲占也程子曰大畜艮止乾也故乾三爻皆被止在他卦則正應相援者也在大畜則正應乃為相止陽上進之物上與三皆陽故同志而无相止之義初陽剛健體居下必上進六四在上止已安能敵在上得位之勢若犯之而進則有危厲利已占也已止也程子曰利在已而不進也九二九居第二畫為大畜之賁輿説輹象也輿下伏兔為輹一三四互兑坎輿而毁其下畫是説去輿下之輹也九二當輿輹之處而其輹脱去故其輿不行也程子曰二為六五所止勢不可進五據在上之勢豈可犯也二雖剛健之體然其處得中道故進止无失雖志于進度其勢之不可則止而不行如輿説去其輹也九三九居第三畫為大畜之損良馬逐象也乾為良馬乾之三陽在下為艮之二柔所止而未可以進九三處下體之上漸可進矣健體之極如良馬之馳逐然逐謂追躡於艮之後也利艱貞占也良馬雖可以進然二柔止之於前其進甚難之時也故宜艱難以主事不可以易心處之也日閑輿衛象也三四五上肖離為日閑習也古者乗車三人在車上步卒七十二人在車下輿之衛也當艱難之時未可輕易而進且當每日閑習其輿之衛以為行之備九三變為柔三四五成坤為輿初二其衛也言九三當與二陽同心協力无日不訓國人討軍實而為行訐也利有攸往占也四止初五止二故二陽皆不可往獨上九與九三同徳同位既不止之而又援之以進況九三儆備周完則宜有所往矣六四六居第四畫為大畜之大有童牛之牿象也内乾之健為外艮所止止乾陽者艮二隂也然二隂歸功於上九之一陽葢艮由上一陽而成卦所以止也彖傳所謂剛上而上賢能止健是取此義夫牛之角豕之牙皆剛物之在前者艮上畫一剛象之上九一剛畫在四五之前四之視上猶牛首之有牿五之視上猶豕首之有牙四為童牛上為牿五為豶豕上為牙也牿者設横木於牛角以止觸所謂幅衡也六四艮之下畫即坤之下畫也坤為牛艮為男之少牛之童犢者童牛未有角之牛也坤牛而連其上畫設横木於牛首之象童牛无角故上畫之剛不象角而象牿元吉占也六四尊成卦之主而以止健之功歸上九占之所以為元吉六五六居第五畫為大畜之小畜豶豕之牙象也豕去勢為豶坎為豕坎五上相易成艮坎中畫之剛易為柔是刳去其中之實豕之豶者也坎上畫之柔易為剛是已豶之豕而有牡牙之剛在外也六五之中虚象豶豕上九之外剛象牙六五之柔能以外剛為主故曰豶豕之牙吉占也柔以剛為主故吉也上九上之畫得九為大畜之泰何天之衢象也何與噬嗑上九何校之何同後漢王延夀魯靈光殿賦云荷天衢以元亨何作荷以人一身而言上為首何謂以首戴之也天之衢雲霄之上四通八達之路无所障礙之處也何天之衢其辭猶詩言何天之休何天之龍其意猶莊子言鵬之背負青天而飛于九萬里之上也大畜者一陽止於外而三陽畜藏於内畜極則散止極則行故上九雖艮體至畜之終則不止而行也葢初九九二之進為四五二柔所阻上九與九三同徳其位相應不阻其進而引之使前九三得超二隂以達於上九上九天上之衢九三進造其下如何之以首通行乎雲霄之路而莫之障礙矣項氏曰初九為六四所止九二為六五所止九三與上九相合健極而進前有二隂尚當艱貞而防衛既越二隂而至於上九則乾道通行无復疑阻矣上九在上而導乾以行故為天之衢亨占也陽剛之道得行而无阻遏衆美之會也六畫俱九六為大畜之萃經彖辭凡十二字爻辭凡四十八字利巳夷止切説吐活切輹音服日舊本作曰鄭虞皆作日晁氏曰陸希聲謂當作日程朱並從之牿古毒切豶符云切何河可切衢其俱切註度待洛切易心以䜴切輕易同卒尊率切彖傳馳戀切夫牛音扶楅音福少詩詔切犢亭篤切去勢起吕切下同刳音枯荷河可切之處充註切龍陳隴切造七到切无復符后切震下艮上四之七上之十五緯八純坎變主上九頤此羲皇震下艮上之卦而文王名之曰頤頤者人之頤頷凡飲食皆自頤而入所以養人之身故頤有養義程子曰上艮下震上下二陽中含四隂上止下動外實中虚頤頷之象也貞吉占也觀頤象也卦自坎而變先以二易上成觀再以五易初成頤故取觀為象觀者下觀上也初九下頤也上九上頤也初九觀上九之頤謂觀其養人之道也上九頤之主爻故得専頤之名自求口實象也自自已謂初九口實食物之實於口中者坎之初六其畫耦如口之虚剛畫自五來實之口實之象初九先觀上九之頤又自求所以實口之物謂求其自養之道也觀頤以坎之一上相易取象自求口實以坎之五初相易取象初九初之畫得九為頤之剝舍爾靈龜觀我朶頤象也爾謂初我謂上程子曰初九陽體靈龜喻其明智龜能咽息不食可以不求養於外項氏曰頤卦肖離為龜靈龜伏息而在下初九象之朶頤在上而下垂上九象之卦唯有二陽上九在上為所養之主初九在下為自養之賢上九卦主故稱我羣隂從我而求養固其所也初九本无所求乃亦仰而觀我聖人以其居養之初故深戒之以明自養之道澄案此爻辭與彖辭觀頤自求口實相表裏皆初九觀上九也彖為初九言之則言初九既觀上九之飬人者而又自求其養已者爻為上九言之則言上九謂初九舍爾之養已者而觀我之養人者葢陽實能自養而養人隂虚不能自養而資養於人頤之二陽能飬者也四隂受陽者也上九居上當養人之任故為朶垂向下之頤以養在下之羣隂初九處下不當養人之任故為靈智自養之龜而无求於外然卦有觀之象初雖下伏而猶上觀是羡上九之能養其下而不无舍已為人之意也與素其位而行不願乎其外者異矣凶占也項氏曰有靈而不自貴宜其凶也六二六居第二畫為頤之損顛頤象也卦中四隂皆資初上二陽之養顛者頭頂倒而在下謂求養於初也程子曰以上養下理之正也二不能自養反下求於初則為顛倒故曰顛頤拂經于丘頤象也拂謂舉手摩拭其上如引袖拂天星階前樹拂雲之拂經過也歴也丘謂六五五艮山之中畫為丘經于丘如陶淵明言崎嶇而經丘也六二比初而求下之養固為顛倒若欲拂上而求上之養則上非其應必須經從六五之丘而後可至上九之頤六五雖為六二所應之位然亦資養於上九何能為人求養也哉六二拂上則必經于丘以求頤故曰拂經于丘頤征凶占也下比於初可資其養行而求上則凶也六三六居第三畫為頤之賁拂頤象也六三與上九應拂摩以求養於上者也貞凶占也上九之所養者養賢也六三亦受上九之養然隂柔不中正不賢而竊祿者也所養之人如此何所用哉以之正主事則凶矣如使鯀治水而績弗成使管叔監殷而以殷畔是也十年勿用占也用謂用此占而有為也十年數之極戒以十年勿用則終不可用矣三四五互坤十坤數无攸利占也六三之占曰貞凶再曰十年勿用者言非但今時之凶雖後時亦不可用也又曰无攸利者言非但此事之凶雖他事亦无所利也六四六居第四畫為頤之噬嗑顛頤象也六四與初九應顛倒以求養于下者也吉占也陰柔不能自養而求養于在下之正應如在上之人才有不足而求益於在下大賢以飬其德者程子曰四賴初之飬使在下之賢由己以行其道而澤施於民何吉如之虎視眈眈其欲逐逐象也離象龜又象虎龜者以其介甲之外堅虎者以其文明之外著夫自養於内者莫如龜求養於外者莫如虎故頤之初九六四取二物為象視亦離目之象也虎視常下眈眈專一貎逐逐相繼也四之於初其下賢求益之心必如虎之視下求食而後可其視下也専一而不他其欲食也繼續而不歇如是則於人不貳於己不自足乃得居上求下之道无咎占也其占雖吉然苟下賢之心不専則賢者不樂告以善矣求益之心不繼則未少有得而止矣朱子曰視眈眈下而専也欲逐逐求而繼也能如是則无咎六五六居第五畫為頤之益拂經象也拂經謂拂上求養者之所經從也六五比近上九凡在下求養於上九者皆必經從乎五而後至於上也案頤與噬嗑卦體相似噬嗑以上下二爻嗑中四爻頤以上下二爻養中四爻各以所比所應之爻而為受噬受養者噬嗑則初九噬二噬四上九噬五噬三頤則初九養二養四上九養五養三倒首在下曰顛引手摩上曰拂六二六四皆資養於下故以顛為象六五六三皆資養於上故以拂為象居貞吉占也六五隂柔才弱資養于上静處而正主事則吉朱子曰居貞吉如洪範用静吉用作凶六五賴上九之養故守常則吉不可渉大川占也卦之六畫有舟象然卦變坎之九五降為頤之初九坎之初六升為頤之六五强者退後弱者進前故不可渉大川上九上之畫得九為頤之復由頤象也一陽在上諸隂皆由之以養内有震之大塗外有艮之徑路人所由以求養於上者故曰由頤厲占也居至髙而求之者至衆故危吉占也上能兼養天下故吉鄭氏剛中曰頤卦上三爻皆吉喜其止也下三爻皆凶惡其動也利渉大川占也坎之九三升為頤之上九坎之上六降為頤之六三强者進前弱者退後故利涉大川六畫俱九六為頤之大過經彖辭凡九字爻辭凡七十二字舍音捨拂敷勿切舊音符勿切者非眈東南切註頷戸感切為初為上云偽切夫自音扶樂告音洛惡其烏路切巽下兊上五之二上之十六緯八純離變主上六大過此羲皇巽下兊上之卦而文王名之曰大過大謂陽也過者不及之對行而踰越其處謂之過未至其處謂之不及卦有六畫隂陽各三則為均平此卦陽畫四隂畫二隂半於陽小者不及也陽倍於陰大者過也故為大過棟橈象也棟屋之脊檩橈弱而曲也卦自離而變先以二易上而成大壯再以五易初而成大過大壯下四象有棟象而大過所取棟橈之象又不與大壯同大過下卦巽木也上卦二陽皆巽木之身上一陰則巽小之末也通六畫象一木以此木為屋之棟中四陽象木身之强初上二陰象木末木之弱屋棟居中衆材輻湊木身雖强然棟之所任者重茍本末皆弱則亦不免於曲橈也大過陽之過盛也有棟橈之象何也中有四陽之强而上下猶有二隂之弱也聖人崇陽之意多以其未能如純乾之六陽故大者雖過而棟猶橈盖猶有所不足於此也利有攸往占也陽雖盛而不自恃其盛故冝於往亨占也陽冝於往故可以亨初六初之畫得六為大過之夬藉用白茅象也藉祭藉也占者祭祀縮酌沃灌薦牲薦黍稷皆藉以茅巽為白又為茅初柔在下而承剛如白茅藉物之象陽之勢過盛故隂之承陽其謹敬亦過於常時譬之祭物措之於地亦可矣而必藉之以茅謹敬之至也无咎占也以卑弱之隂畏强盛之陽能過於慎所以无咎九二九居第二畫為大過之咸枯楊生稊象也楊易生而先榮咸陽氣之盛者巽木之中上二畫皆重陽楊之象也稊根上再生穉茅也二剛居中而變為柔楊枯而空其中之象根雖枯而下有初柔如根之生稊也老夫得其女妻象也三四五互乾五乾夫之終為老夫九二變為柔與九五應二三四成巽二巽女之初為女妻楊根生稊長而為穉楊如老夫娶女妻猶能生育也无不利占也九三九居第三畫為大過之困棟橈象也通六畫象一木為一棟以東西霤之屋譬之棟之兩端指南北初六木之本也指北而在後上六木之末也指南而在前三四木之中身也以木末之弱故當中身之處任重而曲橈此一卦之象也故彖辭云棟橈爻之三四皆當橈處故九三爻辭取象與彖辭同九四亦當橈處乃不曰橈而曰隆何也此又因兩爻之義有不同而異其象以寓教戒也夫棟之橈者别用短木培補其橈處則可以取平而不撓矣九二九五不當屋中故不橈以剛之過而裁減就中二五所裁減之餘可以資三四培補之用亦木工用材之法也九三以剛居剛强悍不受人益故九二之培補无所施而撓者自若九四以剛居柔謙抑能受人益故九五之培補自外來而棟之橈者隆然以起大概陽過之時惡剛之居剛者惡其自恃也喜剛之居柔者喜其有以相濟也凶占也棟而撓焉則屋之他材輻湊於棟者不得其宜矣所以凶也九四九居第四畫為大過之井棟隆象也以剛居柔不自滿假能受益者也資九五之所餘以培補其橈處故棟之橈者隆起而不橈也吉占也當橈之處能受人之益而隆焉所以吉也有他吝占也有他謂應初四之橈正以本之弱幸頼五之培補而隆矣若又係初之應則吝也盖四宜上資五之剛不宜下應初之柔也九五九居第五畫為大過之恒枯楊生華象也五剛居中而變為柔楊枯而空其中之象中已枯而上有一柔如枝上生華也九二之陽臨之二也臨二陽建丑之月為楊根生稊之時九五之陽夬之五也夬五陽建辰之月為楊枝生華之時老婦得其士夫象也二三四互乾二乾夫之初士夫也九五變為柔與九二應三四五成兌五兊女之終老婦也老婦雖嫁士夫亦不能生育如楊枝之上生華非久即飄零矣大過二正皆象夫婦者以其變為咸恒也二之變為咸交感生育者也故取老夫女妻象五之變為恒内外常居者也故取老婦士夫象或曰巽長女何以象女妻兊少女何以象老婦曰長女者謂姊妹之次居第一非謂年之已長也少女者謂姊妹之次居第三非謂年之猶少也伯姬伯姜之十五十六也謂非女妻可乎叔姬叔姜之五十六十也謂非老婦可乎三畫之初為女謂未嫁之時也三畫之終為老謂近死之年也稱女稱老以卦畫之初終起義不以倫次之長少起義也虞翻不達而以上為女妻初為老婦失之矣无咎占也變為柔而與二正應昏姻嫁娶之正禮非比近不正之合也故无咎无譽占也夫婦不當其年故无可稱上六上之畫得六為大過之姤過渉滅頂占也大過肖坎坎之中畫水也積四陽為一中畫水之深過於常時也上為首之頂下應於三如下行至水深之處首頂被水浸過也四陽過盛二陰卑身以尊事乎陽者過其常度初柔居下而得其所故其仰承也謹而又謹上柔居髙而不自安故其下行也卑而又卑如行過涉水愈趨愈下以至地卑水深之處滅没其頂也凶占也无咎占也過涉而滅頂於身固凶然過卑以下於陽於義則无咎也六畫俱九六為大過之頤經彖辭凡九字爻辭凡六十一字橈乃教切藉在夜切稊徒稽切華古花字呼瓜切註處昌據切檩力錦切易生以豉切長而知兩切後同夫棟音扶惡烏路切少詩詔切下同坎下坎上六之六上之十七經八純中男主九五習坎此羲皇坎下坎上之卦而文王名之曰習坎朱子曰習重習也坎險陷也陽陷陰中象水澄案坎之卦體乾中畫交坤上下二畫乾畫天一之水也坤畫兩岸之土也坤地陷下而水流其中岸髙水深故為陷為險水由地中行者為坎非泉穴初出之水非平地散漫之水非沮澤鍾聚之水也習坎者二坎相重陷而又陷險而又險者也項氏曰重卦之序坎在六子之先故加習字以起後例示離震艮巽兊皆當以重習起義不與初經三畫之卦同也乾最為首不於乾加習字乾坤六畫只是一爻白二以上皆為習習義在爻不在重卦至六子而後重與單異有孚占也二五中實感人而人應之盖四柔孚于二剛也故曰有孚維心象也中剛象心二柔象纒絡於外中心之實人係戀之而不解故曰維心亨占也彼之孚者縻係乎此故亨行有尚占也謂六四互震之上畫由大塗而行也四无應於下行則成九五中正之剛而得其配合於上也初六初之畫得六為坎之節習坎象也初六在重坎之下故曰習坎入于坎窞象也坑坎中小穴旁入者曰窞坎之柔畫象水旁兩岸其耦象岸側小穴故曰入于坎窞凶占也九二九居第二畫為坎之比坎有險象也凡言坎字及險字皆指坎之中畫言也求小得占也此以九二變為柔而言小謂陰也一陽陷於二也陰之中未能出險茍有所求惟變為陰小則可有得六三六居第三畫為坎之井來之坎坎象也來之如詩國風知子之來之論語修文徳以來之來謂招之處内之指六三也九二為下卦之主主二而言曰來之謂九二欲招六三來處于二也來之則陷于坎坎之中九五一坎九二乂一坎故曰坎坎險且枕象也居三則下有九二之險且已又枕于其上處不安也入于坎窞象也初與三皆坎之耦畫故其象同謂之故窞初在下坎之内三在上坎之内故皆曰入勿用占也筮得此爻者戒之使勿用用則必有凶悔吝也六四六居第四畫為坎之困樽酒簋貳用缶象也坎為酒二三四五有尊簋缶之象以尊盛酒以簋盛食又以缶盛酒貳其尊虞氏曰貳副也禮有副尊故貳用缶朱子曰貳益之也周禮大祭三貳弟子職左執虚豆右執梜七周旋而貳是也澄案周官大祭三貳其下云皆有酌數皆有器量鄭氏註謂酌酒所用注尊中者貳用缶缶即酌器也為尊之副尊中之酒不滿則酌此器之酒以益之也納約自牖象也納如納言之納約謂歡好相結之言坎之柔維繋於中剛有繩約之象四耦畫虚而通明又當西之位故象牖上卦三爻上爻居險極而陷于罪惟四五三爻剛柔各當其位四以柔正順承五之剛中正設饗禮以尊事之自牖而出徃通於五以納其結歡之約誰能出不由户不由户而自牖葢非常時所由出之處四五非正應而以比近相得故也終无咎占也比近相得雖不如正應然既是敵應无相與者於險陷之時親仁善鄰講信修睦可謂合時之宜矣朱子曰始雖不甚好然於義理无害故終无咎九五九居第五畫為坎之師坎不盈象也九二九五為險陷之主九二之坎有險謂坎之中有流水而深也九五之坎不盈謂坎之中有流水而不滿也葢流水陷在深地而不上及兩岸者也祇既平无咎占也盈科而進水之道也盈則與岸平矣九五變為柔則不盈者未有盈之時也程子曰祇於既平則无咎未平而尚在險中未得无咎也九五剛中之才居尊位宜可濟險然下无助也二陷于險中未能出餘皆陰柔非濟險之才人君雖才安能獨濟天下之險上六上之畫得六為坎之渙係用徽纆寘于叢棘三歲不得象也徽纆黒索也所謂縲絏也坎有繩係之象坎中實象棘之身外耦象棘之刺二坎象棘之叢葢拘係罪人之處栫之以棘也三者坎之數上六陰柔居險極乗剛中正之君失為民之道者也故陷于罪戾既係縛之以徽纆又囚寘之于叢棘三歲而不得免也周官司圜收敎罷民能改者上罪三年而舍其不能改而出圜土者殺三歲不得罪大而不能改者與凶占也犯上而致凶也六畫俱六九為坎之離經彖辭凡十字爻辭凡七十二字窞徒坎切枕針甚切祇音支徽許韋切纒音墨寘之豉切註沮子須切盛時貞切量音亮好吁告切縲力追余切絏辛列切刺千恣切罷音皮舍音捨者與音離下離上三之三上之十八經八純中女主六五離此羲皇離下離上之卦而文王亦名之曰離離麗也明也一隂附麗上下二陽而明象火象日二離相重麗而復麗明而復明者也利貞占也下卦三畫皆得正二五皆得中故宜於正主事亨占也由利貞而亨也畜牝牛吉占也畜養之也牝牛皆坤象離中畫一陰坤之中畫也故象牝牛坤之二五麗於乾四畫之中如牛之繋養于牢也項氏曰坤以全體配乾而行故為牝馬之行地離以二五附乾而居故為牝牛之畜養初九初之畫得九為離之旅履錯然敬之象也初趾也剛畫如趾之納於履中初地也以履履地也附麗之初善惡未别明之初不可太察故履錯然而雜進者皆當敬之无咎占也初剛之進六二能敬之故六二无咎非初之无咎也六二六居第二畫為離之大有黄離象也黄中之色二麗乎中故為黄離元吉占也坤六五之象黄裳為文在中離六二之象黄離亦為文在中故其占同九三九居第三畫為離之噬嗑日昃之離象也五者上卦之中當天之位故日在五為中之時三者下卦之終當人之位故日在三為昃之時日昃之離如人之老而光景垂盡不鼓缶而歌則大耊之嗟象也九三變為柔成震成艮震為鼓為聲而二三四有缶象艮為少男有反老還童之象詩述陳國之風史稱秦人之俗皆鼓缶而歌葢以樂生也人之老也不能以生為樂則必以死為憂矣年八十曰耊九三下卦之終陽氣將盡故曰大耊二三四互倒體之兑歌嗟於兊口取象此爻有將老而死之象其變又有復少而生之象人能自作元命或順受正命則皆樂而不憂也凶占也以其近死故凶惟超出乎生死之外者能不凶也九四九居第四畫為離之賁突如象也此言下體之象突竈突也説文引突字作方以為不順之子義固可通然焚如取火象則突如亦當取火象三四當繼明之時而二剛相值葢繼之不善者也其來如焚如死如棄如象也此言上體之象舊火上升三以接乎四如火氣之出於突新火下來四以逼乎三其猛烈如火之焚繼承之際不善如此必至身殞國亡九四變為柔成坎成艮火入坎水而滅死也火滅成灰而歸于艮山之土棄也其安慶緒朱友珪之事乎六五六居第五畫為離之同人出涕沱若戚嗟若象也涕目液也離為目有出涕象二三四五肖坎為水為雨有沱若象五心位有戚象三四五互兑為口有嗟若象六五為重離之主繼明而嗣位者也居倚廬而无命戒百官總已以聽於冡宰其哭泣而出涕也至于沱若其居䘮而戚也至於嗟若以繼父為悲不以得位為樂也嗣天子之孝者葢如是吉占也項氏曰九四逆子也來迫焚如六五順子也悲憂不樂四五之吉凶可知矣上九上之畫得九為離之豐王用出征有嘉占也離有甲胄戈兵之象王者筮得此爻而用之以出征則有嘉美之功王謂六五出謂自五徃上征謂興師正其罪六五之所征者上九也初上二爻並以時之初終起義方初之時而已附麗者則敬之以示勸也至終之時而不附麗者則征之以示懲也上九居重離之終乗君位之上怙終不臣者也與比謙之上六同六五繼體重明之君如啟嗣禹成王嗣武王啟嗣位而有扈不服成王嗣位而商奄不靖上九之征如啟之征扈成王之征奄也離之上體二剛多不正剛惡者也故四則不子上則不臣折首獲匪其醜无咎占之象也以人身言首在上獲謂兵之所俘獲醜衆也首指上九醜指衆爻至終而不附麗者上九而已其他皆已附麗者也所征者獨上九而衆不與焉故所折者首爾所獲者匪其類也國不受兵則无所俘獲矣刑不濫武不究所以无咎六畫俱九六為離之坎經彖辭凡八字爻辭凡六十九字畜許六切錯七各切耊田節切折子舌切註復符后切别彼列切少詩詔切下同樂音洛下同怙徒忽切不與音預黷徒各切易纂言卷一
