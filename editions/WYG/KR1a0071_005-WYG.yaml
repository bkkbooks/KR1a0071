body:
  text: 易纂言卷五元吴澄撰象上傳象者文王所立六十四重卦之名象傳者夫子為釋文王之卦名而作也象獸名象其形而為字因假借其字為物形肖似之稱凡虎咒虎兎馬牛羊犬等字皆象其形也而肖似之義獨於象字取之者象為極南之獸中土所无惟觀圖畫而想見其形由是圖寫物形之肖似謂之象羲皇八卦之畫象天地八物則謂八卦之畫為象文王重卦之名象上下二體則謂重卦之名為象凡傳釋重卦之名故曰象傳卦名之下言卦之用夫子所以推廣卦畫卦名之象也既釋文王所名各卦二體之象而并釋周公所繫各卦六爻之辭焉或乃指爻辭為象誤矣其以釋卦名者為大象釋爻辭者為小象亦非也天行此釋乾下乾上也乾之畫象天上下二乾者二天也天一而已安得有二故曰天行天之行一日繞地一匝一天自西而下降一天又自東而上升是二乾為天行之象朱子曰昨日行一天也今日行又一天也其實一天而行不已也健此仍羲皇八卦之名而為重卦之名當曰乾而曰健健即乾也陽之性健而成象之大者天也故羲皇以三畫純陽之卦為乾其徳為健而象天因而重之下上皆乾則象天之行一日一周健而又健者也故文王亦名之為乾以卦徳易卦名者以其居六十四卦之首故特異其辭以別於他卦如春秋首年不曰一年而曰元年首月不曰一月而曰正月也君子以自彊不息君子者以徳言生知學知在上在下之通稱其以位言則於古曰先王於今曰后曰上曰大人而先王大人則兼以徳言也以者用也言人觀此卦之象而用之以治身治世也自强能如重乾之健則能不息也自强謂内有所主中立不倚不息謂終始如一不須臾離也潛龍勿用陽在下也陽釋龍在下釋􅅗龍之􅅗如大人之隠於卑下未出用世故得此占者亦不可用事也見龍在田徳施普也龍見而在田如大人之已出見於世雖未為君而其徳之所施己普矣終日乾乾反復道也反復道釋乾乾以學言之也行道己竟又還反以復于己行之道而再行如初一乾既終一乾又始之象也或躍在淵進无咎也未可躍則在淵既可躍則自淵躍出以上于天如是而進是能審其可故其進无咎飛龍在天大人造也造猶作也作謂起也大人起而居天子之位也亢龍有悔盈不可久也五為君位不可更過也過乎君位則為盈水盈則必溢而不可以久大人能知進退則不至於盈也用九天徳不可為首也乾之徳剛健中正中則不過於剛正則不偏於剛用九者純剛俱變為柔葢以柔濟剛而不過不偏也是為天徳不可以純剛居上故曰不可為首傳三之一凡六十八字施申志切註別必列切稱昌證切離力至切竟音敝地勢此釋坤下坤上也坤之畫象地上下二坤者二地也地一而已安得有二故曰地勢地之勢有下有髙下一級一地也髙一級又一地也是二坤為地勢之象坤此仍羲皇八卦之名而為重卦之名坤者順也隂之牲順而成形之大者地也故羲皇以三畫純隂之卦為坤其徳為順而象地因而重之上下皆坤則象地之勢有下有髙順而又順者也故文王亦名之為坤君子以厚徳載物厚徳能如重坤之厚則能載物也厚謂不薄徳之敦厖无一物而不容受承藉之也初六履霜隂始凝也馴致其道至堅冰也馴如馬之馴其行徐徐而至馴致釋至謂其至以漸也六二之動直以方也不習无不利地道光也六二爻義施於人事之動則如坤道之直以方其大不重習其占无所不利者地道之光顯也含章可貞以時發也或從王事知光大也程子曰義所當為則以時而發非含藏終不為也或從王事而能无成有終者是其知之光大也澄謂柔變為剛故云大括囊无咎慎不害也慎釋括囊不害釋无咎黄裳元吉文在中也朱子曰文在中而見於外也龍戰于野其道窮也柔居下為宜至于上則其道己窮極也用六永貞以大終也坤六畫皆柔小也用六者純柔俱變為剛是始小而終則大故曰以大終傳三之二凡九十一字初六履霜舊本作履霜堅冰今依魏志所引知音智註藉齊夜切見賢遍切雲雷此釋震下坎上也震之畫象雷坎之畫在天象雲雨在地象水泉水氣自地而上升于天則為雲故象雲者坎在上卦也水氣自天下降于地則為雨故象雨者坎在下卦也屯此重卦之名屯者鬰結未解之時雲升于上而雷動于下未能成雨則鬱結而屯及雷動于上雨降于下則屯之鬱結解矣故上雷下雨之卦名為解而上雲下雷之卦名為屯也君子以經綸經綸皆治絲之事治世亦曰經綸者治世猶治絲也君子治世猶治絲而欲解其紛亂亦猶屯之時必欲解其鬱結也經者先總其緒為一而後分之象雲之自一而分綸者先理其緒為二而後合之象雷之自二而合也雖磐桓志行正也以貴下賤大得民也志行正因爻辭居貞而廣其義居則不行行則不居初以陽剛之才雖磐桓未可進其志固在於得行而貞也居而貞非其志也大得民釋爻辭建侯大謂陽也民謂二隂屯自艮而變初剛自三來初以陽之貴下於二隂之賤大者為君而得二民之歸嚮也六二之難乘剛也十年乃字反常也剛謂初也反復也程子曰六二乘剛為剛陽所逼是其患難也至於十年則難久必通矣乃得反其常與正應合也即鹿无虞以從禽也君子舍之往吝窮也程子曰无虞而即鹿以有從禽之心也君子則舍之若往則吝而窮困也求而往明也初九能求六四而自内往外以就之初乃剛正賢明之人也屯其膏施未光也程子曰膏澤不下是其徳施未能光也泣血漣如何可長也程子曰屯難窮極如此其能長久乎傳三之三凡七十三字難乃旦切舍音捨施申志切註解音蟹欲解如字山下出泉此釋坎下艮上也艮之畫象山兩山之間流而為川者人所可見之水一山之下出而為泉者人所不見之水山下謂山腹之下非山麓之側也後凡言山下者皆同蒙此重卦之名蒙猶人之童穉也泉之初出􅅗伏山下未達于外不汚不滑亦猶人之童穉良知良能藴蓄於内未為外誘所汚滑者故山下出泉之卦名為蒙也君子以果行育徳果行象出泉育徳象山下行謂身之所行徳謂心之所得君子之動也勇於義以果毅其行象内泉之涓滴而决𨗳其流於外也君子之靜也主於敬以養育其徳象外山之包藏而渟涵其源於内也徐氏㡬曰蒙未有所適體坎之剛中以果其行而達之蒙未有所害體山之靜止以育其徳而成之利用刑人以正法也刑人者正其法以示懲戒也子克家剛柔接也接謂交際五之柔與二之剛接故能有助而使二為克家之子勿用取女行不慎也行不謹慎謂不有其躬也困蒙之吝獨逺實也陽實隂虚獨逺實者言獨逺於陽也項氏曰初三近九二五近上九三五皆與陽應唯六四所比所應无非隂在六爻中獨為无陽之人童蒙之吉順以巽也順以巽謂六五柔順以卑巽入從九二之陽也五坤順也變剛成巽巽也利用禦宼上下順也因其為宼禦而止之上之順也因禦而止遂不為宼下之順也互坤之下畫為下順上九變為柔得坤之上畫為上順傳三之四凡五十九字行不慎舊本慎作順朱子曰順慎古字通用荀子順墨作慎墨作慎於經意尤切今從之行下孟切下同逺于願切注汚音烏滑音骨亭音亭逺於陽如字雲上于天此釋乾下坎上也坎在上卦象雲而乾在下卦雲上於天之上也需此重卦之名需者待也雲上于天雖未成雨而雨可待矣故卦名為需君子以飲食宴樂君子之需待安分樂天以俟時而已潘時舉問屯需皆隂陽未成雨之象然屯言經綸需言飲食宴樂者何也朱子曰屯之時齟齬艱難故曰經綸需是緩意他无所致力其義不同又曰事之當需者但飲食宴樂以俟其自至一有所為則非需也程子曰雲方上於天而未成雨猶君子蓄其才徳而未施於用也觀需雨之象懐其道以待時飲食宴樂所謂居易俟命也澄謂飲食者非謂醉醲飽鮮以奉己各因其自養之素如夫子之飲水疏食顔子之一簞一瓢皆飲食也宴者身安而他无所營作樂者心愉而他无所謀慮也飲食則素其位而宴樂則不願乎外也飲食於上坎取象宴樂於下乾取象坎為酒飲也坎下一畫連乾上中二畫成兊食也乾陽之性上進而來居於内有宴以安其身之象乾純陽陽舒為樂樂天不憂有樂以愉其心之象需于郊不犯難行也利用恒无咎未失常也程子曰不冒犯險難而行復宜安處不失其常雖不進而志動者不能常也安静自守志雖有須而恬然若將終身焉乃用常也需于沙衍在中也雖小有言以吉終也衍者下平之地雖水所可及然猶在内卦之中則未至於水也小者得此占始雖有言語之傷而終於吉若大者得之則始亦无言始終皆吉也需于泥災在外也自我致宼敬慎不敗也朱子曰外謂外卦占得此雖若不吉然能敬慎處之得其道亦可不凶或失其剛正之德又无堅忍之志則不能不敗矣需于血順以聽也謂六四柔順以聽從於九五也聽取坎耳之羲酒食貞吉以中正也程子曰需於酒食而貞吉者以五得中正也不速之客來敬之終吉雖不當位未大失也需上卦三爻皆當位下卦三陽初三皆當位雖有九二一爻不當位然剛而得中不以居陰位而失陽剛之道也天謂陽剛也未大失者於陽剛之道未為失也故下之三陽皆上六之所當敬傳三之五凡九十二字樂音洛難乃旦切注居易以豉切疏食音似復宜扶豆切天與水違行此釋坎下乾上也水行而下天行而上其行兩相背戾是違行也訟此重卦之名訟者爭辯也人情相順嚮則无事相背戾則有爭人情背戾若天水之相違爭訟所由起也故卦名為訟君子以作事謀始人情有始順嚮而終背戾者當順嚮之時始謀不能深逺輕信苟交及終而背戾必生訟矣君子知其然凡所作事謀於其始不輕信不苟交事事謹審絶訟端於始則他日訟无由興作事坎象謀始乾象坎水流行如有事作為乾知大始能説諸心如始謀之髙不可及不求所事訟不可長也雖小有言其辯明也訟不可長猶彖傳言訟不可成小者柔弱始雖受人誣毁其終也辯析既明則其言息矣所以吉也不克訟歸逋竄也自下訟上患至掇也項氏曰上兩句皆是爻辭下兩句方是象傳如需之上六象傳句法朱子曰掇自取也程子曰自下而訟其上義乖勢屈禍患之至猶掇拾而取之也食舊徳從上吉也食上之徳者從乎上也項氏曰此從字與從王事從字不同復即命渝安貞不失也程子曰能如是則為无失矣訟元吉以中正也元之吉者以其中正也以訟受服亦不足敬也程氏曰謂其受服為可鄙傳三之六凡七十七字竄于㫁切掇端奪切注背音佩地中有水此釋坎下坤上也地猶人之肌肉水猶人之血脉地中有水猶人肌肉中有血脈灌注之也師此重卦之名師者衆也以地之至廣而水之灌注无不周徧猶人之至衆而將之統御无不管攝也故卦名為師君子以容民畜衆水之周徧能容王質故所畜者廣君之寛𢎞能容其民故所畜者衆衆者民之多言非止一民也能容民所以能畜衆也項氏曰地之能固以其中有水也水所以畜地君子之於民也浸潤之道深入乎其中所以能涵蓄萬衆而不分也容畜屬坎民衆屬坤或謂有陽畫則隂為民民盖坎之二柔容民言内卦坤為衆畜衆言外卦也澄案臨之容保民觀之觀民民皆指坤而言師出以律失律凶也當聴律聲不吉則止違律而行必取喪敗在師中吉承天寵也王三錫命懐萬邦也方伯為諸侯之長得専征伐有功而受三錫之寵萬邦諸侯見之知有功必賞則无不懐徳者矣師或輿尸大无功也大謂陽指九二也輿尸之敗雖在六三然九二為主帥偏禆之喪師即主帥之无功故曰大无功也城濮之戰楚左師右師敗唯子玉之中軍不敗然子玉帥也故敗師之罪子玉當之左次无咎未失常也程子曰見可而進知難而退師之常也如四退次乃得其宜故未為失也長子帥師以中行也弟子輿尸使不當也程子曰二以中徳受任以行若復使其餘是任使之不當也其凶宜矣大君有命以正功也小人勿用必亂邦也大君有開國承家之命者以此恩賞正軍旅之功也受此賞者必有位之君子或大夫有功而命之為諸侯或士有功而命之為大夫皆非小人无位者所得與故小人得此占則勿用盖諸侯為一邦之君大夫為一邦之臣使之治其邦也若以小人為之則上之所命非其人下之所處非其據不能治其邦必至亂其邦矣傳三之七凡八十四字長知兩切往喪息浪切復使符后切得與音預地上有水此釋坤下坎上也比此重卦之名相比而无間者莫如地上之有水故卦名為比先王以建萬國親諸侯太古之時凡是立法定制世守不變之事則稱先王坤為衆為土萬國象地諸侯布其上象水震為諸侯坎之一君統二民與震同也先王知民之不可无所比也故分土分民建為萬國各以君治之故有諸侯諸侯為父母而子其民則萬國之民各親其君如父母君民之情一體无間如水地之相親比也國分為萬者以民之多也侯曰諸侯者非止一君也比之初六有他吉也有他者无所不比也比之自内不自失也自謂己也六二不自失中正之道故人之比之者自内而始未有内不相親比而能使外人相親比者也比之匪人不亦傷乎雖有中正者比之然己不中正非人也必自取凶禍不亦可傷矣乎外比於賢以從上也五賢而在四之上比於賢謂賢者比之也從上四順從九五也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也九五之位得正得中禽之逆我而去者舍之順我而來者取之不誡者上之使民合於中道聴其自順不强其必從也比之无首无所終也下四隂五之所比而上獨居後九五无上六猶人之无首下畫皆順從惟上畫在卦終而逆命卦之无所終也傳三之八凡七十八字舍音捨註間居限切風行天上此釋乾下巽上也巽之畫在天象風在地象木天无處不在无所謂上下也天上者逺非人目力所及者而風上行焉小畜此重卦之名風者陽包隂在内隂少乎陽又行乎天上則既有包隂之陽在其外又有天之陽在其内内外之陽甚多所包畜之隂甚少故卦名小畜君子以懿文徳懿美也如仲山甫之懿徳柔嘉維則今儀令色小心翼翼也文如柔來文剛剛上文柔之文懿象巽之一隂徳象乾之三陽風行天上其所以畜者風中之一隂甚少也然中一隂而内外陽有離卦文明之體以一柔而文五剛君子之以懿而文其徳者象之項氏曰懿者小徳之名君子以小徳而文大徳雖不若前言往行啓發培灌之多然而和氣愉色婉容令辭所以輔成其徳者不可廢也復自道其義吉也能舍己所獨應之隂則不徇人欲之私而合天理之宜所以吉也牽復在中亦不自失也五陽共畜一隂私於隂則為自失初居剛既能不自失矣二為初所牽連而復者以其在下卦之中故雖居柔而亦不自失也夫妻反目不能正室也非正應而欲以四為妻不能正室家之道也其反目也宜哉有孚惕出上合志也出外而上與九五合志也有孚攣如不獨富也五之能攣四也不獨有其富而與四共之也既雨既處得積載也君子征凶有所疑也上九之剛為柔孚六四之柔得載矣此柔能勝剛之時也有所疑者疑君子之不可有行也既雨既處得積載也如訟卦九二象𫝊例上舉爻辭下文有所疑也四字乃并釋其義傳三之九凡六十九字得積載舊本得作徳因經文誤而誤也往舍音捨上天下澤此釋兌下乾上也兌之畫象澤卑下之處水瀦而不流者曰澤其大者海也履此重卦之名履謂足之所踐也地之上有天下有澤人在其中履也故卦名為履君子以辨上下定民志辨謂分別也天不可以為澤澤不可以為天人之有上下之分亦猶是也分別上下之分以示民則民之志有定而无僭踰上象乾天下象兑澤辨象上互離在中民象互離中之一柔定象一柔處二剛介乎下履二承四上不至九五上九之天下不至初九地下之澤也程子曰古之時公卿大夫位各稱徳士修其學學至而君求之農工商賈勤其事而所享有限故皆有定志後世自庶士至公卿日志于尊榮農工商賈日志于富侈億兆之心交騖於利天下紛然如之何其可一君子觀履之象而分辨上下使各當其分以定民之志也素履之往獨行願也以獨行其志為願非他有所願也幽人貞吉中不自亂也范氏大性曰剛中故不以乘剛之柔亂其意眇能視不足以有明也跛能履不足以與行也咥人之凶位不當也武人為于大君志剛也目之眇者雖猶能視豈能如不眇者之明乎足之跛者雖猶能履豈能如不跛者之行乎項氏曰眇跛六之柔也能視能履三之剛也程子曰隂柔之人其才不足視不能明行不能逺以柔居三履非其正其能免於害乎所以被咥而凶也澄案剛謂上九六三欲為大君效力志在從上九之剛也志剛如咸卦象傳言志末愬愬終吉志行也畏懼禍害而終獲其吉者其志之得行也夬履貞厲位正當也位正而當所處必得其宜不至於貞夬履之事而厲爻辭示戒焉爾彖傳所謂不疚光明足以見九五之善矣又安有貞厲之事哉元吉在上大有慶也大謂陽剛元徳之人終喪盡禮所以吉也大釋元有慶釋吉傳三之十凡八十八字注別彼列切分扶問切稱充證切賈音古騖榮暮切天地交此釋乾下坤上也天在上而其氣下降以交乎地地在下而其氣上騰以交乎天泰此重卦之名泰者流通无滯也天地之氣交而上下流通故卦名為泰后以財成天地之道輔相天地之宜以左右民后君也天子諸侯之通稱此后謂天子也財裁通乾陽不可以无隂坤隂不可以无陽必二氣交通於上下而後為泰人君參贊於其中亦必有以交通之而後能納民於泰也渾然而全者天地之道則自其全者裁制而成之以品分大徳之一本截然而分者天地之宜則因其分者輔助而相之以曲全小徳之萬殊全者分之分者全之亦交而通之之意民者坤也左右之者乾也坤上者民之情達於上乾下者左之右之之徳至於下也此君民之交通也拔茅征吉志在外也在外謂應四蔡氏曰應隂隂為民君子在内則思澤乎民包荒得尚于中行以光大也項氏曰泰之所以成泰者以九二六五上下相交也程子曰言如此則其道光明顯大也无往不復天地際也徐氏㡬曰乾坤相遇之際泰否反復之機在此可不戒哉翩翩不富皆失實也不戒以孚中心願也失謂不得四翩翩向下雖不富而其鄰肯従之者蓋三隂皆不得陽而欲下求也不待期約而以其相孚之人同下盖二隂亦下求陽各出於其中心之所願以祉元吉中以行願也謂柔得中而行歸以應剛者乃其心之所願欲也城復于隍其命亂也泰極而否治極而亂矣程也子曰雖其命之亂不可止傳三之十一凡八十二字相息亮切左右去聲天地不交此釋坤下乾上也地不交天而氣不上騰天不交地而氣不下降也否此重卦之名否者閉塞不通也天地之氣不交而上下隔絶故卦名為否君子以儉徳辟難不可榮以祿上下隔絶之時君子惟當在下以儉約為徳而避免禍難在上雖欲榮之以祿而不可儉徳避難者安處下坤而此不交乎上不可榮以禄者逺絶上乾使復不能以交乎下盖法天地不交之象也儉徳者守坤之儉嗇避難者就坤之平順禄者天祿不可榮者不居乾之崇髙儉與奢對隂虚而貧則儉陽實而富則奢榮與辱對天尊而貴則榮地卑而賤則辱否之時寧貧母富寧賤母貴故居儉而辭榮也項氏曰儉徳避難不與害交也不可榮以祿不與利交也不可榮者言不可得而榮非戒其不可也拔茅貞吉志在君也泰初九應六四六四隂也民也初之陽志在澤民不獨善其身而兼濟天下故曰志在外否初六應九四九四陽也君也初之隂志在承君不自植私黨而同仕公朝故曰志在君大人否亨不亂羣也程子曰大人於否之時守其正節不雜亂於小人之羣類包羞位不當也位不當者不得其正也有命无咎志行也謂其濟否之志得以行也大人之吉位正當也程子曰有大人之徳而得至尊之正位故能休天下之否是以吉也无其位則雖有其道將何為乎故聖人之位謂之大寳否終則傾何可長也程子曰否終則必傾豈有長否之理傳三之十二凡六十二字辟皮二切難乃旦切注逺于院切天與火此釋離下乾上也離之畫在地象火而在天象電象曰天在上而火之性亦炎上天與之同故曰天與火同人此重卦之名在上之天與炎上之火同人之相同者亦如天與火之相同故卦名同人君子以類族辨物天之所生各族殊分法乾覆之无私者於殊分之族而類聚其所同異中之同也火之所及凡物均照法離明之有別者於均照之物而辨析其所異同中之異也族言人物言動植之屬出門同人又誰咎也又誰咎者又誰得而咎之也同人于宗吝道也所同者私狹而不公廣其道為可吝也伏戎于莽敵剛也三嵗不興安行也項氏曰言敵剛恐人誤以為攻二也程子曰所敵者五既剛且正其可奪乎故畏憚伏藏至於三嵗不興終安能行乎乘其墉義弗克也其吉則困而反則也項氏曰恐人以弗克攻為力之弱故釋之曰義弗克也又曰困而反則也澄謂九四之力敵五則不足攻二則有餘其弗克攻者知義之不可而止故云義弗克非力弗克也困謂於義不通也程子曰以其義之弗克困窮而反於法則也二者衆陽所同欲獨三四有爭奪者二爻居二五之間也三以剛居剛故終其强而不能反四以剛居柔故有困而能反之義能反則吉矣同人之先以中直也大師相遇言相克也直即正也六二於先而號咷者以中正逺同中正之九五不昔近同强暴之九三故也及九五用大師而後二與五得相遇者言九三欲克五奪二不能敵九五之大師而始受克於五也九三先欲克五九五後乃克三故言相克同人于郊志未得也天可同之人故志未得傳三之十三凡八十字注別彼列切火在天上此釋乾下離上也火之體隱而不見麗於物以為體者昔燧人氏之世有火麗空而明盖火見其體於空中也火在天上者火見其體於天之上也大有此重卦之名文王名卦凡曰大者皆謂陽剛大子大象則取大小之義唯天為火在天成象者不一火在天上則皆能照及是火之所照者大而多有也與在地之火所照不逺於寡少者不同故卦名大有君子以遏惡揚善順天休命火之所照能分別善惡而天道福善故於善人則必福之以休美之命君子既能如離火之分別善惡矣而惡者則抑遏之善者則舉揚之所以順上天福善之休命也分善惡屬離休命屬乾遏揚又屬乾順必屬離火之別淑慝盖以順天之所休天之有禍福盖以遏揚火之所照命言休而不言咎者遏惡亦以揚善也大有初九无交害也言因无交而有害也大車以載積中不敗也車大則能勝重載故載雖多積於中而車行不至於敗占之所以往无咎也公用亨于天子小人害也小人得此占則不利也匪其彭无咎明辨晳也以離明辨別事理而能照晰故知盈滿之戒而不處其盛也朱子曰晢明貌厥孚交如信以發志也威如之吉易而无備也孚信於九二賴其剛以啓發已之志故不過於柔而威嚴可畏也威如而後吉者盖居尊不可太柔太柔則人將易之而无畏備之心也大有上吉自天祐也天錫之祐謂君至大有之上其占所以吉者盖居上應天是自天而祐之也傳三之十四几七十九字晳先的切處敞吕切易以豉切地中有山此釋艮下坤上也闕謙此重卦之名劉表曰謙之道降已升人者也澄謂山之髙而降之以居卑地之下地之卑而升之以居髙山之上有如降已升人之謙故卦名為謙君子以裒多益寡稱物平施山在地中則髙者降而下卑者升而上一降一升而髙卑適平矣物之多者裒取而使之寡猶降山之髙而使之卑也物之寡者増益而使之多猶升地之卑而使之髙也一裒一益而多寡適平矣稱物乎施謂稱量物之多寡而損益之然後所施均平而多者不偏多寡者不偏寡也謙謙君子卑以自牧也牧如牧牛之牧常常看顧不令亡失也程子曰自牧自處也鳴謙貞吉中心得也中心有得於謙而外發為聲也勞謙君子萬民服也功勞及於天下之萬民而退讓不居冝其民之心服也萬民服謂有終而吉也萬民以卦之五隂言隂為民萬者極言其數之多也以一卦則五數為至多以天下則萬數為至多无不利撝謙不違則也既无不利矣而又撝示其謙於下不違於謙之則也則謂理之當然可以為法者利用侵伐征不服也不服謂上六上六應九三而居六五之上有恃三陵五之象然體順質柔非强抗跋扈也但謙之時无有不附雖九三之大功亦止於下小大帖然獨上六自尊髙而不屈下斯為不服之人耳如此則上六之罪不可以不侵伐而往正之盖以五柔順得中之君人之視之易失之慢易若不略振威武則不及而非中矣然其侵伐也非進兵求勝也彼能服罪則已矣往正其罪有征无戰故曰征不服也鳴謙志未得也可用行師征邑國也上六之志常欲自伸而不肯下人其鳴謙於九三也畏其勲勞之大權勢之重不得已而然故曰志未得也其於六五之君也盖如邑國之臣自為尊髙而不入王朝故用師征之而可𫝊曰一不朝則貶其爵再不朝則削其地三不朝則六師移之此先王行師征邑國之制也傳三之十五凡八十八字裒蒲侯切稱尺證切施申志切註稱量並平聲慢易以豉切雷出地奮此釋坤下震上也雷者地之陽氣薄於險而有聲方陽氣之消而始生也則此氣在於地中伏藏而无聲雷在地中是也及陽氣之長而既盛也則此氣出於地上奮發而有聲雷出地奮是也豫此重卦之名豫者和緩悦樂之意陽氣伏藏於地久矣一旦發聲不急遽不慘戚故卦名為豫先王以作樂崇徳殷薦之上帝以配祖考凡作樂者以象其徳也周之世徳卑順抑畏不務表顯既得天下之後作樂以象之然後昔之遵晦自卑者今見其崇項氏曰崇徳猶章徳也澄謂樂聲之發象雷周徳之卑順象地殷盛大也上帝即天也饗燕朝會祭祀皆用樂而其最盛者則以薦之上帝而又以祖考配也謂冬至祀天於南郊而以祖后稷配季秋祀帝於明堂而以考文王配也上帝象上卦之震祖考象下卦之坤樂指九四一陽而言五上皆天也上者郊外所祀之天五者廟中所祀之天三祖也二考也初者武王之徳也初與四為正應初六之徳章於九四之樂聲則卑者升而崇二三與五上為敵應二三之祖考以薦九四之樂而升配五上之天也初六鳴豫志窮凶也小人之志窮極於其所喜樂也朱子曰窮謂滿極不終日貞吉以中正也以其中正故能見㡬而作也盱豫有悔位不當也六三與六二枉反者六二中正而六三不中正也由豫大有得志大行也謂大者之志得行也即彖傳所謂剛應而志行六五貞疾乘剛也恒不死中未亡也乘剛而有衰弱之疾則不能制强臣矣處上卦之中則天子之名位猶未亡也㝠豫在上何可長也豫既終極何可以長處此樂也故必改變其所已成者傳三之十六凡七十七字注長而知兩切悦樂喜樂此樂音洛澤中有雷此釋震下兑上也雷者陽氣出地薄於隂而成聲澤中安得有雷哉易之六十四大象皆實有非虚言也或求此卦實有之象而不得則以為虚試以人問所嘗有之事得於耳目聞見之實者言之嘗一人家白晝霹靂一聲自臺柱中出視之則有一龍飛去又一人家白晝霹靂一聲自鼔中出視之亦然盖神龍所養已熟形質查滓銷盡俱无惟有一團純陽之氣莊子所謂聚則成體散則成胎者故能出入有无靜則􅅗於柱間鼓間而人不見動作衝破隂氣而成霹靂之聲也雷者陽氣所為此龍乃陽氣之聚其􅅗於澤中之時龍之所在即雷之所在也雷之與龍一也故震為雷亦為龍但地中之雷則地之陽氣所成而此澤中之雷則龍之陽氣所成均是陽氣所成之雷然惟神龍能如此若凡龍則水獸爾不能為雷也神龍所居之靈湫其水清澈不容穢濁每喧汚輒興雲雨所謂澤中有雷者此也隨此重卦之名水動而常流者也澤中之水則止而不流雷動而有聲者也澤中之雷則静而无聲以雷之動隨澤而靜故卦名為隨君子以嚮晦入宴息嚮如夜嚮晨之嚮晝為明夜為晦入謂居於内雷行天而動者也然亦有居澤而靜之時是以人之動亦當有時而靜也君子晝則動以勤其事夜則靜以安其身故嚮晦之時入居於内而宴安休息謂夜而寐也人之寐猶雷之蟄也嚮晦象日在兑方而將晦入象震之在内卦宴息象震之動極而靜初二三震之動也二三也四互艮動而止官有渝從正吉也出門交有功不失也近舍私係上從正應所以吉也不失謂初以九四為交則不失所可隨之人也異于六二之失丈夫六三之失小子者矣係小子弗兼與也二之中正非必果背五嚮初也但以其近比易於牽係儻若係此則必失彼二者弗能兼與也故爻辭示戒云爾程子曰戒人從正當専一也係丈夫志舍下也下謂初取四則舍初也隨有獲其義凶也有孚在道明功也天理之宜為義其義凶謂凶者固其宜也明功謂賢明之功即初九爻辭所謂有功也孚于嘉吉位正中也二之位正而中故曰嘉也拘係之上窮也窮極也在上為隨之極故其固結不解如此也傳三之十七凡七十字舍音捨注近舍同背音佩易以䜴切山下有風此釋巽下艮上也地之理山為牡川為牝牝者水之所歸牡者氣之所行氣之行在山腹之内故曰山下然有養物之氣有賊物之氣養物之氣温煖和緩烘烘如烝者謂之火賊物之氣冷凊勁急拂拂如吹者謂之風山下有風者謂山腹之内有此賊物之風也蠱此重卦之名蠱敗壊也山下有風其氣賊物内氣冷凊則外壤枯朽其山崩圯童秃草木之生不遂故卦名為蠱君子以振民育徳蠱之象非美也君子以之則取其美風在内而能振動外物則象之以振動其民山在外而能涵育内氣則象之以涵育其徳振者作興彼之善新民之事也育者培養已之善明徳之事也育徳以山下取象與蒙卦同幹父之蠱意承考也隂柔豈能幹父之蠱哉然其意亦欲承父之志焉爾才雖不足意則可嘉也幹母之蠱得中道也長女暫當家則少女専奉母得時中之道也幹父之蠱終无咎也以陽剛幹父之蠱終不變為隂柔則終无咎裕父之蠱往未得也往未得者穉弱故也幹父用譽承以徳也有柔剛適中之徳故能幹父而用譽盖以徳而承父之志也初六六五皆才不足故初六之意承考其承之也有其意而已非有其才也六五之承以徳其承之也以其徳而已非以其才也夫承者固子道之宜然隂柔事親之道爾陽剛事親之道則異乎是啓賢能敬承繼禹之道此以賢嗣聖隂柔之道也善繼人之志善述人之事周公成文武之徳此以聖嗣聖陽剛之道也不事王侯志可則也言其志之髙尚可為法則也傳三之十八凡六十字注凊七正切圮部鄙切長女知兩切少女詩詔切夫承音扶澤上有地此釋兑下坤上也若西海北海之濵大澤之上而有髙地也臨此重卦之名大澤之上而有高地下臨深海故卦名為臨君子以教思无窮容保民无疆教謂教之以義其教也思之所及深逺長久无有窮已之時容保謂容保之以仁其容保也尺地一民皆被其恵澤无有疆界之限教者兑澤之所漸民者坤地之所有思如澤之漸入於地中容保如澤之四周於地外无窮者如澤水之不涸无疆者如坤土之至廣師卦以地水容畜坤地為容民臨卦以兌澤容保坤地為容保民咸臨貞吉志行正也陽在四而下感以臨初其貞吉者以君之志下行於民而得其正也咸臨吉无不利未順命也陽在五而下感以臨二必如此而後吉且无不利者盖以二陽雖長四隂猶盛民未順君之命必自降下以感其民此盤庚之斆于民而命衆悉至于庭者也甘臨位不當也既憂之咎不長也以不正故為媚説之態先雖媚説而後能憂則始雖有咎而其咎不長故可无咎也至臨无咎位當也四剛下初為至臨故初柔得以升四而當其位大君之宜行中之謂也以五之中而下行於二也敦臨之吉志在内也内二剛也志在順乎内之二剛以俟其進故吉傳三之十九凡七十二字思息嗣切注漸兹僉切涸曷各切雖長知兩切媚説音曰風行地上此釋坤下巽上也觀此重卦之名風之徧行地上如人之徧行地上而游觀故卦名為觀先王以省方觀民設敎巡省四方象風之行於地觀觀民俗之如何而設教以示之民象風之吹萬不同設教象風之因萬竅而成聲方民坤之象教巽之象省之觀之者由上觀下也設之者使下觀上也初六童觀小人道也程子曰所觀不明如童穉乃小人之分故曰小人道也闚觀女貞亦可醜也項氏曰婦人之目所闚者狹婦无公事所知者蠶織女无是非所闚者酒食此在女徳為不失男子而寡見諛聞則可醜矣觀我生進退未失道也釋臨九二曰未順命謂二剛浸長而猶必俯就其民盖以四隂猶盛而民或未順君命也釋觀六三曰未失道謂六三從六四同進消陽然觀六四而為進退四猶臣順而三亦未失臣道也未順命慮之之辭未失道幸之之辭未順言終不能以不順也未失言終不保其不失也臨進為泰則未順者順矣觀進為剥則未失者失矣觀國之光尚賔也言上進以朝貢于王而為賔也觀我生觀民也五為四之君四為五之民五觀四之所為者觀民之向背逆順何如也觀其生志未平也小人長盛君子孤危上九自觀其身圖以免禍其志未得帖然安平而无憂患也傳三之二十凡五十九字注之分扶問切謏音小浸長長盛知兩切朝貢音朝背音佩電雷此釋震下離上也電在前而雷繼其後也卦畫以下為先而上為後時之先後也卦象以上為前而下為後位之先後也噬嗑此重卦之名既開為電而有光矣又合為雷而有聲既開又合猶噬之而使開者合也故卦名噬嗑先王以明罰勅法明者辨別精審之意勅者整飭嚴儆之意明象電光勅象雷威罰者一時所用之法法者平日所定之罰一時所用之允當者示平日所定之信必也故明其罰所以勅其法屨校滅趾不行也於初而屨校滅趾者未經鞫問之人以此拘留之令其不得行去終獲釋免也噬膚滅鼻乘剛也以至柔乘至近之剛故噬之易而膚滅其鼻也項氏曰他卦以乘剛為厄噬惡者以乘剛為利二最易噬又乘剛焉如膚在齒上遇毒位不當也位之不當在肉為不正之臭味所謂毒也利艱貞吉未光也初九以六二之易噬有易心焉遂至滅鼻若九四之難噬則非可易者故戒以艱貞而後得吉是其道之未光也貞厲无咎得當也乾肉之堅難噬也故貞厲黄金之得為得其所當故无咎何校滅耳聰不明也由其耳之不聰不聞善言故怙終極惡以致受罪也傳三之二十一凡五十三字電雷舊本作雷電程子曰象无倒置者疑文互也朱子曰當作電雷今從之注別彼列切易以豉切山下有火此釋離下艮上也麗於物而其燄炎熱者有體之火未麗於物而其氣温暖者无體之火山下有火者山腹之内有此无體之火也醫書六氣論火分為二有君火有相火而以温暖之氣為君火炎熱之氣為相火邵子謂火半隠半見盖隱而无體者君火見而有體者相火也易之以火為象凡十卦惟賁卦之火是以君火言賁此重卦之名草木暢茂而光華為賁古文書曰賁若草木火者温暖之氣能養萬物山下有此火氣藴藏於内則山上之草木暢茂賁然有光華故卦名為賁君子以明庶政无敢折獄朱子曰庶政事之小者折獄事之大者項氏曰賁之用可以明庶政而不可以折獄澄謂明者離之明无敢者艮之止庶政又艮象猶山中之多庶物也折獄又離象猶火光之能照見也交互取象其明但可用於艮之庶政止而不敢用於離之折獄也舍車而徒義弗乘也義弗乘六二之車者盖以就賁於所比之隂柔為非義也賁其須與上興也程子曰須隨頤而動者繫於所附與上同興也永貞之吉終莫之陵也陵謂漸卑迤也九三與上九同位山之髙也若降在六二則與六五同位陵之卑也六四當位疑也匪宼㛰媾終无尤也六四當居其位非有可疑者也其始也初九疑之而不親其終也知其匪宼乃㛰媾也則无尤之之意而與之為應矣六五之吉有喜也聘幣之至可喜之事也白賁无咎上得志也上復反為泰之九二故得志傳三之二十二凡六十八字折之舌切註相火悉亮切半見火見賢遍切山附於地此釋坤下艮上也山高聳於地者也山之下址朽蝕銷圯則山之上頂頽塌陷下而附著於地也剥此重卦之名程子曰山高起於地而反附著於地圯剥之象故卦名為剥上以厚下安宅下謂民也宅謂君之所居也民在下為君之基猶地在下為山之基也地基厚於下則山安於上民基厚於下則君安於上故居上者厚其下所以安己之宅也下者坤象宅者艮象厚者欲其如地安者欲其如山也剥牀以足以滅下也滅與爻辭蔑字同義非滅没滅息滅絶之滅剥其足者謂削蔑其下也剥牀以辨未有與也丘氏富國曰與應也凡隂陽相應為有與困九四應初六言有與是也陰陽不應為无與井初六不應六四言无與是也咸六爻皆應則謂之感應以相與艮六爻皆不應則謂之敵應不相與剥之未有與者言當剥之時在上未有以應陰无以止陰之進也大凡小人為害使其間有一君子與之為應以遏止之則猶有所顧忌而不敢肆惟其未有與此剥道所以進長而不可救也聖人於此不謂之无與而謂之未有與葢不忍陰柔之害正而猶冀有以止之也澄案丘説是也初六之剥足惟无與也故剥遂至於四使六二之剥辨而有與則剥不及五矣惟其未有與故剥遂至於五若六三之剥之唯其有與也上九之所以不剥也未有云者言六二之所未有至六三而後有也葢傷有與之不蚤而僅能存一陽也剥之无咎失上下也程子曰其所處與上下諸陰不同是與其同類相失於處剥之道為无咎如東漢之吕强是也剥牀以膚切近災也程子曰剥及其膚切近於災禍也以宫人寵終无尤也程子曰羣陰剥陽以至於極六五若能長率羣陰駢首順序獲寵愛於陽則終无過尤也君子得輿民所載也小人剥廬終不可用也民謂五陰小人得之有剥廬之象雖卦已至終其占不可用也項氏曰協韻蓋用有以音傳三之二十三凡六十八字注圯部鄙切塌託合切著直略切進長長率知兩切雷在地中凡釋震下坤上也一陽初生於地中未能為雷也而曰雷者春時之雷即此初生之陽所為也復此重卦之名復者還反也十月純坤陽氣消盡則无能為雷者矣為雷之陽初生於地中猶既去而來還也故卦名為復先王以至日閉闗商旅不行后不省方闗者四郊之門至日一陽初生故閉闗不開商旅不通行則外者不入内人君不巡狩則内者不出外蓋欲地上安靜以養地下初動之陽也至日震一陽之象閉闗坤闔户之象商旅者坤為衆之象行者震為大塗之象后者震為君之象方者坤為國土之象項氏曰外之人未可行内之君未可出皆象雷之在地也不逺之復以修身也程子曰不逺之復者君子所以修其身也學問之道无他也唯其知不善則速改以從善而已休復之吉以下仁也六二陰變而復於陽猶未善者變而復於善處已中正芘蔭及人仁者之事也能使初九初復之陽依附以休息占之吉者以六二之仁而初九下之也下謂初九處六二之下尊之使在上也舊注皆以初九為仁而六二下之案他處凡言下者皆謂在其下也彖傳隨卦剛來而下柔初剛在二柔之下也咸卦男下女艮男在兑女之下也象傳屯初九以貴下賤初九貴六二賤而初九在六二之下也未有在其上而曰下者復之六二處初九之上而曰下仁與他處所言之例不合注家之意欲尊初九一陽之復不知中正之六二變剛為二陽之復尤可尊也頻復之厲義无咎也頻雖有厲復則能補過矣故於義為无咎也中行獨復以從道也道者所行之路也遵其故道而還曰復獨復者以其在五陰之中獨能從初九所行之道而上也敦復无悔中以自考也考成也程子曰五處中而體順能敦篤其志以中道自成可以无悔自成謂成其中順之徳迷復之凶反君道也反字與彖傳剛反同人象傳困而反則序卦傳窮上反下古文尚書乃反商政之反同上六之迷其失君道久矣其復者欲復反于君道也然為君之道甚難既失豈易復哉迷而後復雖欲反於君道其凶莫可救也傳三之二十四凡六十九字注豈易以豉切天下雷行此釋震下乾上也言普天之下雷之行无不徧而六合之内物之衆无不聞也案卦之有雷者凡十五二雷及與雲雨電風並者共七卦皆言其名而不言其處澤中地中雖言其處然无聲之雷也山下天上雖是有聲之雷然一則幽潛而未及一則亢極而已過至若澤上之雷間或有之而不常有皆非可以人間常聞之雷一槩論有其聲有其處人間所常聞者惟山上之雷出地之雷天下之雷三象而已山上出地之雷此處所聞他處不徧聞也雖二雷之洊其聲不過百里之逺唯天下雷行則是雷徧行於天下而无一處之不閉與風行地上之象同彼謂風徧行於地之上而无一處之不被也故唯二象以行字言物與无妄此重卦之名而加以物與二字者无二字則辭義不達也物兼人及動植而言普天之下雷皆徧行无一物不聞其聲聞之者雖庸愚之人莫不恐懼而心无妄思身无妄為有知无知之物一同驚駭振動而无有所私皆无妄也是物物而與之以无妄矣故卦名无妄先王以茂對時育萬物茂懋通勤勉之意上奉天時以行政令使无一民不得其所无一物不遂其生也天有四時萬物出乎震故時屬乾萬物屬震上之時而對之以在下之震下之物而育之以在上之乾无妄之往得志也得志釋吉字程子曰誠之於物无不能動以之修身則身正以之治事則事得其理以之臨人則人感而化以无妄而往无不得其志也不耕穫未富也富謂陽實也二陽未實往資於五以實之聖人慮其有妄求之心故以不耕示戒雖不耕而終必有穫者蓋以其未能如陽實之富必至有穫而後可以為富也項氏曰小畜九五富以其隣泰六四謙六四不富以其隣升上六消不富也皆以陽為富陰為不富无妄之六二進於陽矣但未純耳故曰未富也行人得牛邑人災也其得者无妄之福其失者无妄之禍以无妄之人居无妄之時災福非可以妄而致也可貞无咎固有之也六三之為无妄者已无一善可稱賴上下夾持之益而不至於妄若九四之可貞无咎則其剛實无私之善乃已固有之而非資於人者也无妄之藥不可試也試猶用也不可試者深戒其用藥治療也无妄之行窮之災也朱子曰上九非有妄也但以其窮極而不可行爾傳三之二十五凡六十二字天在山中此釋乾下艮上也天无處不有凡虚空處皆天也高山之下嵓洞之中隔絶人世而其中空曠可見日月有晝有夜方外之人謂之洞天者是為天在山中也大畜此重卦之名天至大之物而藏畜於一山之中是其所藏畜者大也故卦名大畜君子以多識前言往行以畜其徳識謂記之於心徳大於前言往行猶天之大於山也以外之所聞所見而涵養其中至大之徳猶山在外而藏畜至大之天於中也前言往行象山中寳藏之多徳象天之大有厲利己不犯災也程子曰有厲則宜已不犯災危而進也輿説輹中无尤也程子曰輿説輹而不行者葢處得中道動不失宜故无過尤也善莫善於剛中柔中者不過柔爾剛中中而才也初九處不得中故戒以有危宜已二得中進止自无過差故言輿説輹謂不能下行也利有攸往上合志也程子曰上九與三合志上進也六四元吉有喜也元徳之人能以隂柔遜其功有可喜者也六五之吉有慶也剛在外而主夫柔柔在下而遜夫剛剛柔俱有福慶也何天之衢道大行也天謂陽剛言湯剛之道得行也傳三之二十六凡六十二字識音志又如字往行下孟切山下有雷此釋震下艮上也山内為陽氣所包故多雷每遇天隂雨時山下懸崖絶深之處陽氣轟隠而出俗謂之雷是為山下有雷也頤此重卦之名山下嵓洞天隂雨之時雷聲殷殷在其中山側有穴如人頤口象而雷自中出騰騰以上於天是山下有口如人之頤為雷所出入之處故卦名為頤君子以慎言語節飲食人之言語自口出飲食自口入觀象於頤而慎節之者朱子曰諺云禍從口出病從口入項氏曰慎言語象雷之藏聲節飲食象山之生物澄謂卦體中虚象口而義則為養雷者氣也震在内而口向外故慎其自内出外之言語以養氣山者形也艮在外而口向内故節其自外入内之飲食以養形觀我朶頤亦不足貴也程子曰自我為可賤也項氏曰亦不足貴者示其本貴也六二征凶行失類也類謂初九同體比近乃其類也近舍初九而行求上九則失其類矣所求者非其類所以凶也十年勿用道大悖也大謂上九之陽六三小人不足以當君子之養與上九養賢之道相悖戾也顛頤之吉上施光也程子曰顛倒求養而吉者蓋得剛陽之應以濟其事致已居上之徳施光被于天下吉孰大焉居貞之吉順以從上也六五之但能居貞而吉者葢柔順以從上九而求養者爾非陽剛之才能自養且養人者也故不可以動而有為由頤厲吉大有慶也陽剛之大能養已以養天下已與人俱有福慶也傳三之二十七凡六十四字施申志切注殷倚謹切舍音捨澤滅木此釋巽下兑上也木生在澤木高澤卑澤水漲溢浸過木杪滅没其木則澤高出於木上而木低入於澤下矣大過此重卦之名澤之水滅没其木是水之大過於常時也故卦名大過君子以獨立不懼遯世无悶君子大過人之事其獨立不移也如木在水中挺特而不傾歌其遯世不見也如水過木杪淹没而不呈露不懼於内而无悶乎外猶木不動搖而任水之淹浸也蔡氏曰獨立不懼巽木象遯世无悶兑説象藉用白茅柔在下也柔而又在下故畏謹過甚老夫女妻過以相與也相與相應也二五皆陽本不相應因二變柔遂相應而為夫妻其相與之情過於常也棟橈之凶不可以有輔也車輻之弱則縛木於兩旁以為輔九三之有九二如車輻之有輔也可以培補橈處而三不受益輔九所施故云不可以有輔棟隆之吉不橈乎下也下謂初也不橈乎下謂不因下之弱而至於橈也葢九三之橈以在上正應之弱九四之不橈以在下正應之弱然三不得二之輔則遂以上之弱而橈四能得五之輔則不以上之弱而橈也象傳於三不言橈乎上於四不言有五之輔互相備也枯楊生華何可久也老婦士夫亦可醜也程子曰枯楊而生華安能乆乎老婦而得士夫亦為可醜也過涉之凶不可咎也與初皆為卑下以事陽者上六不幸而遇凶其无咎則與初一也傳三之二十八凡六十八字注下見賢遍切水洊至此釋坎下坎上也洊再也洊至者一水至又一水至也習坎此仍羲皇八卦之名而為重卦之坎上加習字以别於八卦之坎舉此一卦為例而離震艮巽兑五卦不復加者可類推也君子以常徳行習教事始終如一之謂常一再不已之謂習常習以象二坎之重徳行者徳之行教事者教之事徳行者一君之所進修九二如此九五又如此常其徳行也教事者二民之所視效初三如此四上又如此習其教事也習坎入坎失道凶也程子曰柔弱无愋而處不得當由習坎而更入坎窞失道也求小得未出中也一陽未能出於中而脱險陷變為小陰則成坤順故得所求來之坎坎終无功也用事則終必无功故勿宜用樽酒簋貳剛柔際也五剛四柔相交際而結好也坎不盈中未大也二五皆取剛變為柔之義蓋剛中而不能出險亦與柔隂同也九二之經曰求小得謂其求得而不免為隂柔之小也九五之傳曰中未大謂其居中而未能為陽剛之大也上六失道凶三嵗也失道謂民而敢乘君也傳三之二十九凡六十字樽酒簋下舊本有貳字案陸氏釋文无之今世所行張陸希聲皆同明兩作此釋離下離上也明謂大明日也作猶起也兩作者一明起又一明起也古人言十日並出自甲至癸為十日甲之旦一日出乙之旦又一日出為並出此言明兩作猶彼言日並出也離此仍羲皇八卦之名而為重卦之名大人以繼明照于四方大人者有大徳居大位之人繼者先後相續象二離之重明指中虚之二畫而言六二之明于下地六五之明又上於天二明相繼也四方者指四陽畫而言初為東三為南四為西上為北項氏曰繼明如言聖繼聖程子曰凡以明相繼皆繼明也舉其大者故以世襲繼照言之履錯之敬以辟咎也項氏曰邪正錯然並陳於前欲其敬者未論求福且欲辟咎也黄離元吉得中道也程子曰无吉者以得中道也不云正者離以中為重所以成文明由中也正在其中矣日昃之離何可久也程子曰日既傾昃明能久乎明者知其然故求人以繼其事退處以休其身安常處順何足以為凶也突如其來如无所容也亂臣賊子人人得而誅之无所容於天地之間必无幸也六五之吉離王公也繼明而照四方上則麗于一王之位下則麗于羣公之固王用出征以正邦也邦謂侯國征者所以正不臣順之邦也傳三之三十凡六十二字辟皮二切易纂言卷五
