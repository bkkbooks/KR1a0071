body:
  text: 易纂言卷十一元吳澄撰序卦傳羲皇六十四卦之序始乾終坤蓋竒畫耦畫之上每加一竒一耦二而四四而八八而十六十六而三十二以極於六十四乃其生卦自然之序非人所安排也後之易各因羲皇之卦而其序不同如連山之首艮歸藏之首坤不復可知其六十四卦之序何如矣始乾坤終既濟未濟者周易六十四卦之序也蓋文王既立卦名之後而次其先後之序如此皆以施用於人事者起義而夫子為之傳以發明其卦序之意或者乃疑其非夫子之作張子曰序卦不可謂非聖人之藴其間雖无極至精義大槩皆有意思今欲安置一物猶求審處況聖人之於易必湏布遍精密如是大匠豈以一斧可知哉有天地然後萬物生焉此言乾坤所以為上經之首也天地謂乾坤二卦盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也此言屯所以次乾坤也盈者窒塞填滿之意也始生艱難未能暢達如人欲吐未吐欲㵼未㵼窒塞填滿於中程子曰天地生萬物萬物之始生鬱結未通盈塞於天地之間故繼乾坤之後物生必蒙故受之以蒙蒙者蒙也物之穉也此言蒙所以次屯也程子曰屯物之始生穉小蒙昩物穉不可不養也故受之以需需者飲食之道也此言需所以次蒙也程子曰物之幼穉必待養而成養物之需者飲食也飲食所以潤益於物雲上於天有蒸潤之象故需為飲食之道飲食必有訟故受之以訟此言訟所以次需也程子曰人之所需者飲食既有所需爭訟所由起訟必有衆起故受之以師師者衆也此言師所以次訟也程子曰師之興猶有爭也衆必有所比故受之以比比者比也此言比所以次師也程子曰比親輔也既有衆必相親輔然後能安比必有所畜故受之以小畜此言小畜所以次比也程子曰物相比輔則為聚畜物畜然後有禮故受之以履履者禮也此言履所以次小畜也程子曰物之聚則有大小之别髙下之等美惡之分是物畜然後有禮禮人之所履也履而泰然後安故受之以泰泰者通也此言泰所以次履也程子曰履得其所則舒泰泰則安矣物不可以終通故受之以否此言否所以次泰也程子曰通泰之極則必否隔絶不相交通否也物不可以終否故受之以同人此言同人所以次否也程子曰天地不交則為否上下相通則為同人世之否與人同力乃能濟與人同者物必歸焉故受之以大有此言大有所以次同人也程子曰與人同者物之所歸物之所歸為大有之義有大者不可以盈故受之以謙此言謙所以次大有也程子曰有既大不可至於盈滿必在謙損有大而能謙必豫故受之以豫此言豫所以次謙也程子曰有既大而能謙則有豫樂豫者安和恱樂之義承二卦之義而為次也豫必有隨故受之以隨此言隨所以次豫也程子曰豫恱之道物之所隨以喜隨人者必有事故受之以蠱蠱者事也此言蠱所以次隨也程子曰喜恱以隨於人者必有事也无事則何喜何隨承二卦之義以為次蠱非訓事蠱乃有事也有事而後可大故受之以臨臨者大也此言臨所以次蠱也程子曰韓康伯云可大之業由事而生二陽方長而盛大為臨澄謂因蠱之有事而後有臨之盛大也物大然後可觀故受之以觀此言觀所以次臨也物之小者在下視之而不見必大而後可以觀也以臨卦二陽之大反易其體則大者在上矣故為在下四隂之所觀可觀而後有所合故受之以噬嗑嗑者合也此言噬嗑所以次觀也程子曰既有所觀然後有來合之者物不可以苟合而已故受之以賁賁者飾也此言賁所以次噬嗑也不執贄則不可以成賔主之合不受幣則不可以成男女之合程子曰物之合必有文飾也致飾然後亨則盡矣故受之以剥剥者剥也此言剥所以次賁也致其文飾而百嘉聚㑹則華美之極至矣盡矣程子曰極則必反故賁終則剥也物不可以終盡剥窮上反下故受之以復此言復所以次剥也程子曰物无剥盡之理故剥極則復陽剥極於上而復生於下窮上而反下也復則不妄矣故受之以无妄此言无妄所以次復也程子曰復者反於道也既復於道則合正理而无妄有无妄然後可畜故受之以大畜此言大畜所以次无妄也程子曰无妄則為有實故可畜聚物畜然後可養故受之以頤頤者養也此言頤所以次大畜也程子曰物既畜聚則必有以養无養則不能存息項氏曰需當物生之初如兒之湏乳苖之須溉故曰飲食之道頤當畜聚之極萬物交致其養故曰養也不養則不可動故受之以大過此言大過所以次頤也程子曰凡物養而後能成成則能動動則有過物不可以終過故受之以坎坎者陷也此言坎所以次大過也程子曰過極則必陷陷必有所麗故受之以離離者麗也此言離所以次坎也程子曰陷於險難之中則必有所附麗傳九之一章凡四百九字故受之以履下舊本无履者禮也四字韓註有之今案王弼略例引此四字蓋是後人誤以正文書作註字否備鄙切觀平聲註填音田上於時掌切之别彼列切豫樂音洛方長知兩切坎難乃旦反有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯此言咸所以為下經之首也夫婦謂咸卦先言天地萬物男女者有夫婦之所由也後言父子君臣上下者有夫婦之所致也有夫婦則其所生為父子由家而國雖非父子而君尊臣卑之分如父子也由國而天下雖非君臣而上貴下賤之分如君臣也禮義所以分别尊卑貴賤之等錯猶置也乾坤咸不出卦名者以其為上下篇之首卦特别異之程子曰天地萬物之本夫婦人倫之始所以上經首乾坤下經首咸恒也夫婦之道不可以不久也故受之以恒恒者久也此言恒所以次咸也程子曰咸夫婦之道夫婦終身不變者物不可以久居其所故受之以遯遯者退也此言遯所以次恒也程子曰久則有去物不可以終遯故受之以大壯此言大壮所以次遯也程子曰遯為違去之義壯為進盛之義遯者隂長而陽遯大壯陽之壯盛也衰則必盛消息相須故既遯則必壯物不可以終壯故受之以晉晉者進也此言晋所以次大壮也程子曰物无壯而止之理既盛壯則必進進必有所傷故受之以明夷夷者傷也此言明夷所以次晋也程子曰進而不己必有所傷傷於外者必反其家故受之以家人此言家人所以次明夷也程子曰傷困於外則必反於内家道窮必乖故受之以睽睽者乖也此言暌所以次家人也程子曰家道窮則暌乖離散乖必有難故受之以蹇蹇者難也此言蹇所以次睽也程子曰暌乖之時必有蹇難物不可以終難故受之以解解者緩也此言解所以次蹇也程子曰難極則必散解者散也緩必有所失故受之以損此言損所以次解也程子曰緩縱則必有所失失則損損而不已必益故受之以益此言益所以次損也程子曰盛衰損益如循環損極必益益而不已必決故受之以夬夬者決也此言夬所以次益也程子曰理无常益益之極必潰矣決必有遇故受之以姤姤者遇也此言姤所以次夬也程子曰夬判也物之決判則有遇合不合則何遇物相遇而後聚故受之以萃萃者聚也此言萃所以次姤也程子曰物相會遇必成羣聚聚而上者謂之升故受之以升此言升所以次萃也程子曰物之積聚而益髙大聚而上也故為升升而不己必困故受之以困此言困所以次升也程子曰升者自下而上自下升上以力進也不己必困矣困乎上者必反下故受之以井此言井所以次困也程子曰上升不己也而困則必反於下物之在下者莫如井井道不可不革故受之以革此言革所以次井也程子曰井之為物存之則穢敗易之則清潔不可不革者也革物者莫若鼎故受之以鼎此言鼎所以次革也程子曰鼎之為用變腥而為熟易堅而為柔水火不可同處也能使相合為用而不相害是能革物也主器者莫若長子故受之以震震者動也此言震所以次鼎也程子曰鼎者器也震為長男傳國家繼位號者也故為主器之主而繼鼎之後物不可以終動止之故受之以艮艮者止也此言艮所以次震也程子曰動静相理因静則有動動則有静物无常動之物不可以終止故受之以漸漸者進也此言漸所以次艮也程子曰進以序為漸今人以緩進為漸進止必有進止之所生亦進也所反亦進也進必有所歸故受之以歸妹此言歸妹所以次漸也程子曰進必有所至故漸有歸義項氏曰晉之義進而明也明之極必至於无進故有所傷漸之義不急於進其進以漸故得其所歸也得其所歸者必大故受之以豐豐者大也此言豐所以次歸妹也程子曰物所歸聚必成其大澄謂臨之大以其所臨之二陽為大豐之大以其卦名為盛大之義窮大者必失其居故受之以旅此言旅所以次豐也程子曰豐盛至於窮極則必失其所安旅而无所容故受之以巽巽者入也此言巽所以次旅也程子曰羈旅親寡非巽順何所取容苟能巽順雖旅困之中何往而不能入入而後說之故受之以兊兊者說也此言兊所以次巽也程子曰物相入則相說說而後散之故受之以涣涣者離也此言涣所以次兊也程子曰人之氣憂則結聚說則舒散物不可以終離故受之以節此言節所以次涣也程子曰物既離散則當節止之節而信之故受之以中孚此言中孚所以次節也程子曰節者為之制節使不得過越也信而後能行上能信守之下則信從之節而信之也有其信者必行之故受之以小過此言小過所以次中孚也項氏曰有其信猶書所謂有其善言以此自負而居有之也自恃其信者其行必果而過於中程子曰信則必行行則過也澄謂過者行動而踰越之也故大過云動小過云行凡行動未至其所為未及既至其所為至既至而又動又行則為踰越其所至之地而過也有過物者必濟故受之以既濟此言既濟所以次小過也人卑才智踰越於人為過程子曰能過於物必可以濟項氏曰大過則踰越常理故必至於陷小過則或可濟事故有濟而无䧟也物不可窮也故受之以未濟終焉此言未濟所以次既濟而為六十四卦之終也程子曰既濟矣物之窮也物窮而不變則无不己之理易者變易而不窮也既濟之後受以未濟則未窮也傳九之二章凡五百二字錯七路切難乃旦切解音蟹而上時掌切長子知兩切說音曰註之分扶問切分别别異竝彼列切隂長知両切吕氏大圭曰序卦之意有以相因為序如屯蒙需訟是也有以相反為序如泰否同人是也天地間不出相反相因而已易纂言卷十一
