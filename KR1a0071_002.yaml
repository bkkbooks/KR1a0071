body:
  text: 易纂言卷二元吳澄撰下經第二此篇起咸恆終既濟未濟對體之卦二反體之卦十六反體一卦為二卦總計三十四卦謂之下經艮下兑上七之二下之一經三隂否變主九三咸此羲皇艮下兑上之卦而文王名之曰咸咸交感也以少男下子少女男下女上男內女外夫婦之交惑也卦自否變三上相易否上下不交今三之隂升上而交乎陽上之陽降三而交乎隂交感之義也亨占也利貞占也取女吉占也其占亨又利于貞又為取女之吉占初六初之畫得六為成之革咸其拇象也拇足大指初下體之下拇之象初與四正應而四舍初將欲取近故初欲舉趾而往就四也有象無占六二六居第二畫為咸之大過咸其腓象也腓足肚也在踝之上膝之下足之中也二下卦之中故象腓腓隨股而動三為股二不能逺俟正應之五而近感所比之三故曰咸其腓凶占也感近而私從所比故凶居吉占也居謂止而不動以俟正應之來感不自動以感三也范氏大性曰六爻皆應所以為咸然諸爻皆舍應取近故雜卦云咸速也二取三則失正而凶止而待五之感則善故曰居吉居者艮止象九三九居第三畫為咸之萃咸其股象也四為身二為腓三在腓之上身之下股也二三四為翼亦為股腓隨股而動腓動則股動矣二感三而三亦感二故曰咸其股執其隨象也執猶詩執我仇仇之執謂係戀之也隨者隨從之人謂二也往吝占也三有正應在上乃下戀六二而又欲往就正應心二乎邪迹徇乎正可羞吝也崔氏憬曰二隨于巳志在所隨而遂往感上失義故吝九四九居第四畫為咸之蹇貞吉占也四居三剛之中下有正應故貞則吉悔亡占也處不當位宜有悔以貞吉故其悔亡毛氏璞曰易言悔亡自此爻始憧憧往來象也憧憧思慮不定貌變剛為柔則是內易所守而思慮不定也往謂四變為柔而上感五來謂五因四感而下感四也朋從爾思象也朋謂同類四五皆陽故以五為朋爾思猶逸詩所云豈不爾思爾謂四五為心思者五思四也四正應在初下感正應則貞吉悔亡若變為柔上感所比之五五朋來從其從者思爾之人也言私心之從非大公至正之感也九五九居第五畫為咸之小過咸其脢象也脢夾脊肉前與心對而稍近上五當心位而中正下與中正之二為正應咸之時欲速相感近感所比而不感正應二既欲不感五而感三五亦欲不感二而感上是不以其中正之心相感乃以其非心之處相感也故曰咸其脢無悔占也不以其中正相感故僅可無悔而已上六上之畫得六為咸之遁咸其輔頰舌象也兑為口輔頰在口旁舌在口中輔牙車之外頰之裏也頰兩臉輔之表也輔頰舌皆口之所以言者口有言則輔頰舌動也上與三正應三感二而舍上故上子口舌之間言之不已猶婦人之夫舍其配偶而二于他人故其婦有怨言責言也案咸卦六畫各有正應然咸感之時欲速感而不能久俟故諸爻逺舍正應而近取所比二感三三感二五感上皆舍其正應而所感非正四本無他感而變為柔以感五亦不正也唯初上二爻雖為正應所舍然其心不敢有他初在下故舉趾以往就于四上在上故滕口以怨責于三此二爻之德視諸爻為善爻辭無占者蓋二爻之德雖無凶悔吝之感而難必其得吉無咎之應也衛莊薑之為人妻楚屈原之為人臣其亦若此者與六畫俱六九為咸之損經彖辭凡七字爻辭凡五十一字取七具切拇芒茍切腓房非切憧昌容切脢芒杯切頰兼叶切注少詩詔切舍音捨後並同踝户瓦切隨從才用切處昌據切者與音余巽下震上五之四下之一經三陽泰變主初六恆此羲皇巽下震上之卦而文王名之曰恆恆常久也程子日咸少男在少女之下以男下女交感之義恆長男在長女之上男尊女卑居室之常論交感之情則少為深切論尊卑之敘則長當謹正故兑艮為咸而震巽為恆也男在女上男動于外女順于內入理之常故為恆也亨占也無咎占也程子曰恆之道可以亨恆而能亨乃無咎也恆而不可以亨非可常之道為有咎也利貞占也貞者正主其事不失其常也利有攸往占也卦自泰變陽自初往四恆非一定不易之謂故利有所往初六初之畫得六為恆之大壯浚恆象也恆者夫婦居室之常也內卦巽女為婦外卦震男為夫故爻辭內三爻言婦道外三爻言夫道浚掘而深之也初地之下有浚象婦道雖以卑巽而貴得中初巽體之下卦變自四降初卑巽而入居至下之處猶不居地上而掘地及泉婦之初歸以此為常才弱志卑退處深入內職不修者也貞凶占也卑巽之至不能正主事者也故凶無攸利占也雖不正主事亦無所利內之三爻初不及三過唯二得中也九二九居第二畫為恆之漸悔亡占也婦以柔順為正二以剛居內卦之中中得婦位而剛非婦德有悔者也然應五之柔蓋賢婦配懦夫夫之才弱其剛也不得已以濟夫之不及而又居柔則剛柔適中而非過于剛也故其悔亡九三九居第三畫為恆之解不恆其德象也一與之齊終身不改此夫婦常久之道婦居中主饋常久不變者也德謂食物詩言既飽以德是也三以剛居剛位不在中婦之悍戾遭出者不得常其主饋之職故曰不恆其德或承之羞象也或者無所指定之辭或嬖妾或賤人不知其為誰非可主饋者也承以手奉而進之也羞食之加饌非正饌也主饋者既出不得以職其職或人非可以主饋而代之所承而進者又非正饌皆非常也貞吝占也非可以主饌之人而正主事其可吝也九四九居第四畫為恆之升田無禽象也國風女曰雞鳴之詩曰特翺將翔弋鳬與鴈弋言加之與子宜之蓋弋獵於外者夫之事烹飪於內者婦之職四震男之初卦變自初升四為外卦之主而居不當位夫不夫矣爻位四為上卦之地故曰田不成坎象故曰無禽田無禽者弋獵於外而無所獲無以供中饋之烹飪也居柔失夫之剛蓋無才而非有惡也故不言凶悔吝六五六居第五畫為恆之大過恆其德象也外卦之中夫之正位互卦兑女之終居之女歸夫家終其身唯酒食是義故曰恆其德貞婦人吉夫子凶占也柔中婦道之善故如此而正主事者在婦人則吉若夫子則凶蓋五位以震男居外卦之中而為夫然柔非男子所宜也上六上之畫得六為恆之鼎振恆象也振者于終而奮迅也上震動之極然柔而不夫久矣今變柔為剛不安于弱而欲奮迅於終以為常凶占也質本柔也乃變為剛而奮迅于終是欲強其才之所不能也烏能變弱而為強哉故凶六畫俱六九為恆之益經彖辭凡十字爻辭凡四十七字恆胡登切浚荀閏切振之刃切注少詩詔切長知兩切掘權月切處昌據切饋權位切悍侯玩切奉父勇切饌泰戀切烹丕庚切飪忍審切迅音信強其其兩切艮下乾上七之一下之二緯二隂辟主六二遁此羲皇艮下乾上之卦而文王名之曰遁二隂長而消二陽夏正六月之卦也二隂浸長而四陽退避之也王氏弼曰柔長故剛遁劉氏牧曰逃內而之外也亨占也此占謂四陽也時當遁而遁所以亨也小利貞占也此占謂二隂也隂得時得志故小者利于正主事初六初之畫得六為遁之同人遁尾象也四陽在前遁去而初之一隂最在後如獸之尾故曰遁尾厲占也隂道雖長然四陽尚盛初以在下隂柔敵之危之道也戒隂之進使之知所畏憚不敢前進以消陽也勿用有攸往占也止于初而不進以逼陽則庶乎可免矣故戒以勿用有所往也此卦本謂四陽去以避隂之進而聖人設教又欲隂勿進以避陽之盛其意深逺矣六二六居第二畫為遁之姤執之用黃牛之革莫之勝説象也執謂拘留之也二下卦之中為黃坤為牛而上畫變成艮是牛外之皮變矣故為革隂之勢浸長欲其留止勿進故拘執之以黃牛之革使之不可解説而去聖人慮隂之長而欲遏其進也如此九三九居第三畫為遁之否係遁象也隂浸長陽當避之而三與二比有所私係故曰係遁有疾占也隂侵陽疾也厲占也治疾者去隂邪則瘳矣今係戀于隂則疾不除故為有疾而危厲畜臣妾吉占也以三之陽係戀于二之隂施之于畜養臣妾則吉也臣妾謂下二隂初位剛臣也二位柔妾也九四九居第四畫為遁之漸好遁象也隂消陽之時而四應初與之和好故曰好遁三與二私比也故為係戀四與初正應也故為和好君子吉小人否占也雖有和好亦宜避去唯君子見幾之明避禍之決乃能如此故吉若小人則必昵于情好而不善矣否不善也九五九居第五畫為遁之旅嘉遁象也五與二中正相應如嘉耦然雖嘉耦亦當避之故曰嘉遁四與初皆不正故其相應謂之好言以情合也五與二皆中正故其相應謂之嘉言以禮合也貞吉占也遁之時好與嘉皆不當顧唯當遁去四不正未必能遁故兩開君子小人之端五中正故正主事而吉言不以嘉耦而係其志也上九上之畫得九為遁之咸肥遁象也上卦乾三陽四五皆應隂唯上無應無私昵之纍則心廣體胖故曰肥遁無不利占也遁宜在人先上九遁之先也遁去而最先脫然無所纍遁之最善者故其占無不利六畫俱六九為遁之臨經彖辭凡五字爻辭凡五十七字勝音升説吐活切好虛到切否音鄙注長知兩切解音蟹去音邪起吕切瘳音抽纍郎遂切胖音盤乾下震上一之四下之二緯四陽辟主九四大壯此羲皇乾下震上之卦而文王名之曰大壯四陽長盛消隂已過其半夏正二月之卦也大謂陽也壯強盛也陽長至四大者強盛故曰大壯利貞占也陽壯盛故利于正主事遁二隂長則小者利于貞大壯四陽盛故大者利于貞也初九初之畫得九為大壯之恆壯于趾象也初陽居剛當陽壯之時猛于前進故曰壯于趾征凶占也恃陽之壯盛而猛于前進非善處壯者也故以征則凶有孚占也四為壯之主牽聨四陽以進以同德同位而孚于初志在同進也九二九居第二畫為大壯之豐貞吉占也以剛居中中而不過故不恃其壯以之正主事則吉也九三九居第三畫為大壯之歸妹小人用壯君子用罔占之戒辭也以陽居剛而不中過于壯者也故戒之曰小人乘時恃勢則用其壯君子則不然故用其罔罔無也勢雖壯盛而不自恃慊然若無也貞厲占也剛過而不中以正主事則危羝羊觸藩羸其角象也大壯者復體之兑九三變為柔則下卦又成兑兑為羊羝牡羊也陽之壯盛故象羝羊羸傷損也九三過用其剛如羝羊之喜觸九四剛畫在前如藩籬然進而觸之必羸毁其角大概陽盛之時不宜過剛二居柔得中則吉初與三以剛居剛則占皆不吉也聖人雖喜陽之進盛而猶抑其太過以示教戒也九四九居第四畫為大壯之泰貞吉占也以剛居柔善處壯者也故以貞則吉悔亡占也居不當位本當有悔為其以柔濟剛而處壯故其悔亡藩決不羸象也變為柔則二三四成兑為羊五當四前其畫斷而不連如藩籬決開不至羸羊之角壯于大輿之輹象也坤為大輿四當坤體之下以剛承上輿下之輹也剛畫故壯四為壯之主爻以柔濟剛而進如大輿之輹強壯而可以行也六五六居第五畫為大壯之夬喪羊于易象也三四五互兑為羊五變為剛則非羊矣易謂疆場邊界將盡之處也上乃疆之盡處而五近之故為易謂喪其羊于疆場之間也無悔占也象曰喪羊而占乃云無悔者謂羊若羣行而隂狠乘身則悔無隂狠所以無悔上六上之畫得六為大壯之大有羝羊觸藩不能退不能遂象也三四五互兑為羊成羣狠進六五變剛則非羊矣故其爻辭曰喪羊其不變則羊之狠進者自若上六之柔變為剛如藩籬之當其前羊很進既不能退前阻于藩又不能遂其進也無攸利占也狠進不能遂故無所利艱則吉占也能知其艱難而不狠進則可以言吉六畫俱九六為大壯之觀經彖辭凡四字爻辭凡七十六字羝音低羸力追切輹音服喪息浪切易音肄注長知兩切為其云偽切坤下離上八之三下之三緯四隂觀變主六五晉此羲皇坤下離上之卦而文王名之曰晉晉進也離日出坤地之上進進而麗于天中卦自觀變四之柔進居五在下之衆民進而仰觀在上之文明故為晉也康侯用錫馬蕃庶晝日三接占也坤臣道也日君象也下坤進而上瞻離日有諸侯朝貢天子之象離日下照坤土有天子禮接侯國之象康侯安康之侯猶考工記所謂寧侯也錫下錫上也猶納錫大龜禹錫玄圭之錫蕃庶多也案覲禮享之時匹馬卓上九馬隨之故曰蕃庶侯馬蕃庶皆以坤取象六五離日當中天之位故曰晝日三接者王接侯之禮覲禮延升一也覲畢致享升致命二也享畢王勞之升成拜三也三四五互坎三坎數也初六初之畫得六為晉之噬嗑晉如摧如象也推抑退也柔順居下力弱難進將進而又抑退故曰晉如摧如貞吉占也順德不急于進唯自以正主事故吉罔孚占也四為正應而不與之孚故曰罔孚裕無咎占也裕饒益也心泰無不足之意人雖罔孚處之泰然不急于求孚而終必得其孚故無咎六二六居第二畫為晉之未濟晉如愁如象也進而無應于上故愁以隂居隂前後皆隂隂盛多慘有愁之象貞吉占也中正故正主事而吉受兹介福于其王母占也介大也五君位以隂居尊王母之象爾雅曰父之妣為王母以六二而言六三之隂在已上猶母也九四之陽尊于母猶父也六五之隂又尊于父猶王母也二與五德同位應進而感格于五猶順孫之享王母王母降介福于二而二受之也朱子以此為享先妣之吉占六三六居第三畫為晉之旅衆允象也坤為衆允與通進也三在坤衆之先率衆同進故曰衆允案易中以允字為象者二此爻及升初六也説文引升初六爻辭為升其字從本從少諧允聲本者進趨􅋄亦進而上徹之意古者鐘鼎銘用諧聲字多只用偏旁蓋從省也此爻允字亦當依説文所引升初六之辭作乃叶象義悔亡占也居不當位宜有悔也然坤順之極前導二隂進順乎上衆進而進故其悔亡九四九居第四畫為晉之剝晉如鼫鼠象也鼫與碩同子夏傳鄭氏皆作碩説者因鼫字指為五技而窮之鼠遂謂之螻蛄失于僻矣碩大也二三四互艮象鼠九陽畫為大鼠畫伏夜動四近天子之光以剛居柔值大明當空之晝畏而不敢進故為鼫鼠貞厲占也四之象如此而正主事其進乃危行也六五六居第五畫為晉之否悔亡占也柔居尊而不當位宜有悔也以中故悔亡失得占也有失者可得位在中而隂畫虛喪失其中所有之象然隂畫居陽位隂為無陽為有無而有失者可得之象勿恤占也又戒之以勿勞于憂恤往吉占也往上則遇剛以濟柔故吉無不利占也承上文往字言得剛濟柔則于事無所不利上九上之畫得九為晉之豫晉其角象也角剛而在上之物以剛居上故象角維用伐邑占之事也三四五互坎有維繫象伐者離為甲胄戈兵之象邑者下卦坤所象也進貴乎柔進之極而以剛居上但可因下人之維繫用之以伐畿內未順乎上之邑而已厲占也位髙故危吉占也民之心服故吉無咎占也以吉故無咎貞吝占也剛伐進極僅可用之以伐邑雖吉而無咎正主其事者亦可吝也六畫俱六九為晉之需經彖醉凡二十字爻辭凡七十一字蕃音煩推罪雷切鼫音碩注朝音潮勞力到切音允本音滔􅋄音徹省所梗切傳直戀切螻音樓蛄音姑離下坤上三之八下之三緯二陽臨變主六二明夷此羲皇離下坤上之卦而文王名之曰明夷夷傷也字與痍通日入地下掩蔽其明而不見若有傷之者然故曰明夷利艱貞占也明者遭傷艱難之時也利于艱難而正主事初九初之畫得九為明夷之謙明夷于飛垂其翼象也明夷者明而遭傷之人謂六二也六二明夷之主爻初九六二九三所謂明夷者皆指六二而言于飛謂自二升三也卦自臨變臨之九二升為九三而成明夷初畫若變為柔則自初至五有飛鳥之象三象鳥身初二四五象鳥翼以小過飛鳥之象擬之鳥翼皆是耦畫明夷之初為鳥翼而其畫竒又居地下之位是鳥翼之傷合而不開下垂于地者也鳥之善飛者直翅而上明而遭傷之人如鳥方飛而初之翼下垂向地不能直翅以戾天也此象為六二卦主言非為初九一畫言也君子于行三日不食占也此占乃專就初九一畫言君子謂初行謂道路初與四應六四互震之中畫為大塗于行謂自初適四也二三四互坎其數三無兑口故不食六二明夷之主明而遭傷垂翼不能去初與二同體亦當靜處以俟出而在路欲就正應必至飢餓三日而不得食明夷之時皆不宜動六二中正能自守者初以剛居剛其志不能不動故其占如此有攸往主人有言占也往謂往二二為卦主故曰主人初九逺適四則有三日不食之厄近往二則二以其不宜動而動故亦有言也六二六居第二畫為明夷之泰明夷夷于左股象也明夷謂六二左股謂九三二之爻位在人身為股互震下畫為左九三者六二之左股也六陽二明夷之主而九三之遭傷者傷于左股也蓋九三之乃六二之所以為明者而自二升三逼近坤體受其掩蔽卦之名為明夷正以九三之明遭傷也故曰明夷夷于左股六二為離日之中虛非其受傷之處九三為離日之外明傷者掩蔽其外明也故明之遭傷専指九三言之用拯馬壯吉占也拯救也九三為六二之左股雖遭傷然九三陽剛在六二之前互震初畫為馵足作足之馬互坎中畫為美脊亟心之馬如危難之中用以拯救而得強壯之馬蓋九三雖遭傷而能拯救六二明夷之主也九三九居第三畫為明夷之復明夷于南狩象也明夷謂六二三為南之位卦變自二升三故曰南狩如升之卦變自初升三而曰南征也狩者四時田獵之通名非專言冬也得其大首象也大謂三之陽上畫為首三與上應上者三之首也故曰大首明夷之人狩于南而得大首謂能得上六也説者以武王伐紂之事譬之不可疾貞占也狩獵之事宜武勇乃能有獲正主事者不可示疾疾則怯弱而損威強春秋時用師者曰擐甲執兵固即死也病未及死豈敢言病奈之何其以病敗君之大事蓋亦此意若鄭人侵衛而疾作不可以執弓則不可也故曰不可疾貞疾者隂柔之為患六二明夷之主而以柔居柔然至此之時外既用九三之剛則中不可以復主于柔也故戒其不可疾蓋文王遵養時晦之時可以柔武王是用大介之時不可以柔也上帝臨汝無二爾心今日之事有進無退牧野之師王杖鉞麾旄師尚父鷹揚將士如虎貔熊羆豈可以疾貞哉六四六居第四畫為明夷之豐入于左腹象也自外來內曰入入者五入之左腹者四也互震中畫為左四之爻位在人身為腹此言六五下交于四也獲明夷之心于出門庭象也下卦明夷之人謂六三上卦明夷之人謂六五也五柔順得中而無應四與五比四腹五心也三四五艮之反體艮為門闕五在門闕之外門外之庭也五來比四為入于左腹自內往外曰出四往比五為獲明夷之心于出門庭獲心猶詩言實獲我心謂稱彼之心也明夷之時遍地昏暗以一卦言則上坤傷下離之明以各爻言則唯上六居暗極而傷九三之明若六四六五皆有柔順之德五中四正為以柔順中正相親比而處于昏暗之世其譬則微子箕子各敷心腹以相告語自靖人自獻于先王者也五箕子四微子也六五六居第五畫為明夷之既濟箕子之明夷象也以箕子之賢而為紂所囚明而遭傷者也六五居中而柔順以自晦箕子之佯狂為奴似之故曰箕子之明夷五之位與離日中畫之虛相應明也居坤暗之中夷也利貞占也猶彖辭之利艱貞也上文有明夷字即艱之義故此不言艱上六上之畫得六為明夷之賁不明晦象也明指九三而言九三為離日之明上六與之應相應乃相傷者也九三之明為上六所掩蔽故不明而晦也初登于天後入于地象也上六能用九三正應之明則九三之明往以應上而登于天矣天謂上也儻若商紂能用文王為三公文王之明上登于天如兩相暉映然則文王之明即紂之明耳惟其不然文王之明入于坤地之下則羑里之囚不相應而相傷矣非不明晦乎六畫俱九六為明夷之訟經彖辭凡五字爻辭凡八十九字拯之逞切注痍延知切翅施智切象為非為云偽切明處昌據切馵音注危難乃旦切擐音患復主扶豆切稱昌證切離下巽上三之五下之四緯八純兑變主六二家人此羲皇離下巽上之卦而文王名之曰家人卦自兑變三往易四上來易二上體成長女下體成中女二女各得正位而有其夫家家人者其夫也五為巽女之夫居三畫卦之人位三為離女之夫居六畫卦之人位故曰家人利女貞占也宜于女人正主事者以二女之主爻皆得正位也初九初之畫得九為家人之漸間有家象也卦之初泛言治家之始事艮為門闕初艮之下畫而連亘如以木拒門為間有家者防間之于初則為力易古語曰教子嬰孩教婦初來間之于初也悔亡占也男女同處不免有悔自初間之則其悔亡案家人卦初上二爻以卦之初終取義中間四爻分上下二體取義下體在下之家也以有家之臣而言三為夫二為婦上體在上之家也以有天下之君而言五為王四為后不取逺應為配而取近比為配者家道尚親也舊説以二五相應為夫婦皆與各爻象義不協六二六居第二畫為家人之小畜無攸遂象也禮大戴記曰婦人從夫無所敢自遂也六二柔順中正上承九三剛正之夫婉娩聽從無或專行者也在中饋象也居中而主饋者婦人之職故曰中饋中謂二居下卦之中饋者二三四互坎二變為剛則二三四互兑有飲食象貞吉占也以六二柔順之德在于中饋之婦如是而貞其事則吉也九三九居第三畫為家人之益家人嗃嗃象也九三下體之上一家之長也故稱家人嗃嗃嚴酷貌字與熇通如火之炎熾也離火上畫以剛居剛過剛不中故象嗃嗃悔厲吉占也悔者追恨其非而有欲改之意治家過嚴則傷恩能改悔則雖厲而吉婦子嘻嘻象也婦謂二子謂初嘻嘻歎聲字與嘻通苦熱痛呼之聲也亦于離火取象項氏曰家人治家者也婦子其所治者也治家失道而強威嚴行之如谷風之有洗有潰小辨之維其忍之使為婦為子者嘻歎怨讟則不可嗃嗃嘻嘻只一意非相反之辭嘻嘻二字在詩之噫嘻禮之嘻其甚矣左氏傳之嘻嘻出出陽虎從者曰嘻皆為歎懼之辭終吝占也上文謂改悔其嚴酷則雖厲而吉此占為不改悔者言范氏大性曰治家雖不可縱弛茍過乎嚴而或近乎酷致婦子之間常聞愁恨之聲斯賊恩之大者故終吝也六四六居第四畫為家人之同人富家象也陽實為富謂九五也九五王也六四后也后所處乃王之家也王之家富有四海以天下為家者故曰富家大吉占也大者陽也亦謂九五六四柔順得位王后之賢者也不敢有其吉而以其吉歸之九五娥皇嬪虞塗山氏相夏大姒邑薑興周此舜禹文武之吉也九五九居第五畫為家人之賁王假有家象也王九五也剛中正居尊位天子之能正其家者假至也字與格通如舜格于文祖公假于太廟之假有家與初九有家同朱子謂如夙夜浚明有家之有非奄有四海之有范氏大性謂此言有家猶革渙言有廟項氏謂王假有家王假有廟言王至于家王至于廟也澄謂王入廟祭告則為假于有廟退朝適寢則為假于有家舜在牀琴文王雍雍在宫之時也勿恤吉占也聖人心正身修齊家特其餘事外治內治靡不修舉故至于有家不待夏恤而吉也上九上之畫得九為家人之既濟有孚占也上九以陽實居最上之位在下者皆以誠心相應也威如占之象也身容整肅下皆望而畏之也陽剛嚴敬非隂柔寬弛者故威如終吉占也此卦之終總言治家之終事下皆有孚而又畏之治家之道如此至終而吉非特暫焉之吉而已六畫俱九六為家人之解經彖辭凡五字爻辭凡五十五字饋巨偽切嗃黑各切嘻喜悲切假庚白切注長知兩切亘居鄧切易以豉切洸音光潰胡對切讟徒谷切辨音盤嬪皮賓切大姒音泰朝音潮兑下離上二之三下之四緯八純巽變主六五睽此羲皇兑下離上之卦而文王名之曰睽睽目不相視兩情乖異也火上澤下兩相背戾二女同居各異所歸故曰睽小事吉占也陽大隂小睽以六五為主睽異之時隂柔主事故小事則吉大事則不吉也初九初之畫得九為睽之未濟悔亡占也無應當有悔自處得正而無求于外故其悔亡喪馬勿逐自復象也言所失之馬不待追覓而自還坎為馬睽之下體兑也坎下畫之柔為兑下畫之剛則坎體失故為喪馬初變為柔則坎體復故為勿逐自復見惡人無咎占也見謂目所視也二三四互離為目在初之外而接乎四見也非往見之見人而不仁疾之已甚則致亂九四剛強不正而為敵應惡人也目不相視為睽初四雖敵應不相與而初之待四無睽異之情故目常見之不與之絶所以免于咎也九二九居第二畫為睽之噬嗑遇主于巷象也主謂五也巷者里中之道離中虛有巷之象二與五正應睽異之時難于遇合又兩皆不正二往就五與之遇于里巷之間也當睽而遇則情不睽矣無咎占也當睽之時正應之情不睽故無咎六三六居第三畫為睽之大有見輿曳其牛掣象也二三四互離六三互離之中畫有目故能見三四五互坎為輿曳謂從後拖曳之而車不得進也説卦傳坎之象其于輿也為曳牛謂引車之牛互離為牛掣謂以手控制之而牛不得行也六三當坎輿之後欲往應上九而柔弱不能前進若或曵其輿然九四當離牛之前剛強為梗阻隔六三之進若或掣其牛然夫牛之引車車在牛後此則三四五之坎稍前于離牛二三四之離反却于坎輿故有輿曳不進牛掣不行之象其人天且劓象也其人謂三即乘輿服牛之人也三當人位故曰其人天去須之刑劓割鼻之刑上體離有頤象三在其下須也三變為剛是去其須矣故為天艮為鼻九四在六三之上以剛畫易劓艮之下畫艮之下體不具如鼻之下端遭傷也故為無初有終占也三之輿牛初雖曳掣而不得合于上九然正應終必合也故無初而有終九四九居第四畫為睽之損睽孤象也四當睽時一陽介二隂之間獨處無朋故曰睽孤遇元夫象也九四初九敵應不相與者然九四居柔變為柔而應初則如婦人失其配偶而忽遇元夫元夫謂初夫也猶元配之元四隂位初陽位故四以初為夫交孚象也隨之初九九四敵應相與故初以四為交睽之初九九四亦敵應相與故四以初為交四下遇初初上孚四故曰交孚初者四之交友也四雖以元夫視初初則唯以交友自處也厲占也孤而無應故危無咎占也同德相應而不孤則無咎也六五六居第五畫為睽之履悔亡占也項氏曰初以在下不與世事而悔亡五以柔進上行得中應剛是以悔亡厥宗噬膚象也此象及下占皆為應爻九二言之宗謂六五也六五一卦之主猶宗子為衆兄弟之主也二為五之正應而五其宗也故曰厥宗二應五而四隔之所以睽也二至上有頤之象四梗于其間猶噬嗑卦之頤中有物九二剛畫猶頤之下齒能噬者也然于九四非比非應勢不相及故不噬強梗之四而唯上就正應之五六五互坎之外體而柔如豕膚之柔而易噬故曰噬膚往何咎占也四雖剛強然可以害五不可以梗二二不往外則已往則必合于五矣豈九四所能梗哉故曰何咎上九上之畫得九為睽之歸妹睽孤象也上剛而與柔比亦睽之時而獨處者也故象與四同見豕負塗載鬼一車先張之弧後説之弧象也上九離明之極故能見豕鬼車弧皆坎之象六三互坎下畫為上九之應九四互坎中畫為六三之梗坎下隂畫水旁土也坎中陽畫地中水也四之水溼三之土為塗泥六三坎豕居于兑澤體有坎土四以坎水溼之如豕之背負泥塗也六三坎輿之下畫上載九四于坎輿之中九四坎月之魄為鬼一車者陽實之體充滿車中也一亦坎數四與三近而不相得九四以剛險陵下而欲傷三故其先張弧而射之六三以柔説承上而獲免禍故其後説弧而不射匪冦婚媾象也冦婚媾亦坎象九四説弧六三不為所梗則上九正應之睽可合矣故上九謂六三非異己之冦乃同己之婚媾也往遇雨則吉占也雨亦坎象六三之往應上九也歷四歷五四不為三之梗而與三和如隂陽之和而雨則六三之往也無所隔礙可以上合于上九矣所以吉也六畫俱九六為睽之蹇經彖辭凡四字爻辭凡九十二字而舊本作天安定胡氏謂當作而蓋古篆而與天字體相似而誤也睽苦圭切喪息浪切復音服曳以制切掣尺逝切劓魚器切説吐活切注背音佩夫牛音扶去須起吕切不與音預易噬以豉切射食亦切柔説音曰艮下坎上七之六下之五緯八純震變主九五蹇此羲皇艮下坎上之卦而文王名之曰蹇蹇者行步艱難之名有險在前止而不進故為蹇利西南占也凡爻位初為東三為南四為西上為北卦變蒙蹇自震而變屯解自艮而變蹇解之變以三四二畫相易其義為往來于上下體交際之處故蹇解二彖其占為行者利往來于西南二方也若屯蒙之變以初上二畫相易其義為往來于上下體窮盡之處不若西南在上下二體交際之處為利也不利東北占也初東山下之窮處止之最下者也上北水外之窮處險之最極者也故行者不利于東北二方也利見大人占也九五剛中正大人也六二在下為正應往而見之則利貞吉占也五當位二三四上亦當位故正主事而吉也初六初之畫得六為蹇之既濟往蹇來譽象也蹇之六畫唯初四不相應其餘皆有應然蹇跛不行之時難于逺取正應卦中四畫相往來者皆近取比爻也卦上坎下艮故宜來而不宜往往則遇險來則可止故也初六最在下有可往無可來故爻辭以六二言之六二中正有譽者也往比三則近上體之險而蹇來比初則其止最先去險最逺而可保其譽也六二六居第二畫為蹇之井王臣蹇蹇匪躬之故象也九五王也六二王之臣也蹇蹇蹇而又蹇也由下體之蹇歷上體之蹇故曰蹇蹇二往應五近阻九三之山已為蹇矣再前則阻六四之水蹇而又蹇也六二之蹇者以三之故蹇而又蹇者以四之故四為躬六二中正守道安命而不尤人不以蹇而又蹇歸尤于四故曰匪躬之故子思子曰素患難行乎患難上不怨天下不尤人其斯之謂與九三九居第三盡為蹇之比往蹇來反象也反猶窮上反下之反陽自下升初起于下而動為震升及于中而陷為坎升極于上而止為艮九三艮之上畫升極而止者也三往比四則涉上體之險而蹇來比二則是既止于上而復反于下以逺險也六四六居第四畫為蹇之咸往蹇來連象也連猶連諸候連橫之連六四上體九三下體上下異體不相連屬者也四往比五則陷坎險之中而蹇來比三則與下體連屬而依艮止之安也九五九居第五畫為蹇之謙大蹇象也大謂陽也卦自震而變震初之陽往外易五而陷坎險之中大者蹇也朋來象也朋謂九三卦唯二陽九三與九五同類故曰朋震四之陽來內易三而居艮止之上故曰來九五之往外者雖蹇而九三同類之來內者得止則可幸也上六上之畫得六為蹇之漸往蹇來碩象也上六最在外有可來無可往故爻辭以九五言之九五陽剛碩大者也往比上則冒坎險之極而蹇來比四則近下體之止漸將脫險而可保其碩也吉占也此占為九五言也諸爻雖以來為善而不言吉者蹇之時得免于蹇為幸何望其吉也唯九五居尊位剛中正有濟蹇之才以身蹇而未能𢎞濟自處得宜身漸脫險則可圖濟天下之蹇矣故吉利見大人占也此占為上六言也五為大人上六利于見之彖辭之利見九五者六二在其下而往見也此爻辭之利見九五者上六在其外而來見也六畫俱六九為蹇之睽經彖辭凡十四字爻辭凡四十五字蹇紀免切注屯職倫切解音蟹之處昌注切跛彼可切患難乃旦切謂與音余屬之故切為九為上云偽切坎下震上六之四下之五緯八純艮變主九二解此羲皇坎下震上之卦而文王名之曰解解謂分釋其糾結也雷動于上雨降于下則鬱結解人動乎險之外則險難解也利西南占也卦自艮而變三往易四四來易三四西也三南也行者利往來於西南之方也無所往其來復吉占也艮之上極于卦外無所往矣則來而反復于內以易二也故曰其來復吉有攸往夙吉占也艮之二處于卦內猶可有所往也則往而出居于外以易上也上居六畫之前猶一日之朝也故曰夙吉初六初之畫得六為解之歸妹無咎占也為難者四隂也而二陽解之九二解之主也初六之柔居下近比九二得中之陽順從之而不復為難解之最先者也故無咎九二九居第二畫為解之豫田獲三狐象也二地之上田也坎為狐下卦為坎三四五又互坎二坎有三隂為三狐田之獲謂能取之而已其害也九二比初比三而應五故能獲三狐也三狐皆為九二所獲則隂之難解矣得黃矢象也黃者中之色矢之齊五分其金而錫居二以柔濟剛也九二以剛居柔而不過于剛故象矢九二所以解三狐之難者以其得黃矢也黃矢者得中而不過剛也貞吉占也得中而不過剛故正主事而吉蓋解隂之難不尚猛烈潛化服之使之順從而不為難所以吉也六三六居第三畫為解之恆負且乘致冦至象也六三上承九四猶負重任也下乘九二坎為輿猶乘乘車也負擔之人而復乘乘車處非其據必有劫奪之者故致冦至冦自九四而言也至謂自外而內也九四亦上卦解隂之主豈可謂之冦三四五互坎故象冦也卦之正體則三為下坎之上畫三狐之一也即負四乘二者也卦之互體則三為互坎之下畫九四之民也為四冦三者也互坎之下畫就居六三之位奪其所據柔變為剛以君子易小人不使小人乘九二之輿也六三隂類之狐九二既獲之彼不能為害矣雖乘九二九二不與校也蓋九二剛而中是以能容之九二者九四同類之朋而為六三隂柔所乘故九四使其民冦奪六三而易其類蓋九四剛而不中是以不能容之也案九四射上六則稱公奪六三則稱冦何也上六不服從九四者也九四與九二同為解隂之難者射而獲之正也六三已服從九二者也負乘之僭誠有可罪置而不問不失為容德九四奪之固當然田廣已下漢而韓信復進襲臨災項羽已歸太公而漢軍復追至垓下其成功雖偉帝王之兵則不如是所以亦謂之冦與貞吝占也六三為九二所獲隂之難既解矣但以柔乘剛為九四所惡是以遭冦奪也其占正主事則可吝若難未解之時而六三之所處如此則凶矣奚止于吝而已哉九四九居第四畫為解之師解而拇象也二陽解四隂之難茍有所私係則難不解矣拇謂初六初者四之正應而汝也指四而言謂初爻汝之拇也能解去之然後為無私係也朋至斯孚占也朋謂九二至鳥飛自上而下至地也卦變艮上之陽自上而下易二故曰至四不私于初則九二同類之陽孚于四也二陽同解四隂而九四或私于其所應之隂則同類之朋不能無疑也六五六居第五畫為解之困君子維有解象也君子謂九二維坎象謂初三二隂維絡中畫之陽也九二為初三二隂所維而能解去之不以近比而有所私也吉占也九二不私于近比所以吉也有孚于小人占也六五有九二之孚也小人謂六五蓋九二不私于初六六三之近比故其誠足以感六五之心而六五亦誠服也上六上之畫得六為解之未濟公用射隼于髙墉之上獲之象也公謂九四震為長子公候之象故曰公三四五互坎為三公柔變為剛則四五上成離為矢有弓矢故用射隼隂鷙之物謂上六也上天位六鳥象之飛而戾天者初三五之隂在地在人間故象狐上之隂在天際故象隼也二三四互離有墉象九四居卦之上體互離之三畫故為髙墉之上獲之者上柔化剛為矢之鏃離矢發于九四之手而達于上六之翼柔畫化剛猶以矢鏃之實貫鳥翼之虛而獲之也初之一隂最在下九二解之甚易上之一隂最在上九四解之甚難故于卦終而後能獲之也繫辭傳謂之待時而動則非如初六之易解矣無不利占也初六六三六五于九二為比為應力之所及故九二能獲之上六一隂于九二非比非應力之所不及故九二不能獲之也九四上六雖不近比然同在上體上柔化剛為九四之離矢矢能及上故上六為九四所獲也上六隂柔小人據髙恃逺最難獲者也今能獲之則四隂俱為二陽所獲而隂柔之難無不解者矣故其占為于事無所不利也六畫俱六九為解之家人經彖辭凡十六字爻辭凡六十三字解音蟹拇而茍切乘平聲射食亦切隼筍準切注險難乃旦切後同不復扶豆切而復復進復追同齊才詣切乘車成證切為四云偽切冦與音余所惡烏路切鏃子木切甚易易解以豉切甚難如字傳直戀切兑下艮上二之七下之六經三陽泰變主六三損此羲皇兑下艮上之卦而文王名之曰損損謂減殺之也凡陽為有餘隂為不足殺陽之有餘以補隂之不足卦自泰變損三之陽益上之隂故取損下益上為義有孚占也六三孚上九也卦體內外實而中虛似中孚損下益上民孰不疑其厲己然當損之時而損在下者以為當然故誠心應上而無疑也元吉占也六三卦之主居下卦之上元也當損而損故吉無咎占也六三不當位咎也以合時之宜故得無咎可貞占也柔非能正主事者合時宜則亦可也利有攸往占也卦變三往益上故利有攸往曷之用二簋可用享占也上五占以六三上九言此一占以初二四五言用者得此占而用之于此事先為問辭曰曷之用乎答云所用者二簋也雖二簋而亦可用之以享祀蓋用于損之時為宜也下卦兑為食六三饋食之主也初二在六三之內象二簋陽實為黍稷實于簋初應四二應五象二簋以享祀上之神二簋盛黍稷禮之甚薄少者然當減殺之時則薄少為宜故可用享也二兑數初九初之畫得九為損之蒙己事遄往占也初在下而與四應以下陽益上隂己止也事所自作為之事陽動喜作為初在下蓋止其所作為之事而速往以益四也無咎占也初九陽動喜于作為蓋有用之才而能遄往以求為上益此處下之道也故無咎酌損之象也四受初之益如以器挹取初之有餘而損之也九二九居第二畫為損之頤利貞占也宜自守其中以正主事也征凶占也二三四互震為大塗有征行之象二當自守不當征行上就六五也弗損益之象也二與五應當自損以益五然五雖柔而居剛非不足者二雖剛而居柔非有餘者故二弗損已唯以中相應自可益五也案初九九二皆是以下卦之陽益上卦之隂者而爻辭之意相反初必自止其事而速當上往就四二宜自貞其事而不可上征就五初之益四則損已而益之二之益五則不損己而益之蓋初以陽居陽二以陽居隂故不同也六三六居第三畫為損之大畜三人行則損一人一人行則得其友象也卦自泰而變泰下卦三陽三人行也減三陽之一以益上損一人也上之一隂來易三一人行也三上相交而得上九之益得其友也三人位故曰人行亦于互震取象友能益己者也九自三往上而為六之益六自上來三而受九之益故上為三之友也六四六居第四畫為損之睽損其疾象也凡損卦皆是損下益上初剛好作為此有餘之疾也四酌而損之取初之有餘益已之不足是損初之疾也其指初而言使遄有喜占也疾則有憂疾愈則有喜四損初益已是使初之疾愈而遄有喜也無咎占也四居上能取在下之賢以益己故無咎有喜屬初無咎屬四六五六居第五畫為損之中孚或益之象也五受二之益故二益之或者不為必然之辭也十朋之龜弗克違象也古者五貝為一朋王莽時改兩貝為一朋十朋之龜一龜直五十貝大寶龜也弗克違謂龜謀從己自之吉也自二至上肖離有龜象然因陽自三往上而成此象故十朋之龜専指上九而言謂二儻益五則非但二益之而上亦從其謀也元吉占也居三隂之上元也所應之二所比之上皆益之所以為元之吉也上九上之畫得九為損之臨弗損益之象也九自三而往益上者既往益上又還益六三之柔其于益上也不損下而自能益之無咎占也益上而下不損故無咎貞吉占也此爻三占與彖辭同但彖言可貞爻言貞吉為異彖以六三言隂柔之貞可而已上九陽剛之貞則吉也利有攸往占也因三往上而有所益故利有攸往得臣無家象也成卦由三上相易上九居上為君六三在下為臣自三而言則三得上為得友自上而言則上得三為得臣也凡臣之有家者公則利其國私則利其家未免不專于奉上三獨隂居下專意奉上臣之無家而專于為國者也故曰無家謂不有其家也賈誼曰為人臣者國爾忘家六畫俱九六為損之咸經彖辭凡二十一字爻辭凡八十字已事音以遄市專切注殺所戒切饋食音嗣盛音成好虛到切為國云偽切震下巽上四之五下之六經三隂否變至初九益此羲皇震下巽上之卦而文王名之曰益益謂增補之也卦自否而變上損九四之陽下益初六之隂故以損上益下為義利有攸往占也二之柔中正往應五之剛中正也利涉大川占也自初至五有舟之象初九初之畫得九為益之觀利用為大作占也初自四來益下為益之主凡益下之事必大有所興作陽居震動之初大作者也元吉占也為益之主元也大有所興作以益民故吉無咎占也大作者益下之事而非勞民動衆也故無咎六二六居第二畫為益之中孚或益之象也二受五之益益之謂五也益六二即損六五也故爻辭同十朋之龜弗克違象也二得益于初而初至五有龜象十朋之龜指初九而言謂五當來益二則非特五益之而初必從其謀也永貞吉占也六隂也故有永貞之戒謂能永久正主事則吉也王用享于帝吉占也王謂五二地上也祭天掃地而祭因吉土以饗帝于郊九五降心在二猶王者于地上享帝能致帝之來格也故吉六三六居第三畫為益之家人益之象也凡益皆損上益下初九自四來益下六四受初九之益而易位居上此己益者也五上在上之二陽當益二三在下之二隂此方益者也九五能益六二而上九不能益六三六三在下體當其益者也故曰益之然非上九益之乃自能益之也何以能自益六之質隂也隂雖不足三之位陽也陽為有餘故六三能自益也用凶事無咎占也凶事謂喪禮也六三既無外乘之益而唯以已所自有為以此而用之于凶事則無咎也凡他事皆可待人之益喪禮有禭賵賻贈亦資人之益者然或偶無人益則急遽不暇于營求唯當隨其見在所有以供事蓋親喪當自盡于已而不當取辦于人稱家之有無可也茍無矣斂手足形還葬無槨人豈非之乎有孚占也初九孚六三也六三既不受上九之益初九為益之主與六三同體其剛實之誠能感六三者也中行告公用圭象也中者三居六畫卦之中也行者震為大塗之象公謂初九初九孚于六三故六三在中路而告初九以致歸嚮求益之意臣之告君用圭以通信如禹告治水成功則以玄圭錫帝也圭指六二言震為圭六二震之中畫也能為六三通信于初九三與初在下卦雖同體然非比非應必因六二以通其信六二外比六三而下近于初則二乃初九之近臣也故六三用二為圭以通信于公六四六居第四畫為益之無妄中行告公從占也中者六畫卦中之位也行者與初九畫互易而居其位也九陽自上益下而下居初六隂自下受不易而上居四六四與初九為應而交相為益者茍有所足則于中路告公而公從之也三四二爻皆中中行告公謂居六畫卦中之位不親造公所而使人告也四與初正應故其告公也公從其所告三與初非正應又非近比故其告公也必因六二為圭以通其信不敢必其從也故三不言從而四不言用圭也利用為依遷國占也凡遷國必有所依左氏傳謂周之東遷晉鄭焉依是也故曰依遷國初四相易各去其位故曰遷二三四互坤國之象陽君也隂民也六二六三國之舊民不遷者四遷于初而依六二遷國之君也初遷于四而依六三新遷之民也故此爻之占利用之以依于人而遷國九五九居第五畫為益之頤有孚占也此言六二孚九五也五下益二故二孚于五惠心象也惠者懷其恩也五為心二孚于五而惠九五益之之心也勿問占也問即繫辭傳問焉而以言之問勿問者不待占筮也元吉占也五之德與位皆為元不待占筮而知其吉也有孚占也此言六二孚初九也惠我德象也六二不但有孚于九五而惠九五之心又有孚于初九而惠初九之德初為卦主故指初為我初剛實六二所食者故曰德二五相應應逺故惠其心初二相比比近故惠其德也爻辭言九五所應之六二因及六二所比之初九六二爻辭亦言六二受九五之益而又得初九之弗違與此爻辭之意同上九上之畫得九為益之屯莫益之象也上九當下益六三而不能益之故曰莫益之或擊之象也擊者虐害之也三四五互艮為手有擊之象上九之于六三非徒不能益之而或又虐害之故曰或擊之立心勿恆占之戒辭也立如三十而立之立謂固守之也五為心而在上九之內立心者固守其在內之心也恆常久不變也益之上下二體互易為恆恆與益相悖者也故戒之曰立心勿恆如此而不變也凶占也茍恆如此不益民而害民則民莫之與而或傷其君凶之道也六畫俱九六為益之恆經彖辭凡九字爻辭凡九十字注禭音遂賵方貢切賻符遇切見在賢遍切稱昌證切斂力檢切還音旋能為云偽切造七到切傳直戀切悖音佩乾下兑上一之二下之七緯五陽辟主九五夬此羲皇乾下兑上之卦而文王名之曰夬五陽長盛而消隂將盡夏正三月之卦也夬決也五陽決去一隂也揚于王庭象也髙舉在上曰揚推播在前曰揚王謂五庭謂上五王之居也上六在王居之前王之庭也一隂處于五陽之上故曰揚于王庭猶詩言在前上處也孚號象也孚謂九五孚于上六也號號呼也一隂在五陽之上處不自安孤立將亡而與五比故號呼以求援于五然小人失勢則祈哀乞憐于其所親厚之君子及稍得志則傾害君子不遺餘力君子豈可因其號呼而遽信之哉有厲占也此占為九五言也九五夬之主先四陽以進而與所決之一隂比近茍以狎昵之故信其號呼遂不察其中心之狡而哀憐之則危矣有厲者今雖未危將有危之漸也或以此占為言上六非也上六將亡矣爻辭謂之終有凶奚止于有厲而已哉告自邑象也兑口有告之象卦自坤變坤為邑坤之五隂變為陽僅存坤上六之一畫邑之削小者也告自邑將以起徒役然邑小民寡雖告何為不利即戎占也范氏大性曰兵戎乃用衆坤為衆乾變坤至五則幾于無衆矣故不利即戎利有攸往占也往指九五言九五往而上進則為純乾矣初九初之畫得九為夬之大過壯于前趾象也卦以五陽決一隂乾三陽兑二陽乾健兑説彖傳言健而説決而和和者剛柔適中也健而且説二者不偏如此決之而後和偏于健則剛過而鄰于暴矣偏于説則剛不及而流于懦矣下體健者也初三剛居剛而不中有過而暴之失九二雖健體而居柔得中故不暴上體説者也九四剛居柔而不中有不及而懦之失九五雖説體而居剛得中故不懦爻辭于初三之壯則戒其過于四之次且則勉其不及二雖健而惕懼五雖説而夬夬唯其中故能無過無不及也項氏曰夬初至四大壯也加九五一爻而成夬下四爻與大壯相似初之壯趾二之以中三之用壯四之悔亡是也丁氏易東曰四陽為壯五陽為夬大壯初九曰壯于趾此曰壯于前趾因大壯而言也澄案初為趾四在下卦三陽之前而與初趾同位前趾謂四之位也初九居一卦之下急于前進以決上六之隂故用其勇壯欲超升大壯四陽之位以近九五而決上六也故曰壯于前趾往不勝為咎占也勝謂勝其任壯于前趾勇往也往而不勝其任則為咎矣戒之之辭也九二九居第二畫為夬之革惕號象也惕警懼也剛中實故能惕號指上六而言九二得中不過剛故當五陽勢盛之時聞上六之號呼待盡猶且警懼也莫夜有戎象也二地上之位日至地上將入地下莫夜之時也戎者二變為柔成離有戈兵之象勿恤占也能警懼則知戒備矣故雖莫夜之時卒有兵戎之變亦不用憂恤也九三九居第三畫為夬之兑壯于頄象也頄面顴骨謂上六也夬之三即大壯之三其壯也猶大壯之小人用壯壯于頄者言其勇壯及于上也三與上應當夬之時應爻乃其所欲決者猶噬嗑之時應爻乃其所囓噬者也有凶占也隂固當決去然待其時以其漸則不勞力不傷己三剛居剛恃其勇壯以下淩上非十全之道故有凶君子夬夬象也剛居剛而不中為小人之壯若君子則不如此矣夬而復夬其決柔之意未嘗止息然不恃剛過壯也獨行遇雨若濡象也君子不必絶小人之交而去之自有其道夬五陽而九三獨與上六一隂應隂陽和為雨故有獨行遇雨而濡之象若語辭猶言而也濡謂為其所沾濡九三變為柔則三四五上肖坎象雨象濡有愠占也獨為上六所濡中有含怒之意而欲決之無咎占也雖欲決之然決之而和故無勞力傷己之咎也九四九居第四畫為夬之需臀無膚象也四居上體之下為臀膚在臀下而柔者四乘九三之剛其下不柔臀無膚也其行次且象也以剛居柔又為説體當同進決柔而其進不勇故曰行次且牽羊象也兑為羊羊羣行九四兑之下畫羊之在後者九五兑之中畫羊之在前者也牽謂牽聨而進四隨九五以進為牽悔亡占也次且本當有悔九五陽長之主如羊羣之在前四在五後牽聨而進以決柔則其悔亡此勉其進也聞言不信象也四變為柔成坎坎為耳然四爻剛實塞而不虛耳之不聰者也言謂流言遺言之言信實也四既不聰故所聞流言不謂其實也九五九居第五畫為夬之大壯莧陸夬夬象也項氏曰莧音丸土羊也陸其羣行之路猶鴻漸于陸之陸澄案項説是也莧字上從草羊之角也中從目羊之目也下從凡象羊之足莧字諧莧聲舊誤作莧從草從見竟解作草名羊羣之行山牽而前引之牧于陸九五變為柔成大壯為互體之兑象羊之羣行五在其前猶莧之行山路故曰莧陸夬夬者行而不息也五變成震為大塗陸之象中行象也中行者所行之路至中半也未中半為不及過中半為過五居上卦之中不過其半中行之象無咎占也五在上體中得中則不恃剛而過亦不比隂為不及故無咎上六上之畫得六為夬之乾無號象也上當兑口故為號呼之象彖之孚號上向五而號也二之惕號二聞上之號也夫以五陽上進一隂豈能久存而猶號呼者所謂將死之鳴臨絶之音也其終也上六變為純乾則一隂消亡而無復號呼之聲矣故曰無號無有無之無非禁止之無終有凶占也卦之終一隂消亡不復能存故曰有凶也六畫俱九六為夬之剝經彖辭凡二十字爻辭凡七十六字夬君邁切號平聲後同勝音升莫音暮頄求龜切臀徒敦切次七私切且七餘切莧户官切注為九云偽切説音曰傳直戀切卒七率切顴音權囓擬結切復夬扶豆切無復不復同陽長知兩切丸户官切羖音古巽下乾上五之一下之七緯一隂辟主初六姤此羲皇巽下乾上之卦而文王名之曰姤一隂初生于地下而消一陽夏正五月之卦也姤遇也一柔遇五剛也女之邂逅而與男遇為姤女壯象也下巽為一索之女女生之最先者陽長至四畫然後為壯姤一隂初生而曰女壯何也蓋初隂雖微與四為應己足敵四畫之壯陽矣故曰女壯勿用取女占也一隂初生己能消陽故戒之以勿用取此女也初六初之畫得六為姤之乾繫于金柅象也柅以止輪金者喻其堅也坎為輪坎之上爻為剛畫是以堅剛之柅柅其輪也剛畫為金金柅指九三而言金柅止輪之行于前而又繫其輪于柅之後則輪不可動矣初象輪之後牙柅之于前三也繫之于中者二也以象固止初隂使不得前進如是則可無隂長消陽之患矣貞吉占也使初隂止而不進正主事則吉也有攸往見凶占也初隂往而進以消陽陽勢猶盛往則不敵必見凶也此亦戒初六使不進也羸豕孚蹢躅象也羸瘠也蹢躅不靜也坎為豕坎上畫之柔為巽上畫之剛則坎之外體變矣柔象肉剛象骨坎外之柔為剛如豕之外體無肉而有骨也故為羸瘠之豕孚謂初六孚于九二也微隂雖孚應于陽而其中未易制伏如羸形之豕雖暫孚而猶懷蹢躅之心也蓋坎之外體雖變而其內體不變如豕之外形雖羸而其心常不靜也聖人為戒之意深矣九二九居第二畫為姤之遁包有魚象也初與四為正應而與二比近故先為二所有古人魚肉包之以草詩曰野有死麕白茅包之是也魚隂物謂初二能得之猶包苴之中有此魚也二陽畫連亘有包之象巽為魚魚者巽下畫之隂也無咎占也蔡氏曰遇雖非正當遇之時故可無咎不利賓占也初卦之主四對之故為賓乾亦為賓賓主相對遇之正也九二以近比而得初九之遇則初不復往遇于正應之四矣故其占為不利于賓也九三九居第三畫為姤之訟臀無膚象也四為臀三在四下剛而不柔猶臀之無膚也此三四比近而二剛不相得之象其行次且象也三與四既不相得四欲下行與初六正應相遇而為三所阻隔故其行次且姤之九三即夬之九四故其象同行次且者九四以陽居隂故行次且舊注以為三之行者非夬九四之行欲上決一隂也姤九四之行欲下遇一隂也厲占也三以剛居剛過剛而不中居下之上故危無大咎占也三之自處雖危然下能柅初六之上進上能阻九四之下行不使隂進遇陽而消陽也有防微杜漸之功故于陽剛之道為無咎九四九居第四畫為姤之巽包無魚象也初者四之正應而為二所得故二之包中有魚而四之包中無魚也起凶占也己之正應與他人遇猶男之失其配君之失其民也今雖未凶凶由是起矣九五九居第五畫為姤之鼎以把包瓜象也下巽為木二巽之中畫其位與五位之天同象木之髙聳參天者也故為把瓜地下之瓜隂物也謂初六二與初遇包而有之猶把木之葉下包其瓜也九五剛中正居尊與九二之位應二之得民猶五之瓜得民也二把包初瓜以之者五也故曰以把包舍章象也九五變為柔與二正應而藏二三四之三陽在內故曰含章也有隕自天象也五之剛中正在上在下者皆欲遇之然初六九二非比非應無由得而相遇今五變為柔以應二比四而包含三陽之章于內則三因四之比初因二之應皆得以遇于九五如有物自天而隕于下也九五天位隕于下謂與下相接而為在下者所遇也上九上之畫得九為姤之大過姤其角象也剛而在上者角也至姤之終下之所遇者如角之剛也吝占也前不可進剛而能觸竟何為哉故吝無咎占也處時之窮非己有咎也六畫俱六九為姤之復經彖辭凡七字爻辭凡六十八字姤古豆切取七喻切柅乃履切羸力追切蹢直戟切躅直録切注索所白切陽長知兩切隕云隱切麕蠲囷切不復扶豆切蓏即可切坤下兑上八之二下之八緯四隂觀變主上六萃此羲皇坤下兑上之卦而文王名之曰萃萃聚也兑説為澤坤順為衆為地在上以説臨其下民聚于下以順其上澤者水之所歸澤滿溢而上于地則澤不受水而衆流之歸皆聚于地上故為萃王假有廟象也王謂九五艮為廟二三四互艮六二艮之下畫廟之內也五下應二是王者至于有廟聚己之精神以聚祖考之精神也利見大人占也五陽剛中正為大人四隂聚而歸五利見大人也亨占也大人能聚天下之衆美者也利貞占也能致亨則宜正主事矣用大牲吉占也大牢為大牲少牢為次牲特牲為小牲下坤為牛上兑為羊三四五上肖坎為豕三牲具也利有攸往占也六二上應九五為往物聚而衆多則宜備禮人聚而衆多則宜出外損之時則用二簋而可萃之時則用大牲吉屯之時則勿用有攸往萃之時則利有攸往各順其時也初六初之畫得六為萃之隨有孚占也四以説道聚民而與初應故有孚于初不終占也四位不當故其孚不終乃亂乃萃若號象也初以四之孚不終故其志擾亂與三隂相聚而號呼以求四之孚初柔變為剛成震故有聲而號一握為笑象也初之號衆皆笑之一握猶言一團二三四爻互艮為手艮數一故曰一握二三象手之指能握笑者蓋二三笑之三為兑口之倒而向下者故能笑初之號勿恤占也雖為衆所笑然所求者正應故戒之以勿恤往無咎占也勿恤衆笑上往求四則無咎也六二六居第二畫為萃之困引吉占也二聚于下而順上五説乎上以聚下中正相應然二柔居柔懼其易變故戒之以引而至于長久則吉無咎占也能引而得吉則無咎也孚乃利用禴占也孚謂六二之誠孚于九五也禴者夏祭之名舊説相承以禴為薄祭蓋宗廟四時之祭春祠夏禴秋嘗冬蒸其孝誠一也物則隨時而有厚薄之殊秋之時萬物成熟故秋嘗之物豐冬蒸則彌豐春之時萬物始生故春祠之物殺夏禴則彌殺卦位五為天上卦之中也上為北五者日行天中而近北夏之時也故凡禴祭之象皆以五而言二之順五以其中正而已然隂虛非實故為之戒云必其誠實先孚于五乃可于萃聚用大牲之時而利于用夏月薄物之祭以事其上蓋誠既先孚則在上者不疑其簡也項氏曰羣聚之時為禮當厚必如二五之交信在其中而後外可略也六三六居第三畫為萃之咸萃如嗟如象也三與下二隂萃于下而上無應故嗟歎不得志六三兑口之倒體能嗟無攸利占也往無咎占也三雖無應而比近九四之陽茍能往而上求九四則可無咎小吝占也若但安于隂小而不上往求陽則吝矣九四九居第四畫為萃之比大吉占也四應初下臨三隂之聚可以得民矣然位不當而其孚不終蓋雖陽而居隂故也若如九五之以陽居陽則吉矣四雖陽畫而非陽位必陽畫居陽位而後為大也凡九居二者雖中而非大中必九居五則畫與位俱陽而謂之大中此大吉之大猶大中之大無咎占也能如九五以陽居陽之大則吉乃可無咎也九五九居第五畫為萃之豫萃有位象也萃之時陽畫居陽位故曰萃有位無咎占也匪孚占也二為五之正應然以柔居柔隂虛不實或未能孚于五也故曰匪孚二之爻辭以為必能孚于五而後利于用禴亦因二之不足于孚而戒之也元永貞悔亡占也九五以陽居陽其占固為無咎矣然儻木能得二之孚則當有悔必有元以長人之德永久貞其事則其悔乃可亡也大抵聚而衆多之時慮其不可以久故二以引長而後吉五以永貞而後悔亡皆欲其久而不變也上六上之畫得六為萃之否齎咨涕洟象也齎咨者嗟歎之聲涕目液洟鼻液兑口有聲三四五上肖坎有液上自四升上為萃之主以柔居柔不敢當天下之聚故不安于居衆人之上而至于齎咨涕洟可謂懦而無立者矣無咎占也説極而致天下之順聚雖柔懦不安無傷于萃也故無咎六畫俱六九為萃之大畜經彖辭凡二十字爻辭凡七十四字舊本卦名下有亨字程子曰羡文也陸氏曰馬鄭虞陸續並無此字朝氏曰王昭素謂當無假庚白切號平聲禴羊略切齎將兮切洟音夷注説音曰少牢詩照切殺所戒切長知兩切巽下坤上五之八下之八緯二陽臨變主初六升此羲皇巽下坤上之卦而文王名之曰升升上進也萃與升皆自坤取義萃者兑之一隂説而為主于上故坤之三隂順而聚于二陽之下升者巽之一隂入而為主于下故坤之三隂順而升于二陽之上又地氣上騰木生地中日進而上故曰升元亨占也元以二陽之大而言四隂巽順而應之故亨用見大人勿恤占也升者萃之反萃九五在上之大人三隂萃而在下者利往見之升九二在下之大人三隂升而在上者降而來見則可勿恤言其無憂也南征吉占也卦自臨變初三相易一陽在初上進居三三南也故于南方征行則吉也初六初之畫得六為升之泰允升象也説文引此爻之辭允作進也諧聲字本義存聲從省作允升自臨變升之初六本臨之六三也臨六三之隂下退于初而進初九之陽以上升于三也故曰允升大吉占也大指三之剛畫而言臨之初與三易位故剛得上進以升于三居下體之上而吉也九二九居第二畫為升之謙孚乃利用禴象也二剛中而應五然五柔未易速孚故必俟既孚于五而後乃利用禴也禴者宗廟之禮薄于常時者蓋升其誠意于上以誠不以物也無咎占也誠孚于上而後用禴則上不疑其簡故無咎九三九居第三畫為升之師升虛邑象也臨之三四五互坤為邑柔畫耦為虛三自初而升以實臨三之虛故曰升虛邑六四六居第四畫為升之恆王用亨于岐山吉占也王謂九三二三四互兑兑西方坤為國邑西方之山在國邑之內者岐山也山地示隂神也兑上畫隂也以象岐山之神九三兑之中畫為王九三之陽升其誠意于上之隂神祭山之占也隨上六王用亨于西山亦以九五兑中畫為王上六兑上畫為山之神無咎占也三四之相得以近比非以正應有咎也然九三之誠上升于四以合乎坤之順故無咎六五六居第五畫為升之井貞吉占也二剛中而應五五階之而升故正王事則吉升階象也二之升至五如升階然坤三耦如地勢之自下而髙也故象階上六上之畫得六為升之蠱冥升象也上天上之位也在青冥杳冥之上而隂又昏暗故曰冥升利于不息之貞占也位在上則為冥升位之升不可過髙也唯進德不息而正主事則利蓋德之升愈髙愈進其升無已時也六畫俱六九為升之無妄經彖辭凡十二字爻辭凡五十三字用亨許兩切注説音曰音允示與祇同坎下兑上六之二下之九緯三隂否變主九二困此羲皇坎下兑上之卦而文王名之曰困困窮瘁也字象木在囗中四面不得通達二之一剛為初三二柔所掩四五二剛為三上二柔所掩蔽塞其前後無由通達故為困亨占也卦德內雖有險而外能説故雖處困而可以亨貞大人吉占也卦自否而變上之陽下居而為困之主剛中之大人也正主事者以此大人則吉無咎口也困之時有此大人貞其事而吉乃可無咎有言不信占也兑口在上有言之象以言傷人而其言誣毁不實不能困人也初六初之畫得六為困之兑臀困于株木象也卦唯初四有應臀謂四也三四五至巽為木木下曰本木上曰末木中曰朱字正作朱後人加木為株朱為木之中身也四為巽木之中畫故曰株木四欲下拯初而不能來猶臀之困于朱木而不能動也入于幽谷象也在卦之內故為入地下之位故為幽水注溪曰谷坎水之下故為谷以柔居下在困之初不得正應之助故入于幽谷不能自拔以出于困也三嵗不覿象也三坎數也幽谷之中雖三嵗之久不能上覿四之正應也九二九居第二畫為困之萃困于酒食象也坎為酒兑為食九二處坎中畫應兑中畫得中而以酒食優遊自養者也在困之時他無所困但為酒食所困而已朱紱方來象也三四五互巽為股三又股之位也二三四互離為牛二以離牛之革蔽于巽股之下紱之象也朱者赤黃之色坎之色赤中之色黃坎之中畫居下卦之中為朱紱卦變九自否之上來二故曰方來利用亨祀占也朱紱者祭服之紱也困于酒食之時而上之人方且賜以祭服之紱故利于用之以亨祀征凶占也困之時居中自養可也征行則失其中而凶矣無咎占也以其得中能固守不動雖有咎可無咎也六三六居第三畫為困之大過困于石象也坎中畫之剛為石三在石上為石所困也據于蒺藜象也據者居其上也謂居坎之上畫也蒺藜之象亦坎也坎之上六曰置于叢棘即此蒺藜也入于其宫象也三互離之中畫中虛象宫不見其妻象也三陽位夫也其畫柔夫之柔邪者也上隂位三之妻也三雖有離目能視然妻在離宫之外柔與柔不相應夫與其妻隔絶故不得而見也凶占也此爻之辭蓋謂困若拘囚之人六三隂柔不中正猶周官所謂罷民也困于石其坐諸嘉石者與據于蒺藜其置之圜土而薦之以棘者與入于其宫不見其妻則雖暫時還家而其妻已離異隔絶也國語云罷士無伍罷女無家蓋古法凡坐嘉石入圜土之罷民則離異其夫妻而不使之有室家與凶者傳所謂既辱且危而死將至也九四九居第四畫為困之坎來徐徐象也來謂下應初徐徐者以居柔而其行不勇也困于金車象也坎為輪為輿金者剛物九四坎之下畫也剛而成兑金如以金錮其車輪也雖堅固而不利轉行之所以遲也故曰困于金車吝占也下來拯初而重滯不速故吝有終占也不速雖可吝然終必能下與初應也九五九居第五畫為困之解臲卼象也臲卼髙而不自安之象五居互巽之上畫巽為髙居髙不安故臲卼困于赤紱象也赤紱者二也五既居髙不安九二在應位而非正應故不能為助而反為繫纍故為困于赤紱乃徐有説象也二既不應而五之中正能自處雖有所繫纍而能徐徐説去之也利用祭祀占也赤紱常繫于身雖困人而用之以祭祀則為宜故利用祭祀陸氏曰祭一本作享程子曰享祀祭祀泛言之則通分言之則祀天神祭地示享人鬼澄案帝天神也而亦言亨禴人鬼也而亦言祭難以分言二五爻辭宜同陸氏别本作享為是上六上之畫得六為困之訟困于葛藟象也三四五巽木也上六以柔纒繞于巽木之上葛藟之象故為困于葛藟于臲卼象也九五巽之上畫既髙而不安上六又處九五之上愈髙愈不安矣故為困于臲卼蒙上困字故不復言困曰動悔有悔占也二悔字之義與豫六三同上居困之極圖欲離去曰者兑口之言也其言若曰自處未善故困今當動而改悔然雖如此亦不免于有悔也征吉占也若能征行則離于困矣故吉蓋曰動悔者言之虛也征者行之實也茍徒有其言而不勇于行則亦何能離困哉六畫俱六九為困之賁經彖辭凡十二字爻辭凡九十五字九五爻辭臲卼舊本作劓刖陸氏曰荀王肅陸續作臲卼鄭云當為倪仉朝氏曰倪㐳即臲卼之省文也與上六字同臲五結切卼五骨切有説吐活切注囗音圍説音曰罷民音皮下罷女同者與家與音余傳直戀切離去離于離困來至切巽下坎上五之六下之九緯三陽泰變主九五井此羲皇巽下坎上之卦而文王名之曰井井人取食水之所巽木下入而取坎水至上故為井改邑不改井象也卦自泰而變上體坤也為邑泰初易五坤地之中畫降初而坤邑變成坎水此邑之改也泰五易初而初二三四肖坎坎水在下為井之象二三之陽畫井水也而二畫不改易此井之不改也無喪無得占也占者無所喪亦無所得蓋邑雖改而實無減損故無喪井不改而非有增加故無得往來井井象也又以卦變往來取象初上往五而成坎體井水之至上者也五下來初而初二三四亦肖坎體坎水之在下者也剛上往而成上之井柔下來而成下之井故曰往來井井此句上下二象汔至亦未繘井象也此申言往而至上之井汔幾也繘者汲水之綆井卦三陽畫象水以水之至上者而言九五之水至坎中畫未至坎上畫雖幾于至而水猶未出井口也亦與未繘井同羸其瓶象也此申言來而在下之井羸損傷也瓶者汲井之甕以水之在下者而言二三之水實在汲井之甁而下一畫耦猶甁底傷損而水下漏凶占也此占専為羸瓶而言初六初之畫得六為井之需井泥象也井以陽剛為泉隂柔為土初六隂柔在水之下故為泥不食象也居卦之下井在卑下之地而淺者也有泥無水而不可食逺于兑口不食之象舊井無禽象也不為人所食則為荒廢之井故曰舊井井在卑地者禽鳥或食其水杜詩鸕鷀窺淺井是也泥而不可食不但為人所棄雖禽鳥亦不下顧坎禽象也在上而不來下故曰無禽九二九居第二畫為井之蹇井谷象也九二陽剛象井中之水井水上出而不下流初六耦畫象谷在九二之下下流不塞而水泄于下之象水之下注者谷也故曰井谷射鮒象也鮒謂小魚亦指初六初六巽下之隂象魚水既下注惟衝射以活小魚而已故曰射鮒甕敝漏象也甕汲水之器即彖所謂瓶也九二剛畫中實象水實甕中初畫耦象甕之敝舊而下漏者二無應于上而水不上出故其象如此九三九居第三畫為井之坎井泄象也九三剛居剛居下之上井之泄治清潔者不食象也二三四互兑三在兑口之下故有不為人所食之象為我心惻象也我心謂九五九五井卦之主故稱我居心之位惻者為之動心也以九三之泄而不見食故九五之心為之惻然閔其不見用于時也蓋卦唯九五九三以剛居剛為可食之清泉九五居上體在兑口之上人所食者也九三居下體在兑口之下人所不食九五所以為之而惻也可用汲占也如三之清泉可汲以食也王明並受其福申占之意仕進者遇王之明則必見用而賢入與衆人俱受其福王五也三四五互離為明賢者為明王所用則賢者得行其道天下得被其澤猶井之為人所食而有益于人也九五能以九三之不見用為惻者其明也卒使正應之上六汲之以上是即九五之明王用之也六四六居第四畫為井之大過井甃象也甃謂以石以甓包砌其旁也六四隂畫井旁之土也居得其位如井之四旁甃砌完整故曰井甃無咎占也甃則井旁之土不崩頽而井中之水不汚壞矣故無咎九五九居第五畫為井之升井洌象也洌甘潔也變為柔則成坤坤土之味甘剛居剛為清潔寒泉食象也寒冷也坎正北方為寒水甘潔而又寒冷五之中正具此數美居兑口之上為人所食者也九五之德美如此有象無占何也曰九五雖為洌寒可食之泉然未上出井口此彖辭所謂汔至亦未繘井者蓋井必至上而後成功也程子曰五于井道為至善而不言吉者未至于上未及用也故至上而後言元吉上六上之畫得六為井之巽井收象也收謂轆轤收綆水至井口也畫耦在井上有轆轤雙柱對立之象變為剛而動有收綆之象勿幕象之戒辭也幕字當作坰俗作冪今作幕從省羃蔽覆也勿幕者欲人人可汲溥其功用耦畫開而不塞井口不蔽覆之象有孚占也孚謂九三正應上六應九三能汲九三之水以出于井口故九三以其剛實孚應于上六也元吉占也井以上出為功故上六之德為首而吉也六畫俱六九為井之噬嗑經彖辭凡二十四字爻辭凡六十一字喪息浪切汔許訖切繘音橘羸力追切射食亦切甕屋送切敝皮世切泄息列切甃則候切洌音列收詩救切幕當作羃莫狄切舊音莫非注綆音梗幾居希切専為云偽切為之同甓蒲歷切覆孚豆切離下兑上三之二下之十緯八純巽變主六二革此羲皇離下兑上之卦而文王名之曰革革者改其舊之謂皮去毛曰革皮有毛而去其毛改變其舊也澤為容水之處澤中有火以消乾其水蓋海之尾閭名為焦釡之谷水入其中如沃焦釡消乾而無復有是為澤中之火水熄火者也而反為澤中之火所熄改變其常也故名為革已日乃孚象也天有十日甲至戊為前五日己至癸為後五日變革天下之事不當輕遽乃能孚信于人故以十日為率革于未及中半之前不若革于己過中半之後則無輕遽之失而能孚于人也卦自巽而變先以巽初易上成需是猶需待而未變革也後以巽四易二成革則可以變革而不需待矣當此之時是猶十日之已過中半也下卦離之中畫為革之主爻離象日以之象月則納已故曰己日元亨占也變革者必有長人之德如九五之剛中正者然後可以致亨利貞占也元者能致亨則利于正主事悔亡占也凡革易于有悔如上所云則所革皆當而其悔亡也初九初之畫得九為革之咸鞏用黃牛之革象也鞏以韋束物也象與遁六二同初變為柔成艮坤畫三柔為牛艮之上畫變坤之外牛皮變為草之象革謂三黃謂二革之初在下而無應必堅固其志確守故常而不輕為拘束于六二九三之內如鞏固之以黃牛之革令不得動作也六二六居第二畫為革之夬已日乃革之象也象與彖辭同二中正應亦中正革之善者也離納已在卦中為中半之義故曰已日乃革之征吉占也至中半而後革則不輕遽矣故征行則吉無咎占也九三九居第三畫為革之隨征凶占也革卦內三爻皆不欲輕革六二中正猶必待至已日乃可革之初則固守而不可動九三雖當位而不中未可以革也故征行則凶貞厲占也居下之上雖不征行但正主事亦危革言三就象也上來應之以變革之言來就已者至于三就如欲有謀焉則就之之就兑口在上為言九三變為柔則成震三震數也有孚占也上來就已孚于己也九四九居第四畫為革之既濟悔亡占也不當位宜有悔自處之善故悔亡有孚占也四無應卦變以巽之四易二二為卦主二四本相易之爻故四能有二之孚改命吉占也巽為命令四者巽之主爻四改為二是改其命矣改者得中而為卦主故吉九五九居第五畫為革之豐大人虎變象也皮之去毛者為革故初九黃牛之革以去毛之皮而言九五上六之時革將變矣故無毛之革又變而為有毛之皮五陽剛中正居人位大人也離隂質而文明象虎九五卦之外體與內離之中畫以中正相應是內之文明形見于外者也故為虎變言虎之革變而有文也未占猶益六五言勿問也有孚占也九五得六二之孚不待占筮而知之矣故曰未占有孚上六上之畫得六為革之同人君子豹變象也上六柔畫變為剛則象君子離之文明象虎九五與離之中畫相應文明見于外故為虎變上六與離之上畫相應文明亦見于外五陽位為大上隂位為小豹者似虎而小故上六不為虎而為豹豹變者亦言無毛之革變而為有文之豹也小人革面象也上六變為剛而為君子亦不能如九五大人之變也不過為豹而已況其本質隂柔小人也若不變為剛則不取文明形見于外之義三剛居剛而不中為剛惡上柔居柔而不中為柔惡上六與九三正應內懷剛很而外之顔色變為柔媚以順從九三之君故曰革面面之顔色見于外而在衆體之上者也上六居外居上故為面內應剛而外則柔心很面柔之小人也征凶占也處革之極革道終矣君子變革其心而有文小人變革其外而順君復何求哉靜守可也征行則凶矣居貞吉占也居謂靜處不行也六畫俱九六為革之蒙經彖辭凡十一字爻辭凡六十五字己日音紀鞏九勇切注去毛吕舉切後同消乾音干復有扶豆切長人知兩切易于以豉切令不趨貞切形見賢遍切下同巽下離上五之三下之十緯八純兑變主六五鼎此羲皇巽下離上之卦而文王名之曰鼎鼎者烹飪之器以巽木入于離火之內而烹飪也卦之下一畫耦鼎足之象二三四三畫竒鼎腹中實以牲體之象五畫耦鼎耳之象上一畫竒鼎鉉之象故名為鼎也元亨占也有長人之德則能致亨初六初之畫得六為鼎之大有鼎顛趾象也初在下而耦鼎趾之象四為鼎腹之上口而與初應顛者上反居下下反居上之謂初六上應四則鼎趾向上九四下應初則鼎口向下故曰顛趾利出否占也否不善之物謂鼎中之穢惡也當鼎之初未實牲體正當洗濯之時顛其趾以傾出其穢惡故趾雖顛而于出否則為利也得妾以其子象也柔居下賤妾之象兑為妾巽者兑之倒體也故初柔為妾九四陽在上而不中正妾子之象初上應四如妾因其子之貴而得以上達故曰妾以其子以與以其鄰以其國君之以同無咎占也妾以其子而達于上則非上僭也故無咎九二九居第二畫為鼎之旅鼎有實象也二中實鼎之有實在中者謂牲體之實于鼎中者也我仇有疾不我能即象也我謂六五五為卦主故稱我仇如君子好仇之仇言為五之匹配五下應二故彖傳言得中而應乎剛二當上應五以其有實在中難于上進如有中滿之疾氣不上行人之道德充積于中在下位而不援上所謂不召之臣也君欲有謀焉則就之而不敢必其就我六五尊德樂道而忘勢不以二之不上應為尤故言我之仇匹以有疾之故而不我能即然臣不就君而君就其臣自重重賢兩得其道矣吉占也二不枉已五能下賢所以吉九三九居第三畫為鼎之未濟鼎耳革象也卦自兑而變兑三柔易五而為鼎之耳兑初九易上而為鼎之鉉今三之剛變為柔居下體之上亦耳之象是鼎耳之在五者今變革而在三矣故曰鼎耳革其行塞象也震為大塗象三變為柔二三四成離九四以陽而塞其前也故曰其行塞雉膏象也離為雉離之中畫為雉腹中之膏故為雉膏不食占也三四五互兑為口三居兑口之下故為不食方雨象也剛變為柔則三四五成坎為雨故曰方雨言方將有雨也虧悔終吉占也陽畫實為盈隂畫虛為虧悔者心欲改悔也三變為柔是以盈為虧改悔其舊也故終吉九四九居第四畫為鼎之蠱鼎折足象也足謂初以初之上應九四而言則為鼎顛趾而向上以四之下應初六而言則為鼎足折于下鼎仆而橫卧故四腹下與初趾齊著于地也覆公餗象也三為公位餗者鼎實也公餗公之餗也四當鼎腹之上口而應初柔是鼎折其足腹卧于地而覆其鼎中之餗其刑剭象也剭者刖足之刑鼎之折其足猶人之刖其足故曰其刑剭凶占也初未實鼎之時則顛趾而以出否為利四已實鼎之後故折足而以覆餗為凶六五六居第五畫為鼎之姤鼎黃耳金鉉象也黃者中之色居上卦之中故曰黃五畫耦在九四鼎口之上為耳鉉者鼎之扄以木橫貫鼎耳而舉之者也上畫竒在六五鼎耳之上鉉也九剛故為金謂鼎耳之虛能受上之金鉉以實其中也鉉以木為之曰金者取剛之義利貞占也中虛而能受外之剛以相提挈故宜正主事上九上之畫得九為鼎之恆鼎玉鉉象也上為鼎鉉在五則取九之剛而曰金在上則取畫剛而位柔故為玉玉剛柔兼有大吉占也以陽大在上舉鼎而行故其占吉無不利占也又且于事無所不利也六畫俱六九為鼎之屯經彖辭凡三字爻辭凡七十九字元亨舊本作元吉亨程子曰羡吉字朱子亦云刑剭舊本作形渥陸氏曰鄭作刑剭朝氏曰京虞荀悅九家陸希聲一行並作刑剭今從之否音鄙折之舌切餗送鹿切剭音屋注長人知兩切彖傳直戀切援音袁樂道音洛齊著直略切扄君熒切震下震上四之四下之十一經八純長男主九四震此羲皇震下震上之卦而文王亦名之曰震震動也雷之象一陽動于二隂之內而奮發故曰震此重震則二雷相踵而動也亨占也震動而萬物發生者亨也人聞雷而恐懼修省亦能致亨震驚百里象也凡震字皆謂動也雷聲聞于百里聞者皆驚震象諸侯諸侯地方百里以雷聲所及象其政令所及之逺近也乾下畫易坤下畫為震乾陽君也坤地國邑也分乾之一陽以主坤之國邑者諸侯之君也一陽象雷聲二隂象百里之地不喪匕鬯象也喪謂失也匕以升肉于爼鬯以灌地降神皆祭者所執下震象匕互坎象鬯互艮象手執之震為諸侯為長子皆主宗廟社稷之祭者主祭之人其心一于誠敬雖值雷震之威而不喪失其所執之匕鬯蓋不以驚懼而亂其所守也初九初之畫得九為震之豫震來虩虩後笑言啞啞象也初九下震之主九四上震之主雷震之威皆此二陽所為也來謂人自外而入內言雷震之初有自外來至雷震之所者初能恐懼則後必安樂也程子曰蠅虎謂之虩虩虩顧慮不自寧也啞啞言笑和適之貌當震之始恐懼不敢寧則終保安吉故笑言啞啞吉占也六二六居第二畫為震之歸妹震來厲占也震來與初九同來謂自二而來初也二乘初剛來內則犯初震之威故危億喪貝象也億者古有詭億之戲億度錢貨之數較其中否以相賭賽也後漢梁冀傳注云若今攤錢也二五皆以隂柔居中為敵應有相對較利之象故為億貝者水中介蟲古者以為貨漢志大貝二枚直錢二百一十六牡貝二枚直錢五十么貝二枚直錢三十小貝二枚直錢十初二三四肖離有貝象億戲者被震雷驚散而喪失其所億之貝也與不喪匕鬯者異矣一于誠敬者心有主役于貨利者心無主故也躋于九陵象也九陵謂六三二三四互艮為山六三在艮山之半故為陵九者艮數人之怯懦者有所怖畏則辟易數里六二柔居柔怯懦者也比近初九雷震之威怖畏而喪貝自二從三而避之故曰躋于九陵勿逐七日得象也逐謂追尋七者震數上下更始得謂得其所喪之貝也六二因怖畏而有喪失又且辟易逺避可謂怯懦無所守矣然居中得正若有墮甑弗顧之達則有去珠復還之喜故曰勿用追尋至七日而所喪之貝可得也六三六居第三畫為震之豐震蘇蘇象也蘇蘇神氣緩散自失之狀三以隂居陽不正自處不正于平時且不能安況處震乎故其震懼而蘇蘇然不勝其自失也震行無眚占也若因震懼而能行去不正而就正則可以無過眚過也三行則至四正也動以就正為善故二勿逐則自得三能行則無眚以不正而處震懼有眚可知九四九居第四畫為震之復震遂泥象也遂者競不復還之義三四五互坎四當坎中畫在二隂之間有遂陷于泥之象震遂泥者言雷聲沈抑陷下不能奮揚而上也虞氏翻曰坤土得水為泥位在坎中故遂泥六五六居第五畫為震之隨震往來厲占也往上則值震之窮來四則犯震之威故皆危億無喪象也五與二對億者也二居柔則志氣餒故逢初九之震而喪其貝五居剛則持守堅故逢九四之震而無所喪失也隂柔之為億一也然二有所喪五無所喪者居剛居柔之異也有事象也有事如必有事焉之義六五有所事謂以固守其中為事也有事則心有主故威不能懾也上六上之畫得六為震之噬嗑震索索象也索盡也九四之雷聲至上六竭矣第一字言聲至六五而將盡第二字言聲至上六則已盡也故曰索索視矍矍象也變為剛則成離目能視矍矍驚駭不定貌雷聲耳所聞非目所視也雷聲至上六索索而聽者無聞矣惟驚駭之餘目視猶有不定也案震卦以重字為象者五此爻之矍矍與初之虩虩啞啞皆言人也此爻之索索與三之蘇蘇皆言雷聲也初爻震下有來字謂雷震之時人自外來者虩虩也三上則言震者謂雷聲之復生雷聲之已盡也征凶占也居卦之終前無所之征則唯可下行而已下行則趨而近威震故凶震不于其躬于其鄰象也躬謂九四鄰謂六三震上體之主爻在四震之威四所自為而四無所驚懼故曰不于其躬四之雷聲遂泥下而不上三在四下為四之鄰迫近九四之威震而受其驚懼故曰于其鄰無咎占也上六與六三為敵應下視六三之迫近九四而受驚懼也因此知所警畏故無咎婚媾有言象也凡易言婚媾者皆謂應爻上六與六三雖是敵應然同位也三陽位上隂位故六三為上六之婚媾也上六逺于九四之震而無驚懼六三近于九四之震而有驚懼故上六則視六三而知畏六三則怨上六而有言以其獨逺威震而不相顧恤也六畫俱六九為震之巽經彖辭凡十字爻辭凡七十八字彖辭亨字下舊本有震來虩虩笑言啞啞八字初九爻辭重出也今正之喪息浪切鬯敕亮切虩許逆切啞鳥格切泥陸氏曰荀乃低切索桑洛切矍俱縳切注長子知兩切安樂音洛億度待洛切么于喬切辟易音闢亦復還復生扶豆切餒努璀切艮下艮上七之七下之十一經八純少男主上九艮其背此羲皇艮下艮上之卦而文王亦名之曰艮艮止也一陽止于二隂之上而不行故曰艮此重艮則內外俱止也卦名連彖辭象也背北堂也詩曰焉得諼草言樹之背背謂初六不獲其身象也艮為手能獲身謂六四行其庭象也三四五互震為足能行庭謂上九不見其人象也三四五上肖離為目能見人謂九三無咎占也卦之二三四五象堂房室初在堂之後象背上在堂之前象庭以一人之體言四為身以三才之位言三為人六四之身艮于初九之背者身止于其內也身既止于內而形不在外初六不應六四也六四亦不應初六故外亦不能獲其止于內之身內不出靜而止也九三之人行于上九之庭者人行于其外也人雖行于外而影不至內上九不應九三也九三亦不應上九故內亦不能見其行于外之人外不入動而止也隂靜陽動靜者止于內動者行于外初六隂畫而在內故象止上九陽畫而在外故象行初內之下四外之下三內之上上外之上四之身止于其初之背三之人行于其上之庭同位故也外不獲乎內內不見乎外敵體不相應無與故也無與當有咎以內外各止其所故無咎也初六初之畫得六為艮之賁艮其趾象也初當下體之下象趾趾能行者也六隂畫能靜止于下而不行故曰艮其趾無咎占也位不當有咎也止而不行故無咎利永貞占也隂柔非能固守者以居剛而變為剛故永久正主其事而利也六二六居第二畫為艮之蠱艮其腓象也二當下體之中象腓腓在股之下隨于股而好自動二居中得正自止其所而不動故曰艮其腓此其字指二而言不拯其隨象也九三下卦之主二民之君也六二在其下乃其隨從者然以中正自守止其所止而不上從于三故三亦不援手而拯之故曰不拯其隨此其字指三而言其心不快象也心謂六五快猶喜也二五柔中同德同位然敵應不相與故二不應五而五亦不快于二也不快謂其不相取不相得也此其字指五而言蓋六二中正自守近不昵同體之三逺不應同位之五不願乎其外如此可謂能止其所止者矣九三九居第三畫為艮之剝艮其限象也限者上下之際股之上身之下也三以剛居剛而不中止之太過者也凡人上下之際須轉動屈伸止其限而不轉動屈伸可乎列其夤象也列分裂也夤背膂肉屬上體指四而言膂即吕也謂之膂力者人之有力由于此止其限則上下體分隔為二如裂絶其夤而血脈不相聨貫矣厲占也過剛而止其所不可止者故危熏心占之象也熏如火氣之上熏詩曰憂心如熏三四五上肖離為火有熏象心者六五也九三止其上下之限六四之夤既裂絶而不相屬矣其為危厲又越比近之六四而上熏于六五雖相去之逺者亦覺其危以言其危之甚也六四六居第四畫為艮之旅艮其身象也身謂股以上膈以下前臍腹後腰膂腎所在處乃生身之所由始故以此為身呼吸之根氣所從生也止其身則氣住而神亦住四以柔居柔專氣致柔者所以止其身也無咎占也柔而正得止其身之道故無咎六五六居第五畫為艮之漸艮其輔象也五當腹之上項之下心之位也不言止其心者凡一身衆體之止皆心止之也輔在口旁言所從出謂上九也上九艮之主爻五為心而在上九之內為上九宰制其所當止者以心止上九之輔不待至上九而于六五之爻曰止其輔者止之于未言之先也言有序象也言者心之聲也非禮勿言一皆聽命于心則口無擇言而言必中倫矣故曰有序悔亡占也先立乎其大者言前定則不跲故悔亡上九上之畫得九為艮之謙敦艮象也上變為柔成坤故象與臨上復五同敦者如地之厚也敦厚于止故曰敦艮此爻一卦之主也故不言艮其蓋諸爻之艮皆上之敦也吉占也三亦下卦之主然以剛居剛止而過者也止非其所當止故厲上以剛居柔止而不過者也止于其所當止故吉六爻唯此最善六畫俱六九為艮之兑經彖辭凡十六字爻辭凡五十六字背音佩舊讀為人身之背今案爻辭其趾其腓其限其身其輔是就人身取象彖辭其背與其庭為對是就宫室取象舊讀非陸氏曰徐莆載切今從其音夤引真切熏許云切注諼匪元切好自虛到切隨從才用切援手音袁昵尼質切轉朱戀切相屬之欲切膈音格中倫貞仲切艮下巽上七之五下之十二緯三隂否變主九三漸此羲皇艮下巽上之卦而文王名之曰漸漸者進有次序而不急遽也山上有木以漸而長內男聘外女以漸而進故為慚也女歸吉占也巽女在外將入而未來歸艮男在內方止而未往迎有女歸以漸之象聘則為妻奔則為妾自納采問名納吉納徴請期親迎六禮備而後成婚女歸之以漸如此卦自否變三往四為巽女四來三為艮男得位之正所以吉也利貞占也二三四五剛柔各得正位初上雖非正位而剛居上居外柔居下居內亦得女歸之正故利于正主事者初六初之畫得六為漸之家人鴻漸于干象也巽為鴻干水涯也二三四互坎為水初近水為干初六鴻之止于水涯而未逺去者也鴻水鳥而乘風以飛下卦艮止而有坎水故下三爻之象曰干曰磐曰陸皆鴻之漸進而止于水際者也上卦巽為風為髙故上三爻之象曰木曰陵曰逵皆鴻之漸進而飛于風中者也小子厲占也艮為小子幼弱在下初進而無應故危而不安項氏曰小子對丈夫言士窮則困于流俗有言象也危而又有言語之傷也無咎占也項氏曰初始離水其進不速猶在水濱窮感之地小憂小故時時有之然寧止于此而不進則于義猶無失也元稹初時亦不肯茍合特以不能堪困躓之厄受衆多之言遂改途而妄迎故以此戒之六二六居第二畫為漸之巽鴻漸于磐象也磐石之安平者蓋水旁石墩也漢書引易作般注云水中堆也鴻離水涯進而止于水旁之墩坎為石互坎之下畫故為磐程子曰自干之磐又漸進也二五以中正相應其進之安平莫加焉飲食衎衎象也坎為飲二變為剛成兑為食衎衎和樂自得貌中正相應止而不急于進自養以俟時者也吉占也居易以俟命故吉九三九居第三畫為漸之觀鴻漸于陸象也地之髙平曰陸九三互坎之中畫水中也變為柔成坤為平地在下體之上是水中有平地而髙故曰陸鴻水宿之鳥干者水之涯地雖窮感而切近于水磐在水旁而髙于干雖離水而安平暫棲息焉得其所矣九三髙平之陸雖在水中然謂之陸則有人耕治非如磐石之上人迹不到而可安棲也詩言鴻飛遵陸毛傳亦謂陸非鴻所宜止水中變為平地非其常也水烏止于平陸非所安也初二柔而靜故漸而得其所止九三剛而躁故漸而不得其所止以剛居剛故躁夫征不復婦孕不育象也三往為六四四來為九三自否變為漸而九三得居正位三四男女之交也九三剛躁不安其居又欲往四則漸變為否而男女不交矣三艮男夫也征謂行而往四三往四則上體成乾上征而不下復故曰征不復四巽女婦也四之位為腹艮為少男在腹之內孕也四來三則下體成坤而艮體壞有坤母而無艮男故曰孕不育三往則四來因夫征不復故孕婦不育也凶占也夫婦離居而繼嗣不成故凶利禦冦占也互坎為冦艮禦止之故曰利禦冦禦冦謂止三之動則三四不相往來而漸體不變矣六四六居第四畫為漸之遁鴻漸于木象也六四巽之下畫也象木鴻不木棲漸于木者非止集于木飛而過其上如烏鵲南飛繞樹三匝也上體之下飛而未髙猶在木杪也或得其桷象也桷屋椽之方者鴻之飛過木上也或得橫平之柯有似于桷茍可以棲猶有棲止之意故曰或得其桷巽為木而六居四得正故象橫平之柯乘風之鴻可髙飛矣漸進不遽回翔人間未即沖天也猶將擇木而止賢人君子之難進者似之無咎占也居上乘風而其進不遽故無咎九五九居第五畫為漸之艮鴻漸于陵象也九五變為柔成艮在艮山之半故曰陵漸于陵者飛而過髙陵之上也詩曰鴥彼飛隼率彼中陵婦三嵗不孕終莫之勝象也二為五之正應婦也體有少男為孕互坎下畫坎數三為三嵗進以漸而不急遽五與二經三嵗之久未諧夫婦之好故不孕正應終必得合故曰終莫之勝程子曰二正應而中正之德同乃隔于三四三比二四比五皆隔其交者也未能即合至三嵗不孕然終莫之能勝但其合有漸耳虞氏翻曰勝陵也澄案勝無訓陵者勝堪也任也莫之勝謂莫之能任也中正相應惟二五相堪終無有能如之者舊讀作勝負之勝非也無爭何有于勝若同人之四五則與九三有爭故必克勝而後相遇也然則三四隔二五之交者何也曰二五中正而應天作之合也然五近于四四亦欲以為夫二近于三三亦欲以為婦故五不得以速聘二二不得以早許五也久而他議寢然後正配諧所謂終莫之勝也三四既為夫婦而二五又為夫婦何也曰三四雖以往來相易而成夫婦然比也而非應也二五則以剛柔正應而成夫婦乃夫婦之得其正者故爻辭特于九五明之吉占也終得相合故吉上九上之畫得九為漸之蹇鴻漸于逵象也逵舊作陸安定胡氏曰當作逵字體相類傳録誤也程子從之朱子曰以韻讀之良是澄案蓋因襲之訛辵為􅊟也路九達曰逵容九軌曰逵路也天上風髙之處鴻翼戾天飛過九逵九達之逵通道大都之人皆見之也震為大塗下艮乃震之倒體自上視下倒是為鴻漸在天際下視人間地上之大塗所謂漸于逵也其羽可用為儀象也儀法也如鳯皇來儀之儀詩曰鴻鴈于飛肅肅其羽言其羽翮整肅羣飛有序可為儀法也項氏曰胡以陸為逵是也繇辭協韻當然然不必謂之雲路鴻之漸于逵飛而過之如六鷁之過宋都爻辭恐人以為鴻有立于逵者故繼之以其羽可用為儀望飛鴻之羽于九達之逵見其次序之足儀刑也吉占也六爻之占上九為最吉六畫俱六九為漸之歸妹經彖辭凡六字爻辭凡八十三字術苦岸切勝音升逵渠規切注而長知兩切迎宜慶切離水力智切稹止忍切躓職利切墩音敦般音盤和樂音洛居易以豉切少男詩照切離居如字匝作納切鴥音欲之好虛到切任音壬勝負繩證切辵丑略切􅊟符缶切翮下革切繇音宙兑下震上二之四下之十二緯三陽泰變主六三歸妹此羲皇兑下震上之卦而文王名之曰歸妹婦人謂嫁曰歸妹者少女也兑為少女而居內卦內卦夫家也婦人內夫家故以入于夫家為歸震長男也而居外卦外卦女家也卦自泰而變乾三往四成震乾父沒而長子承家以兄而嫁其妹也故曰歸妹征凶占也此以三四二畫言泰之三四當位三往四四來三而變歸妹則三四皆不當位是因征行而失正也故征凶無攸利占也此以初上二畫言初上雖當位然上以柔居一卦之上初以剛居一卦之下柔乘剛故亦無所利初九初之畫得九為歸妹之解歸妹以娣象也此為卦之初爻不取一爻之義而統言一卦之義歸妹者將歸之妹謂六五也以與妾以其子之以同娣女弟為媵者謂六三也跛能履象也履卦之下體兑也六三有跛能履眇能視之象歸妹之下體亦兑也初九曰跛能履九二曰眇能視分履卦六三之二象于二爻其二象皆指六三一爻而言也兑體變震足之中畫跛也初二為地六三在初二之上履地者也六爻獨二五相應有夫婦之義六五在女家為震兄所歸之妹九二在夫家為兑女所從之夫六三即泰之六四為六五之娣泰三四相易成歸妹六四來居三女君未歸而先至夫家比近于夫既非匹配之正無與為偶如兩足而跛其一雖能履地亦何為哉征吉占也六四之降為六三非正也而為卦主故言六三如跛者之能履若征行而往四上承六五之女君以同歸于夫家則吉矣初九即泰之初九也泰初九其占征吉故此爻其占亦同泰言一爻之義謂三征于四則吉此言一卦之義謂三征于四則吉也九二九居第二畫為歸妹之震眇能視象也此象亦指六三而言離目之中畫偏而不正眇也有離目能視也六三歸妹之主爻然與九二非匹配之正故象眇者之能視利幽人之貞占也項氏曰二以五為婦三雖相比非正配如兩目之眇其一為九二者但當守幽人之貞以俟正配澄案履之九二其占曰幽人貞吉歸妹九二即履之九二故其占亦同六三六居第三畫為歸妹之大壯歸妹以須象也須賤女媵之妾也天文有須女字或作嬃楚辭女嬃之嬋媚荀陸續作嬬子夏孟京作口音義並同六三來自泰之六四六四于五為娣今來居三失其正矣故降為須而不得為娣也反歸以娣象也反謂還其舊處三若反居于四待六五女君之歸而以其娣同行則得娣之正矣漸與歸妹皆因三四之往來成卦然漸自否變不宜再變復為否也故九三夫征不復則可憂歸妹自泰變欲令再變復為泰也故六三反歸以娣則可喜九四九居第四畫為歸妹之臨歸妹愆期象也上卦震為長男九四以震一陽為女家之主歸妹之兄也四為兄五為妹九二為壻皆不得位故婚姻不得及其時此歸妹之所以愆期也遲歸有時象也雖遲其歸其歸必有其時雖不言吉亦無凶也六五六居第五畫為歸妹之兑帝乙歸妹象也帝乙謂九四所歸之妹謂六五歸妹六五即泰之六五也故象與泰六五同柔得中居尊帝女之貴也其君之袂不如其娣之袂良象也君謂女君袂衣袖也良善也美也乾為衣一衣而二袂乾三畫皆竒變其外一竒為耦者袂之象下卦六三娣之袂也六五變為竒則上六為女君之袂然必六五變為奇而後成如裁改而成之袂不如下卦六三之袂固有而自成者之為善也帝女下嫁有中德不尚外飾故其袂不如其娣之袂良娣則以容飾事人者也月幾望象也巽為月既望之象六五變為剛則三四五成巽六三當巽之下畫而為卦主娣盛亢君月望亢日之象吉占也娣之袂良于君月之望亢于日六三始上僭矣六五以己之立德為貴不計人之何如也吉者自吉爾人何與焉上六上之畫得六為歸妹之睽女承筐無實士刲羊無血象也女謂上六士謂初九此卦六爻惟九二六五相應成夫婦五為所歸之妹二為歸妹之壻三四無應不得位而為成卦之主四為歸妹之兄而愆其歸妹之期不得為兄之道矣三為歸妹之娣而降居賤女之列不得為娣之道矣初上二爻隂陽得位而無應此男女之守正而婚姻不成者也有室者男女之初也于其初無室可受則不成娶故不得為夫而但稱士適人者女之終也于其終無人可適則不成嫁故不得為婦而但稱女女之嫁者非受幣不交不親上卦震有筐之象上六欲從夫于三而三非陽也陽為實無陽則無以實其筐故曰承筐無實蓋婚不成而無納幣之禮也士之娶者為酒食以召鄉黨僚友下卦兑為羊初九欲迎婦于四而四非隂也隂為血無隂則無血故曰刲羊無血蓋婚不成不饗食賓客不刲羊故無血也無攸利占也與彖辭同咸恆漸歸妹四卦之為男女夫婦何也曰漸者男方求女之事歸妹者女將歸男之時以未成夫婦而名卦也咸者夫婦始初相合之情恆者夫婦終久相處之道以己成夫婦而名卦也漸歸妹皆內卦為男家外卦為女家故漸內艮外巽若歸妹之內兑者歸于男家之娣也外震者主于女家之兄也咸恆皆內卦為女身外卦為男身故恆內巽外震若咸之內艮者男之下交乎女也外兑者女之上交乎男也六畫俱九六為歸妹之漸經彖辭凡七字爻辭凡七十六字娣大計切跛波可切眇彌小切𬒮彌世切幾讀作既刲苦圭切注少詩照切長知兩切媵以證切亢苦浪切饗食音嗣離下震上三之四下之十三緯三陽泰變主六二豐此羲皇離下震上之卦而文王名之曰豐豐盛大也雷電交至聲光赫奕盛大之義亨占也盛大之時百嘉所聚也王假之象也假至也王假之者就諸侯之國而言有王者至其國也外震象諸侯內離為日象王離日下照居內為主蓋天子巡守侯國入其國內而為主所謂天子無客禮也離入居下有明入地中太陽下同萬物之疑故彖辭特以天子適諸侯取義勿憂占也盛大之時當豫憂其衰徴戒以勿憂者當有道以常保其盛大不可徒憂而已能持滿則可不憂也宜日中象也盛大之時如日之中宜常如此不可令其過中也初九初之畫得九為豐之小過遇其配主象也配主謂六二隂陽之合曰配主者六二為卦之主爻也雖旬無咎占也旬十日也離初納己卯離二納己丑為一旬初二非正應而以近比相遇不可以久然淹留十日亦無咎也但不可過旬之外凡卜筮吉凶以一旬之內為斷過旬則再卜再筮矣故于初二之遇亦以一旬為限節也往有尚占也往謂往二遇者彼此不相求適然邂逅而已非應往而有遇也初二皆無應則固可相配合尚謂配合在己上者初往求合于二則二在其上而為之配故曰往有尚六二六居第二畫為豐之大壯豐其蔀象也蔀障蔽之物五天之位也日麗乎天而九四一竒畫在天之下如障蔽然日中見斗象也二之應位在五如麗天之日離之中畫在二為照地之日日麗天中而光照地上故二象日中九四為蔀障蔽麗天之日而地上無光日暗則星見故日中而見斗也斗北斗七星星之大而易見者震仰盂有斗象往得疑疾占也疑疾如樂廣之客見杯中蛇影遂致疾蓋因疑而得疾也凡陽者無疑暗則多疑麗天之日不明則照地之日無光二既昏暗故不可以往往則必得心疑之疾也有孚占也發若占之意也二若不往則有四三之陽自來孚而發其昏暗發如發蒙之發謂徹去其蔀也吉占也初九待二來遇則二失正往合于二則初得中故初不宜待而宜往待則有過旬之咎往則有尚也六二往求于三四則此失中待三四來孚則彼得中故二不宜往而宜待往則有心疑之疾待則有孚而吉也九三九居第三畫為豐之震豐其沛象也陸氏曰沛或作斾澄案古字通用斾幡幔之屬凡陽畫連亘不開皆象障蔽之物故四為蔀三為斾四既為蔀障蔽日明三又為斾在蔀之下重障蔽之則明者愈暗日中見沫象也沫斗下小星也震象斗三在震下斗下之星也暗未甚則但見大而易見之星見斗是也暗愈甚則雖小而難見之星亦見見沫是也折其右肱象也三四五互兑為右為肱五亦為肱右肱謂六五也六五當兑上畫兑為毁折故曰折五如日之在天中四與三重蔽五之明不能照下故二當日中而無光二卦主也既蔽五之明如人之折其右肱而不可用也無咎占也四之蔽重三之蔽輕蔽五非専三之咎故在九三為無咎九四九居第四畫為豐之明夷豐其蔀象也與六二同蔀者正指九四而言故于此爻又言其象日中見斗象也與六二同日中謂六二斗者震象卦因二四相易而成此二象故二爻之辭同剛自二往四為蔀而蔽五之明故二當日中昏暗而見斗也遇其夷主象也二豐之主爻為四所障蔽而昏暗二之明在天為四所傷也四變為柔成明夷故四以二為夷主謂遭傷之主也四若下與夷主遇則剛柔相易豐轉為泰蔀徹而明不傷矣吉占也為泰故吉六五六居第五畫為豐之革來章象也來謂下求四五四皆無應五之柔若下求四之剛則隂陽相間而成章故曰來章有慶譽占也隂下從陽是庸愚從賢智既有福慶歸于己而又有名譽聞于人也吉占也有慶有譽所以吉也上六上之畫得六為豐之離豐其屋象也上六柔變為剛蓋覆于上如屋又居極髙之地有崇大其屋之象蔀其家象也上變為剛則六五當離之中畫在上之內為家九四障蔽于其下為蔀故曰蔀其家窺其户闃其無人三嵗不覿象也五中虛象户三居人位與上應為其家之人然隱藏于下為九四之蔀所隔而不得見上故自外而居其户則其家內闃其無人覿見面也九三深藏于內雖三嵗之久亦不能與上六相見有障隔故也三震數凶占也六畫俱六九為豐之渙經彖辭凡十字爻辭凡八十八字假庚白切蔀普茍切沛與斾同莆蓋切沫音妹窺苦規切闃苦鵙切注守詩又切令離丁切斷廷亂切星見賢遍切餘並如字易見以豉切幡孚煩切幔莫半切相間居限切覆孚豆切艮下離上七之三下之十三緯三隂否變主六五旅此羲皇艮下離上之卦而文王名之曰旅旅者衆處于外之名凡家居者入而舉火于內旅寓者止而舉火于外晝食夜宿皆欲憑髙見逺每依山而舉火故山上有火為旅之義小亨占也小亨小者亨也六五為旅之主五隂也故曰小以其得中而順于剛故亨旅貞吉占也內艮為止外離為麗為明止宿而麗于明處旅中之正主事者如此則吉此蓋指九三而言彖辭之占吉而爻辭之占厲取義各不同也初六初之畫得六為旅之離旅瑣瑣象也此旅字無所指名于旅初之時泛言處旅之道爾瑣瑣細碎貌六為隂小初又卑下小之又小者也故曰瑣瑣斯其所取災占也旅貴乎得衆旅而瑣瑣則失衆心此其所以取災也六二六居第二畫為旅之鼎旅即次象也旅謂六五也旅因三五相易而成卦六五上卦之主九三下卦之主卦中稱旅者六五與九三也旅以應位為次六二者上旅六五之次上九者下旅九三之次也六五下就六二既得中又得位次舍之最善者也懷其資象也懷謂懷藏而不失資者財貨也巽為利二三四互巽資也得童僕貞象也艮少男童也艮中畫為童僕之能正主事者有宿止之地有資用之財有幹事之童僕六五之旅得六二為次而諸美具焉九三九居第三畫為旅之晉旅焚其次象也旅謂九三其次則上九也上九為九三之次而在離火之上故為焚其次喪其童僕貞象也否卦六居三當互艮中畫為童僕之貞者否變為旅則艮之中畫去三而就五是喪其童僕之貞者矣厲占也處旅不善而居下之上危地也九四九居第四畫為旅之艮旅于處象也此旅謂六五也九四乃六五比近依乘故曰于處處謂暫時居處非其次舍也得其資斧象也互巽為資巽木連離兵為斧斧者行旅所用以析薪斬伐者也周公東征有破斧之詩我心不快象也我謂五也卦主故稱我五之位為心依乘近地而處有資有斧亦云可矣然所依者居柔之剛非正位也豈心之所樂哉故我心不快必若六二之得正位乃為得所安之次舍也六五六居第五畫為旅之遁射雉一矢亡象也雖為雉乾之剛象矢以卦變言六上居五變乾為離射而得雉也乾之三陽一下居三三矢而亡其一也朱子曰亡如秦無亡矢遺鏃之亡終以譽命占也六五之旅始者乾以射取文明之柔而不免亡矢中實之陽及其終也即應位之次則有二之譽有五之命羈旅之中名譽未易得命令未易行人之譽歸于己巳之命行于人旅而能兼之者蓋鮮矣上九上之畫得九為旅之小過鳥焚其巢象也上變為柔成小過有飛鳥之象三四為鳥身而三之位與上應鳥蓋指九三也二三四互巽為木五上在巽木之上象鳥巢在木杪六五耦畫巢之中空處上九竒畫巢之上覆也當離火之上畫為火焚其巢上奇變為耦象巢被火焚而毁其上覆九三為旅人則上九為旅之次九三象鳥則上九為鳥之巢上九之焚其巢即九三之焚其次也旅人先笑後號咷象也旅人九三也三居六畫卦之人位兑為笑離為先號咷同人離在下五變為柔三四五互兑在上故為號咷而後笑此旅卦三四五互兑在下離在上故為先笑後號咷蓋九三先在下而未遭焚則笑後就上而遭焚則號咷喪牛于易象也小過坎之復體象輿離為牛在前有旅人以牛服車之象上既變為柔失離體為喪牛上一卦窮處疆埸之象旅人喪其服車之牛于境外也凶占也喪失其牛則無以挽資糧之重車而不可行矣所謂凶也此卦六畫惟六五九三為旅人初言其時二四上言其地五本失位而以大二為次則得位三本得位而以上九為次則失位蓋處旅之道宜柔不宜剛五柔而中三剛而過是以五得財得人而譽命三既無可居又不可行而凶也六畫俱六九為旅之節經彖辭凡六字爻辭凡七十六字喪息浪切卦內及下卦同射食亦切于易音亦注少男詩照切所樂音洛未易以豉切鮮悉翦切空處昌據切上覆孚豆切巽下巽上五之五下之十四經八純長女主六四巽此羲皇巽下巽上之卦而文王亦名之曰巽巽入也一隂入伏于二陽之下也小亨占也卦以二隂為主故其占為小者亨也利有攸往占也柔在內剛在外內柔往外順從于陽故利有攸往利見大人占也二五陽剛居中陽為大中為人位大人也故利見大人初六初之畫得六為巽之小畜進退象也巽為進退不果隂欲進而從于陽又欲退而安于下疑而不決也利武人之貞占也武人質柔而位剛又依附外剛以為強如人之被甲胄執戈兵六居初比九二二人位也初以二之剛為己之強故曰武人剛強自治然後能果決而上進以從陽故利武人之貞九二九居第二畫為巽之漸巽在牀下象也初耦二竒有牀之象巽為卑伏而入于下指初六而言牀者二也初在二下卑伏而入于下之象用史巫紛若占之象也史作䇿以告神巫歌舞以事神皆卑下順承以求神者也紛若多也卦之名巽本取二柔之卑伏者言然巽之時陽亦當卑巽故陽爻亦以巽為善蓋陽為隂所順從亦必以卑巽待之若剛強自處非所以懷柔順服之人也二剛而得中又居柔故亦能卑巽二之位與五應與三比卑巽以同于在上比應之陽如人之卑巽以事神然既能巽于在己上者則亦能巽于在己下者矣吉占也能巽于上則能巽于下而吉也無咎占也不當位宜有咎得中故無咎也九三九居第三畫為巽之渙頻巽象也三變為柔則下卦成坎三當下卦之終水之盡處也為頻于水之象九三以剛居剛非能卑巽者當下卦之終而變為柔猶頻于水而後能巽也吝占也頻而後巽故吝六四六居第四畫為巽之姤悔亡占也無應承乘皆剛當有悔也能上從于陽故其悔亡田獲三品象也四上卦之地田也獵者所獲一為乾豆以奉宗廟一充君庖一頒徒御遍及上下四順從于上下之陽如獵于田者之獲三品而遍及上下也上宗廟五君下之二三徒御也九五九居第五畫為巽之蠱貞吉占也剛巽乎中正故正主事則吉悔亡占也無應宜有悔中正故亡無不利占也剛而中正故于事無所不利無初有終占也下比于柔故無初上同于剛故有終先庚三日後庚三日占也先于庚之三日者丁也後于庚之三日者癸也巽之主爻六四為西方庚辛故先後自庚而數二三四互兑納丁三四五互離納癸離納己又納癸者己為日之體朔日子時日會月于癸故又納癸也吉占也筮日則丁癸吉皆柔日也上九上之畫得九為巽之井巽在牀下象也四耦五奇亦有牀象巽謂六四牀者五也六四在五之下巽在牀下也四卑伏以從上二陽猶初之卑伏以從下二陽也故其象同然二能有初之巽而上不能有四之巽也喪其資斧象也下巽為資互離為兵貫于巽木之上為斧自初至五資斧也而上處其外不能有之是喪其資斧也貞凶占也如此而正主事則凶也六畫俱六九為巽之震經彖辭凡十一字爻辭凡七十字先庚悉薦切注乾豆音干而數色主切兑下兑上二之二下之十四經八純少女主上六兑此羲皇兑下兑上之卦而文王亦名之曰兑兑説也一柔見于二剛之上而説也亨占也程子曰物莫不説而與之是以致亨利貞占也利正主事者防非道邪諂之説也初九初之畫得九為兑之困和兑象也六畫惟初不比隂柔與九二相説二陽相比説道之善故曰和和者中節而無所乖戾也兑之説以三上二柔言也而四剛畫亦取説義吉占也九二九居第二畫為兑之隨孚兑象也二以中實孚于三也吉占也悔亡占也比柔當有悔以誠心待小人則小人無所用其姦故其悔亡六三六居第三畫為兑之夬來兑象也三不中正下求説于二故曰來兑小人以諂説媚君子者也凶占也九四九居第四畫為兑之節商兑象也商度量也與周書商賚九章商工商除之商同義四下比三柔上承五剛皆其所説故商度其所説而未定未寧介疾有喜占也未寧者未定也四與五同體同德始雖商度未定終能舍三説五介疾者介乎上下之疾有喜者疾安也未寧之疾安謂無復有不定之意也九五九居第五畫為兑之歸妹孚于剝象也五之中實孚于上猶二之孚于三也然隂者在下之物居于極上者剝陽已盡而後能至上也五之孚于上者孚于剝陽之隂也有厲占也君子誠心待小人然小人未必無害君子之心也故有有厲之戒有厲者今未厲也言其有則不可不知戒也上六上之畫得六為兑之履引兑象也説至于上可以已矣樂不可極也隂柔但知以説為事于説之終又引而長之豈君子之説哉六畫俱九六為兑之艮經彖辭凡四字爻辭凡三十八字注説音曰見賢遍切中節貞仲切度量待洛切舍三音捨無復扶豆切樂音洛坎下巽上六之五下之十五緯三隂否變主九二渙此羲皇坎下巽上之卦而文王名之曰渙渙散也離也水凝結而氷合風渙散之則氷釋而離也亨占也二五剛中故亨蔡氏曰二與四交用故亨王假有廟象也五為王三四五互艮為宗廟九五當互艮之上象王者祭祀而至于宗廟之中也案萃卦渙卦皆言王假有廟蔡氏曰人生則神氣聚死則神氣散朱子曰祖考之精神既散王者當至廟以聚之也利涉大川占也卦有舟象故繫辭下傳舟楫之利以濟不通取諸渙也利貞占也初六初之畫得六為渙之中孚用拯馬壯象也坎水在下風渙之于上此氷凍將釋之初也氷凍合則車行其上氷將釋而不疾馳則陷矣故用以拯渙必馬壯也坎馬在後二三四互震馬在前與明夷六二同吉占也九二九居第二畫為渙之觀渙奔其機象也否之三陽聚處于上四之一陽降而居二乃成坎體坎為輿二在坎輿中如車中之有機是為渙散之時而奔就其居中之機也凡乘安車用機悔亡占也陽居隂位陷隂中宜有悔也得所依倚而安故其悔亡六三六居第三畫為渙之巽渙其躬象也四于人之體為躬否九四之剛乃六三之柔所比近者如人下體之股比于上體之躬也否之九自四降二而為渙則四躬與三股相離矣故曰渙其躬無悔占也躬自去四而就三非三之過也故無悔六四六居第四畫為渙之訟渙其羣象也其羣謂初六六三也否卦三隂同處于下為羣二之一隂去二升四離其初三隂柔之羣故曰渙其羣蔡氏曰言散其同類之私羣而上同乎五也元吉占也上同剛中正之五其德之所以為元而吉也渙有丘象也三四五互艮為山四山之半為丘六自二升四是渙散其羣而有此丘也故曰渙有丘匪夷所思象也四上同于五自五言之則曰四自二升而有丘匪遭傷夷者也乃吾所思者爾卦之五畫俱變而惟四之一畫不變則為明夷故曰匪夷四上同于五而五當心位故四為五之所思也九五九居第五畫為渙之蒙渙汗其大號象也巽為風大塊噫氣作則萬竅怒號陽為大大號者風也五者心之位汗者心之液風中于心以汗而散由中心浹于四體則散矣故曰渙汗其大號巽風命令之象王言自中心而發為命令以遍及于四方猶風之自中心而散為汗液以周浹于四體也不言風而曰其大號猶屯九五不言兩而曰其膏也渙王居象也居如居貞之居言處而不去也五上卦之中王之位也王之命令當如風之散于四方而王之位則當常居于中渙王居者在渙之時唯王居中而不渙也若出居于鄭居于狄泉居于成周者不得居中而居于外王位之渙也豈宜見此事哉無咎占也渙之時惟王獨居于中而不渙則無咎也上九上之畫得九為渙之坎渙其血象也上應三三坎體之隂血也上居渙之終去三逺為渙其血之象謂血之凝聚結毒為害而今渙散之也去逖出象也逖逺也上去三逺猶人去其禍害而逺出則禍害不能及之也無咎占也六畫俱六九為渙之豐經彖辭凡十二字爻辭凡五十八字假庚白切號平聲逖徒歷切注下傳直戀切噫于界切風中貞仲切兑下坎上二之六下之十五緯三陽泰變主九五節此羲皇兑下坎上之卦而文王名之曰節節猶竹節之節有分限而不可踰越也澤之上有水其所容受有限則故曰節亨占也九五剛中故亨苦節象也苦火之味初至五肖離上六節之極離火之所熏蒸故其象為苦節苦節者節之太過也不可貞占也節貴乎得中乃可以正主事太過則不可貞矣初九初之畫得九為節之坎不出户庭象也初變為耦象户二在户前為庭二之剛畫窒塞于前不可出也無咎占也當節之初守正于內而不出故無咎九二九居第二畫為節之屯不出門庭象也二變為柔成震震者艮之倒體有門闕之象三四在二前為門外之庭畫皆耦而無所窒礙出三四則上合于剛中正之九五矣九二以敵應不相與故不出門庭凶占也可出而不出不合時宜故凶六三六居第三畫為節之需不節若則嗟若象也六三不中正雖或有不節之事然居澤之上有所限止而兑口有能嗟之象三節而能嗟與泰侈而不自知其非者異矣無咎占也以不節為嗟故無咎六四六居第四畫為節之兑安節象也節上三爻皆能節者蓋澤之止水有限止故也四承中正之五所居得正安于節而無所強勉者坤體之隂靜重故能亨亨占也承上得正故亨九五九居第五畫為節之臨甘節象也五變為柔成坤坤為土土之味甘故為甘節甘者樂易而無難苦之謂吉占也往有尚占也下雖無應于二然有六四往外承上而與己配合故曰往有尚凡爻辭言往皆謂內往外然有此往彼者亦有彼往此者屯六四往吉初往四也睽上九往遇雨三往上也此之往有尚四往五也上六上之畫得六為節之中孚苦節象也上六變為剛則六畫成復體之離離為火火味苦居節之極而又變為剛節之太過者也故曰苦節貞凶占也節之太過正主事則凶悔亡占也苦節雖有悔然能過于節禮與其奢也寧儉故其悔亡六畫俱九六為節之旅經彖辭凡七字爻辭凡四十六字注強勉其兩切樂易上音洛下以豉切兑下巽上二之五下之十六緯八純離變主六四中孚此羲皇兑下巽上之卦而文王名之曰中孚中謂二五此以實感而彼應之曰孚二五剛實居中以中心之實感人而三四二柔皆孚應之風感于上則澤之浪遄應于下其信不渝也豚魚象也豚魚澤中之物似豬俗謂江豚澤將有風則浮出水面有南風則口向南有北風則口向北舟人稱為風信唐人詩曰江豚吹浪夜還風風澤之卦故取以為象中實之孚其信如豚魚吉占也信如豚魚則吉也利涉大川占也巽木在兑澤之上卦體中虛有舟象利貞占也四為卦主得位而承五之中初九初之畫得九為中孚之渙虞吉象連占也初居澤之內如澤之虞人近孚于九二之中不逺交于外専守其職不變其志所以吉也有他不燕占也有他謂外應四也若不專孚于九二而又有他志則不安矣九二九居第二畫為中孚之益鳴鶴在隂其子和之象也二三四互震為鳴為鶴二隂位澤之中山之下幽隱之處故曰在隂子謂六三陽大隂小九二陽也鶴之大者六三隂也鶴之小者故二為鶴而三為鶴之子我有好爵吾與爾靡之象也我六四也四中孚之主故稱我好爵猶曰尊爵謂九五也天下有達尊三爵一齒一德一德之尊者稱其人為懿德詩言好是懿德是也爵之尊者稱其人為好爵此言我有好爵是也猶詩言我有嘉賓也九五位在六四之上故六四稱之為好爵猶儀禮士稱大夫為異爵也吾亦謂六四爾謂九二也靡與縻通謂係戀之也四與五相孚二與五同位亦以中實相孚故設為六四卦主與九二言我有九五之好爵我與爾之心同向慕之鶴鳴子和二得三之孚也吾與爾靡之四與二共孚于五也六三六居第三畫為中孚之小畜得敵象也敵謂與己同等者也三與四同為隂柔敵也或鼓或罷或泣或歌象也三與四二柔雖同類然其志不同而相反三鼓四罷四泣三歌三居剛互震之中畫震動故為鼓又兑口也故為歌四居柔互艮之中畫艮止故為罷四多懼又離目也故為泣四得正而上孚于五矣三不實而欲四之孚故四不來孚也六四六居第四畫為中孚之履月幾望象也巽為月既望之象六四當巽下畫為中孚之主隂之得位得時者也其盛如既望之月馬匹亡象也二三四互震為馬四與三同類而不孚于三下絶其類而上孚于五如馬之亡其儔匹無咎占也當位而孚于中實之君故無咎九五九居第五畫為中孚之損有孚占也有四之孚攣如占之象也四孚于五固結不解如攣其手象與小畜九五同無咎占也中實而得人之孚如此故無咎上九上之畫得九為中孚之節翰音登于天象也巽為雞雞曰翰音謂其羽有文采而能鳴也豚魚知風鶴知夜半雞知旦皆物之有信者故中孚彖爻取三物為象上九天之位也雞飛類之走鳴于地上以孚于人者欲其音登徹于天則非所能矣貞凶占也項氏曰巽雞之翰音而欲效澤鳥之鳴登聞于天愈久愈凶六畫俱九六為中孚之小過經彖辭凡十一字爻辭凡六十六字和胡卧切靡忙皮切罷音皮幾讀作既攣力圓切翰侯案切注好是虛到切艮下震上七之四下之十七緯八純坎變主九四小過此羲皇艮下震上之卦而文王名之曰小過小謂隂也為卦隂倍陽半二陽陷于四隂隂過而陽不及故曰小過亨占也蒙卦名小字言小者過盛故小者亨利貞占也亦蒙小字言利于小者正主事也可小事不可大事占也小人可小知而不可大受也隂柔小人但可以為小事非陽剛君子則豈可以當天事哉飛鳥遺之音不宜上宜下象也小過者隂柔小人過盛而得志之時也陽剛君子衰微不得志彖辭上三占既皆為隂柔小人言矣此之象及下文之占乃為陽剛君子謀也卦有飛鳥之象三四二陽鳥之身也上下四隂飛之巽也音者鳥鳴之聲遺者鳥飛過而其鳴聲遺留于人耳也陶詩曰來鴈有遺聲凡動物飛類屬陽聲音亦屬陽飛鳥遺之音指二陽而言隂強過盛陽弱不及君子其可知進而不知退乎若飛鳥然其飛鳴而過也不宜自下而趨上但宜自上而趨下上則進為盛隂所忌易以取禍下則退就卑處可以全身也至哉聖人處憂患之道乎大吉占也大者陽剛君子也小過之時大者非可以吉惟善于自處能辭尊而居卑勇退而不進如鳥音之下而不上則大者可吉此君子不得志之時轉凶為吉之道也初六初之畫得六為小過之豐飛鳥以凶象連占也卦以二陽象飛鳥擬君子此飛鳥謂九四也過盛之隂傷不及之陽其為正應者乃為敵讎也故初六害九四者也上六害九三者也九四之凶以初六而凶也六二六居第二畫為小過之恆過其祖遇其妣象也六五過其祖而六二遇其妣也陽在己上者父也在父之上者祖也隂居尊位者妣也故六二之視九三猶父也視九四猶祖也而六五與九四同在上體祖之妣也祖之妣處九四之上過其祖也過之者六五其祖之其指六二而言祖者九四也六二六五雖非正應然隂過之時以柔中相合故六二往與六五遇所遇者過其祖之妣也遇之者六二其妣之其指九四而言妣者六五也六五之為妣也過其祖而上居二之應位故二得以上應而遇其妣不及其君遇其臣象也六二不及其君而六五遇其臣也下卦艮九三艮之君也六二君之臣也君之臣處九三之下不及其君也不及之者六二其君之其亦指六二而言君者九三也六二往合六五故六五得與六二遇所遇者不及其君之臣也遇之者六五其臣之其指九三而言臣者六二也六二之為臣也不及其君而下居五之應位故五得以下應而遇其臣無咎占也二五當隂過之時而無害陽之事得中故也五中而不正二中而正故其爻辭比六五尤善九三九居第三畫為小過之豫弗過象也過謂踰越也九三弗過上六也九三與上六正應然陽不及之時豈可踰越于隂上六在上體九三在下體而不敢上進以就正應是謂弗過防之象也惟當如扞水之防以隄備上六俾不能為己害斯可矣防之扞水內不得出外不得入則在內者可以避害而在外者不能加害也九四陽畫連亘在前象扞水之防從或戕之象也若往從上六則或為其所戕害矣凶占也往從上則凶不往可也九四九居第四畫為小過之謙無咎占也無九三之凶者以居柔也弗過象也九四弗過六五也九四上與六五比然初六內卦之下九四外卦之下同在下位不敢踰越而上合于五是謂弗過項氏曰九三九四二爻為隂所過非能過人者也故皆曰弗過遇之象也下與初六為應惟當與初六遇而已與初六遇則是退居至下之位也不上而下則免為初六所害矣彖所謂不宜上宜下也往厲必戒占也若上往合五則危必當戒之不可往也勿用永貞占也不但不可往五雖長永正主事于四之位亦不可惟退而下就初之位其庶乎大概小過之時陽但宜處下也六五六居第五畫為小過之咸密雲不雨自我西郊象也九四六五得坎之上體又有九三一陽重蔽其下如雲之密然坎之下畫塞而不通則隂上而不下故不雨所以然者九四為主爻陽弱隂強故隂陽不和不能成雨我西郊謂四也四為西又互兑體故曰西郊郊者以其在內卦之外也蓋九四不上合六五何望乎隂陽之和而成雨哉公弋取彼在穴象也公謂四彼謂初在穴謂初在坎穴之內四與初應猶弋而取彼在穴之物蓋言四但下取彼初而不上取此五也上六上之畫得六為小過之旅弗遇象也上六弗與九三遇也過之象也謂過越九三而居極髙之位小過者隂過陽不及故九三之弗過弗能過上六也此云過之上六過九三也九四之弗過弗敢過六五也六二云過其祖六五過九四也皆隂能過陽陽不過隂也飛鳥離之象也九三為飛鳥離麗也詩曰鴻則離之上六變為剛成離離象網罟使九三處下猶或可避其害儻趨髙應上如鳥之上飛沖天則離于上六之網中矣凶占也初六害九四然九四宜應初六上六害九三而九三不宜應上六蓋隂過之時陽剛不宜上宜下九四下應初六則是退于卑下而可免凶九三上應上六則是進于髙亢而必致凶也是謂災眚占也災謂禍災眚謂過眚災由己取眚非己致單言眚者非己所致之眚災眚者由己所致之眚也九三剛居剛不退居于下以避禍乃進趨乎上以取禍其凶乃己所自致也此卦初六與九四九三與上六兩爻之辭皆相表裏然初六之以凶其辭若急至九四曰無咎曰厲曰勿用則其辭緩何也九三之或戕其辭猶疑至上六曰離之曰凶曰災眚則其辭決何也蓋隂柔過盛陽剛但宜下退不宜上進四居柔則能下也三居剛則好上也下則凶或可免上則凶不可免矣此初四之辭所以先急而後緩三上之辭所以始疑而終決與嗚呼陽剛有不幸而際斯時者可不知所以自處之道哉六畫俱六九為小過之中孚經彖辭凡一十四字爻辭凡八十字注為隂為陽云偽切易以以豉切卑處昌據切好上虛到切失與音余離下坎上三之六下之十八經三陽泰變主六二既濟此羲皇離下坎上之卦而文王名之曰既濟濟者渡水已竟之名二物相資相成亦曰濟此卦取水火相成之義水性下以金盛水于上則水不滅火火性上以木傳火于下則火能熱水水上火下已能成烹飪之功故曰既濟亨小占也小謂隂柔也既濟以二為主爻其亨者隂柔也故曰亨小利貞占也六爻皆得位故六二主爻利于正主事初吉占也謂內卦六二也柔居離明之中故初則吉終亂占也謂外卦上六也柔居坎險之極故終則亂初九初之畫得九為既濟之蹇曳其輪象也二三四互坎為輿為輪初在輿後曳之者也濡其尾象也坎又為狐初在狐之後尾之象也在水之下濡之象也無咎占也既濟之初可以濟而守正不遽進也如車將濟水而曵其輪狐將濟水而濡其尾雖不遽濟而終可濟故無咎六二六居第二畫為既濟之需婦喪其茀象也二五相應猶女之將從夫而需待未行坎輿為婦所乘之車茀者車後蔽也初在二後而不遽進如車喪失其後蔽而不行故曰喪其茀勿逐七日得象也居中守正終必可得故喪茀不待追尋七日之後自得之則可行矣二變為剛成乾七乾數九三九居第三畫為既濟之屯髙宗伐鬼方象也髙宗商之賢君武丁也商頌言髙宗伐荆楚荆楚南方之國好巫鬼故曰鬼方伐之者離為戈兵也九三離之終南方之窮處也故象鬼方之國三年克之象也髙宗指九五而言自五來三歷三畫三又坎數也為三年克之之象此乃伐逺國久而後勝之占小人勿用占也小人得此占則不可用故戒以勿用六四六居第四畫為既濟之革繻有衣袽象也漢制裂帛邊繻頭以為關門符信繻帛之未成衣者袽衣之已成而敝壞者四已過既濟之半凡事過半則有將敗壞之理猶繻之必為袽也終日戒象也終日戒者慮其必至于此也下卦離為日五為日中之時四為將昃之時將昃則漸終矣九五九居第五畫為既濟之明夷東鄰殺牛不如西鄰之禴祭實受其福象也初為東二與之鄰東鄰謂六二也離為牛四為西五與之鄰西鄰謂九五也禴夏祭五于時為夏四時之祭夏祭最薄六二當一卦之中有殺牛之盛祭九五當過半之後但有夏禴之薄祭然六二雖中正柔豈能自濟也必九五之剛中正應之乃能成既濟之功故五祭雖薄而二實受其福也上六上之畫得六為既濟之家人濡其首象也上于人之體為首未濟取象于濡上六居坎險之終濟水而將及岸也然隂之柔弱如人之濟水將及岸而濡其首厲占也雖不至溺死亦危矣六畫俱九六為既濟之未濟經彖辭凡十字爻辭凡六十八字喪息浪切茀分勿切繻音需袽音如注盛水時征切好巫虛到切坎下離上六之二下之十八經三隂否變主九二未濟此羲皇坎下離上之卦而文王名之曰未濟火上水下不相為用未能成烹飪之功故曰未濟亨占也六五柔得中故亨小狐汔濟象也三四五互坎為狐剛大柔小以六五隂柔故曰小狐汔幾也言幾及于上也井卦之水在九五井口之中未出上六井口之外則曰汔至未濟之狐在六五坎水之中未登上九水外之岸故曰汔濟蓋六五狐之前體也若至上九則為出水登岸矣未至上九則是幾于濟而猶未濟也諸家説以下卦之坎為狐者于辭義皆不協濡其尾象也初六連九二在互坎之後象小狐之尾在前水之內後水之中故濡狐身向前幾于濟矣而其尾在後濡于水中則不能濟無攸利占也將濟未濟故無所利初六初之畫得六為未濟之睽濡其尾象也此即彖辭所謂小狐之濡其尾者吝占也九二九居第二畫為未濟之晉曳其輪象也三四五互坎為輪二在其後為曳輪君子難進之象貞吉占也六三六居第三畫為未濟之鼎未濟征凶占也六三居險極宜于奮發而尚在險中是渡水而猶未濟所濟尚未盡于險則未可行于陸也未濟而其才弱故行則凶利涉天川占也六三變為剛則二三四成乾上卦變為坎矣而乾健在後能進而前故利涉也李氏曰蓋濟者可以水浮而不可以陸走也九四九居第四畫為未濟之蒙貞吉占也四陽剛比柔中之五故正主事則吉悔亡占也陽居隂宜有悔得所比故悔亡震用伐鬼方象也四變為柔二三四成震震謂動其奮發如雷之震也有離之戈兵為伐居離下畫之陽故為鬼方既濟伐鬼方九三為天子而伐之也未濟伐鬼方九二為諸侯而伐之也震諸侯象三年有賞于大國象也天子伐而三年克之者天子之兵勝也諸侯伐之而有賞于大國者用兵有功而受賞于天子也大國謂天子之國指五而言五陽位為大九四變為柔三四五成坤為國六五六居第五畫為未濟之訟貞吉占也六五柔中故正主事而吉無悔占也得中故雖不當位而無悔視九四之悔亡為尤善也君子之光象也君子謂九二離日在天下照地上光被于九二而為九二之光有孚占也九二為正應而孚于六五也吉占也六五下光于九二而九二上孚于六五所以吉也上九上之畫得九為未濟之解有孚于飲酒占也上九與六三應六三坎體為酒上就三飲酒而三往孚焉因飲酒而後有孚故曰有孚于飲酒無咎占也當未濟之時因歡洽而得正應之孚信故可無咎濡其首象也三坎體為水上在人之體為首上九下就六三飲酒而忘反如以上體之首下入坎水之內故六三之水得以濡上九之首也有孚失是占也柔邪易以溺人飲其酒而沈湎過度以至被水濡其首而亦不知則三雖有孚于上而上下皆失其正是者非之對失是者失其是也六畫俱六九為未濟之既濟經彖辭凡十三字爻辭凡七十字汔許訖切注易以以豉切湎彌免切易纂言卷二
