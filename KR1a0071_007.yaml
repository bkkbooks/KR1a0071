body:
  text: 易纂言卷七元吳澄撰繫辭上傳繫者謂如綴繩於物辭者易書之言也文王所作之辭繫於各卦之下者為象周公所作之辭繫於各畫之下者為爻夫子述此篇以釋文王周公所繫彖辭爻辭之意故曰繫辭傳未子曰通論一經之凡例無經可附而自為上下云天專地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣此言聖人因天地自然之易而作易也天者陽氣之輕清尊者謂其昭著在上也地者隂質之重濁卑者謂其凝聚在下也乾坤以三畫之卦言乾純陽之卦坤純隂之卦定謂定其方位定乾於上以擬天之尊定坤於下以擬地之卑也蓋羲皇卦圖乾上坤下離左坎右震下之左兊上之左巽上之右艮下之右八卦但言乾坤六卦在其中矣卑高以陳以天地間植物言藪澤墳衍原隰丘陵山嶽所生之草木卑高等第不一下土微草之著地者最卑高山喬木之參天者最高陳猶列也貴賤以卦之上下六位言上為貴下為賤位猶置也卦之六位目下而上猶兩間衆植之陳列而有卑高也動靜有常以天地之用言天運轉不已陽常動也地填嶷不移隂常靜也剛柔以卦之奇耦二畫言剛謂奇畫柔謂耦畫斷猶判也剛畫猶陽動之實而一柔畫猶隂靜之虛而二也方以類聚物以羣分以天地間動物言方謂東西南北物謂羽毛鱗介五方之人各以類聚諸族之物各以羣分吉凶以揲蓍求卦所值之占言生謂因此生出蓋卦之貴賤六位或比應相得而吉或比應不相得而凶猶人類物羣之聚分而有乖和也在天成象在地成形以天地之體言象謂日月星辰形謂水火土石成象於天者降而在地則象變而化為形成形於地者升而在天則形變而化為象變化以揲蓍求卦所變之畫言見謂因此顯見蓋卦之剛柔二畫或剛變而化柔或柔變而化剛猶在天之象或變而化形在地之形或變而化象也天地卑高動靜類羣象形者天地自然之易乾坤貴賤剛柔吉凶變化者聖人所作之易也是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女是故承上起下之辭承上文而言八卦章首但言乾坤蓋舉父母以包六子此先言六子而後總之以乾坤也摩與磨通猶兩石相磑切也蕩猶以器蕩于水上也畫卦之初以一剛一柔與第二畫之剛柔相摩而為四象又以二剛二柔與第三畫之剛柔相摩而為八卦八卦既成則又各以八悔卦蕩于一貞卦之上而一卦為八卦八卦為六十四卦也震為雷離為電霆即電也春秋穀梁傳曰震者何雷也電者何霆也巽為風坎為雨羲皇卦圖左起震而次以離鼓之以雷霆也又起巽而次以坎潤之以風雨也風不能潤風而雨故通言潤樂記潤作奮離為日坎為月艮山在西北嚴凝之方為寒兊澤在東南溫熱之方為暑左離次以兊者日之運行而為暑也右坎次以艮者月之運行而為寒也邵子曰日為暑月為寒書曰日月之行有冬有夏夏至之日道近極暑之侯也冬至之月道近極寒之候也文王卦位乾在西北故乾為寒羲皇卦位艮在西北故艮為寒也乾成男者父道也坤成女者母道也左起震厯離厯兊而終于乾右起巽厯坎厯艮而終於坤故以乾道成男坤道成女二句總之於後也乾知大始坤作成物乾以易知坤以簡能上言八卦而總之以乾坤此又接成男成女二句而專言乾坤也乾男為父者以其始物也始謂始其氣也坤女為母者以其成物也成謂成其質也知者主之而無心也作者為之而有迹也乾始物不言物者與下句坤成物互相備也始之上加大字者贊乾之始物甚大非坤之成物所可同也易簡者以乾坤之理言始物者乾之所知然乾之性健其知也宰物而不勞心故易而不難成物者坤之所作然坤之性順其作也從陽而不造事故簡而不繫此乾坤皆指天地而易之乾坤二卦象之者也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業上言天地之易簡此言人之易簡立心如乾之易則其心明白而人易知行事如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之共事者衆故有功有親則有人𫝊繼其心故自今而可至於永久有功則有人充拓其事故自小而可至于廣大德者言其心之所得業者言其事之所就德業至此可以為賢人矣易簡而天下之理得矣天下之理得而成位乎其中矣上言賢人之易簡此又言聖人之易簡得謂不失也聖人如乾坤之易簡而于天下之理一無所遺謂其能盡性也聖人能盡其性則可以與天地參天位乎上地位乎下而聖人位乎其中與天地並而為三故曰成位成者完全備具三者而無虧缺也傳五之一章凡百六十三字斷東亂切見賢遍切蕩定黨切大始音泰易並以豉切注著直略切見謂顯見並賢遍切磑于對切加大者泰聖人設卦觀象繫辭焉而明吉凶悔吝剛柔相推而生變化此篇名繫辭傳正以釋文王周公之繫彖繫爻也首章先言作易之本此章乃言繫辭之㫖聖人謂文王周公設卦謂文王設立六十四卦也揚子雲曰易始八卦而文王六十四蓋羲皇始有八卦之名至文王增益之而設立六十四卦之名也羲皇畫八卦因而重之則已有六十四卦之畫矣其時未有文字八卦之名止是因其三畫之形而生聲既有文字之後乃以乾兊離震巽坎艮坤為卦名之字然惟坤字震字是正卦名其餘六卦之名皆是假借他字若六十四卦則未有名也但以三畫卦名分注于各卦六畫之下以相識别而已文王仍八卦舊名而設為八純重卦之名又設立新名以名五十六卦而共為六十四卦名也象謂卦名所肖似文王之名卦皆象各卦之二體而立名既設卦名則觀其名之所肖似于卦名之下繫彖辭其明而占之為吉為凶為悔為吝也周公又因文王之彖而繫爻辭焉爻辭吉凶悔吝備彖辭但言吉凶惟革彖有悔亡一占周公之繫爻辭也又以剛柔兩畫相推而生出各爻之變化推如手之推柔推去剛則剛變而化柔剛推去柔則柔變而化剛也蓋爻辭有就未變之剛柔取義者亦有就已化之剛柔取義者是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也此覆說上文也然專指爻辭文王之卦名謂之象而周公之爻辭亦有所象爻辭中之言吉凶者以其于人事有失得之象也得故吉失故凶言悔吝者以其于人事有憂虞之象也憂謂憂患於中虞謂虞度於外事之憂虞雖未為失亦不為得而占之悔吝雖未至凶亦不為吉矣剛柔二畫之變化者天地陰陽有進退之象剛變而化柔象陽退而隂進柔變而化剛象陰退而陽進也已變而化之剛柔者天地隂陽有晝夜之象也剛之為柔象自晝而為夜柔之為剛象自夜而為晝也動者人之作為也三極天地人也三才同一至極之理故曰三極吉凶悔吝象人事之失得憂虞變化剛柔象天地隂陽之進退晝夜是六爻所言人事之動兼有天地人之道也是故君子所居而安者易之象也所樂而玩者爻之辭也君子謂學易之人安如安土之安樂如樂天之樂玩習熟也易之象即文王所名一卦之象爻之辭即周公所繫一爻之辭文王觀卦象繫彖辭此言象不言辭者文王之彖以象為本故言象以該辭周公爻辭亦有所象此言辭不言象者周公之爻以辭為用故言辭以該象學易之君子平居無事之時身所居處安之若命者於易之象有得也心所樂循玩之無斁者於爻之辭有得也是故君子居則觀其象而玩其辭動則觀其變而玩其占觀其象而玩其辭即上文二句常時學易者之事觀其變而玩其占乃動時用易者之事人有所作為之時問之於筮遇某卦某爻則觀其蓍䇿之變而玩其象爻占以應事也凡言變化者卦畫之變占言變者蓍䇿之變也傳五之二章凡百一十字而明吉凶下舊本無悔吝字易之象也舊本象作序今並依虞翻本而玩其占下舊本有是以自天祐之吉無不利十字案此乃文言𫝊釋大有上九爻辭錯簡重出在此今刪去樂音洛注識别上音志下彼列切手之推推去並吐回切度待洛切彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也此承上章正釋二聖人繫辭之㫖彖者文王所繫一卦之辭因名卦之象而言即上章所謂設卦觀象也爻者周公所繫六爻之辭因揲蓍之變而言即上章所謂剛柔相推而生變化也卦畫之變化而以蓍䇿之變言者蓋蓍三變得九則剛變而化柔蓍三變得六則柔變而化剛也彖辭爻辭或曰吉或曰凶者以言其事之有得有失也辭曰悔曰吝者以言其事雖未大失而已有小疵也辭曰無咎者以善其能補過也有過當有咎能補之則不過矣故得無咎也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔列貴賤者存乎位覆說爻者言乎變上貴下賤布列於六位而每位各繫以爻辭也齊小大者存乎卦覆說彖者言乎象項氏曰彖辭之例專取主爻為言隂爻為小陽爻為大或小或大雖有不齊而為一卦之主則無小人之間故謂之齊然存乎卦者存乎卦之位也位之貴賤以六爻言卦之大小以一爻言明於六位之中取一位以為卦主也澄謂分辨吉凶存乎彖爻之辭此覆說言乎其失得也悔吝介乎吉凶之間憂其所介則趨於吉不趨於凶矣此覆說言乎其小疵也震者動心戒懼之謂有咎而能戒懼則能改悔所為而可以無咎此覆說善補過也是故卦有小大辭有險易辭也者各指其所之上文有貴賤小大吉凶悔吝無咎五句此獨再提卦有小大而不及其他蓋卦彖為諸辭之總也卦主既有小大之殊而聖人繫辭則亦因時取宜其辭或難或易也之適也凡彖爻所言吉凶悔吝無咎之辭各指示人以所適之路使之趨於吉無咎而免於凶悔吝也傳五之三章凡九十四字易以豉切注小大之間居限切易易通卦象蓍數而言也卦畫蓍法皆羲皇肇創合卦與蓍而名之曰易前第二章第三章既釋繫辭之㫖以明文王周公之易矣自此第四章至第七章又推原易之道以明羲皇之易與天地準故能彌綸天地之道此言卦象之體同乎天地也準所以為平謂與之平等也彌如開弓愈開愈滿綸如合繩漸大彌綸謂充而廣之與天地之道一也仰以觀於天文俯以察於地理是故知幽明之故此言隂陽隱顯之道在天地者以申上文與天地準之意以謂以此易也卦之象觀於天文察於地理而皆相合易之與天地準也明者文之顯而易觀幽者理之隱而難察故謂所以然之迹知天文所以明地理所以幽之故則能彌綸天地之道矣原始反終故知死生之說此言卦象之體該乎萬物也原謂本其所從來反謂復其所歸往原始反終謂易中具萬物始終之理精氣為物游魂為變是故知鬼神之情狀此言隂陽屈伸之理在萬物者以申上文原始反終之意氣之精者聚則為物物謂自無而有萬物之始也魂之游者散則為變變謂自有而無萬物之終也鬼者氣之屈而歸神者氣之伸而至情言其用狀言其體知氣聚而伸氣散而屈之情狀則知死生之說矣天地之道幽明之故皆言天地也而以知幽明三句申釋彌綸天地二句死生之說鬼神之情狀皆言萬物也而以知鬼神三句申釋知死生二句其兩節各二句者言故而兩節各三句者言是故所以釋上文也羲皇卦象隂陽二畫而已然大而天地之與齊小而萬物始終之悉備觀先天方圓圖可見矣邵子曰圖雖無文吾終日言而未嘗離乎是蓋天地萬物之理盡在其中所謂與天地準原始反終者也與天地相似故不違此言蓍數之用與天地相似故其所占吉凶之應雖天地亦不能違之知周乎萬物而道濟天下故不過蓍數之用其燭物情無不通其前民用無不溥故雖萬物之衆天下之廣皆囿其中無或有踰越而出其外者旁行而不流此申上文與天地相似之意旁行如天而不流如地謂蓍之周萬物者其知無不遍及而因物之則其理一定不流蕩失正也下闕一句其意若曰中立而不滯蓋中立如地而不滯如天謂蓍之濟天下者其仁無少偏倚而因人之問其事多端不拘滯執一也樂天知命故不憂安土敦乎仁故能愛此申上文知周萬物道濟天下之意其知之周也順乎自然灼見其流行之理而事無迷惑是以不憂其道之濟也隨所居處每厚其慈閔之心而人有利益是以能愛或曰蓍亦有憂愛之情乎曰聖人以其知仁寓之於蓍蓍之知即聖人不憂之知也蓍之仁即聖人能愛之仁也其曰不憂猶後章言易無思也範圍天地之化而不過範鑄金之模也如範模在外圍繞得天地之化莫能踰越乎此此以卦象之與天地隼蓍數之與天地相似者言曲成萬物而不遺曲謂一偏纎悉成完而無一物之或遺也此以蓍數之知周萬物道濟天下者言通乎晝夜之道而知萬物死生之道通貫為一而能知之此以卦象之原始反終者言故神無方而易無體以上三句而觀則蓍數之神妙不測無有方所而卦象之變易隨時無有定體也傳五之四章凡百三十六字不流下闕五字詳其文勢蓋如老氏所謂獨立而不改周行而不殆彌木畀切知周音智樂音洛注合繩音閣易觀以䜴切嘗離來地切一隂一陽之謂道天地間隂陽二氣而已聖人合卦象與蓍數而名曰易者取隂陽互相更易之義莊氏云易以道隂陽是也故此章專言隂陽二字以明易之所以為易者隂陽也一隂一陽謂隂而陽陽而隂循環無端也周子曰動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根是也隂陽氣也道者理也然非别有一物在氣中即是氣而為之主宰者道也程子曰隂陽非道也所以一隂一陽者道也繼之者善也成之者性也繼之謂隂陽之運而為造化者繼續而無息也成之謂隂陽之凝而為人物者成完而無虧也繼續流行而無息者其理則謂之善成完備具而無虧者其理則謂之性繼之成之者隂陽之氣善者性者道也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣此因上文成之者性而言也此道以隂陽混成而賦與於人物則謂之性性之在人聖愚賢不肖一也而上聖大賢以下所禀隂陽之氣不能無偏或得陽之多而為仁者或得隂之多而為知者見之之之指道而言仁者知者各因其所偏而有見於道或謂之仁或謂之知不能盡如其性之所有而全之然仁知之人雖不能全其性猶各能見其一偏至若百姓之愚不肖則日用之間無非由行此道而皆不能知仁者知者知之而不全百姓由之而不知故君子之道雖各具於性然能全而知之者少矣君子通賢聖而言此道字即上文之謂道之道也顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德此因上文繼之者善而言也此道以隂陽相繼而流行於天地間則謂之善仁者生物之元由春生而為夏長之亨此仁顯見而發達乎外長物之所顯者生物之仁也故曰顯諸仁用者收物之利由秋收而為冬藏之貞此用藏伏而歸復乎內閉物之所藏者收物之用也故曰藏諸用二氣運行於四時之間鼓動萬物而生長收閉之然自生自長自收自閉天地無心而造化自然非如聖人之於民有所憂而治之教之也仁之顯而生長者為德之盛用之藏而收閉者為業之大德之為仁業之為用其顯者流行不息其藏者充塞無間此所謂易簡之善極其至者故贊之曰至矣哉生物之仁及夏而日長日盛故曰日新收物之用至冬而包括無餘故曰富有生生之謂易成象之謂乾效法之謂坤此以一陰一陽之謂道寓於卦象者言也陽畫變而生陰隂畫變而生陽互相變易生生不窮故曰易陽畫之竒如天氣之連亘而一者成天之象故曰乾凡陽畫皆乾非但三畫純陽為乾也隂畫之耦如地形之分斷而殊者效地之法故曰坤凡陰畫皆坤非但三畫純隂者為坤也乾坤法象之隂陽而主之者生生之易易者隂陽變易之體也其所以生生者道也極數知來之謂占通變之謂事陰陽不測之謂神此以一隂一陽之謂道寓於蓍數者言也窮極過揲掛扐之數以知方來之事之吉凶所謂占也貫通十有八變之變俾每變所得之占皆可行事而無窒礙所謂事也然數有九六七八之隂陽不可測知其為九六七八也變有五九四八之陰陽不可測知其為五九四八也故曰隂陽不測數者變之已成變者數之未定占在事之先事在占之後數變占事之隂陽而主之者隂陽不測之神神者隂陽神妙之用也其所以不測者道也上言乾坤之隂陽而先之以易此言占事之隂陽而終之以神以見變易之道在乎未有卦象之先而神妙之道行乎已有蓍數之後也傳五之五章凡百一十二字知者音智下同鮮上一注復動扶豆切夏長知兩切下同顯是賢遍切無間居限切易簡以豉切夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣此言易畫之廣大也禦猶止也不禦言其大謂以至逺之處而言則雖無窮無盡而其用遍及無所極也靜而正言其廣謂以至近之處而言則雖無思無為而其體兼該無所偏也備謂二皆具天地間衆理具備言雖至廣至大而其中纎悉不遺也下篇所謂易之為書廣大悉備是也夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉此言天地之廣大也乾坤謂天地非指易卦言也專謂無處不有直謂無可屈撓翕謂合而氣之專者藏乎此闢謂開而氣之直者出乎此以其專直而見其氣之大故曰大生焉以其翕闢而見其形之廣故曰廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德易其至矣乎言易書之廣大配乎天地之廣大先以此一句結上文兩節又推言易之變通配乎天地之四時易之陰陽配乎天地之日月蓋易書廣大之中有變通焉有陰陽之義焉亦猶天地之有四時日月也四時日月即天地猶易之六子即乾坤也易之廣大變通陰陽皆易簡之善為之主宰而天地之至德亦此簡易之善而已是易書易簡之善配乎天地之至德也天地之德至矣而易能配之則易之書亦可謂至也故贊之曰易其至矣乎此章曰乾天坤地曰四時日月者陰陽也曰易簡之善曰至德者道也善字因上章繼之者善而言傳五之六章凡九十字易其至矣乎上舊本有子曰字蓋因後人欲分此句屬下章故加子曰字以别之夫音扶下同易簡以䜴切注同夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地上章言易書之配天地此章言聖人配易中之天地也崇德者立心之易而所得日進日新也廣業者行事之簡而所就日充日富也德之進而新由所知之崇高明如天業之充而富由所履之卑平實如地天地設位而易行乎其中矣此天地謂易中之天地即兩儀之竒耦二畫也設位謂圓圖陽儀在左陰儀在右也易謂六子由陰陽交易而成卦也陽竒陰耦對立者天地之設位而乾陽坤隂交錯換易流行於其中以生六子也成性存存道義之門成性具知禮知天也禮地也存存謂無時不存也道謂所由之路義謂所處之宜道陽也義陰也門謂從此出也知禮之成性常存猶天地之位設也道義皆自所存之成性中出猶陰陽之變易流行於天地間也知之崇格物致知也禮之卑誠意慎獨也成性存存心正也道義者一身之應接萬事循理得宜無一不當也此章曰天地曰易者陰陽也曰成性曰道義者道也性字因上章成之者性而言傳五之七章凡四十一字夫音扶知音智注之易以䜴切當丁浪切聖人有以見天下之賾而擬諸其形容賾頤中深處以喻卦義之藴奧難見擬比類也諸之於也形容謂有形之狀貌可象者如天地日電雷風雲雨水泉火木山澤是也六畫之卦有畫無名其義賾而難見文王即其上下二體所象之物以擬之於是見其各卦難見之義以定其名也象其物宜是故謂之象宜猶稱也物宜謂所擬之物與卦畫之義相稱也象其物之宜稱者而以名其卦如卦之義與雲雷二物相稱則名之曰屯以雲雷鬱結未能成雨之象有屯之義也卦之義與山泉二物相稱則名之曰蒙以山下出泉未有所適之象有蒙之義也此象字謂文王之名卦故以對周公之繫爻而言不以彖對爻言而以象對爻言者文王未繫彖辭之先先立重卦之名謂之象象先於彖言象則彖在其中或以此象字為如說卦所列者彼乃彖爻之辭泛引物類以取象言爻足以包之矣何為與爻辭相對而言哉若謂獨指彖辭中所言之象則彖辭中所言之象甚少不如爻辭中所言之象為多豈有舍其所言之多者乃舉其所言之少者而名之曰象乎必不然矣故知此是指文王六十四卦之名為象也聖人有以見天下之動而觀其㑹通以行其典禮動謂人所作為之事㑹如㑹府之㑹自彼而來者面面可至通如通都之通自此而往者方方可達會通謂大中至正之理非一偏一曲有所拘礙者也典謂君臣父子夫婦長幼朋友五典禮謂吉凶軍賔嘉五禮人所行之事未有出於五典五禮之外者聖人見天下不一之動觀其極善之理以行其事見理精審則行事允當也繫辭焉以斷其吉凶是故謂之爻周公以處事之法為辭繫於各爻之下使筮而遇此爻者如此處事則吉不如此處事則凶也言天下之至賾而不可惡也言天下之至動而不可亂也惡謂厭惡亂謂棼亂文王所名六十四卦之象所以章顯天下至幽之義而名言宜稱人所易知則自不至於厭惡其賾矣周公所繫三百八十四爻之辭所以該載天下至多之事而處決精當人所易從則自不至於棼亂其動矣擬之而後言議之而後動擬議以成其變化擬之者比類於物以取義所謂擬諸其形容也文王名卦而謂之象者先擬之而後示人以言也言者謂其所定之名也議之者講度其理以處事所謂觀其㑹通以行其典禮也周公繫辭而謂之爻者先議之而後教人以動也動者謂其所占之事也其象之所擬爻之所議皆所以成定剛柔二畫之變化蓋畫有變化而一象可作六十四象用一爻可作十二爻用也傳五之八章凡九十五字此章後舊本有文言傳錯簡釋中孚九二同人九五大過初六謙九三乾上九節初九解六三爻辭七節賾思革切斷東亂切惡烏路切注緼于尹切稱昌證切長知兩切當丁浪切棼音分易知易從以豉切度待洛切天一地二天三地四天五地六天七地八天九地十天之氣専直而無間斷故其數一而竒地之形翕闢而有容受故其數二而耦天一地二者天地本數也一本而四支已有二矣而又加竒一耦二則為天三地四已有四矣而又加竒一耦二則為天五地六已有六矣而又加竒一耦二則為天七地八已有八矣而又加竒一耦二則為天九地十支四加而數成焉數成於十實則竒一耦二而已此天地自然之數也河圖數與此同天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也天數五謂一三五七九也地數五謂二四六八十也五位相得謂一得三五七九或三得一五七九或五得一三七九或七得一三五九或九得一三五七者天之五位相得也二得四六八十或四得二六八十或六得二四八十或八得二四六十或十得二四六八者地之五位相得也各有合者凡謂總并天五位相得則合而為二十有五地五位相得則合而為三十又總并天地之數則合而為五十有五凡陰變而化陽則為水木陽變而化陰則為火金皆以此五十五數而後完備故曰成變化蓋一生水六成之二生火七成之三生木八成之四生金九成之五生土十成之也鬼神即此二氣之屈伸往來者其所以運行終而復始者以此也故曰行鬼神大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五歲再閏故再扐而後掛衍如水之溢出平地加羡之意天地之數共十位然數起於一其對為二一參之而為三二兩之而為四有一二三四而十數具矣四者正位十者積數也故以正位之四衍積數之十每一加羡以四謂之衍如算數家之因法即天地數本一枝四之推也一而衍四者一并一則為五矣邵子所謂小衍之而為五是也二而衍四者二則八也并二則為十矣三而衍四者三則十二也并三則為十五矣四而衍四者四則十六也并四則為二十矣合五數十數十五數二十數則為五十邵子所謂大衍之數為五十是也衍母之一數之所起故大衍五十之數虛其一而不用所用者四十有九其數七七蓋以一一為體七七為用也分者兩手總持四十有九䇿信意平分為二兩謂陰陽左手所持之䇿象陽置之於左右手所持之䇿象陰置之於右掛者右手就所置右䇿之中取一䇿掛於左手小指無名指之間三謂陰陽及大一沖氣兩既分則一不可見故掛此一䇿以與左䇿右䇿為三以象陰陽沖氣之三也揲以手數之也大衍之母至四而具大衍之子以四而衍故數䇿之法每揲以四以象春夏秋冬之四也竒謂揲左揲右之餘扐謂扐於兩指間也先以右手四揲置右之䇿别置於所置左䇿位之右揲竟所餘或四或三或二或一歸之於左手無名指將指之間此初扐也又以右手四揲置左之䇿混於已揲右䇿之中揲竟所餘或四或一或二或三歸之於左手將指食指之間此再扐也厯法一章凡十九年七閏前閏至二年九月之外置後閏大率五年之間置閏者再故以掛一揲右揲左象不閏之嵗三初扐再扐象再閏之嵗二再扐既畢則合一掛二扐之䇿或五或九别置於所置左䇿位之左是謂一變復以兩手總持已揲之䇿或四十四或四十而分二掛一揲左初扐揲右再扐如前其一掛二扐之䇿或四或八别置於一變掛扐之左是謂二變復以兩手總持已揲之䇿或四卜或三十六或三十二而分二掛一揲左初扐揲右再扐如前其一掛二扐之䇿或四或八别置於二變掛扐之左是謂三變而得一畫矣再扐而後掛者言第一變再扐畢則第二變又掛一第二變再扐畢則第三變又掛一也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也此言過揲之䇿數三變得一畫第三變過揲所積其䇿三十六則曰九其䇿二十四則曰六其䇿二十八則曰七其䇿三十二則曰八周易用九六不用七八故三百八十四爻辭皆以九六名爻而不曰七八也若第三變得三十六䇿則為乾之初九其第六變第九變第十二變第十五變第十八變又各得三十六䇿則成乾之六畫而乾六畫之䇿共二百一十有六矣君第三變得二十四䇿則為坤之初六其第六變第九變第十二變第十五變第十八變又各得二十四䇿則成坤之六畫而坤六畫之䇿共百四十有四矣然陽畫非必皆得九而不得七陰畫非必皆得六而不得八但以易用九六故設言卦若得乾而六畫皆九卦若得坤而六畫皆六則其過揲之䇿數如此云爾期者四時一周匝也每嵗凡三百六十五日有竒十二月凡三百五十四日有竒三百六十者正數也嵗二十四氣共多五日有竒者氣之盈月十二朔共少五日有竒者朔之虛損其盈益其虛而為一期之正數三百六十日乾坤六畫之䇿數亦共三百六十與期三百六十日之數符也又以上下二篇六十四卦而言凡陽畫百九十二若皆以三十六䇿之九計之則為六千九百一十二䇿凡陰畫百九十二若皆以二十四䇿之六計之則為四千六百八䇿合之共萬有一千五百二十䇿與天地間萬物之數符也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣四營謂分二掛一揲四歸竒也營猶言規度也易變也謂揲蓍之一變也以分掛揲歸四者營度而成一變如是七十二營為十八變而成一卦也引如丈引之引謂加長之也伸謂舒展之也以此扺彼曰觸物之相同曰類長猶增益也畢猶盡也又遡其先而言四營成一變之後三變得一畫九變則得三畫而內卦之體具是為八卦中之一卦八卦者卦之小成也由九變引長而展之倍為十八變則得六畫而外卦之體全是為六十四卦中之一卦六十四卦者卦之大成也十八變成一卦之後其卦或不變或一畫二畫三畫四畫五畫變或六畫俱變若變則以此先得之卦觸彼同類之卦增益其名曰某卦之某卦而此一卦可變六十三卦充之則六十四卦可作四千九十六卦唯筮者所值何如爾夫自八而六十四自六十四而四千九十六足以該括天下之動凡人所能為之事盡在是矣顯道神德行道謂天之道德行謂人之所行吉凶禍福天之道也問蓍得此以占未來之事者能前知天道至幽也因占說出而幽者顯矣故曰顯道人之行事不敢自為必待決之於蓍聽從神物所告而為之則所行之事雖在人而實出於神矣故曰神德行蔡氏曰顯道闡幽也神德行微顯也是故可與酬酢可與佑神矣主導賔飲曰酬賔報主獻曰酢故人之應接事物譬之曰酬酢佑贊助也天道幽也以占而顯則雖天之道而可以用之應接人事矣德行人也以占而神則雖人之所行而可以贊助神之所為矣蓋所行皆神之所教訓則是以人而代神之所為也故曰佑知變化之道者其知神之所為乎此章自大衍至能事畢矣言蓍數之神自顯道至佑神矣言蓍占之神蓍變蓍占者神之所為也然變占之用究其所歸不外乎陰陽二畫之變化而已九六陰陽二畫之變化象天地陰陽二氣之變化也故章首天一地二至行鬼神也先以天地之數言陰陽變化之道然後言蓍數變占之神以見蓍之數而以此總結之曰知天數地數變化之道者其能知蓍數變占之所以神者乎傳五之九章凡二百二十字天一至地十舊本在第十一章之首程子張子並云此二十字宜在天數五上而朱子從之又案漢書律厯志引此章天一地二至行鬼神也六十四字相連則是班固時此簡猶未錯也知變化之道上舊本有子曰字亦是後人欲分此一節屬下章而妄增也程子朱子並云宜屬上章今從之期一作朞音基伸一作信音伸而長知兩切德行下孟切酬市由切酢在洛切佑舊本作祐今依荀氏作佑注復始扶豆切下復以同羡夷見切手數色主切下數䇿同度待洛切加長引長並如字長猶知兩切夫自音扶所行行事並如字易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占辭變象占皆聖人之道在易書之中者第八章已言象辭第九章已言變占故此章合四者並言之以謂以上易之書言謂謀議陳誨問辨應對等語辭謂彖爻一篇之辭動謂祭祀㛰姻田狩征伐等事變謂蓍䇿四營之變制器謂創物以利用象謂所擬物形之肖似卜筮謂叩神以決疑占謂所斷事情之可否是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此有為謂作內事有行謂作外事問謂問之於蓍以言與上以言同謂求彖爻之辭而以之發言也此三句尚辭者也其指蓍命謂令蓍之命蓍受人之命則答人所問如響之應聲或在逺或在近凡幽深難見之事皆遂知其方來之休咎此三句尚占者也至精謂其吉凶悔吝之辭甚驗蓋尚占然後得所尚之辭而至精之辭所以知所尚之占也參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此參三也伍五也參以變謂初揲之餘右四左四再揲三揲之餘右四左三左三右四合掛一及右左之餘得九得八而為耦者凡三也伍以變謂初揲之餘右三左一右一左三左二右三再揲二揲之餘左二右一右一左一合掛一及右左之餘得五得四而為竒者凡五也通謂暢逺不窒塞通伍之變五四皆為奇則參天而成天之文通參之變九八皆為耦則兩地而成地之文此三句尚變者也交入為錯綜猶綜絲之綜以作緯之絲交入作經之絲一一相間是謂錯綜極謂究竟之窮盡每以三變掛扐之數錯而綜之究竟至極則參參參為九者凡十二定為乾之象參參兩為八者凡十二定為兑之象參兩參為八者十二定為離之象參兩兩為七者凡十二定為震之象兩參參為八者凡四定為巽之象兩參兩為七者凡四定為坎之象兩兩參為七者凡四定為艮之象兩兩兩為六者凡四定為坤之象定此六十四象與重卦六十四之數相符觀之可以制器矣此三句尚象者也至變謂其彼此多少之數不常蓋尚象必先由所尚之變而至變之變所以定所尚之象也易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此易謂蓍卦此總上四者而言寂閴靜也感觸動也蓍枯莖爾卦陳編爾非能有所思慮有所作為也未用則寂然不動同於無情之物及有人問之一感觸而動遂能通達天下之事故而無一不知靜則同乎一物動則妙乎萬物其至神不可測者如此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至極深謂卦之辭能窮極理之深邃研幾謂蓍之變能磨研事之幾微朱子曰極深者至精也研幾者至變也澄謂唯辭之能極深也故以辭為占則可以前知而開通天下人之心志唯變之能研幾也故以變得象則可以制作而完成天下人之事務然辭占變象所以能如此者皆妙不可測之神為之唯其妙不可測故不待疾之而自速不待行之而自至謂自然而然非人所能為也易有聖人之道四焉者此之謂也重舉起語作結語以終此章傳五之十章凡二百六字章末易有上舊本有子曰字與音預下同夫音扶注斷丁亂切否符苟切相間居限切間夫役切邃徐醉切夫易何為者也開物成務冒天下之道如斯而已者也設問而自答開物謂人所求知者開發之成務謂人所欲為者成全之冒謂韜尸之冒謂天下之道悉包裹於其中也此第一節總起下文六節是故聖人以通天下之志以定天下之業以斷天下之疑通志開物也定業成務也斷疑謂易於天下之道包裹無遺故於天下之疑事皆能決之也此第二節是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密圓謂七七之用無所凝滯方謂八八之體無所缺折易謂變易貢猶告也圓而叵測所以通志方而能知所以定業因蓍變所得卦內之爻辭告人以吉凶而決其疑也洗謂滌去思慮退謂退處藏謂潛藏密靜也聖人以此蓍卦六爻俾民自擇吉凶則其心脫然無纍而得以退處潛藏於無為也此第三節之始吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其德夫申上文意言不能趨吉避凶者民之所患也聖人亦為民而患之故曰同患聖人未能忘民之所患則何以能退藏於密者蓋以其與民同患之心寓之於蓍卦有蓍之神足以知吉凶未至之事於其先有卦之知足以藏吉凶已定之理於其內俾民問蓍求卦則自能趨吉避凶而聖人之心不復以此為患也能如是者其誰乎故設問云其孰能與於此哉而又自答之也古蓋謂羲皇聰明睿知謂耳之所聞目之所覩心之所思無不能知生知之知也神武不殺蓋借不殺之武以譬不言之教教之必以言猶武之必以殺也神於武者不待殺而敵自服以譬神於教者不待言而民自喻也明於天之道謂卦之知興猶言起立神物謂蓍之神齊戒即洗心也齊者致齊戒者散齊皆屏絶人事不以役心也神明即神知其指蓍卦言德即上文所謂蓍之德卦之德聖人以其生知之知寓諸卦故明於天道之卦可為察民事之知以其不言而教之神寓諸蓍故興起人物之蓍可為前民用之神聖人則無所用其心若齊戒然凡民有事皆必取決於蓍卦而信其為神信其為知所以神明蓍卦之德也但舉蓍卦二者而不復言六爻之義蓋二者足以該之此第三節之終是故闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神闔户謂蓍之未分猶坤之靜翕含靜專者於內也闢户謂蓍之既分猶乾之動直自動闢者而出也一合一分而蓍之一變成往來不窮謂兩揲兩扐左右多少之數無定也左往而來右則左少右多右往而來左則右少左多故謂卦之象著見因象以知器生其象而制之以為器則民得而用之也不但制器可以利民之用凡出而作外事入而作內事無一不問於蓍故曰咸用之此第四節承上第三節申言圓而神之蓍因及制器者所尚之象闔闢變通蓍之圓也象器法民咸用之者其神也是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業易謂陽竒陰耦互相更換而為四象八卦也太者大之至也極者屋棟之名天地間之有此理猶屋之有極也易有太極謂一陰一陽之相易有理以為之主宰也儀匹也一陰一陽相匹配而為兩卦之第一畫也是謂兩儀兩儀之上各加一陽一陰則倍二而為四卦之第二畫也是謂四象四象之上又各加一陽一隂則倍四而為八卦之第三畫也是謂八卦有此八卦則其别有六十四而可用之占筮以定吉凶俾民無所疑而勇於趨事赴功故曰生大業此第五節承上第三節申言方以知之卦因及卜筮者所尚之否二四而八卦之方也定吉凶生大業者其知也是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月法謂地之理象謂天之文天地謂乾坤二卦變通謂陰陽寒暑之相禪不窮四時謂震巽艮兊四卦日月謂坎離二卦飛走草木亦有文理朝暮晝夜亦有變通列星亦懸象著明而皆不如天地四時日月之大故聖人畫八卦以象天地象四時象日月也此第六節之始言卦以申第五節之意崇高莫大乎富貴備物致用立象成器以為天下利莫大乎聖人崇高謂位在人上富謂有四海貴謂為天子以位而言無如有四海為天子之崇高者將言聖人之利天下而先言此蓋苟無其位則雖有其德亦不能以利天下也備物蓋指生蓍而言致用謂以之占決庶物立象蓋指畫卦而言成器謂以之制作百度古初以來若鑽燧取火合土範金造字制律厯數醫藥等類何莫非備物制用立象成器以利天下之事聖人亦有不自為而任人為之者帷有蓍卦則出於聖人神知之所獨而非他人所能古之為天下利者不一而莫大於生蓍畫卦之聖人也此第六節之中於言卦之後言蓍之前特言聖人於二者之間以表蓍卦之利皆聖人之功也探賾索隱鉤深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜探如以手入內而取之索謂求之於彼鈎如以鈎引下而取之致謂至之於此亹亹猶勉勉也賾者隱而不可見如探於頤之賾而求之使隱者顯而可見也深者逺而不可即如鈎於水之深而致之使逺者近而可即也此謂蓍之靈能知末來幽深之事也定此事為吉此事為凶事既瞭然而無疑則勉勉行之而不怠也占決吉凶固亦有其他小術而皆莫能如蓍龜之卜筮言蓍而兼言龜者卜筮之理一也此第六節之終言蓍以申第四節之意第四節第五節分言蓍卦至此合言蓍卦而歸功於聖人也是故天生神物聖人則之天生蓍龜神物聖人則之者用之以卜筮也此第七節之始言蓍以申第六節莫大乎蓍龜之意天地變化聖人效之天垂象見吉凶聖人象之變化即四時之變通效之者效天地四時以畫乾坤震巽艮兑也見猶示也日月如常則是示人以吉有變則是示人以凶象之者象日月以畫坎離也此第七節之中言卦以申第六節莫大乎天地莫大乎四時莫大乎日月之意河出圖洛出書聖人則之河圖者羲皇時河出龍馬背之旋毛後一六前二七左三八右四九中五十以象旋毛如星㸃而謂之圖羲皇則其陽竒陰耦之數以畫卦生蓍洛書者禹治水時洛出神龜背之拆文前九後一左三右七中五前之右二前之左四後之右六後之左八以其拆文如字畫而謂之書禹則其自一至九之數以叙洪範九疇洛書雖出於畫卦生蓍之後而并言之者亦言其理之一如言蓍筮而并及龜卜也此第七節之終既言蓍言卦矣而又言此者此為蓍卦之本原也傳五之十一章凡三百四十字開物成務上舊本再有夫易二字陸氏曰一本無今從之立象成器舊本無象字朱子曰立下疑有闕文澄案荀悅漢紀引此文作立象成器今增補夫易音扶者夫德夫同以斷東亂切以知音至知以睿知同易以音亦洗悉殄切與於音預齊戒側皆切見乃賢遍切見吉同太極音泰縣音𤣥探吐南切注求知能知知吉生知並如字餘並音至屏卑正切復言符后切蓍見賢遍切其别彼列切易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也四象謂竒上加竒竒上加耦耦上加竒耦上加耦也凡畫卦自八而十六十六而三十二三十二而六十四皆由此四者而生四象者羲皇六十四卦之畫也示謂示人以意繫辭者文王周公所繫彖爻之辭也告謂告人以言既告以言而為教為戒又定其占之為吉為凶所以斷決其疑而使之趨避也書不盡言言不盡意然則聖人之意其不可見乎書不盡言言不盡意或古有是語也上文四象繫辭定吉凶皆謂易之書也此承上文而謂書有限言無窮易經上下二篇之書豈能盡聖人之言又謂言有限意無窮雖有六十四彖三百八十四爻之言豈能盡聖人之意然則以下設問而下文答之也聖人立象以盡意設卦以盡情僞繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神立象謂羲皇之卦畫所以示者也盡意謂雖無言而與民同患之意悉具於其中設卦謂文王設立重卦之名也盡情僞謂六十四名足以盡天下事物之情其情之本乎性而善者曰情情之怫乎性而不善者曰僞辭謂文王周公之彖爻所以告者也羲皇之卦畫足以盡意矣文王又因卦之象設卦之名以盡情僞然卦雖有名而未有辭也又繫彖辭爻辭則足以盡其言矣此三句答上文不盡言不盡意二語設卦一句在立象之後繫辭之前蓋竟盡意之緒啓盡言之端也盡意盡情僞盡言者皆所以為天下利又恐其利有所未盡於是作揲蓍十有八變之法使其所用之䇿往來多少相通不窮而其所得之卦一可為六十四亦相通不窮其象其辭皆可通用而不局於一則其用愈廣而足以盡利矣因變得占以定吉凶則民皆無疑而行事不倦如以鼓聲作舞容鼓聲愈疾而舞容亦愈疾鼓聲不已而舞容亦不已自然而然不知其孰使之者所謂盡神也項氏曰立象設卦繫辭三盡者作易之事變通鼓舞二盡者用易之事澄謂立象設卦象也繫辭辭也變通變也鼓舞占也乾坤其易之緼邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣此申立象以盡意一句乾坤謂兩儀竒畫為乾耦畫為坤非謂三畫已成之卦也上云易有四象此又以四象本乎兩儀也成列謂竒耦二畫相對易謂竒耦交互相易緼謂藏蓄在中如衣之著也有陽儀陰儀則一易而成四象再易而成八卦毁謂不先列兩儀之體無此體則無以見其相易之用乾坤相易之用不可見則其一定之體殆若無所用故曰幾乎息是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業有乾坤則相易而成八卦八卦皆象有形之物而兩儀之本乎太極則無形也故有形之上者道也太極是也有形之下者器也八卦所象之物是也因剛畫之可化柔柔畫之可化剛而以揲蓍之變裁制之使蓍之三變得九則剛畫化柔三變得六則柔畫化剛惟得七得八則剛自為剛柔自為柔而不化也推即剛柔相推之推行謂通行此可為彼彼可為此也既有卦畫之象又有蓍䇿變通之法舉此二者錯之天下之民俾用之以占則得以成務定業也聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其㑹通以行其典禮繫辭焉以斷其吉凶是故謂之爻朱子曰重出以起下文澄案象其物宜謂文王之象申設卦以盡情僞一句繫辭以斷吉凶謂周公之爻申繫辭焉以盡其言一句極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行極猶極深之極卦即象也辭即爻也上文七謂明其所以然者也此之六存實其所能然者也神而明之即前章所謂神明其德也之指蓍卦其人謂聖人聖人不自用其神知而教民用蓍卦以占所以明蓍之為神明卦之為知也默即不言也聖人不以言教而托蓍卦以教民趨避吉凶是不言而成全之也聖人雖不言而能使民自信蓍卦之為神明德行者謂聖人有德有行備陳蓍卦之象辭變占而歸功於作易用易之聖人也傳五之十二章凡二百六十五字所以斷也下舊本有文言傳錯簡釋大有上九爻辭一節因此間隔後人遂截此以上二十四字屬上章而於書不盡言上加子曰字以為此章之首聖人有以見天下之賾上舊本有是故夫象四字東萊吕氏音訓曰衍文斷東亂切緼委引切錯七故切一作措德行下孟切注衣之著展吕切神知音至為知同易纂言卷七
