body:
  text: 易纂言易類提要臣等謹案易纂言十二卷元吳澄撰字幼清號草廬崇仁人宋咸淳末舉進士不第入元以薦擢翰林應奉文字官至翰林學士卒諡文正事迹具元史本傳是書用吕祖謙古易本經文每卦先列卦變主爻每爻先列變爻次列象占十翼亦各分章數其訓解各附句下音釋考證則經附每卦之末傳附每章之末間有文義相因即附辨于句下者偶一二見非通例也澄于諸經好臆為點竄惟此書所改則有根據者為多如師卦丈人吉改大人吉據崔憬所引子夏傳本比卦比之匪人下增凶字據王肅本小畜卦輿説輻改輿説輹據許慎説文尚德載改尚得載據京房虞翻子夏本泰卦包荒改包巟據説文及虞翻本大畜卦曰間輿衛改日間輿衛從鄭元虞翻陸希聲本萃卦萃亨刪亨字從馬融鄭元虞翻陸績本困卦劓刖改臲卼據荀爽王肅陸績本鼎卦其形渥改其刑剭據鄭元本比彖比吉也刪也字據王昭素本賁彖補剛柔交錯四字據王弼注震彖驚逺而慎邇也下補不喪匕鬯四字據王昭素所引徐氏本漸彖女歸吉也改女歸吉利貞據王肅本坤象履霜堅氷改初六履霜據魏志坎象樽酒簋二刪二字據陸德明釋文案澄注明言舊本有二字陸氏釋文無之今世所行張弧陸希聲本皆同是傳文已刪去二字徐氏通志堂本乃劖補刋板增入二字是顧湄等校正之時以不誤為誤也謹附識于此繫辭上傳繫辭焉而明吉凶下補悔吝二字據虞翻本繫辭下傳何以守位曰仁改何以守位曰人據王肅本耒耨之利改耒耨之地據王昭素本以濟不通下刪致逺以利天下六字據陸德明釋文序卦傳故受之以履下補履者禮也四字據韓康伯本皆據引古義具有源流不比師心變亂其餘亦多依傍胡瑗程子朱子諸説澄所自改正者不過數條而已惟以繫辭傳中説上下經十六卦十八爻之文定為錯簡移置于文言傳中則悍然臆斷不可以為訓矣然其解釋經義詞簡理明融貫舊聞亦頗賅洽在元人説易諸家固終為巨擘焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書易纂言卷首元吳澄撰易易者陰易相變易也上古包羲氏見天地萬物之性情形體一易一陰而已於是作一竒畫以象陽作一耦畫以象陰見一陽一陰之互相易也故自一竒一耦相易而為四象八卦極於六十四卦是為卦畫之象又作揲蓍之法教民以卦而占吉凶自一變而極於十有八變是為蓍數之變卦象蓍變皆以陰陽相易故名之曰易其時未有易字也後之造字者合日月二文而為易字日陽精昱乎畫月陰精昱乎夜日往則月來月往則日來陰陽相易而成晝夜故易從日從月字書乂謂易字象蜥蜴之形而假借為變易之易蓋不然也禮記曰昔者聖人達陰陽天地之情立以為易􅅀􅄲羲皇畫卦之時先作此一畫一者為竒陽之象也一者為耦陰之象也陽渾合無間故一陰受衡即開故二後人名之為兩儀繫辭傳曰易有太極是生兩儀邵子謂一分為二朱子謂一竒一耦為一畫者二是也其畫一其位二其竒耦之數三竒耦一畫之上再加一竒一耦以象陰陽之有老少竒上加竒者陽之純故象老陽竒上加耦者陰雜於陽中故象少陰耦上加竒者陽雜於陰中故象少陽耦上加耦者陰之純故象老陰後人名之為四象繫辭傳曰兩儀生四象邵子謂二分為四朱子謂兩儀八各生竒耦為二畫者四是也其畫二其位四其積畫其竒耦之數十二蓋一畫加一為二其位則倍二為四也二畫之上又各加一竒一耦竒竒之上加一竒象天而名乾竒竒之上加一耦象澤而名兊竒耦之上加一竒象日象火而名離竒耦之上加一耦象雷而名震耦竒之上加一竒象風而名巽耦竒之上加一耦象月象水而名坎耦耦之上加一竒象山而名艮耦耦之上加一耦象地而名坤乾一兊二離三震四巽五坎六艮七坤八總名之曰八卦然當時未有乾兊離震巽坎艮坤八字及卦字也即此各卦三畫之象而名為乾名為兊名為離名為震名為巽名為坎名為艮名為坤也天地山澤日月水火雷風亦有其名而未有其字繫辭傳曰四象生八卦八卦成列象在其中矣邵子謂四分為八朱子謂四象各生竒耦為三畫者八是也其畫三其位八其積畫二十四其竒耦之數三十六蓋二畫加一為三其位則倍四為八也畫至三而卦有八為卦之小成三才之象具矣故定為此圖直豎則乾上坤下離左坎右震左後兊左前巽右前艮右後平布則乾南坤北離東坎西震東北兊東南巽西南艮西北繫辭傳曰天尊地卑乾坤定矣説卦傳曰天地定位山澤通氣雷風相薄水火不相射謂此圖也邵子曰太極既分兩儀立矣陽下交於陰陰上交於陽四象生矣陽交於陰陰交於陽而生天之四象剛交於柔柔交於剛而生地之四象於是八卦成矣乾以分之坤以翕之震以長之巽以消之長則分分則消消則翕也乾坤定位也震巽一交也兊離坎艮再交也震陽少而陰尚多也巽陰少而陽尚多也兊離陽浸多也坎艮陰浸多也乾坤之名位不可易也坎離名可易而位不可易也震巽位可易而名不可易也兊艮名與位皆可易也離在天而當夜故陽中有陰也坎在地而當晝故陰中有陽也震始交陰而陽生巽始消陽而陰生兊陽長也艮陰長也震兊在天之陰也巽艮在地之陽也故震兊上陰而下陽巽艮上陽而下陰天以始生言之故陰上而陽下交泰之義也地以既成言之故陽上而陰下尊卑之位也順數之乾一兊二離三震四巽五坎六艮七坤八逆數之震一離兊二乾三巽四坎艮五坤六也乾坤定上下之位離坎列左右之門天地之所闔闢日月之所出入是以春夏秋冬晦朔弦望畫夜長短行度盈縮莫不由乎此矣乾坤縱而六子衡易之本也三畫之上又各加一竒一耦邵子謂八分為十六朱子謂八卦各生竒耦為四畫者十六兩儀之上加八卦八卦之上加兩儀是也其畫四其位十六其積畫六十四其竒耦之數九十六蓋三畫加一為四而其位則倍八為十六也四畫之上又各加一竒一耦邵子謂十六分為三十二朱子謂四畫各生竒耦為五畫者三十二四象之上加八卦八卦之上加四象是也其畫五其位三十二其積畫一百六十其竒耦之數二百四十蓋四畫加一為五其位則倍十六為三十二也五畫之上又各加一竒一耦邵子謂三十二分為六十四朱子謂五畫各生竒耦為六畫者六十四蔡氏謂八卦重為六十四卦一卦之上各有八卦是也其畫六其位六十四其積畫三百八十四其竒耦之數五百七十六蓋五畫加一為六其位則倍三十二為六十四也邵子曰一變而二二變而四三變而八卦成矣四變而十有六五變而三十有二六變而六十四卦備矣畫至六而卦有六十四為卦之大成兼三才而兩之萬物萬事悉備矣故又為此圖以圎函方圎者象天周地外方者象地在天中説卦傳曰八卦相錯數往者順知來者逆謂此圖也邵子曰八卦相交錯而成六十四卦數往者若順天而行是左旋也皆已生之卦也知來者若逆天而行是右行也皆未生之卦也無極之前陰含陽也有象之後陽分陰也陰為陽之母陽為陰之父故母孕長男而為復父生長女而為姤是以陽起於復陰起於姤也夫易根于乾坤而生于姤復蓋剛交柔而為復柔交剛而為姤自兹而無窮矣復至乾凡百有十二陽姤至坤凡八十陽姤至坤凡百有十二陰復至乾凡八十陰陽在陰中陽逆行陰在陽中陰逆行陽在陽中陰在陰中則皆順行此真至理案圖可見之矣邵氏曰此圖圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生于子中極于午中陰生于午中極于子中其陽在南其陰在北方布者乾始于西北坤盡于東南其陽在北其陰在南二者陰陽對待之數圖於外者為陽方於中者為陰圓者動而為天方者靜而為地也右羲皇之易昔在羲皇始畫八卦因而重之為六十四當是時易有圖而無書也後聖因之作連山作歸藏作周易雖一本諸羲皇之圖而其取用蓋各不同焉三易既亡其二而周易獨存世儒誦習知有周易而已羲皇卦圖鮮或傳授而淪落於方伎家雖其説具見於夫子之繫辭説卦而讀者莫之察也至宋邵子始得而發揮之於是人乃知有羲皇之易而學易者不斷自文王周公始也今於易之一經首揭此圖冠于經端以為羲皇之易而後以三易繼之蓋欲使夫學者知易之本源不至尋流逐末而昧其所自云爾以上凡八圖其八卦定位六十四卦方圎凡二圖邵子得之於李之才挺之李得之穆修伯長穆得之希夷先生陳摶圖南蓋羲皇八卦重卦既成之後作此二圖也儒者不傳而方伎家傳之以為修養火候之節其一畫二畫三畫四畫五畫六畫凡六圖則朱子推而得之載於易學啓蒙雖失其傳授所自然考夫子繫辭傳所言及邵子觀物外篇所推則古有此圖也必矣蓋羲皇未作八卦定位重卦方圓二圖之時先有此圖也故今定此以為羲皇之易云易連山艮下艮上此連山易之首卦也以下六十三卦先後之次不可知右夏之易周官大卜掌三易一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四或曰神農作連山夏因之以其首艮故曰連山今亡歸藏坤下坤上此歸藏易之首卦也以下六十三卦先後之次不可知右商之易子曰我欲觀殷道是故之宋而不足徴也吾得坤乾焉説者以坤乾為歸藏或曰黃帝作歸藏商因之以其首坤故曰歸藏今亡案夏商二易蓋因羲皇所畫之卦而用之以占筮卦序與先天自然之序不同故連山首艮歸藏首坤朱子易贊曰降帝而王傳夏歷商有占無文民用弗彰以為二易無繇辭也或曰春秋左氏傳所載繇辭與周易不同者蓋夏商之易則以為有繇辭矣然今莫可考證世俗所傳歸藏易偽書也易纂言卷首
